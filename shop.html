<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Kereskedő - Death's Armada</title>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="responsive.css">
    <style>
        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; }
/* HEADER */
        .shop-header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 10px 20px; background: rgba(0,0,0,0.9); border-bottom: 2px solid var(--gold); 
            position: sticky; top: 0; z-index: 100;
        }
        .gold-display { color: var(--gold); font-size: 1.3em; border: 1px solid var(--gold); padding: 5px 15px; border-radius: 6px; background: rgba(255,255,255,0.05); }

        /* LAYOUT */
        .trade-layout { 
            display: flex; justify-content: center; align-items: stretch; 
            padding: 20px; gap: 16px; max-width: 1800px; margin: 0 auto; 
        }

        .panel { 
            background: var(--panel-bg); border: 2px solid var(--gold); border-radius: 8px; 
            display: flex; flex-direction: column; align-items: center; padding: 15px; 
            width: 306px; flex-shrink: 0; /* kb. 10%-kal kisebb */
            min-height: 640px;
        }
        .seller-panel {
            width: 520px;
            margin-left: -90px;
        }
        .bag-panel {
            width: 520px;
            margin-right: -90px;
        }
        .deal-zone {
            width: 420px;
            flex: 0 0 420px;
        }
        .panel-header { color: var(--gold); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; border-bottom: 1px solid var(--gold); width: 100%; text-align: center; padding-bottom: 5px; }

        .avatar-box { width: 260px; max-width: 100%; aspect-ratio: 1/1; border: 3px solid var(--gold); border-radius: 4px; overflow: hidden; background: #000; margin-bottom: 10px; }
        .avatar-box img { width: 100%; height: 100%; object-fit: cover; object-position: center 20%; }

        /* ITEM GRID */
        .item-grid { 
            width: 100%; height: 320px; display: grid; grid-template-columns: repeat(6, minmax(0, 1fr)); 
            gap: 12px; overflow-y: auto; padding: 10px 5px; border-top: 1px solid #444;
            grid-auto-rows: 148px;
            align-content: start;
        }
        .item-grid::-webkit-scrollbar { width: 4px; }
        .item-grid::-webkit-scrollbar-thumb { background: var(--gold); }

        .item-slot { 
            background: transparent; border: none; padding: 2px;
            text-align: center; cursor: pointer; border-radius: 4px; transition: 0.2s;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            overflow: visible;
            position: relative;
        }
        .item-slot:hover { background: transparent; }
        .item-slot .item-art {
            width: 100%;
            height: 78px;
            background: rgba(0, 0, 0, 0.92);
            border: 1px solid #222;
            border-radius: 8px;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 4px;
            position: relative;
        }
        .item-slot img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center top;
            margin: 0;
            display: block;
        }
        .item-slot .name {
            width: 100%;
            font-size: 0.58em;
            display: block;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: #eee;
            margin-top: 6px;
            opacity: 0.9;
            line-height: 1.15;
            min-height: 12px;
        }
        .item-slot .price-tag {
            width: auto;
            max-width: 92%;
            padding: 2px 8px;
            font-size: 0.6em;
            font-weight: bold;
            color: #ffd24d;
            background: rgba(0,0,0,0.92);
            border: 1px solid #c5a059;
            border-radius: 8px;
            text-shadow: 0 0 8px rgba(255, 210, 77, 0.9);
            box-shadow: inset 0 0 8px rgba(255, 210, 77, 0.15), 0 0 6px rgba(0,0,0,0.8);
            position: relative;
            margin-top: 4px;
            white-space: nowrap;
            z-index: 3;
        }

        /* DEAL ZONE */
        .deal-display { 
            width: 100%; min-height: 250px; background: rgba(0,0,0,0.8); 
            border: 2px dashed var(--gold); border-radius: 15px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            margin-bottom: 15px; text-align: center; padding: 15px; 
        }
        .deal-display img.big-item-preview { width: 140px; height: 140px; object-fit: contain; filter: drop-shadow(0 0 10px var(--gold)); }

        .btn-group { width: 100%; display: flex; flex-direction: column; gap: 8px; }
        .btn-action { width: 100%; padding: 12px; font-family: 'MedievalSharp'; font-size: 1.1em; cursor: pointer; border-radius: 6px; }
        .buy-btn { background: var(--accent); color: white; border: 1px solid #f00; }
        .sell-btn { background: #2d5a27; color: white; border: 1px solid #5f5; }
        .cancel-btn { background: #333; color: #ccc; border: 1px solid #555; }
/* --- MOBIL OPTIMALIZÁLÁS --- */
        @media (max-width: 1100px) {
            .trade-layout { 
                flex-direction: column; 
                align-items: center; 
                padding-bottom: 80px; 
            }
            .panel { width: 100%; max-width: 500px; margin-left: 0; margin-right: 0; min-height: auto; }
            .deal-zone { width: 100%; flex: 0 0 auto; }
            .deal-zone { order: -1; position: sticky; top: 70px; z-index: 90; margin-bottom: 10px; } /* Az alku zóna legyen szem előtt */
            .avatar-box { height: 200px; } /* Mobilon ne foglaljon annyi helyet a kép */
            .item-grid { grid-template-columns: repeat(6, minmax(0, 1fr)); height: auto; max-height: 400px; }
            .shop-header { padding: 10px; }
            .shop-header div:first-child { font-size: 1.2em; }
        }

        @media (max-width: 500px) {
            .item-grid { grid-template-columns: repeat(6, minmax(0, 1fr)); }
            .avatar-box { display: none; } /* Nagyon kicsi telón kapcsoljuk ki az avatarokat a shopban, hogy elférjen a rács */
        }
    </style>
</head>
<body class="page-shop">

<div class="master-bg"></div>

<div class="shop-header">
    <div>🛒 Kalmár Sátra</div>
    <div class="gold-display">💰 <span id="current-gold">0</span></div>
</div>

<div class="trade-layout">
    <div class="panel seller-panel">
        <div class="panel-header">Kereskedő</div>
        <div class="avatar-box">
            <img src="https://i.ibb.co/LzMTVrSt/Copilot-20260405-024414.png" alt="Merchant">
        </div>
        <div id="shop-items" class="item-grid"></div>
    </div>

    <div class="panel deal-zone">
        <div id="deal-container" class="deal-display">
            <div style="font-style: italic; color: #555;">Válassz egy árut...</div>
        </div>
        <div id="action-area" class="btn-group"></div>
    </div>

    <div class="panel bag-panel">
        <div class="panel-header">Hátizsákod</div>
        <div class="avatar-box">
            <img id="player-img" src="" alt="Player Avatar">
        </div>
        <div id="player-inventory" class="item-grid"></div>
    </div>
</div>

<a href="index.html" class="btn-back">⬅ Várba</a>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-functions-compat.js"></script>
<script src="firebase-credentials.js"></script>
<script src="items.js"></script>

<script>
    const db = window.initFirebaseDb();
    const functionsClient = firebase.functions(undefined, 'europe-west1');
    const secureShopTrade = functionsClient.httpsCallable('secureShopTrade');

    const myId = localStorage.getItem('selectedCharId');
    let myGold = 0;
    let selectedItem = null;
    let selectedType = "";
    let currentInv = {};
    const EQUIP_SLOTS = ["sisak", "fegyver", "páncél", "pajzs", "lábvért", "cipő"];
    const STACKABLE_TYPES = new Set(["consumable"]);
    const ITEM_FALLBACK_IMG = "https://via.placeholder.com/96/0b0b0b/3a3a3a?text=%20";

    const HERO_IMAGES = { "Harcos": "https://i.ibb.co/20BXyqpy/Copilot-20260403-032810.png", "Mágus": "https://i.ibb.co/yFz5bcXv/Copilot-20260403-033651.png", "Lovag": "https://i.ibb.co/Fk3n339M/Copilot-20260403-034043.png", "Íjász": "https://i.ibb.co/whd2jNpB/Copilot-20260403-034402.png", "Bérgyilkos": "https://i.ibb.co/b525CsLg/Copilot-20260403-032807.png", "Nekromanta": "https://i.ibb.co/NnCwwCbR/Copilot-20260403-033301.png" };

    if (!myId) window.location.href = 'index.html';

    db.ref(`characters/${myId}`).on('value', snap => {
        const data = snap.val();
        if (!data) return;
        window.__latestCharData = data;
        myGold = data.gold || 0;
        document.getElementById('current-gold').innerText = myGold;
        document.getElementById('player-img').src = HERO_IMAGES[data.charClass] || "";
        renderPlayerInventory(data.inventory || {});
    });

    function renderShop() {
        const shopItems = document.getElementById('shop-items');
        shopItems.innerHTML = Object.keys(ITEMS).filter(key => {
            const i = ITEMS[key];
            const isWeapon = i.type === "fegyver" || i.type === "weapon";
            return !(isWeapon && i.rarity === "legendary");
        }).map(key => {
            const i = ITEMS[key];
            const imgSrc = (i.img && String(i.img).trim()) ? i.img : ITEM_FALLBACK_IMG;
            return `
                <div class="item-slot ${i.rarity}" onclick="selectForDeal('${i.id}', 'buy')">
                    <div class="item-art"><img src="${imgSrc}" alt=""></div>
                    <div class="price-tag">💰 ${i.price}</div>
                    <span class="name">${i.name}</span>
                </div>
            `;
        }).join('');
    }

    function renderPlayerInventory(inv) {
        currentInv = inv;
        const container = document.getElementById('player-inventory');
        container.innerHTML = '';
        Object.keys(inv).forEach(key => {
            const itemId = inv[key];
            const itemData = ITEMS[itemId];
            if (itemData) {
                const imgSrc = (itemData.img && String(itemData.img).trim()) ? itemData.img : ITEM_FALLBACK_IMG;
                container.innerHTML += `
                    <div class="item-slot ${itemData.rarity}" onclick="selectForDeal('${key}', 'sell')">
                        <div class="item-art"><img src="${imgSrc}" alt=""></div>
                        <div class="price-tag">💰 ${itemData.sellPrice}</div>
                        <span class="name">${itemData.name}</span>
                    </div>
                `;
            }
        });
    }

    function selectForDeal(id, type) {
        selectedType = type;
        const container = document.getElementById('deal-container');
        const action = document.getElementById('action-area');
        let itemData;

        if(type === 'buy') {
            itemData = ITEMS[id];
            selectedItem = { ...itemData };
        } else {
            const itemId = currentInv[id];
            itemData = ITEMS[itemId];
            if(!itemData) return;
            selectedItem = { key: id, itemId: itemId, ...itemData, price: itemData.sellPrice };
        }

        const stats = itemData.type === "consumable" ? `Gyógyítás: +${itemData.heal}` : `Atk: +${itemData.atk || 0} | Def: +${itemData.def || 0}`;
        const stackCount = Object.values(currentInv || {}).filter(v => v === itemData.id).length;
        const stackInfo = STACKABLE_TYPES.has(itemData.type) ? `<div style="font-size: 0.8em; color: #85c1e9;">Stack nálad: ${stackCount} db</div>` : "";
        const effectInfo = itemData.effect ? `<div style="font-size: 0.8em; color: #bbb; margin-top: 4px;">${itemData.effect}</div>` : "";

        container.innerHTML = `
            <img src="${selectedItem.img}" class="big-item-preview">
            <div style="font-size: 1.2em; color: white; margin-top: 5px;">${selectedItem.name}</div>
            <div style="font-size: 0.8em; color: #aaa;">${stats}</div>
            ${effectInfo}
            ${stackInfo}
            <div style="font-size: 1.5em; color: var(--gold); font-weight: bold;">💰 ${selectedItem.price}</div>
        `;
        
        action.innerHTML = `
            <button class="btn-action ${type === 'buy' ? 'buy-btn' : 'sell-btn'}" onclick="trade()">
                ${type === 'buy' ? 'VÁSÁRLÁS' : 'ELADÁS'}
            </button>
            <button class="btn-action cancel-btn" onclick="resetDeal()">MÉGSE</button>
        `;

        // Mobilon görgessünk az alku zónához, ha kiválasztottunk valamit
        if(window.innerWidth < 1100) {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    }

    function resetDeal() {
        selectedItem = null;
        document.getElementById('deal-container').innerHTML = `<div style="font-style: italic; color: #555;">Válassz egy árut...</div>`;
        document.getElementById('action-area').innerHTML = "";
    }

    async function trade() {
        if(!selectedItem) return;
        const pin = String((window.__latestCharData && window.__latestCharData.pin) || '');
        if (!pin) return alert("Hiányzó PIN. Jelentkezz be újra.");
        if(selectedType === 'buy') {
            const invItems = Object.values(currentInv || {});
            const isStackable = STACKABLE_TYPES.has(selectedItem.type);
            if (!isStackable && invItems.includes(selectedItem.id)) return alert("Ez a tárgy már nálad van, nem halmozható!");
            if (invItems.length >= 28) return alert("A hátizsák tele van (28/28)!");

            const charData = window.__latestCharData || {};
            const alreadyEquipped = EQUIP_SLOTS.some(slot => charData[`equip_${slot}`] === selectedItem.id);
            if (!isStackable && alreadyEquipped) return alert("Ez a tárgy már fel van szerelve, nem vásárolható még egy!");

            if(myGold < selectedItem.price) return alert("Nincs elég pénzed!");
            try {
                await secureShopTrade({
                    characterId: myId,
                    pin,
                    action: 'buy',
                    itemId: selectedItem.id
                });
            } catch (e) {
                alert("Vásárlás sikertelen: " + ((e && e.message) ? e.message : 'ismeretlen hiba'));
                return;
            }
        } else {
            try {
                await secureShopTrade({
                    characterId: myId,
                    pin,
                    action: 'sell',
                    inventoryKey: selectedItem.key
                });
            } catch (e) {
                alert("Eladás sikertelen: " + ((e && e.message) ? e.message : 'ismeretlen hiba'));
                return;
            }
        }
        resetDeal();
    }
    renderShop();
</script>
</body>
</html>

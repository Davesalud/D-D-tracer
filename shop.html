<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kereskedő - Death's Armada</title>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --accent: #8b0000; --bg: #050507; --panel-bg: rgba(20, 20, 25, 0.95); }
        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; }
        
        body { font-family: 'MedievalSharp', cursive; background-color: var(--bg); color: #ccc; margin: 0; height: 100vh; overflow: hidden; }
        .master-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.95)), url('https://i.ibb.co/0HSGQK0/Copilot-20260405-001515.png'); background-size: cover; background-position: center; z-index: -1; }

        .shop-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 40px; background: rgba(0,0,0,0.9); border-bottom: 2px solid var(--gold); }
        .gold-display { color: var(--gold); font-size: 1.5em; border: 1px solid var(--gold); padding: 5px 20px; border-radius: 6px; background: rgba(255,255,255,0.05); }

        .trade-layout { 
            display: flex; 
            justify-content: center; 
            align-items: flex-start;
            height: calc(100vh - 75px); 
            padding: 20px; 
            gap: 30px; 
            max-width: 1400px; 
            margin: 0 auto;
        }

        .panel { 
            background: var(--panel-bg); 
            border: 2px solid var(--gold); 
            border-radius: 8px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 15px; 
            overflow: hidden;
            width: 340px; 
        }

        .panel-header { color: var(--gold); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; border-bottom: 1px solid var(--gold); width: 100%; text-align: center; padding-bottom: 5px; }

        .avatar-box { 
            width: 320px; 
            height: 320px; 
            border: 3px solid var(--gold); 
            border-radius: 4px; 
            overflow: hidden; 
            background: #000;
            box-shadow: 0 0 20px rgba(0,0,0,1);
            margin-bottom: 10px;
            flex-shrink: 0;
        }

        .avatar-box img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            object-position: center 20%; 
        }

        .item-grid { width: 100%; display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; overflow-y: auto; margin-top: 10px; border-top: 1px solid #444; padding-top: 10px; }
        
        .item-slot { background: rgba(0,0,0,0.5); border: 1px solid #444; padding: 8px; text-align: center; cursor: pointer; border-radius: 4px; transition: 0.2s; }
        .item-slot:hover { border-color: var(--gold); background: rgba(197, 160, 89, 0.1); }
        .item-slot img { width: 45px; height: 45px; object-fit: cover; border-radius: 4px; margin-bottom: 4px; }
        .item-slot .name { font-size: 0.7em; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .item-slot .price-tag { font-size: 0.65em; color: var(--gold); margin-top: 2px; }

        .deal-zone { 
            flex: 0 1 400px; 
            background: transparent; 
            border: none; 
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .deal-display { 
            width: 100%; 
            height: 350px; 
            background: rgba(0,0,0,0.8); 
            border: 2px dashed var(--gold); 
            border-radius: 15px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            margin-bottom: 20px;
            position: relative;
        }

        .deal-display img.big-item-preview { width: 180px; height: 180px; object-fit: contain; filter: drop-shadow(0 0 10px var(--gold)); border-radius: 10px; }
        .deal-name { font-size: 1.8em; color: white; margin-top: 10px; }
        .deal-price { font-size: 2em; color: var(--gold); margin-top: 5px; }

        .btn-group { width: 100%; display: flex; flex-direction: column; gap: 10px; }
        .btn-action { width: 100%; padding: 15px; font-family: 'MedievalSharp'; font-size: 1.2em; cursor: pointer; border: none; border-radius: 8px; transition: 0.3s; }
        .buy-btn { background: var(--accent); color: white; border: 1px solid #f00; }
        .sell-btn { background: #2d5a27; color: white; border: 1px solid #5f5; }
        .cancel-btn { background: #333; color: #ccc; border: 1px solid #555; }
        .cancel-btn:hover { background: #444; color: white; }

        .btn-back { position: fixed; bottom: 20px; left: 20px; background: #000; color: var(--gold); border: 1px solid var(--gold); padding: 10px 20px; text-decoration: none; border-radius: 4px; }
    </style>
</head>
<body>

<div class="master-bg"></div>

<div class="shop-header">
    <div style="color: var(--gold); font-size: 1.8em;">🛒 Kalmár Sátra</div>
    <div class="gold-display">💰 <span id="current-gold">0</span></div>
</div>

<div class="trade-layout">
    <div class="panel">
        <div class="panel-header">Kereskedő</div>
        <div class="avatar-box">
            <img src="https://i.ibb.co/LzMTVrSt/Copilot-20260405-024414.png" alt="Merchant">
        </div>
        <div id="shop-items" class="item-grid"></div>
    </div>

    <div class="panel deal-zone">
        <div id="deal-container" class="deal-display">
            <div style="font-style: italic; color: #555;">Válassz egy árut...</div>
        </div>
        <div id="action-area" class="btn-group"></div>
    </div>

    <div class="panel">
        <div class="panel-header">Te Hátizsákod</div>
        <div class="avatar-box">
            <img id="player-img" src="" alt="Player Avatar">
        </div>
        <div id="player-inventory" class="item-grid"></div>
    </div>
</div>

<a href="index.html" class="btn-back">⬅ Vissza a Várba</a>

<script src="items.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBg2WzLqxt0QRDkDiUKYrGRCw0Kg-gr1OU", authDomain: "dnd-tracker-4fe05.firebaseapp.com", projectId: "dnd-tracker-4fe05", databaseURL: "https://dnd-tracker-4fe05-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const myId = localStorage.getItem('selectedCharId');
    let myGold = 0;
    let selectedItem = null;
    let selectedType = "";
    let currentInv = {};

    const HERO_IMAGES = { "Harcos": "https://i.ibb.co/20BXyqpy/Copilot-20260403-032810.png", "Mágus": "https://i.ibb.co/yFz5bcXv/Copilot-20260403-033651.png", "Lovag": "https://i.ibb.co/Fk3n339M/Copilot-20260403-034043.png", "Íjász": "https://i.ibb.co/whd2jNpB/Copilot-20260403-034402.png", "Bérgyilkos": "https://i.ibb.co/b525CsLg/Copilot-20260403-032807.png", "Nekromanta": "https://i.ibb.co/NnCwwCbR/Copilot-20260403-033301.png" };

    if (!myId) window.location.href = 'index.html';

    db.ref(`characters/${myId}`).on('value', snap => {
        const data = snap.val();
        if (!data) return;
        myGold = data.gold || 0;
        document.getElementById('current-gold').innerText = myGold;
        document.getElementById('player-img').src = HERO_IMAGES[data.charClass] || "";
        renderPlayerInventory(data.inventory || {});
    });

    // Bolt kirajzolása - Frissítve, hogy mutassa az árat!
    function renderShop() {
        const shopItems = document.getElementById('shop-items');
        shopItems.innerHTML = Object.keys(ITEMS).map(key => {
            const i = ITEMS[key];
            return `
                <div class="item-slot" onclick="selectForDeal('${i.id}', 'buy')">
                    <img src="${i.img}" alt="${i.name}">
                    <span class="name">${i.name}</span>
                    <div class="price-tag">💰 ${i.price || 100}</div>
                </div>
            `;
        }).join('');
    }

    function renderPlayerInventory(inv) {
        currentInv = inv;
        document.getElementById('player-inventory').innerHTML = Object.keys(inv).map(key => {
            const itemData = inv[key];
            const originalData = ITEMS[itemData.itemId] || { img: "https://via.placeholder.com/45", sellPrice: 25 };
            return `
                <div class="item-slot" onclick="selectForDeal('${key}', 'sell')">
                    <img src="${originalData.img}" alt="${itemData.name}">
                    <span class="name">${itemData.name}</span>
                    <div class="price-tag">💰 ${originalData.sellPrice || 25}</div>
                </div>
            `;
        }).join('');
    }

    function selectForDeal(id, type) {
        selectedType = type;
        const container = document.getElementById('deal-container');
        const action = document.getElementById('action-area');
        
        if(type === 'buy') {
            const item = ITEMS[id];
            selectedItem = { ...item, price: item.price || 100 };
            
            container.innerHTML = `
                <img src="${selectedItem.img}" class="big-item-preview">
                <div class="deal-name">${selectedItem.name}</div>
                <div class="deal-price">💰 ${selectedItem.price}</div>
            `;
            action.innerHTML = `
                <button class="btn-action buy-btn" onclick="trade()">VÁSÁRLÁS</button>
                <button class="btn-action cancel-btn" onclick="resetDeal()">MÉGSE</button>
            `;
        } else {
            const invItem = currentInv[id];
            const originalData = ITEMS[invItem.itemId] || { img: "https://via.placeholder.com/150", sellPrice: 25 };
            
            selectedItem = { 
                ...invItem, 
                key: id, 
                price: originalData.sellPrice || 25, 
                img: originalData.img 
            };
            
            container.innerHTML = `
                <img src="${selectedItem.img}" class="big-item-preview">
                <div class="deal-name">${selectedItem.name}</div>
                <div class="deal-price">💰 ${selectedItem.price}</div>
            `;
            action.innerHTML = `
                <button class="btn-action sell-btn" onclick="trade()">ELADÁS</button>
                <button class="btn-action cancel-btn" onclick="resetDeal()">MÉGSE</button>
            `;
        }
    }

    function resetDeal() {
        selectedItem = null;
        selectedType = "";
        document.getElementById('deal-container').innerHTML = `<div style="font-style: italic; color: #555;">Válassz egy árut...</div>`;
        document.getElementById('action-area').innerHTML = "";
    }

    function trade() {
        if(!selectedItem) return;
        if(selectedType === 'buy') {
            if(myGold < selectedItem.price) return alert("Nincs elég pénzed!");
            db.ref(`characters/${myId}/gold`).set(myGold - selectedItem.price);
            db.ref(`characters/${myId}/inventory`).push({ 
                name: selectedItem.name, 
                itemId: selectedItem.id,
                type: selectedItem.type || "tárgy"
            });
        } else {
            db.ref(`characters/${myId}/gold`).set(myGold + selectedItem.price);
            db.ref(`characters/${myId}/inventory/${selectedItem.key}`).remove();
        }
        resetDeal();
    }

    renderShop();
</script>
</body>
</html>

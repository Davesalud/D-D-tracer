<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>DM Master Control</title>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --accent: #8b0000; --bg: #050507; --card: rgba(20, 20, 25, 0.9); }
        body { background: var(--bg); color: var(--gold); font-family: 'Segoe UI', sans-serif; padding: 20px; margin: 0; padding-bottom: 80px; }
        
        .header-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); padding: 10px 20px; margin-bottom: 20px; }
        h1 { font-family: 'MedievalSharp'; margin: 0; }
        
        .btn-top { padding: 8px 15px; font-family: 'MedievalSharp'; cursor: pointer; border: none; background: var(--accent); color: white; font-size: 0.9em; border-radius: 4px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; padding: 0 20px; }
        .char-card { background: var(--card); border: 1px solid #444; padding: 15px; border-radius: 5px; display: flex; flex-direction: column; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        
        select, input, button { background: #1a1a1a; color: white; border: 1px solid #444; padding: 8px; margin: 5px 0; width: 100%; cursor: pointer; font-family: 'MedievalSharp'; }
        button:hover { background: var(--gold); color: black; }
        
        .btn-reset { border-color: var(--accent); color: var(--accent); margin-top: 15px; font-size: 0.75em; width: auto; align-self: center; background: none; }

        /* LELTÁR ÉS TÖRLÉS */
        .dm-inventory-list { background: rgba(0,0,0,0.3); border: 1px solid #333; padding: 8px; margin-top: 10px; border-radius: 4px; font-size: 0.85em; max-height: 120px; overflow-y: auto; }
        .inv-item { display: flex; justify-content: space-between; align-items: center; background: #222; border: 1px solid #444; padding: 4px 8px; margin-bottom: 4px; border-radius: 3px; color: #ccc; }
        .del-btn { color: #ff4444; cursor: pointer; font-weight: bold; padding: 0 5px; border: 1px solid transparent; }
        .del-btn:hover { border-color: #ff4444; border-radius: 3px; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.95); border-top: 1px solid var(--gold); padding: 15px; display: flex; justify-content: center; z-index: 1000; backdrop-filter: blur(10px); }
        .btn-exit { background: none; border: 1px solid var(--gold); color: var(--gold); padding: 10px 40px; font-family: 'MedievalSharp'; text-decoration: none; text-transform: uppercase; letter-spacing: 2px; }
        
        .label { font-size: 0.7em; color: #888; text-transform: uppercase; margin-top: 10px; display: block; font-weight: bold; }
        .stat-line { display: flex; justify-content: space-between; font-weight: bold; border-bottom: 1px solid var(--accent); padding-bottom: 5px; margin-bottom: 10px; font-family: 'MedievalSharp'; }
        .equip-box { background: rgba(139, 0, 0, 0.1); border: 1px solid rgba(197, 160, 89, 0.2); padding: 8px; border-radius: 4px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="header-row">
        <h1>🏰 DM MASTER CONTROL</h1>
        <button class="btn-top" onclick="resetAllXP()">⚠️ Mindent Töröl</button>
    </div>

    <div id="char-list" class="grid">A sereg gyülekezik...</div>

    <div class="bottom-nav">
        <a href="index.html" class="btn-exit">Vissza a Főmenübe 🚪</a>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="items.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyBg2WzLqxt0QRDkDiUKYrGRCw0Kg-gr1OU", authDomain: "dnd-tracker-4fe05.firebaseapp.com", projectId: "dnd-tracker-4fe05", databaseURL: "https://dnd-tracker-4fe05-default-rtdb.europe-west1.firebasedatabase.app", storageBucket: "dnd-tracker-4fe05.firebasestorage.app", messagingSenderId: "886037504950", appId: "1:886037504950:web:46e80b46f0e26e24429717" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('characters').on('value', snap => {
            const chars = snap.val();
            const list = document.getElementById('char-list');
            list.innerHTML = '';
            if(!chars) return;

            for(let id in chars) {
                const c = chars[id];
                
                // 1. VISELT FELSZERELÉS
                const equipment = [
                    { slot: '🛡️ Sisak', id: c.equip_head },
                    { slot: '🛡️ Páncél', id: c.equip_chest },
                    { slot: '⚔️ Fegyver', id: c.equip_weapon },
                    { slot: '👢 Cipő', id: c.equip_feet }
                ];
                let equipHTML = '';
                equipment.forEach(item => {
                    if(item.id) {
                        const name = ITEMS[item.id] ? ITEMS[item.id].name : "Ismeretlen";
                        equipHTML += `<div style="font-size:0.8em; color:#eee;"><b>${item.slot}:</b> ${name}</div>`;
                    }
                });
                if(!equipHTML) equipHTML = '<span style="color:#444; font-size:0.8em;">Nincs felszerelés</span>';

                // 2. HÁTIZSÁK + TÖRLÉS GOMB
                let inventoryHTML = '';
                if(c.inventory) {
                    for(let itemKey in c.inventory) {
                        const itemId = c.inventory[itemKey];
                        const itemName = ITEMS[itemId] ? ITEMS[itemId].name : "Ismeretlen";
                        inventoryHTML += `
                            <div class="inv-item">
                                <span>${itemName}</span>
                                <span class="del-btn" onclick="removeItem('${id}', '${itemKey}')" title="Törlés">✕</span>
                            </div>`;
                    }
                } else {
                    inventoryHTML = '<span style="color:#555; font-style:italic;">Üres hátizsák</span>';
                }

                let itemOptions = `<option value="">-- Tárgy választása --</option>`;
                for(let key in ITEMS) itemOptions += `<option value="${key}">${ITEMS[key].name}</option>`;

                const card = document.createElement('div');
                card.className = 'char-card';
                card.innerHTML = `
                    <div class="stat-line">
                        <span>${c.name}</span>
                        <span style="color:#888;">LVL ${c.level || 1}</span>
                    </div>
                    
                    <div style="display:flex; justify-content: space-around; background:rgba(0,0,0,0.5); padding:6px; border-radius:4px; margin-bottom:10px;">
                        <span>💰 ${c.gold || 0}</span>
                        <span>✨ ${c.xp || 0} XP</span>
                    </div>

                    <div class="equip-box">
                        <span class="label" style="margin-top:0; color:var(--gold); margin-bottom:5px;">Viselt felszerelés:</span>
                        ${equipHTML}
                    </div>
                    
                    <span class="label">Módosítás (Érték +/-)</span>
                    <input type="number" id="val-${id}" placeholder="Összeg...">
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px;">
                        <button onclick="updateValue('${id}', 'gold')">💰 Aranyat ad</button>
                        <button onclick="updateValue('${id}', 'xp')">✨ XP-t ad</button>
                    </div>
                    
                    <span class="label">Új tárgy küldése</span>
                    <select id="item-${id}">${itemOptions}</select>
                    <button onclick="giveItem('${id}')">🎁 Tárgy Átadása</button>

                    <span class="label">Hátizsák (Törléshez ✕):</span>
                    <div class="dm-inventory-list">${inventoryHTML}</div>

                    <button class="btn-reset" onclick="resetSingleXP('${id}')">Karakter Reset</button>
                `;
                list.appendChild(card);
            }
        });

        function updateValue(id, field) {
            const val = parseInt(document.getElementById(`val-${id}`).value);
            if(!isNaN(val)) db.ref(`characters/${id}/${field}`).transaction(c => (c || 0) + val);
            document.getElementById(`val-${id}`).value = '';
        }

        function giveItem(id) {
            const itemId = document.getElementById(`item-${id}`).value;
            if(itemId) db.ref(`characters/${id}/inventory`).push(itemId);
        }

        // TÁRGY TÖRLÉSE A LELTÁRBÓL
        function removeItem(charId, itemKey) {
            if(confirm("Végleg törlöd ezt a tárgyat a hőstől?")) {
                db.ref(`characters/${charId}/inventory/${itemKey}`).remove();
            }
        }

        function resetSingleXP(id) {
            if(confirm("Biztosan nullázod ezt a hőst?")) {
                db.ref(`characters/${id}`).update({ xp: 0, level: 1, gold: 50 });
            }
        }

        function resetAllXP() {
            if(confirm("MINDEN hős szintje és XP-je törlődni fog! Folytatod?")) {
                db.ref('characters').once('value', snap => {
                    const updates = {};
                    snap.forEach(child => {
                        updates[`characters/${child.key}/xp`] = 0;
                        updates[`characters/${child.key}/level`] = 1;
                    });
                    db.ref().update(updates);
                });
            }
        }
    </script>
</body>
</html>

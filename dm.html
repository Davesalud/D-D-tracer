<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>DM Master Control - Death's Armada</title>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --accent: #8b0000; --bg: #050507; --card: rgba(20, 20, 25, 0.9); --blue: #0088ff; }
        body { background: var(--bg); color: var(--gold); font-family: 'Segoe UI', sans-serif; padding: 20px; margin: 0; padding-bottom: 80px; }
        
        .header-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); padding: 10px 20px; margin-bottom: 20px; }
        h1 { font-family: 'MedievalSharp'; margin: 0; }
        
        .control-panel { background: rgba(139, 0, 0, 0.1); border: 1px solid var(--gold); padding: 15px; margin: 0 20px 20px 20px; border-radius: 8px; }
        .patch-editor textarea { width: 100%; height: 60px; background: #000; color: #ccc; border: 1px solid #444; padding: 10px; font-family: 'serif'; margin-bottom: 10px; }

        /* Aréna szekció stílusai */
        .arena-monitor { background: rgba(0, 136, 255, 0.05); border: 1px solid var(--blue); padding: 15px; margin: 0 20px 20px 20px; border-radius: 8px; }
        .room-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; margin-top: 10px; }
        .room-card { background: #111; border: 1px solid #333; padding: 12px; border-radius: 6px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .status-tag { font-size: 0.7em; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; font-weight: bold; }
        .status-waiting { background: #27ae60; color: white; }
        .status-fighting { background: #e74c3c; color: white; }
        .status-setup { background: #f1c40f; color: black; }

        .btn-top { padding: 8px 15px; font-family: 'MedievalSharp'; cursor: pointer; border: none; background: var(--accent); color: white; font-size: 0.9em; border-radius: 4px; }
        .btn-blue { background: var(--blue); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; padding: 0 20px; }
        .char-card { background: var(--card); border: 1px solid #444; padding: 15px; border-radius: 5px; display: flex; flex-direction: column; box-shadow: 0 4px 15px rgba(0,0,0,0.5); position: relative; }
        
        select, input, button { background: #1a1a1a; color: white; border: 1px solid #444; padding: 8px; margin: 5px 0; width: 100%; cursor: pointer; font-family: 'MedievalSharp'; box-sizing: border-box; }
        button:hover { background: var(--gold); color: black; }
        
        .online-status { font-size: 0.75em; margin-bottom: 10px; display: block; font-family: 'MedievalSharp'; }
        .status-active { color: #00ff00; text-shadow: 0 0 5px rgba(0,255,0,0.5); }
        .status-offline { color: #888; }
        
        .full-delete-btn { background: #440000; color: #ff4444; border: 1px solid #ff4444; font-size: 0.7em; padding: 4px; margin-bottom: 10px; }
        
        .dm-inventory-list { background: rgba(0,0,0,0.3); border: 1px solid #333; padding: 8px; margin-top: 10px; border-radius: 4px; font-size: 0.85em; max-height: 120px; overflow-y: auto; }
        .inv-item { display: flex; justify-content: space-between; align-items: center; background: #222; border: 1px solid #444; padding: 4px 8px; margin-bottom: 4px; border-radius: 3px; color: #ccc; }
        .del-btn { color: #ff4444; cursor: pointer; font-weight: bold; padding: 0 8px; border-left: 1px solid #444; margin-left: 10px; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.95); border-top: 1px solid var(--gold); padding: 15px; display: flex; justify-content: center; z-index: 1000; backdrop-filter: blur(10px); }
        .btn-exit { background: none; border: 1px solid var(--gold); color: var(--gold); padding: 10px 40px; font-family: 'MedievalSharp'; text-decoration: none; text-transform: uppercase; letter-spacing: 2px; text-align: center; }
        
        .label { font-size: 0.7em; color: #888; text-transform: uppercase; margin-top: 10px; display: block; font-weight: bold; }
        .stat-line { display: flex; justify-content: space-between; font-weight: bold; border-bottom: 1px solid var(--accent); padding-bottom: 5px; margin-bottom: 5px; font-family: 'MedievalSharp'; }
        .equip-box { background: rgba(139, 0, 0, 0.1); border: 1px solid rgba(197, 160, 89, 0.2); padding: 8px; border-radius: 4px; margin-bottom: 10px; }
        .value-control { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 2px; }
    </style>
</head>
<body>

    <div class="header-row">
        <h1>🏰 DM MASTER CONTROL</h1>
        <button class="btn-top" onclick="resetAllStats()">⚠️ Globális Reset (LVL 1)</button>
    </div>

    <div class="control-panel">
        <div class="patch-editor">
            <span class="label" style="color:var(--gold)">📜 Birodalmi Krónikák (Patch Notes)</span>
            <textarea id="patch-input" placeholder="Írd ide az új híreket..."></textarea>
            <button onclick="savePatchNotes()" style="width: auto; padding: 5px 20px;">Hirdetmény Közzététele</button>
        </div>
    </div>

    <div class="arena-monitor">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <span class="label" style="color:var(--blue); margin:0;">⚔️ Aréna Szobák Felügyelete</span>
            <button class="btn-top" style="width: auto; padding: 5px 15px; background: #c0392b;" onclick="clearAllRooms()">🧹 Összes szoba törlése</button>
        </div>
        <div id="room-list" class="room-grid">Szobák keresése...</div>
    </div>

    <div id="char-list" class="grid">A sereg gyülekezik...</div>

    <div class="bottom-nav">
        <a href="index.html" class="btn-exit">Vissza a Főmenübe 🚪</a>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="items.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyBg2WzLqxt0QRDkDiUKYrGRCw0Kg-gr1OU", authDomain: "dnd-tracker-4fe05.firebaseapp.com", projectId: "dnd-tracker-4fe05", databaseURL: "https://dnd-tracker-4fe05-default-rtdb.europe-west1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Patch Notes betöltése
        db.ref('settings/patchNotes').on('value', snap => {
            if(snap.val()) document.getElementById('patch-input').value = snap.val();
        });

        function savePatchNotes() {
            const text = document.getElementById('patch-input').value;
            db.ref('settings/patchNotes').set(text).then(() => alert("Krónikák frissítve!"));
        }

        // ARÉNA SZOBÁK FIGYELÉSE
        db.ref('battles').on('value', snap => {
            const rooms = snap.val();
            const container = document.getElementById('room-list');
            container.innerHTML = '';

            if (!rooms) {
                container.innerHTML = '<div style="color: #444; font-style: italic; font-size: 0.8em;">Nincsenek aktív szobák az adatbázisban.</div>';
                return;
            }

            for (let id in rooms) {
                const r = rooms[id];
                const statusClass = "status-" + r.status;
                const p1Name = r.p1 ? r.p1.name : "Ismeretlen";
                const p2Name = (r.p2 && r.p2.id !== "waiting") ? r.p2.name : "Várakozás...";
                
                const roomDiv = document.createElement('div');
                roomDiv.className = 'room-card';
                roomDiv.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                        <span style="font-size:0.7em; color:#666;">ID: ${id}</span>
                        <span class="status-tag ${statusClass}">${r.status}</span>
                    </div>
                    <div style="text-align:center; margin:10px 0; border-top:1px solid #222; padding-top:10px;">
                        <div style="color:var(--gold); font-weight:bold;">${p1Name}</div>
                        <div style="color:#444; font-size:0.8em;">VS</div>
                        <div style="color:#ccc;">${p2Name}</div>
                    </div>
                    <button onclick="deleteRoom('${id}')" style="background:#222; color:#ff4444; border:1px solid #444; font-size:0.7em; margin-top:5px;">Szoba Törlése</button>
                `;
                container.appendChild(roomDiv);
            }
        });

        function deleteRoom(id) {
            if(confirm("Törlöd ezt a szobát? A harc azonnal megszakad!")) db.ref(`battles/${id}`).remove();
        }

        function clearAllRooms() {
            if(confirm("Biztosan kiüríted az összes Aréna szobát?")) db.ref('battles').remove();
        }

        // KARAKTEREK FIGYELÉSE
        function timeSince(date) {
            if (!date) return "Soha nem volt aktív";
            const seconds = Math.floor((new Date() - date) / 1000);
            if (seconds < 60) return "Éppen most";
            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) return minutes + " perce";
            return Math.floor(minutes / 60) + " órája";
        }

        db.ref('characters').on('value', snap => {
            const chars = snap.val();
            const list = document.getElementById('char-list');
            list.innerHTML = '';
            if(!chars) return;

            for(let id in chars) {
                const c = chars[id];
                const isOnline = c.lastUpdate && (Date.now() - c.lastUpdate) < 300000;
                const statusText = isOnline ? "● Online" : "Utoljára látva: " + timeSince(c.lastUpdate);
                const statusClass = isOnline ? "status-active" : "status-offline";

                const equipment = [
                    { label: '🛡️ Sisak', field: 'equip_sisak', id: c.equip_sisak },
                    { label: '⚔️ Fegyver', field: 'equip_fegyver', id: c.equip_fegyver },
                    { label: '🛡️ Páncél', field: 'equip_páncél', id: c.equip_páncél },
                    { label: '🛡️ Pajzs', field: 'equip_pajzs', id: c.equip_pajzs },
                    { label: '👢 Lábvért', field: 'equip_lábvért', id: c.equip_lábvért },
                    { label: '👞 Cipő', field: 'equip_cipő', id: c.equip_cipő }
                ];

                let equipHTML = '';
                equipment.forEach(item => {
                    if(item.id && ITEMS[item.id]) {
                        equipHTML += `<div style="font-size:0.75em; display:flex; justify-content:space-between; margin-bottom:3px; border-bottom:1px solid rgba(255,255,255,0.05);">
                            <span><b>${item.label}:</b> ${ITEMS[item.id].name}</span>
                            <span class="del-btn" onclick="removeEquip('${id}', '${item.field}')">✕</span>
                        </div>`;
                    }
                });

                let inventoryHTML = '';
                if(c.inventory) {
                    for(let key in c.inventory) {
                        const itemId = c.inventory[key];
                        inventoryHTML += `<div class="inv-item"><span>${ITEMS[itemId]?.name || 'Ismeretlen'}</span><span class="del-btn" onclick="removeItem('${id}', '${key}')">✕</span></div>`;
                    }
                }

                const card = document.createElement('div');
                card.className = 'char-card';
                card.innerHTML = `
                    <button class="full-delete-btn" onclick="deleteCharacter('${id}', '${c.name}')">❌ KARAKTER TÖRLÉSE</button>
                    <div class="stat-line"><span>${c.name}</span><span style="color:#888;">LVL ${c.level || 1}</span></div>
                    <span class="online-status ${statusClass}">${statusText}</span>
                    <div style="display:flex; justify-content: space-around; background:rgba(0,0,0,0.5); padding:6px; border-radius:4px; margin-bottom:10px;">
                        <span>💰 ${c.gold || 0}</span><span>✨ ${c.xp || 0} XP</span>
                    </div>
                    <div class="equip-box"><span class="label" style="margin-top:0; color:var(--gold); margin-bottom:5px;">Felszerelés:</span>${equipHTML || '<span style="font-size:0.8em; color:#444">Üres</span>'}</div>
                    <span class="label">Módosítás</span>
                    <input type="number" id="val-${id}" placeholder="Összeg...">
                    <div class="value-control">
                        <button onclick="updateValue('${id}', 'gold')">💰 Arany</button>
                        <button onclick="updateValue('${id}', 'xp')">✨ XP</button>
                    </div>
                    <span class="label">Tárgy küldése</span>
                    <select id="item-${id}">${Object.keys(ITEMS).map(k => `<option value="${k}">${ITEMS[k].name}</option>`).join('')}</select>
                    <button onclick="giveItem('${id}')">🎁 Átadás</button>
                    <span class="label">Hátizsák:</span>
                    <div class="dm-inventory-list">${inventoryHTML || '<span style="color:#333 italic">Üres</span>'}</div>
                `;
                list.appendChild(card);
            }
        });

        function removeEquip(charId, field) { if(confirm("Törlöd?")) db.ref(`characters/${charId}/${field}`).set(null); }
        function deleteCharacter(id, name) { if(confirm(`Törlöd ${name}-t?`)) db.ref(`characters/${id}`).remove(); }
        function updateValue(id, field) {
            const val = parseInt(document.getElementById(`val-${id}`).value);
            if(!isNaN(val)) db.ref(`characters/${id}/${field}`).transaction(c => (c || 0) + val);
            document.getElementById(`val-${id}`).value = '';
        }
        function giveItem(id) { const i = document.getElementById(`item-${id}`).value; if(i) db.ref(`characters/${id}/inventory`).push(i); }
        function removeItem(cid, key) { if(confirm("Törlöd?")) db.ref(`characters/${cid}/inventory/${key}`).remove(); }

        function resetAllStats() {
            if(confirm("FIGYELEM: Mindenki LVL 1, 0 XP és 100 NextXP lesz! Biztos?")) {
                db.ref('characters').once('value', snap => {
                    const updates = {};
                    snap.forEach(child => {
                        updates[`characters/${child.key}/xp`] = 0;
                        updates[`characters/${child.key}/level`] = 1;
                        updates[`characters/${child.key}/nextLvlXp`] = 100;
                    });
                    db.ref().update(updates);
                });
            }
        }
    </script>
</body>
</html>

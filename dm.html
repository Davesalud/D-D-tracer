<script>
    // ... (Firebase konfiguráció marad) ...

    db.ref('characters').on('value', snap => {
        const chars = snap.val();
        const list = document.getElementById('char-list');
        list.innerHTML = '';
        if(!chars) return;

        for(let id in chars) {
            const c = chars[id];
            
            // 1. VISELT FELSZERELÉS ÖSSZEGYŰJTÉSE
            const equipment = [
                { slot: 'Sisak', id: c.equip_head },
                { slot: 'Páncél', id: c.equip_chest },
                { slot: 'Fegyver', id: c.equip_weapon },
                { slot: 'Cipő', id: c.equip_feet }
            ];

            let equipHTML = '';
            equipment.forEach(item => {
                if(item.id) {
                    const name = ITEMS[item.id] ? ITEMS[item.id].name : "Ismeretlen";
                    equipHTML += `<div style="font-size:0.8em; color:#fff;"><b>${item.slot}:</b> ${name}</div>`;
                }
            });
            if(equipHTML === '') equipHTML = '<span style="color:#555; font-size:0.8em;">Nincs felszerelés</span>';

            // 2. HÁTIZSÁK (INVENTORY) ÖSSZEÁLLÍTÁSA
            let inventoryHTML = '';
            if(c.inventory) {
                Object.values(c.inventory).forEach(itemId => {
                    const itemName = ITEMS[itemId] ? ITEMS[itemId].name : "Ismeretlen";
                    inventoryHTML += `<span class="inv-item">${itemName}</span>`;
                });
            } else {
                inventoryHTML = '<span style="color:#555; font-style:italic;">Üres</span>';
            }

            let itemOptions = `<option value="">-- Tárgy választása --</option>`;
            for(let key in ITEMS) itemOptions += `<option value="${key}">${ITEMS[key].name}</option>`;

            const card = document.createElement('div');
            card.className = 'char-card';
            card.innerHTML = `
                <div class="stat-line">
                    <span>${c.name}</span>
                    <span style="color:#888;">LVL ${c.level || 1}</span>
                </div>
                
                <div style="display:flex; justify-content: space-around; background:rgba(0,0,0,0.5); padding:5px; border-radius:4px; margin-bottom:10px;">
                    <span>💰 ${c.gold || 0}</span>
                    <span>✨ ${c.xp || 0}</span>
                </div>

                <div style="background: rgba(139, 0, 0, 0.1); border: 1px solid rgba(197, 160, 89, 0.2); padding: 8px; border-radius: 4px; margin-bottom: 10px;">
                    <span class="label" style="margin-top:0; color:var(--gold);">🛡️ Aktív Felszerelés:</span>
                    ${equipHTML}
                </div>
                
                <span class="label">Módosítás (Összeg +/-)</span>
                <input type="number" id="val-${id}" placeholder="Mennyiség..." style="margin-bottom:2px;">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px;">
                    <button onclick="updateValue('${id}', 'gold')">💰 Arany</button>
                    <button onclick="updateValue('${id}', 'xp')">✨ XP</button>
                </div>
                
                <span class="label">Új tárgy küldése</span>
                <select id="item-${id}">${itemOptions}</select>
                <button onclick="giveItem('${id}')">Átadás</button>

                <span class="label">Hátizsák tartalma:</span>
                <div class="dm-inventory-list">${inventoryHTML}</div>

                <button class="btn-reset" onclick="resetSingleXP('${id}')">Hős Reset</button>
            `;
            list.appendChild(card);
        }
    });

    function updateValue(id, field) {
        const val = parseInt(document.getElementById(`val-${id}`).value);
        if(!isNaN(val)) {
            db.ref(`characters/${id}/${field}`).transaction(c => (c || 0) + val);
        }
        document.getElementById(`val-${id}`).value = '';
    }

    // ... (többi függvény változatlan) ...
</script>

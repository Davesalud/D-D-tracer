<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Hős Leltár - RPG System</title>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --accent: #8b0000; --bg: #050507; --slot-bg: rgba(20, 20, 25, 0.85); }
        body { background: var(--bg); color: var(--gold); font-family: 'MedievalSharp', serif; margin: 0; padding: 20px; }

        .inventory-container { display: flex; gap: 40px; justify-content: center; align-items: flex-start; margin-top: 20px; }

        /* KARAKTER OSZLOP */
        .char-column { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        
        .stats-bar { 
            display: flex; gap: 25px; background: rgba(30, 30, 35, 0.9); 
            padding: 12px 25px; border-radius: 8px; border: 1px solid var(--gold);
            box-shadow: 0 0 15px rgba(197, 160, 89, 0.2); font-size: 1.3em;
        }

        /* KÉP ÉS SLOTOK FIXÁLÁSA */
        .char-frame { 
            position: relative; width: 350px; height: 500px; 
            border: 2px solid var(--gold); background: #111; overflow: hidden; 
            box-shadow: 0 0 30px rgba(0,0,0,1);
        }
        
        .char-img { 
            width: 100%; height: 100%; object-fit: cover; /* EZ JAVÍTJA A FEDÉST */
            opacity: 0.8; position: absolute; top: 0; left: 0; z-index: 1;
        }

        .equip-slot { 
            position: absolute; width: 75px; height: 75px; 
            background: var(--slot-bg); border: 1px solid var(--gold); 
            display: flex; align-items: center; justify-content: center;
            z-index: 10; border-radius: 5px; font-size: 0.65em; color: #555;
            transition: 0.3s; text-transform: uppercase;
        }

        /* SLOTOK PONTOS HELYE A KÉPEN */
        .equip-slot[data-type="sisak"]   { top: 20px; left: 50%; transform: translateX(-50%); }
        .equip-slot[data-type="páncél"]  { top: 160px; left: 50%; transform: translateX(-50%); }
        .equip-slot[data-type="fegyver"] { top: 160px; left: 15px; }
        .equip-slot[data-type="pajzs"]   { top: 160px; right: 15px; }
        .equip-slot[data-type="lábvért"] { bottom: 30px; left: 50%; transform: translateX(-50%); }

        /* HÁTIZSÁK */
        .backpack-panel { background: rgba(20, 20, 25, 0.95); border: 1px solid var(--gold); padding: 25px; border-radius: 10px; }
        .backpack-grid { 
            display: grid; grid-template-columns: repeat(4, 80px); 
            grid-template-rows: repeat(4, 80px); gap: 12px; 
        }
        
        .inv-slot { 
            width: 80px; height: 80px; background: rgba(255,255,255,0.03); 
            border: 1px solid #333; border-radius: 5px;
            display: flex; align-items: center; justify-content: center;
        }

        /* TÁRGYAK */
        .item-icon { 
            width: 68px; height: 68px; cursor: grab; 
            background-size: contain; background-repeat: no-repeat; background-position: center;
            z-index: 20;
        }
        .item-icon:active { cursor: grabbing; }
        .drag-over { background: rgba(197, 160, 89, 0.3) !important; border-color: #fff !important; }

        .btn-back { margin-top: 20px; padding: 10px 30px; background: none; border: 1px solid var(--gold); color: var(--gold); font-family: 'MedievalSharp'; cursor: pointer; text-decoration: none; display: inline-block; }
        small { color: #888; font-size: 0.7em; margin-left: 5px; }
    </style>
</head>
<body>

<div class="inventory-container">
    
    <div class="char-column">
        <h2 id="char-name" style="margin: 0;">Betöltés...</h2>
        
        <div class="stats-bar">
            <div title="Támadás">⚔️ <span id="total-atk">0</span></div>
            <div title="Védekezés">🛡️ <span id="total-def">0</span></div>
        </div>

        <div class="char-frame">
            <img id="hero-image" src="" class="char-img">
            
            <div class="equip-slot" data-type="sisak" ondrop="handleDrop(event)" ondragover="allowDrop(event)">SISAK</div>
            <div class="equip-slot" data-type="páncél" ondrop="handleDrop(event)" ondragover="allowDrop(event)">PÁNCÉL</div>
            <div class="equip-slot" data-type="fegyver" ondrop="handleDrop(event)" ondragover="allowDrop(event)">FEGYVER</div>
            <div class="equip-slot" data-type="pajzs" ondrop="handleDrop(event)" ondragover="allowDrop(event)">PAJZS</div>
            <div class="equip-slot" data-type="lábvért" ondrop="handleDrop(event)" ondragover="allowDrop(event)">LÁB</div>
        </div>
        <a href="index.html" class="btn-back">Vissza a menübe</a>
    </div>

    <div class="backpack-panel">
        <h2 style="margin-top: 0;">HÁTIZSÁK</h2>
        <div id="backpack-grid" class="backpack-grid"></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="items.js"></script>

<script>
    // Firebase Konfiguráció
    const firebaseConfig = { apiKey: "AIzaSyBg2WzLqxt0QRDkDiUKYrGRCw0Kg-gr1OU", authDomain: "dnd-tracker-4fe05.firebaseapp.com", projectId: "dnd-tracker-4fe05", databaseURL: "https://dnd-tracker-4fe05-default-rtdb.europe-west1.firebasedatabase.app", storageBucket: "dnd-tracker-4fe05.firebasestorage.app", messagingSenderId: "886037504950", appId: "1:886037504950:web:46e80b46f0e26e24429717" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const charId = new URLSearchParams(window.location.search).get('id') || "default";

    // 16 üres hátizsák slot generálása
    const grid = document.getElementById('backpack-grid');
    for (let i = 0; i < 16; i++) {
        const slot = document.createElement('div');
        slot.className = 'inv-slot';
        slot.ondrop = handleDrop;
        slot.ondragover = allowDrop;
        slot.ondragleave = (e) => e.currentTarget.classList.remove('drag-over');
        grid.appendChild(slot);
    }

    function allowDrop(ev) {
        ev.preventDefault();
        ev.currentTarget.classList.add('drag-over');
    }

    function handleDragStart(ev) {
        ev.dataTransfer.setData("itemId", ev.target.dataset.itemId);
        ev.dataTransfer.setData("fbKey", ev.target.id);
        ev.dataTransfer.setData("itemType", ev.target.dataset.type);
    }

    function handleDrop(ev) {
        ev.preventDefault();
        ev.currentTarget.classList.remove('drag-over');

        const itemId = ev.dataTransfer.getData("itemId");
        const fbKey = ev.dataTransfer.getData("fbKey"); 
        const itemType = ev.dataTransfer.getData("itemType").toLowerCase();
        const target = ev.currentTarget;

        // FELVÉTEL (Hátizsák -> Test)
        if (target.classList.contains('equip-slot')) {
            const slotType = target.dataset.type;
            if (itemType !== slotType) {
                alert(`Hiba: Ez egy ${itemType}, nem rakhatod a ${slotType} helyére!`);
                return;
            }
            db.ref(`characters/${charId}/equip_${slotType}`).set(itemId);
            if(fbKey) db.ref(`characters/${charId}/inventory/${fbKey}`).remove();
        } 
        // LEVÉTEL (Test -> Hátizsák)
        else if (target.classList.contains('inv-slot')) {
            const sourceEl = document.querySelector(`[data-item-id="${itemId}"]:not([id])`);
            if (sourceEl) {
                const sourceSlot = sourceEl.parentElement.dataset.type;
                if (sourceSlot) {
                    db.ref(`characters/${charId}/inventory`).push(itemId);
                    db.ref(`characters/${charId}/equip_${sourceSlot}`).remove();
                }
            }
        }
    }

    function updateStats(c) {
        let baseAtk = c.baseAtk || 5; 
        let baseDef = c.baseDef || 2;
        let bonusAtk = 0;
        let bonusDef = 0;

        ['sisak', 'páncél', 'fegyver', 'pajzs', 'lábvért'].forEach(slot => {
            const id = c[`equip_${slot}`];
            if(id && ITEMS[id]) {
                bonusAtk += (ITEMS[id].atk || 0);
                bonusDef += (ITEMS[id].def || 0);
            }
        });

        document.getElementById('total-atk').innerHTML = `${baseAtk + bonusAtk} <small>(+${bonusAtk})</small>`;
        document.getElementById('total-def').innerHTML = `${baseDef + bonusDef} <small>(+${bonusDef})</small>`;
    }

    db.ref(`characters/${charId}`).on('value', snap => {
        const c = snap.val();
        if(!c) return;

        document.getElementById('char-name').innerText = c.name;
        document.getElementById('hero-image').src = c.image || 'https://via.placeholder.com/350x500';

        // Slotok frissítése
        document.querySelectorAll('.equip-slot').forEach(slot => {
            const type = slot.dataset.type;
            const itemId = c[`equip_${type}`];
            slot.innerHTML = type;
            if(itemId && ITEMS[itemId]) {
                slot.innerHTML = `<div class="item-icon" draggable="true" data-item-id="${itemId}" data-type="${type}" ondragstart="handleDragStart(event)" style="background-image: url('${ITEMS[itemId].img}')"></div>`;
            }
        });

        // Hátizsák frissítése
        const slots = document.querySelectorAll('.inv-slot');
        slots.forEach(s => s.innerHTML = '');
        if(c.inventory) {
            let i = 0;
            Object.entries(c.inventory).forEach(([key, id]) => {
                if(ITEMS[id] && slots[i]) {
                    const div = document.createElement('div');
                    div.className = 'item-icon';
                    div.id = key;
                    div.dataset.itemId = id;
                    div.dataset.type = ITEMS[id].type;
                    div.draggable = true;
                    div.style.backgroundImage = `url('${ITEMS[id].img}')`;
                    div.ondragstart = handleDragStart;
                    slots[i].appendChild(div);
                    i++;
                }
            });
        }
        updateStats(c);
    });
</script>
</body>
</html>

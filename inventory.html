<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hős Leltár</title>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --bg: #050507; --card: rgba(20, 20, 25, 0.9); }
        body { 
            background: var(--bg); color: white; font-family: 'MedievalSharp', cursive; 
            margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        .header { padding: 20px; text-align: center; border-bottom: 2px solid var(--gold); width: 100%; margin-bottom: 20px; }
        .stat-bar { background: rgba(0,0,0,0.6); border: 1px solid var(--gold); padding: 5px 15px; border-radius: 5px; display: inline-flex; gap: 20px; margin-top: 10px; }

        .main-container { display: flex; gap: 40px; justify-content: center; flex-wrap: wrap; padding: 20px; }

        /* Karakter nézet */
        .char-view { 
            position: relative; width: 300px; height: 500px; 
            border: 2px solid var(--gold); background: #111; border-radius: 8px; overflow: hidden;
        }
        #hero-img { 
            width: 100%; height: 100%; object-fit: cover; opacity: 0.4; 
            position: absolute; top: 0; left: 0; z-index: 1;
        }
        .slots-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; }

        .slot { 
            position: absolute; width: 60px; height: 60px; border: 1px solid var(--gold);
            background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center;
            font-size: 0.7em; text-align: center; color: #555;
        }
        /* Slot pozíciók */
        .slot[data-slot="sisak"] { top: 20px; left: 120px; }
        .slot[data-slot="fegyver"] { top: 150px; left: 20px; }
        .slot[data-slot="páncél"] { top: 150px; left: 120px; }
        .slot[data-slot="pajzs"] { top: 150px; left: 220px; }
        .slot[data-slot="lábvért"] { top: 300px; left: 120px; }
        .slot[data-slot="cipő"] { top: 380px; left: 120px; }

        /* Hátizsák */
        .bag-container { 
            background: var(--card); border: 1px solid var(--gold); padding: 20px; 
            border-radius: 8px; width: 320px; 
        }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; }
        .inv-slot { 
            width: 65px; height: 65px; background: rgba(255,255,255,0.05); 
            border: 1px solid #333; display: flex; align-items: center; justify-content: center;
        }

        .item { width: 50px; height: 50px; cursor: grab; transition: 0.2s; }
        .item:active { cursor: grabbing; }

        .btn-back { 
            margin-top: 30px; padding: 10px 30px; background: none; border: 1px solid var(--gold);
            color: var(--gold); font-family: 'MedievalSharp'; cursor: pointer; text-decoration: none;
        }
    </style>
</head>
<body>

<div class="header">
    <h2 id="char-name">Karakter betöltése...</h2>
    <div class="stat-bar">
        <span>⚔️ ATK: <b id="stat-atk">0</b></span>
        <span>🛡️ DEF: <b id="stat-def">0</b></span>
    </div>
</div>

<div class="main-container">
    <div class="char-view">
        <img id="hero-img" src="" alt="">
        <div class="slots-overlay">
            <div class="slot" data-slot="sisak" ondrop="drop(event)" ondragover="allowDrop(event)">SISAK</div>
            <div class="slot" data-slot="fegyver" ondrop="drop(event)" ondragover="allowDrop(event)">FEGYVER</div>
            <div class="slot" data-slot="páncél" ondrop="drop(event)" ondragover="allowDrop(event)">PÁNCÉL</div>
            <div class="slot" data-slot="pajzs" ondrop="drop(event)" ondragover="allowDrop(event)">PAJZS</div>
            <div class="slot" data-slot="lábvért" ondrop="drop(event)" ondragover="allowDrop(event)">LÁBVÉRT</div>
            <div class="slot" data-slot="cipő" ondrop="drop(event)" ondragover="allowDrop(event)">CIPŐ</div>
        </div>
    </div>

    <div class="bag-container">
        <h3 style="margin:0; color:var(--gold);">HÁTIZSÁK</h3>
        <div id="inventory-grid" class="grid"></div>
    </div>
</div>

<a href="index.html" class="btn-back">VISSZA A VÁRBA</a>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="items.js"></script>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyBg2WzLqxt0QRDkDiUKYrGRCw0Kg-gr1OU", 
        authDomain: "dnd-tracker-4fe05.firebaseapp.com", 
        projectId: "dnd-tracker-4fe05", 
        databaseURL: "https://dnd-tracker-4fe05-default-rtdb.europe-west1.firebasedatabase.app", 
        storageBucket: "dnd-tracker-4fe05.firebasestorage.app", 
        messagingSenderId: "886037504950", 
        appId: "1:886037504950:web:46e80b46f0e26e24429717" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const myId = localStorage.getItem('selectedCharId');

    const HERO_IMAGES = { 
        "Harcos": "https://i.ibb.co/20BXyqpy/Copilot-20260403-032810.png", 
        "Mágus": "https://i.ibb.co/yFz5bcXv/Copilot-20260403-033651.png", 
        "Lovag": "https://i.ibb.co/Fk3n339M/Copilot-20260403-034043.png", 
        "Íjász": "https://i.ibb.co/whd2jNpB/Copilot-20260403-034402.png", 
        "Bérgyilkos": "https://i.ibb.co/b525CsLg/Copilot-20260403-032807.png", 
        "Nekromanta": "https://i.ibb.co/NnCwwCbR/Copilot-20260403-033301.png" 
    };

    if(!myId) window.location.href = 'index.html';

    db.ref(`characters/${myId}`).on('value', snap => {
        const c = snap.val();
        if(!c) return;

        // Felület frissítése
        document.getElementById('char-name').innerText = `${c.name} (LVL ${c.level || 1})`;
        const imgEl = document.getElementById('hero-img');
        imgEl.src = HERO_IMAGES[c.charClass] || "";
        imgEl.style.display = HERO_IMAGES[c.charClass] ? "block" : "none";

        // Slotok ürítése frissítés előtt
        document.querySelectorAll('.slot').forEach(s => {
            s.innerHTML = s.dataset.slot.toUpperCase();
            s.style.background = "rgba(0,0,0,0.7)";
        });

        // Viselt tárgyak megjelenítése
        let totalAtk = 10, totalDef = 5; // Alap statok
        const equipSlots = ["sisak", "fegyver", "páncél", "pajzs", "lábvért", "cipő"];
        
        equipSlots.forEach(slotType => {
            const itemId = c[`equip_${slotType}`];
            if(itemId && ITEMS[itemId]) {
                const item = ITEMS[itemId];
                const slotEl = document.querySelector(`.slot[data-slot="${slotType}"]`);
                slotEl.innerHTML = `<img src="${item.img}" class="item" id="${slotType}-item" draggable="true" ondragstart="drag(event)" data-itemid="${itemId}">`;
                slotEl.style.background = "rgba(197, 160, 89, 0.2)";
                totalAtk += (item.atk || 0);
                totalDef += (item.def || 0);
            }
        });

        document.getElementById('stat-atk').innerText = totalAtk;
        document.getElementById('stat-def').innerText = totalDef;

        // Hátizsák generálása (16 slot)
        const grid = document.getElementById('inventory-grid');
        grid.innerHTML = '';
        const inv = c.inventory || {};
        const invKeys = Object.keys(inv);

        for(let i=0; i<16; i++) {
            const slot = document.createElement('div');
            slot.className = 'inv-slot';
            slot.ondrop = drop;
            slot.ondragover = allowDrop;
            slot.dataset.index = i;

            if(invKeys[i]) {
                const key = invKeys[i];
                const itemId = inv[key];
                if(ITEMS[itemId]) {
                    slot.innerHTML = `<img src="${ITEMS[itemId].img}" class="item" id="${key}" draggable="true" ondragstart="drag(event)" data-itemid="${itemId}" data-firebasekey="${key}">`;
                }
            }
            grid.appendChild(slot);
        }
    });

    // Drag & Drop Logika
    function allowDrop(ev) { ev.preventDefault(); }

    function drag(ev) {
        ev.dataTransfer.setData("itemId", ev.target.dataset.itemid);
        ev.dataTransfer.setData("firebaseKey", ev.target.dataset.firebasekey || "");
        ev.dataTransfer.setData("sourceSlot", ev.target.parentElement.dataset.slot || "inventory");
    }

    function drop(ev) {
        ev.preventDefault();
        const itemId = ev.dataTransfer.getData("itemId");
        const firebaseKey = ev.dataTransfer.getData("firebaseKey");
        const sourceSlot = ev.dataTransfer.getData("sourceSlot");
        const targetSlot = ev.target.dataset.slot || ev.target.parentElement.dataset.slot;

        // Ha felszerelési slotra húzzuk
        if(targetSlot && targetSlot !== "inventory") {
            const item = ITEMS[itemId];
            if(item.type === targetSlot) {
                const updates = {};
                updates[`equip_${targetSlot}`] = itemId;
                if(sourceSlot === "inventory") {
                    db.ref(`characters/${myId}/inventory/${firebaseKey}`).remove();
                }
                db.ref(`characters/${myId}`).update(updates);
            }
        } 
        // Ha visszahúzzuk a hátizsákba
        else if(ev.target.classList.contains('inv-slot') || ev.target.id === "inventory-grid") {
            if(sourceSlot !== "inventory") {
                const updates = {};
                updates[`equip_${sourceSlot}`] = null;
                db.ref(`characters/${myId}`).update(updates);
                db.ref(`characters/${myId}/inventory`).push(itemId);
            }
        }
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Leltár - Death's Armada</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@600&family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --bg: #050507; --card: rgba(15, 15, 18, 0.95); --accent: #8b0000; --text: #e0e0e0; }
        body { font-family: 'Crimson Text', serif; background-color: var(--bg); color: var(--text); margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .master-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)), url('https://i.pinimg.com/originals/26/2b/dd/262bdd02564bf6dabbe89df4f93e8e26.jpg'); background-size: cover; z-index: -1; }
        
        .header { width: 100%; max-width: 900px; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .btn-back { background: rgba(139, 0, 0, 0.2); color: var(--gold); text-decoration: none; font-family: 'MedievalSharp'; border: 1px solid var(--gold); padding: 10px 20px; }

        .inv-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 95%; max-width: 900px; margin-top: 10px; }
        .card { background: var(--card); border: 1px solid var(--gold); border-radius: 4px; padding: 20px; box-shadow: 0 0 20px black; }
        
        /* Karakter Paperdoll */
        .character-paperdoll { position: relative; width: 100%; height: 500px; background: rgba(0,0,0,0.6); border: 2px solid #2a2a2a; display: flex; flex-direction: column; align-items: center; padding: 10px; box-sizing: border-box; }
        .hero-portrait-bg { position: absolute; width: 100%; height: 100%; background-size: contain; background-repeat: no-repeat; background-position: center; opacity: 0.25; z-index: 1; pointer-events: none; }

        .slot { width: 75px; height: 75px; background: rgba(0,0,0,0.9); border: 1px solid var(--gold); display: flex; align-items: center; justify-content: center; position: relative; z-index: 2; overflow: hidden; }
        .slot img { width: 100%; height: 100%; object-fit: cover; }
        .slot span.label { position: absolute; z-index: 3; text-transform: uppercase; font-size: 0.65em; color: var(--gold); font-family: 'MedievalSharp'; text-shadow: 1px 1px 2px black; }

        .doll-top { margin-top: 20px; margin-bottom: 30px; display: flex; justify-content: center; width: 100%; }
        .doll-mid { display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 30px; width: 100%; }
        .doll-low { display: flex; flex-direction: column; gap: 10px; align-items: center; }
        .slot-armor { width: 95px; height: 95px; }

        /* Raktár */
        .bag-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 15px; }
        .bag-item { aspect-ratio: 1; border: 1px solid #333; background-size: cover; background-position: center; cursor: pointer; background-color: rgba(255,255,255,0.03); }
    </style>
</head>
<body>
    <div class="master-bg"></div>
    <div class="header">
        <a href="index.html" class="btn-back">« Vissza</a>
        <div style="font-family:'MedievalSharp'; color:var(--gold);">💰 <span id="gold-display">0</span></div>
    </div>

    <div class="inv-layout">
        <div class="card">
            <h2 id="char-name-display" style="font-family:'MedievalSharp'; color:var(--gold); text-align:center;">-</h2>
            <div class="character-paperdoll">
                <div id="hero-bg-img" class="hero-portrait-bg"></div>
                <div class="doll-top"><div class="slot" id="slot-Sisak"><span class="label">Sisak</span></div></div>
                <div class="doll-mid">
                    <div class="slot" id="slot-Fegyver"><span class="label">Fegyver</span></div>
                    <div class="slot slot-armor" id="slot-Páncél"><span class="label">Páncél</span></div>
                    <div class="slot" id="slot-Pajzs"><span class="label">Pajzs</span></div>
                </div>
                <div class="doll-low">
                    <div class="slot" id="slot-Lábvért"><span class="label">Lábvért</span></div>
                    <div class="slot" id="slot-Cipő"><span class="label">Cipő</span></div>
                </div>
            </div>
        </div>

        <div class="card">
            <h2 style="font-family:'MedievalSharp'; color:var(--gold); text-align: center;">HÁTIZSÁK</h2>
            <div class="bag-grid" id="bag-grid"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="items.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyBg2WzLqxt0QRDkDiUKYrGRCw0Kg-gr1OU", authDomain: "dnd-tracker-4fe05.firebaseapp.com", projectId: "dnd-tracker-4fe05", databaseURL: "https://dnd-tracker-4fe05-default-rtdb.europe-west1.firebasedatabase.app", storageBucket: "dnd-tracker-4fe05.firebasestorage.app", messagingSenderId: "886037504950", appId: "1:886037504950:web:46e80b46f0e26e24429717" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const myId = localStorage.getItem('selectedCharId');
        const HERO_IMAGES = { "Harcos": "https://i.ibb.co/20BXyqpy/Copilot-20260403-032810.png", "Mágus": "https://i.ibb.co/yFz5bcXv/Copilot-20260403-033651.png", "Lovag": "https://i.ibb.co/Fk3n339M/Copilot-20260403-034043.png", "Íjász": "https://i.ibb.co/whd2jNpB/Copilot-20260403-034402.png", "Bérgyilkos": "https://i.ibb.co/b525CsLg/Copilot-20260403-032807.png", "Nekromanta": "https://i.ibb.co/NnCwwCbR/Copilot-20260403-033301.png" };

        db.ref(`characters/${myId}`).on('value', snap => {
            const c = snap.val();
            if(!c) return;
            document.getElementById('char-name-display').innerText = c.name;
            document.getElementById('gold-display').innerText = c.gold || 0;
            document.getElementById('hero-bg-img').style.backgroundImage = `url('${HERO_IMAGES[c.charClass]}')`;

            // Hátizsák (Inventory) betöltése
            const grid = document.getElementById('bag-grid');
            grid.innerHTML = '';
            if(c.inventory) {
                Object.entries(c.inventory).forEach(([key, itemId]) => {
                    const item = ITEMS[itemId];
                    if(item) {
                        const div = document.createElement('div');
                        div.className = 'bag-item';
                        div.style.backgroundImage = `url('${item.img}')`;
                        div.onclick = () => equip(item);
                        grid.appendChild(div);
                    }
                });
            }
        });

        function equip(item) {
            const slot = document.getElementById(`slot-${item.type}`);
            if(slot) {
                slot.innerHTML = `<img src="${item.img}">`;
            }
        }
    </script>
</body>
</html>

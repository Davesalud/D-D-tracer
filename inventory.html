<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Leltár - Death's Armada</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@600&family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --bg: #050507; --card: rgba(15, 15, 18, 0.95); --accent: #8b0000; --text: #e0e0e0; }
        body { font-family: 'Crimson Text', serif; background-color: var(--bg); color: var(--text); margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .master-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)), url('https://i.pinimg.com/originals/26/2b/dd/262bdd02564bf6dabbe89df4f93e8e26.jpg'); background-size: cover; z-index: -1; }
        
        .header { width: 100%; max-width: 900px; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .btn-back { background: rgba(139, 0, 0, 0.2); color: var(--gold); text-decoration: none; font-family: 'MedievalSharp'; border: 1px solid var(--gold); padding: 10px 20px; transition: 0.3s; text-transform: uppercase; font-size: 0.9em; }
        .btn-back:hover { background: var(--gold); color: black; box-shadow: 0 0 15px var(--gold); }

        .inv-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 95%; max-width: 900px; margin-top: 10px; }
        .card { background: var(--card); border: 1px solid var(--gold); border-radius: 4px; padding: 20px; box-shadow: 0 0 20px black; position: relative; }
        
        /* Karakter Panel */
        .character-paperdoll { position: relative; width: 100%; height: 520px; background: rgba(0,0,0,0.6); border-radius: 4px; display: flex; flex-direction: column; align-items: center; border: 2px solid #2a2a2a; overflow: hidden; padding: 10px; box-sizing: border-box; }
        .hero-portrait-bg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 110%; height: 110%; background-size: cover; background-repeat: no-repeat; background-position: center 20%; opacity: 0.25; z-index: 1; pointer-events: none; }

        /* Slotok stílusa */
        .slot { width: 75px; height: 75px; background: rgba(0,0,0,0.9); border: 1px solid var(--gold); display: flex; align-items: center; justify-content: center; position: relative; z-index: 2; transition: 0.2s; cursor: pointer; border-radius: 2px; overflow: hidden; }
        .slot:hover { border-color: white; box-shadow: 0 0 15px var(--gold); transform: scale(1.05); }
        .slot img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .slot span.label { position: absolute; z-index: 3; text-transform: uppercase; font-weight: bold; color: var(--gold); font-size: 0.7em; font-family: 'MedievalSharp'; text-shadow: 1px 1px 3px black; pointer-events: none; }

        .doll-top { display: flex; justify-content: center; width: 100%; margin-top: 20px; margin-bottom: 35px; }
        .doll-mid { display: flex; justify-content: center; align-items: center; gap: 25px; width: 100%; margin-bottom: 35px; }
        .doll-low { display: flex; flex-direction: column; align-items: center; gap: 15px; width: 100%; }

        .slot-armor { width: 95px; height: 95px; border-width: 2px; }
        .pos-jewel { position: absolute; top: 15px; right: 15px; border-style: dashed; width: 65px; height: 65px; }

        /* Raktár */
        .bag-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 20px; }
        .bag-item { aspect-ratio: 1; background: rgba(255,255,255,0.03); border: 1px solid #333; border-radius: 3px; cursor: pointer; transition: 0.2s; background-size: cover; background-position: center; }
        .bag-item:hover { border-color: var(--gold); background-color: rgba(255,255,255,0.1); }
    </style>
</head>
<body>

<div class="master-bg"></div>
<div class="header">
    <a href="index.html" class="btn-back">« Vissza a Városba</a>
    <div style="font-family:'MedievalSharp'; color:var(--gold); font-size: 1.2em;">💰 <span id="gold-display">0</span></div>
</div>

<div class="inv-layout">
    <div class="card">
        <h2 id="char-name-display" style="font-family:'MedievalSharp'; color:var(--gold); text-align:center; margin-bottom:15px; letter-spacing: 2px;">-</h2>
        <div class="character-paperdoll">
            <div id="hero-bg-img" class="hero-portrait-bg"></div>

            <div class="doll-top">
                <div class="slot" id="slot-Sisak"><span class="label">Sisak</span></div>
                <div class="slot pos-jewel" id="slot-Ékszer"><span class="label">Ékszer</span></div>
            </div>

            <div class="doll-mid">
                <div class="slot" id="slot-Fegyver"><span class="label">Fegyver</span></div>
                <div class="slot slot-armor" id="slot-Páncél"><span class="label">Páncél</span></div>
                <div class="slot" id="slot-Pajzs"><span class="label">Pajzs</span></div>
            </div>

            <div class="doll-low">
                <div class="slot" id="slot-Lábvért"><span class="label">Lábvért</span></div>
                <div class="slot" id="slot-Cipő"><span class="label">Cipő</span></div>
            </div>
        </div>
    </div>

    <div class="card">
        <h2 style="font-family:'MedievalSharp'; color:var(--gold); text-align: center;">RAKTÁR</h2>
        <div class="bag-grid" id="bag-grid"></div>
        
        <div style="margin-top: 30px; font-family: 'MedievalSharp'; background: rgba(0,0,0,0.6); padding: 15px; border: 1px solid var(--gold); border-radius: 4px;">
            <div style="font-size: 0.9em; color: var(--gold); text-transform: uppercase; border-bottom: 1px solid #444; padding-bottom: 5px; margin-bottom: 10px;">Statisztika</div>
            <div style="display:flex; justify-content: space-between; margin-bottom: 5px;"><span>Sebzés:</span><span id="atk-val" style="color:white">--</span></div>
            <div style="display:flex; justify-content: space-between;"><span>Védelem:</span><span id="def-val" style="color:white">--</span></div>
        </div>
    </div>
</div>

<script src="items.js"></script>
<script>
    // Raktár feltöltése a teszt tárgyakkal
    const bagGrid = document.getElementById('bag-grid');
    Object.values(ITEMS).forEach(item => {
        const div = document.createElement('div');
        div.className = 'bag-item';
        if(item.img) div.style.backgroundImage = `url('${item.img}')`;
        div.title = item.name; // Megmutatja a nevet ha fölé viszed az egeret
        div.onclick = () => equipItem(item);
        bagGrid.appendChild(div);
    });

    function equipItem(item) {
        const slot = document.getElementById(`slot-${item.type}`);
        if(slot) {
            // Megkeressük/létrehozzuk az IMG-t
            let img = slot.querySelector('img');
            if(!img) {
                img = document.createElement('img');
                slot.appendChild(img);
            }
            img.src = item.img;
            img.style.display = 'block';
            
            // Elrejtjük a feliratot, ha van kép
            slot.querySelector('.label').style.display = 'none';
            slot.style.borderColor = "white";
        }
    }

    // Alap Firebase adatok beolvasása (név, arany, háttérkép)
    // ... a korábbi script részed marad ...
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <script src="auth-guard.js"></script>
    <title>Hős Leltár - Death's Armada</title>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="responsive.css">
    <style>
        
        .header { 
            padding: 15px; text-align: center; border-bottom: 2px solid var(--accent); 
            width: 100%; background: rgba(5, 5, 7, 0.9); position: sticky; top: 0; z-index: 100; 
        }

        .stat-bar { 
            background: rgba(0,0,0,0.8); border: 1px solid var(--gold); 
            padding: 10px; border-radius: 5px; display: flex; 
            justify-content: center; gap: 15px; margin-top: 10px; flex-wrap: wrap;
        }

        /* HP ÉS MP CSÍKOK */
#hp-fill { width: 0%; height: 100%; background: linear-gradient(to right, #ff0000, #8b0000); transition: 0.5s; }
        #mp-fill { width: 0%; height: 100%; background: linear-gradient(to right, #004cff, #00d4ff); transition: 0.5s; }
.main-container { 
            display: flex; gap: 30px; justify-content: center; flex-wrap: wrap; 
            padding: 20px; width: 100%; max-width: 1200px;
        }

        /* KARAKTER NÉZET - AZ EREDETI POZÍCIÓKKAL */
        .char-view { 
            position: relative; width: 300px; height: 480px; 
            border: 2px solid var(--gold); background: rgba(0,0,0,0.8); 
            border-radius: 8px; box-shadow: 0 0 20px black;
        }
        #hero-img { width: 100%; height: 100%; object-fit: cover; opacity: 0.4; border-radius: 6px; position: absolute; top: 0; left: 0; }

        .slot { 
            width: 60px; height: 60px; border: 1px solid #555; 
            background: rgba(10, 10, 15, 0.9); display: flex; 
            align-items: center; justify-content: center; font-size: 0.6em; 
            color: var(--gold); cursor: pointer; position: absolute; z-index: 5;
            transition: 0.2s; border-radius: 4px;
        }
        .slot:hover { border-color: white; box-shadow: 0 0 10px var(--gold); }
        .slot img { width: 48px; height: 48px; object-fit: contain; }
        .slot-stack {
            position: absolute;
            right: 4px;
            bottom: 4px;
            display: inline-flex;
            align-items: center;
            padding: 1px 5px;
            border-radius: 8px;
            border: 1px solid var(--gold);
            background: rgba(0,0,0,0.88);
            color: #ffe08a;
            font-size: 0.58em;
            line-height: 1;
            white-space: nowrap;
        }

        /* PONTOS POZÍCIÓK AZ EREDETI SZERINT */
        .slot[data-slot="sisak"] { top: 20px; left: 120px; }
        .slot[data-slot="fegyver"] { top: 150px; left: 20px; }
        .slot[data-slot="páncél"] { top: 150px; left: 120px; }
        .slot[data-slot="pajzs"] { top: 150px; left: 220px; }
        .slot[data-slot="lábvért"] { top: 300px; left: 120px; }
        .slot[data-slot="cipő"] { top: 390px; left: 120px; }
        
        .bag-container { 
            background: var(--card); border: 2px solid var(--gold); 
            padding: 15px; border-radius: 8px; width: 100%; max-width: 320px; 
        }
.inv-slot { 
            aspect-ratio: 1/1; border: 1px solid #444; 
            background: rgba(0,0,0,0.5); display: flex; 
            align-items: center; justify-content: center; cursor: pointer; border-radius: 2px; position: relative;
        }
        .inv-slot:hover { border-color: var(--gold); }
        .item-icon { width: 85%; height: 85%; object-fit: contain; }
        .stack-badge {
            position: absolute;
            right: 3px;
            bottom: 3px;
            min-width: 18px;
            padding: 1px 4px;
            border-radius: 10px;
            border: 1px solid var(--gold);
            background: rgba(0,0,0,0.85);
            color: #ffe08a;
            font-size: 0.62em;
            text-align: center;
            line-height: 1.1;
        }
.bag-container #inventory-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 8px;
            max-height: 420px;
            overflow-y: auto;
            padding-right: 4px;
        }
.heal-particle {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 12;
            background: radial-gradient(circle, #c7ff7a 0%, #57ff9f 70%, rgba(87,255,159,0) 100%);
            box-shadow: 0 0 10px rgba(135, 255, 170, 0.9);
            animation: healFloat 820ms ease-out forwards;
        }
@keyframes healFloat {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0.45); opacity: 0; }
        }
.btn-back:hover { background: var(--gold); color: black; }
    </style>
</head>
<body class="page-inventory">

<div class="header">
    <h2 id="char-name" style="margin:0; color:var(--gold);">Hős betöltése...</h2>
    <div class="stat-bar">
        <div class="bar-container inline">
            <div id="hp-fill"></div>
            <span id="hp-text" class="bar-text">? / ? HP</span>
        </div>
        <div class="bar-container inline">
            <div id="mp-fill"></div>
            <span id="mp-text" class="bar-text">? / ? MP</span>
        </div>
        <span>💰 <b id="stat-gold">0</b></span>
        <span>⚔️ <b id="stat-atk">0</b></span>
        <span>🛡️ <b id="stat-def">0</b></span>
    </div>
</div>

<div class="main-container">
    <div class="inventory-char-wrap">
    <div class="char-view">
        <img id="hero-img" src="" alt="">
        <div class="slot" data-slot="sisak" onclick="handleSlotClick('sisak')">SISAK</div>
        <div class="slot" data-slot="fegyver" onclick="handleSlotClick('fegyver')">FEGYVER</div>
        <div class="slot" data-slot="páncél" onclick="handleSlotClick('páncél')">PÁNCÉL</div>
        <div class="slot" data-slot="pajzs" onclick="handleSlotClick('pajzs')">PAJZS</div>
        <div class="slot" data-slot="lábvért" onclick="handleSlotClick('lábvért')">LÁBVÉRT</div>
        <div class="slot" data-slot="cipő" onclick="handleSlotClick('cipő')">CIPŐ</div>
    </div>
    </div>

    <div class="bag-container">
        <h3 style="margin:0; color:var(--gold); text-align:center; letter-spacing: 2px;">HÁTIZSÁK</h3>
        <div id="inventory-grid" class="grid"></div>
    </div>
</div>

<a href="index.html" class="btn-back" id="inv-back-default" onclick="try{sessionStorage.removeItem('challengeReturn');}catch(e){}">🏰 VISSZA A VÁRBA</a>
    <a href="campaign.html" class="btn-back" id="inv-back-challenge" style="display:none; margin-top:8px; border-color:#c0392b;">🔥 VISSZA A KIHÍVÁSHOZ</a>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="firebase-credentials.js"></script>
<script src="items.js"></script>

<script>
    const db = window.initFirebaseDb();
    const myId = localStorage.getItem('selectedCharId');
    const TYPE_TO_SLOT = {
        "helmet": "sisak",
        "shield": "pajzs",
        "leggings": "lábvért",
        "boots": "cipő",
        "weapon": "fegyver",
        "armor": "páncél",
        "pancel": "páncél",
        "fegyver": "fegyver",
        "páncél": "páncél",
        "sisak": "sisak",
        "pajzs": "pajzs",
        "lábvért": "lábvért",
        "cipő": "cipő"
    };

    (function setupChallengeBackLink() {
        try {
            if (sessionStorage.getItem('challengeReturn') === '1') {
                const ch = document.getElementById('inv-back-challenge');
                const df = document.getElementById('inv-back-default');
                if (ch && df) {
                    ch.style.display = 'inline-block';
                }
            }
        } catch (e) {}
    })();

    let isProcessing = false;
    let currentCharData = null;
    const EQUIP_SLOTS = ["sisak", "fegyver", "páncél", "pajzs", "lábvért", "cipő"];

    const HERO_IMAGES = { "Harcos": "https://i.ibb.co/20BXyqpy/Copilot-20260403-032810.png", "Mágus": "https://i.ibb.co/yFz5bcXv/Copilot-20260403-033651.png", "Lovag": "https://i.ibb.co/Fk3n339M/Copilot-20260403-034043.png", "Íjász": "https://i.ibb.co/whd2jNpB/Copilot-20260403-034402.png", "Bérgyilkos": "https://i.ibb.co/b525CsLg/Copilot-20260403-032807.png", "Nekromanta": "https://i.ibb.co/NnCwwCbR/Copilot-20260403-033301.png" };

    // Adatbázis figyelése
    db.ref(`characters/${myId}`).on('value', snap => {
        currentCharData = snap.val();
        if(currentCharData) updateUI();
    });

    function updateUI() {
        const c = currentCharData;
        document.getElementById('char-name').innerText = `${c.name} - LVL ${c.level || 1}`;
        document.getElementById('stat-gold').innerText = c.gold || 0;
        document.getElementById('hero-img').src = HERO_IMAGES[c.charClass] || "";

        // HP Frissítés
        const hp = Math.ceil(c.hp || 0);
        const maxHp = c.maxHp || 100;
        document.getElementById('hp-fill').style.width = (hp / maxHp * 100) + "%";
        document.getElementById('hp-text').innerText = `${hp} / ${maxHp} HP`;

        // MP Frissítés (Kék csík)
        const mp = Math.ceil(c.mp || 0);
        document.getElementById('mp-fill').style.width = mp + "%"; // MP alapból 100-as skálán van nálad
        document.getElementById('mp-text').innerText = `${mp} / 100 MP`;

        // Statisztikák (Alap + Bónusz)
        document.getElementById('stat-atk').innerText = (Number(c.atk) || 0) + (Number(c.bonusAtk) || 0);
        document.getElementById('stat-def').innerText = (Number(c.def) || 0) + (Number(c.bonusDef) || 0);
        // Felszerelt tárgyak slotjai
        ["sisak", "fegyver", "páncél", "pajzs", "lábvért", "cipő"].forEach(st => {
            const slotEl = document.querySelector(`.slot[data-slot="${st}"]`);
            const itemId = c[`equip_${st}`];
            if(itemId && ITEMS[itemId]) {
                const isSoulWeapon = st === "fegyver" && itemId === "lelkek_ore_01";
                const soulStacks = Number(c.soulEaterStacks || 0);
                slotEl.innerHTML = `<img src="${ITEMS[itemId].img}">${isSoulWeapon ? `<span class="slot-stack">${soulStacks}/20</span>` : ''}`;
            } else { 
                slotEl.innerHTML = st.toUpperCase(); 
            }
        });
        
        // Hátizsák (Inventory) rács
        const grid = document.getElementById('inventory-grid');
        grid.innerHTML = '';
        const inv = c.inventory || {};
        const invValues = Object.values(inv);
        Object.keys(inv).forEach(key => {
            const itemId = inv[key];
            if(ITEMS[itemId]) {
                const div = document.createElement('div');
                div.className = 'inv-slot';
                div.onclick = () => handleInventoryClick(itemId, key);
                const stackCount = invValues.filter(v => v === itemId).length;
                const showStack = stackCount > 1 || ITEMS[itemId].type === "consumable";
                const isSoulEaterAxe = itemId === "lelkek_ore_01";
                const badgeText = isSoulEaterAxe ? `${Number(c.soulEaterStacks || 0)}/20` : String(stackCount);
                div.innerHTML = `<img src="${ITEMS[itemId].img}" class="item-icon">${(showStack || isSoulEaterAxe) ? `<span class="stack-badge">${badgeText}</span>` : ''}`;
                grid.appendChild(div);
            }
        });
        // Üres helyek kitöltése (28 slot)
        for(let i = Object.keys(inv).length; i < 28; i++) {
            const div = document.createElement('div');
            div.className = 'inv-slot';
            grid.appendChild(div);
        }
    }

    function parsePassiveFromItem(item, totals) {
        const effect = String(item.effect || "").toLowerCase();
        if (!effect || effect === "nincs") return;
        if (effect.includes("+5% találati")) totals.bonusHitChance += 5;
        if (effect.includes("10%-át áttöri")) totals.armorPenPercent += 10;
        if (effect.includes("+5% blokkolási")) totals.blockChance += 5;
        if (effect.includes("+3% kitérési")) totals.dodgeChance += 3;
        if (effect.includes("+7% kitérési")) totals.dodgeChance += 7;
        if (effect.includes("-1 bejövő sebzés")) totals.flatDamageReduction += 1;
        if (effect.includes("+2 hp minden kör")) totals.hpRegenPerTurn += 2;
        if (effect.includes("+5 mp körönként")) totals.mpRegenPerTurn += 5;
        if (effect.includes("immunitás a kábításra")) totals.stunImmune = true;
        if (effect.includes("1 sebzés a támadónak")) totals.thornsDamage += 1;
        if (effect.includes("első ütésed +3")) totals.openingStrikeDamage += 3;
        if (effect.includes("2 sebzést okoz az ellenfélnek minden körben")) totals.dotDamagePerRound += 2;
        // Fegyver passzívok (balanszolt, limitált értékekkel)
        if (effect.includes("vérzés: +1 sebzés kör végén")) totals.dotDamagePerRound += 1;
        if (effect.includes("parázs: 10% esély égetésre")) totals.dotDamagePerRound += 1;
    }

    function buildDerivedFromEquips(equips) {
        const out = {
            bonusAtk: 0,
            bonusDef: 0,
            bonusHitChance: 0,
            armorPenPercent: 0,
            blockChance: 0,
            dodgeChance: 0,
            flatDamageReduction: 0,
            hpRegenPerTurn: 0,
            mpRegenPerTurn: 0,
            stunImmune: false,
            thornsDamage: 0,
            openingStrikeDamage: 0,
            dotDamagePerRound: 0
        };
        const clamp = (v, min, max) => Math.min(max, Math.max(min, Number(v) || 0));
        EQUIP_SLOTS.forEach(slot => {
            const itemId = equips[slot];
            const item = itemId ? ITEMS[itemId] : null;
            if (!item) return;
            out.bonusAtk += Number(item.atk) || 0;
            out.bonusDef += Number(item.def) || 0;
            parsePassiveFromItem(item, out);
        });
        // Anti-boost / balansz cap-ek
        out.bonusAtk = clamp(out.bonusAtk, 0, 12);
        out.bonusDef = clamp(out.bonusDef, 0, 14);
        out.bonusHitChance = clamp(out.bonusHitChance, 0, 8);
        out.armorPenPercent = clamp(out.armorPenPercent, 0, 10);
        out.blockChance = clamp(out.blockChance, 0, 8);
        out.dodgeChance = clamp(out.dodgeChance, 0, 10);
        out.flatDamageReduction = clamp(out.flatDamageReduction, 0, 2);
        out.hpRegenPerTurn = clamp(out.hpRegenPerTurn, 0, 2);
        out.mpRegenPerTurn = clamp(out.mpRegenPerTurn, 0, 5);
        out.thornsDamage = clamp(out.thornsDamage, 0, 1);
        out.openingStrikeDamage = clamp(out.openingStrikeDamage, 0, 3);
        out.dotDamagePerRound = clamp(out.dotDamagePerRound, 0, 2);
        return out;
    }

    function handleInventoryClick(itemId, fbKey) {
        if (isProcessing) return;
        const item = ITEMS[itemId];
        if (!item) return;

        const actionText = item.type === "consumable" ? "Megiszod" : "Felveszed";
        let stackNote = "";
        const invValues = Object.values(currentCharData.inventory || {});
        const stackCount = invValues.filter(v => v === itemId).length;
        if (item.type === "consumable") stackNote = `\nStack: ${stackCount} db`;
        const statsLine = item.type === "consumable"
            ? `Heal: +${Number(item.heal) || 0}${item.mana ? ` | Mana: +${Number(item.mana) || 0}` : ""}`
            : `ATK: +${Number(item.atk) || 0} | DEF: +${Number(item.def) || 0}`;
        const effectLine = item.effect ? `\nHatás: ${item.effect}` : "";

        if (confirm(`${actionText}: ${item.name}?\n${statsLine}${effectLine}${stackNote}`)) {
            if (item.type === "consumable") {
                useConsumable(itemId, fbKey);
            } else {
                const slotType = TYPE_TO_SLOT[item.type];
                if (!slotType) {
                    return alert(`Ehhez a tárgyhoz nincs felszerelési slot: ${item.type}`);
                }
                equipItem(itemId, fbKey, slotType);
            }
        }
    }

    function handleSlotClick(slotType) {
        if (isProcessing) return;
        const itemId = currentCharData[`equip_${slotType}`];
        if (itemId && confirm(`Leveszed: ${ITEMS[itemId].name}?`)) {
            unequipItem(slotType, itemId);
        }
    }

    function equipItem(itemId, fbKey, slotType) {
        if (currentCharData[`equip_${slotType}`]) return alert("Ebben a slotban már van valami!");

        isProcessing = true;
        const nextEquips = {};
        EQUIP_SLOTS.forEach(slot => { nextEquips[slot] = currentCharData[`equip_${slot}`] || null; });
        nextEquips[slotType] = itemId;
        const derived = buildDerivedFromEquips(nextEquips);
        const updates = {};
        updates[`equip_${slotType}`] = itemId;
        Object.assign(updates, derived);
        if (itemId === "lelkek_ore_01") {
            const totalStacks = Math.min(20, Math.max(0, Number(currentCharData.soulEaterStacks || 0)));
            const appliedStacks = Math.min(totalStacks, Math.max(0, Number(currentCharData.soulEaterAppliedStacks || 0)));
            const pendingStacks = Math.max(0, totalStacks - appliedStacks);
            if (pendingStacks > 0) {
                const hpGain = pendingStacks * 2;
                const nextMaxHp = (Number(currentCharData.maxHp) || 100) + hpGain;
                updates.maxHp = nextMaxHp;
                updates.hp = Math.min(nextMaxHp, (Number(currentCharData.hp) || 1) + hpGain);
                updates.soulEaterAppliedStacks = appliedStacks + pendingStacks;
            } else {
                updates.soulEaterAppliedStacks = appliedStacks;
            }
        }
        updates.lastUpdate = Date.now(); // Frissítés a regenhez

        db.ref(`characters/${myId}`).update(updates).then(() => {
            return db.ref(`characters/${myId}/inventory/${fbKey}`).remove();
        }).finally(() => isProcessing = false);
    }

    function unequipItem(slotType, itemId) {
        isProcessing = true;
        const newKey = db.ref(`characters/${myId}/inventory`).push().key;
        const nextEquips = {};
        EQUIP_SLOTS.forEach(slot => { nextEquips[slot] = currentCharData[`equip_${slot}`] || null; });
        nextEquips[slotType] = null;
        const derived = buildDerivedFromEquips(nextEquips);
        const updates = {};
        updates[`equip_${slotType}`] = null;
        Object.assign(updates, derived);
        updates[`inventory/${newKey}`] = itemId;
        updates.lastUpdate = Date.now();

        db.ref(`characters/${myId}`).update(updates).finally(() => isProcessing = false);
    }

    function useConsumable(itemId, fbKey) {
        isProcessing = true;
        const item = ITEMS[itemId];
        const updates = { lastUpdate: Date.now() };
        const didHeal = !!item.heal;
        
        if (item.heal) updates.hp = Math.min(currentCharData.maxHp, (Number(currentCharData.hp) || 0) + item.heal);
        if (item.mana) updates.mp = Math.min(100, (Number(currentCharData.mp) || 0) + item.mana);

        db.ref(`characters/${myId}`).update(updates).then(() => {
            return db.ref(`characters/${myId}/inventory/${fbKey}`).remove();
        }).then(() => {
            if (didHeal) playHealParticles('hero-img');
        }).finally(() => isProcessing = false);
    }

    function playHealParticles(targetId) {
        const host = document.getElementById(targetId);
        if (!host) return;
        if (getComputedStyle(host).position === "static") host.style.position = "relative";
        for (let i = 0; i < 18; i++) {
            const p = document.createElement('span');
            p.className = 'heal-particle';
            p.style.left = `${45 + Math.random() * 10}%`;
            p.style.top = `${58 + Math.random() * 22}%`;
            p.style.setProperty('--tx', `${(Math.random() - 0.5) * 90}px`);
            p.style.setProperty('--ty', `${-40 - Math.random() * 90}px`);
            p.style.animationDelay = `${Math.random() * 120}ms`;
            host.appendChild(p);
            setTimeout(() => p.remove(), 950);
        }
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Hős Leltár</title>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --accent: #8b0000; --bg: #050507; --slot-bg: rgba(20, 20, 25, 0.85); }
        body { background: var(--bg); color: var(--gold); font-family: 'MedievalSharp', serif; margin: 0; padding: 20px; }
        .inventory-container { display: flex; gap: 40px; justify-content: center; align-items: flex-start; }
        .char-column { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .stats-bar { display: flex; gap: 25px; background: rgba(30, 30, 35, 0.9); padding: 12px 25px; border-radius: 8px; border: 1px solid var(--gold); font-size: 1.3em; }
        .char-frame { position: relative; width: 350px; height: 500px; border: 2px solid var(--gold); background: #111; overflow: hidden; }
        .char-img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; position: absolute; top: 0; left: 0; z-index: 1; }
        .equip-slot { position: absolute; width: 75px; height: 75px; background: var(--slot-bg); border: 1px solid var(--gold); display: flex; align-items: center; justify-content: center; z-index: 10; border-radius: 5px; font-size: 0.65em; color: #555; text-transform: uppercase; }
        
        /* Slot pozíciók */
        .equip-slot[data-type="sisak"]   { top: 20px; left: 50%; transform: translateX(-50%); }
        .equip-slot[data-type="páncél"]  { top: 160px; left: 50%; transform: translateX(-50%); }
        .equip-slot[data-type="fegyver"] { top: 160px; left: 15px; }
        .equip-slot[data-type="pajzs"]   { top: 160px; right: 15px; }
        .equip-slot[data-type="lábvért"] { bottom: 30px; left: 50%; transform: translateX(-50%); }

        .backpack-panel { background: rgba(20, 20, 25, 0.95); border: 1px solid var(--gold); padding: 25px; border-radius: 10px; }
        .backpack-grid { display: grid; grid-template-columns: repeat(4, 80px); gap: 12px; }
        .inv-slot { width: 80px; height: 80px; background: rgba(255,255,255,0.03); border: 1px solid #333; border-radius: 5px; display: flex; align-items: center; justify-content: center; }
        .item-icon { width: 68px; height: 68px; cursor: grab; background-size: contain; background-repeat: no-repeat; background-position: center; z-index: 20; }
        .drag-over { background: rgba(197, 160, 89, 0.3) !important; border-color: #fff !important; }
    </style>
</head>
<body>

<div class="inventory-container">
    <div class="char-column">
        <h2 id="char-name">Karakter betöltése...</h2>
        <div class="stats-bar">
            <div>⚔️ <span id="total-atk">0</span></div>
            <div>🛡️ <span id="total-def">0</span></div>
        </div>
        <div class="char-frame">
            <img id="hero-image" src="" class="char-img">
            <div class="equip-slot" data-type="sisak" ondrop="handleDrop(event)" ondragover="allowDrop(event)">SISAK</div>
            <div class="equip-slot" data-type="páncél" ondrop="handleDrop(event)" ondragover="allowDrop(event)">PÁNCÉL</div>
            <div class="equip-slot" data-type="fegyver" ondrop="handleDrop(event)" ondragover="allowDrop(event)">FEGYVER</div>
            <div class="equip-slot" data-type="pajzs" ondrop="handleDrop(event)" ondragover="allowDrop(event)">PAJZS</div>
            <div class="equip-slot" data-type="lábvért" ondrop="handleDrop(event)" ondragover="allowDrop(event)">LÁB</div>
        </div>
    </div>
    <div class="backpack-panel">
        <h2>HÁTIZSÁK</h2>
        <div id="backpack-grid" class="backpack-grid"></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="items.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBg2WzLqxt0QRDkDiUKYrGRCw0Kg-gr1OU", authDomain: "dnd-tracker-4fe05.firebaseapp.com", projectId: "dnd-tracker-4fe05", databaseURL: "https://dnd-tracker-4fe05-default-rtdb.europe-west1.firebasedatabase.app", storageBucket: "dnd-tracker-4fe05.firebasestorage.app", messagingSenderId: "886037504950", appId: "1:886037504950:web:46e80b46f0e26e24429717" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // URL-BŐL OLVASÁS JAVÍTÁSA: inventory.html?id=norbi
    const urlParams = new URLSearchParams(window.location.search);
    const charId = urlParams.get('id');

    if (!charId) {
        alert("Nincs karakter ID! Használd így: inventory.html?id=KarakterNeve");
    }

    // Hátizsák slotok generálása
    const grid = document.getElementById('backpack-grid');
    for (let i = 0; i < 16; i++) {
        const slot = document.createElement('div');
        slot.className = 'inv-slot';
        slot.ondrop = handleDrop;
        slot.ondragover = (e) => e.preventDefault();
        grid.appendChild(slot);
    }

    function handleDrop(ev) {
        ev.preventDefault();
        const itemId = ev.dataTransfer.getData("itemId");
        const fbKey = ev.dataTransfer.getData("fbKey"); 
        const itemType = ev.dataTransfer.getData("itemType").toLowerCase();
        const target = ev.currentTarget;

        if (target.classList.contains('equip-slot')) {
            const slotType = target.dataset.type;
            if (itemType === slotType) {
                db.ref(`characters/${charId}/equip_${slotType}`).set(itemId);
                if(fbKey) db.ref(`characters/${charId}/inventory/${fbKey}`).remove();
            } else {
                alert("Nem passzol a típus!");
            }
        } else if (target.classList.contains('inv-slot')) {
            const sourceEl = document.querySelector(`[data-item-id="${itemId}"]:not([id])`);
            if (sourceEl) {
                const sSlot = sourceEl.parentElement.dataset.type;
                db.ref(`characters/${charId}/inventory`).push(itemId);
                db.ref(`characters/${charId}/equip_${sSlot}`).remove();
            }
        }
    }

    function updateStats(c) {
        let atk = c.baseAtk || 5; let def = c.baseDef || 2;
        let bAtk = 0; let bDef = 0;
        ['sisak', 'páncél', 'fegyver', 'pajzs', 'lábvért'].forEach(s => {
            const id = c[`equip_${s}`];
            if(id && ITEMS[id]) { bAtk += (ITEMS[id].atk || 0); bDef += (ITEMS[id].def || 0); }
        });
        document.getElementById('total-atk').innerText = atk + bAtk;
        document.getElementById('total-def').innerText = def + bDef;
    }

    db.ref(`characters/${charId}`).on('value', snap => {
        const c = snap.val();
        if(!c) return;
        document.getElementById('char-name').innerText = c.name;
        document.getElementById('hero-image').src = c.image || ""; // Ellenőrizd a FB-ben a kulcsot!

        document.querySelectorAll('.equip-slot').forEach(slot => {
            const type = slot.dataset.type;
            const id = c[`equip_${type}`];
            slot.innerHTML = type;
            if(id && ITEMS[id]) {
                slot.innerHTML = `<div class="item-icon" draggable="true" data-item-id="${id}" data-type="${type}" ondragstart="event.dataTransfer.setData('itemId','${id}'); event.dataTransfer.setData('itemType','${type}')" style="background-image: url('${ITEMS[id].img}')"></div>`;
            }
        });

        const slots = document.querySelectorAll('.inv-slot');
        slots.forEach(s => s.innerHTML = '');
        if(c.inventory) {
            let i = 0;
            Object.entries(c.inventory).forEach(([key, id]) => {
                if(ITEMS[id] && slots[i]) {
                    const div = document.createElement('div');
                    div.className = 'item-icon';
                    div.draggable = true;
                    div.style.backgroundImage = `url('${ITEMS[id].img}')`;
                    div.ondragstart = (e) => { 
                        e.dataTransfer.setData("itemId", id); 
                        e.dataTransfer.setData("fbKey", key); 
                        e.dataTransfer.setData("itemType", ITEMS[id].type); 
                    };
                    slots[i].appendChild(div);
                    i++;
                }
            });
        }
        updateStats(c);
    });
</script>
</body>
</html>

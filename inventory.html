<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Leltár - Death's Armada</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@600&family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --bg: #050507; --card: rgba(15, 15, 18, 0.95); --accent: #8b0000; --text: #e0e0e0; }
        body { font-family: 'Crimson Text', serif; background-color: var(--bg); color: var(--text); margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .master-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)), url('https://i.pinimg.com/originals/26/2b/dd/262bdd02564bf6dabbe89df4f93e8e26.jpg'); background-size: cover; z-index: -1; }
        
        /* FEJLÉC ÉS VISSZA GOMB */
        .header { width: 100%; max-width: 900px; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .btn-back { 
            background: rgba(139, 0, 0, 0.2); 
            color: var(--gold); 
            text-decoration: none; 
            font-family: 'MedievalSharp'; 
            border: 1px solid var(--gold); 
            padding: 10px 20px; 
            transition: 0.3s; 
            text-transform: uppercase; 
            font-size: 0.9em;
            letter-spacing: 1px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .btn-back:hover { background: var(--gold); color: black; box-shadow: 0 0 15px var(--gold); }

        .inv-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 95%; max-width: 900px; margin-top: 10px; }
        .card { background: var(--card); border: 1px solid var(--gold); border-radius: 4px; padding: 20px; box-shadow: 0 0 20px black; position: relative; }
        
        /* D&D Karakter Elrendezés */
        .character-paperdoll { position: relative; width: 100%; height: 480px; background: rgba(0,0,0,0.4); border-radius: 4px; display: flex; flex-direction: column; align-items: center; padding-top: 30px; border: 1px solid #222; overflow: hidden; }
        .hero-silhouette { position: absolute; width: 90%; height: 90%; background-size: contain; background-repeat: no-repeat; background-position: center; opacity: 0.3; z-index: 1; pointer-events: none; bottom: 0; }

        .slot { width: 70px; height: 70px; background: rgba(0,0,0,0.85); border: 1px solid var(--gold); display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.6em; color: #888; position: relative; z-index: 2; transition: 0.2s; cursor: pointer; border-radius: 2px; }
        .slot:hover { border-color: white; box-shadow: 0 0 15px var(--gold); transform: scale(1.05); }
        .slot b { font-size: 1.6em; color: var(--gold); margin-bottom: 2px; }
        .slot span { text-transform: uppercase; font-weight: bold; color: #aaa; text-align: center; line-height: 1; font-family: 'MedievalSharp'; }

        /* D&D Sorok */
        .row-top { margin-bottom: 30px; } 
        .row-mid { display: flex; gap: 35px; margin-bottom: 30px; } 
        .row-low { display: flex; gap: 20px; } 
        .pos-jewel { position: absolute; top: 15px; right: 15px; border-style: dashed; width: 60px; height: 60px; }

        /* Raktár */
        .storage-section h2 { font-family: 'MedievalSharp'; color: var(--gold); margin-top: 0; font-size: 1.2em; border-bottom: 1px solid var(--gold); padding-bottom: 8px; text-align: center; }
        .bag-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 20px; }
        .bag-item { aspect-ratio: 1; background: rgba(255,255,255,0.03); border: 1px solid #333; border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 1.6em; cursor: pointer; transition: 0.2s; }
        .bag-item:hover { border-color: var(--gold); background: rgba(255,255,255,0.1); }
        .bag-item.empty { opacity: 0.1; }

        @media (max-width: 750px) { .inv-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="master-bg"></div>

<div class="header">
    <a href="index.html" class="btn-back">« Vissza a Városba</a>
    <div style="font-family:'MedievalSharp'; color:var(--gold); font-size: 1.2em;">💰 <span id="gold-display">0</span></div>
</div>

<div class="inv-layout">
    <div class="card">
        <h2 id="char-name-display" style="font-family:'MedievalSharp'; color:var(--gold); text-align:center; margin:0 0 15px 0; font-size: 1.5em; letter-spacing: 2px;">-</h2>
        <div class="character-paperdoll">
            <div id="hero-bg-img" class="hero-silhouette"></div>

            <div class="row-top">
                <div class="slot"><b>🪖</b><span>Sisak</span></div>
            </div>

            <div class="row-mid">
                <div class="slot"><b>⚔️</b><span>Kéz</span></div>
                <div class="slot" style="width: 80px; height: 80px;"><b>🛡️</b><span>Páncél</span></div>
                <div class="slot"><b>🛡️</b><span>Pajzs</span></div>
            </div>

            <div class="row-low">
                <div class="slot"><b>🦵</b><span>Lábvért</span></div>
                <div class="slot"><b>👞</b><span>Cipő</span></div>
            </div>

            <div class="slot pos-jewel"><b>💍</b><span>Ékszer</span></div>
        </div>
    </div>

    <div class="card storage-section">
        <h2>RAKTÁR</h2>
        <div class="bag-grid" id="bag-grid">
            <script>
                for(let i=0; i<20; i++) document.write('<div class="bag-item empty">📦</div>');
            </script>
        </div>
        
        <div style="margin-top: 30px; font-family: 'MedievalSharp'; background: rgba(0,0,0,0.6); padding: 15px; border: 1px solid var(--gold); border-radius: 4px;">
            <div style="font-size: 0.9em; color: var(--gold); text-transform: uppercase; border-bottom: 1px solid #444; padding-bottom: 5px; margin-bottom: 10px;">Karakter Statisztika</div>
            <div style="display:flex; justify-content: space-between; margin-bottom: 5px;"><span>Sebzés:</span><span id="atk-val" style="color:white">--</span></div>
            <div style="display:flex; justify-content: space-between;"><span>Védelem:</span><span id="def-val" style="color:white">--</span></div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyBg2WzLqxt0QRDkDiUKYrGRCw0Kg-gr1OU", 
        authDomain: "dnd-tracker-4fe05.firebaseapp.com", 
        projectId: "dnd-tracker-4fe05", 
        databaseURL: "https://dnd-tracker-4fe05-default-rtdb.europe-west1.firebasedatabase.app", 
        storageBucket: "dnd-tracker-4fe05.firebasestorage.app", 
        messagingSenderId: "886037504950", 
        appId: "1:886037504950:web:46e80b46f0e26e24429717" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const myId = localStorage.getItem('selectedCharId');
    const HERO_IMAGES = { "Harcos": "https://i.ibb.co/20BXyqpy/Copilot-20260403-032810.png", "Mágus": "https://i.ibb.co/yFz5bcXv/Copilot-20260403-033651.png", "Lovag": "https://i.ibb.co/Fk3n339M/Copilot-20260403-034043.png", "Íjász": "https://i.ibb.co/whd2jNpB/Copilot-20260403-034402.png", "Bérgyilkos": "https://i.ibb.co/b525CsLg/Copilot-20260403-032807.png", "Nekromanta": "https://i.ibb.co/NnCwwCbR/Copilot-20260403-033301.png" };

    if (!myId) window.location.href = 'index.html';

    db.ref(`characters/${myId}`).on('value', snap => {
        const c = snap.val();
        if(c) {
            document.getElementById('char-name-display').innerText = c.name;
            document.getElementById('gold-display').innerText = c.gold || 0;
            document.getElementById('hero-bg-img').style.backgroundImage = `url('${HERO_IMAGES[c.charClass]}')`;
            // Alap statok megjelenítése (később a felszerelés módosítja)
            document.getElementById('atk-val').innerText = (c.charClass === "Mágus" ? "20-35" : "12-18");
            document.getElementById('def-val').innerText = (c.charClass === "Lovag" ? "15" : "5");
        }
    });
</script>
</body>
</html>

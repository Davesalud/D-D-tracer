<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="items.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBg2WzLqxt0QRDkDiUKYrGRCw0Kg-gr1OU", authDomain: "dnd-tracker-4fe05.firebaseapp.com", projectId: "dnd-tracker-4fe05", databaseURL: "https://dnd-tracker-4fe05-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const myId = localStorage.getItem('selectedCharId');

    let isProcessing = false;
    let currentCharData = null;

    // REGENERÁCIÓS MOTOR KONFIGURÁCIÓ
    const REGEN_SETTINGS = {
        "Harcos":     { hp: 7,  mp: 2 },
        "Mágus":      { hp: 2,  mp: 10 },
        "Lovag":      { hp: 9,  mp: 3 },
        "Íjász":      { hp: 5,  mp: 5 },
        "Bérgyilkos": { hp: 4,  mp: 6 },
        "Nekromanta": { hp: 5,  mp: 8 }
    };

    const HERO_IMAGES = { 
        "Harcos": "https://i.ibb.co/20BXyqpy/Copilot-20260403-032810.png", 
        "Mágus": "https://i.ibb.co/yFz5bcXv/Copilot-20260403-033651.png", 
        "Lovag": "https://i.ibb.co/Fk3n339M/Copilot-20260403-034043.png", 
        "Íjász": "https://i.ibb.co/whd2jNpB/Copilot-20260403-034402.png", 
        "Bérgyilkos": "https://i.ibb.co/b525CsLg/Copilot-20260403-032807.png", 
        "Nekromanta": "https://i.ibb.co/NnCwwCbR/Copilot-20260403-033301.png" 
    };

    // REGENERÁCIÓS SZÁMÍTÁS (OFFLINE IS MŰKÖDIK)
    function processRegeneration(char) {
        if (!char) return null;
        const now = Date.now();
        const lastUpdate = char.lastUpdate || now;
        const elapsedSeconds = Math.floor((now - lastUpdate) / 1000);
        const ticks = Math.floor(elapsedSeconds / 60); // Percenkénti tick

        if (ticks < 1) return null;

        const rates = REGEN_SETTINGS[char.charClass] || { hp: 5, mp: 5 };
        let updatedHp = Number(char.hp) + (ticks * rates.hp);
        let updatedMp = Number(char.mp || 0) + (ticks * rates.mp);

        updatedHp = Math.min(updatedHp, Number(char.maxHp));
        updatedMp = Math.min(updatedMp, Number(char.maxMp || 100));

        if (updatedHp !== Number(char.hp) || updatedMp !== Number(char.mp)) {
            return { hp: updatedHp, mp: updatedMp, lastUpdate: now };
        }
        return null;
    }

    if (!myId) window.location.href = 'login.html';

    // ADATBÁZIS FIGYELŐ
    db.ref(`characters/${myId}`).on('value', snap => {
        const data = snap.val();
        if(!data) return;

        // Regeneráció ellenőrzése betöltéskor
        const regenUpdates = processRegeneration(data);
        if (regenUpdates && !isProcessing) {
            db.ref(`characters/${myId}`).update(regenUpdates);
            return; // Az .on('value') újra le fog futni az új adatokkal
        }

        currentCharData = data;
        updateUI();
    });

    function updateUI() {
        const c = currentCharData;
        document.getElementById('char-name').innerText = `${c.name} - LVL ${c.level || 1}`;
        document.getElementById('stat-gold').innerText = c.gold || 0;
        document.getElementById('hero-img').src = HERO_IMAGES[c.charClass] || "";

        const hp = parseInt(c.hp || 0);
        const maxHp = c.maxHp || 100;
        document.getElementById('hp-fill').style.width = (hp / maxHp * 100) + "%";
        document.getElementById('hp-text').innerText = `${hp} / ${maxHp}`;

        const totalAtk = (Number(c.atk) || 10) + (Number(c.bonusAtk) || 0);
        const totalDef = (Number(c.def) || 5) + (Number(c.bonusDef) || 0);
        
        document.getElementById('stat-atk').innerText = totalAtk;
        document.getElementById('stat-def').innerText = totalDef;

        ["sisak", "fegyver", "páncél", "pajzs", "lábvért", "cipő"].forEach(st => {
            const slotEl = document.querySelector(`.slot[data-slot="${st}"]`);
            const itemId = c[`equip_${st}`];
            if(itemId && ITEMS[itemId]) {
                slotEl.innerHTML = `<img src="${ITEMS[itemId].img}">`;
            } else { 
                slotEl.innerHTML = st.toUpperCase(); 
            }
        });
        
        const grid = document.getElementById('inventory-grid');
        grid.innerHTML = '';
        const inv = c.inventory || {};
        Object.keys(inv).forEach(key => {
            const itemId = inv[key];
            if(ITEMS[itemId]) {
                const div = document.createElement('div');
                div.className = 'inv-slot';
                div.onclick = () => handleInventoryClick(itemId, key);
                div.innerHTML = `<img src="${ITEMS[itemId].img}" class="item-icon">`;
                grid.appendChild(div);
            }
        });
        for(let i = Object.keys(inv).length; i < 16; i++) {
            const div = document.createElement('div'); div.className = 'inv-slot'; grid.appendChild(div);
        }
    }

    function handleInventoryClick(itemId, fbKey) {
        if (isProcessing) return;
        const item = ITEMS[itemId];
        if (!item) return;

        const msg = item.type === "consumable" ? `Megiszod: ${item.name}? (+${item.heal} HP)` : `Felveszed: ${item.name}?`;
        
        if (confirm(msg)) {
            if (item.type === "consumable") {
                useConsumable(itemId, fbKey);
            } else {
                equipItem(itemId, fbKey, item.type);
            }
        }
    }

    function handleSlotClick(slotType) {
        if (isProcessing) return;
        const itemId = currentCharData[`equip_${slotType}`];
        if (itemId && confirm(`Leveszed: ${ITEMS[itemId].name}?`)) {
            unequipItem(slotType, itemId);
        }
    }

    function equipItem(itemId, fbKey, slotType) {
        if (currentCharData[`equip_${slotType}`]) {
            return alert("Ebben a slotban már van valami! Előbb vedd le.");
        }

        isProcessing = true;
        const item = ITEMS[itemId];
        const newBonusAtk = (Number(currentCharData.bonusAtk) || 0) + (Number(item.atk) || 0);
        const newBonusDef = (Number(currentCharData.bonusDef) || 0) + (Number(item.def) || 0);

        const updates = {};
        updates[`equip_${slotType}`] = itemId;
        updates[`bonusAtk`] = newBonusAtk;
        updates[`bonusDef`] = newBonusDef;
        updates[`lastUpdate`] = Date.now(); // Frissítjük a regenerációs időt is

        db.ref(`characters/${myId}`).update(updates).then(() => {
            return db.ref(`characters/${myId}/inventory/${fbKey}`).remove();
        }).catch(err => {
            console.error("Felszerelési hiba:", err);
        }).finally(() => isProcessing = false);
    }

    function unequipItem(slotType, itemId) {
        isProcessing = true;
        const item = ITEMS[itemId];
        const newBonusAtk = Math.max(0, (Number(currentCharData.bonusAtk) || 0) - (Number(item.atk) || 0));
        const newBonusDef = Math.max(0, (Number(currentCharData.bonusDef) || 0) - (Number(item.def) || 0));

        const newKey = db.ref(`characters/${myId}/inventory`).push().key;
        const updates = {};
        updates[`equip_${slotType}`] = null;
        updates[`bonusAtk`] = newBonusAtk;
        updates[`bonusDef`] = newBonusDef;
        updates[`inventory/${newKey}`] = itemId;
        updates[`lastUpdate`] = Date.now();

        db.ref(`characters/${myId}`).update(updates).catch(err => {
            console.error("Levételi hiba:", err);
        }).finally(() => isProcessing = false);
    }

    function useConsumable(itemId, fbKey) {
        const hp = Number(currentCharData.hp) || 0;
        const maxHp = Number(currentCharData.maxHp) || 100;
        
        if (hp >= maxHp) return alert("Az életerőd már maximumon van!");
        
        isProcessing = true;
        const healAmount = Number(ITEMS[itemId].heal) || 0;
        const newHP = Math.min(maxHp, hp + healAmount);
        
        // Mentésnél frissítjük a lastUpdate-et, hogy a regen tiszta lappal induljon
        db.ref(`characters/${myId}`).update({ 
            hp: newHP,
            lastUpdate: Date.now() 
        }).then(() => {
            return db.ref(`characters/${myId}/inventory/${fbKey}`).remove();
        }).finally(() => isProcessing = false);
    }
</script>

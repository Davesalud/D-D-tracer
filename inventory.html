<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hős Leltár - Javított Drag & Drop</title>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --accent: #8b0000; --bg: #050507; --card: rgba(20, 20, 25, 0.9); }
        body { 
            background: var(--bg); color: white; font-family: 'MedievalSharp', cursive; 
            margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            background-image: radial-gradient(circle, #1a1a1a 0%, #050507 100%);
        }
        .header { padding: 20px; text-align: center; border-bottom: 2px solid var(--accent); width: 100%; margin-bottom: 20px; background: rgba(0,0,0,0.5); }
        .stat-bar { background: rgba(0,0,0,0.8); border: 1px solid var(--gold); padding: 8px 20px; border-radius: 5px; display: inline-flex; gap: 25px; margin-top: 15px; }

        .main-container { display: flex; gap: 50px; justify-content: center; flex-wrap: wrap; padding: 20px; align-items: flex-start; }

        /* Karakter Panel */
        .char-view { 
            position: relative; width: 320px; height: 520px; 
            border: 3px solid #333; background: #000; border-radius: 12px;
        }
        #hero-img { 
            width: 100%; height: 100%; object-fit: cover; opacity: 0.5; 
            position: absolute; top: 0; left: 0; z-index: 1; border-radius: 10px;
        }
        .slots-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }

        /* Slotok */
        .slot, .inv-slot { 
            width: 64px; height: 64px; border: 1px solid #444;
            background: rgba(20, 20, 25, 0.85); display: flex; align-items: center; justify-content: center;
            font-size: 0.65em; text-align: center; color: #666; pointer-events: auto;
            transition: 0.2s; position: absolute;
        }
        .inv-slot { position: static; border-color: #222; background: rgba(255,255,255,0.03); }
        .slot:hover, .inv-slot:hover { border-color: var(--gold); }

        /* Slot pozíciók */
        .slot[data-slot="sisak"] { top: 30px; left: 128px; }
        .slot[data-slot="fegyver"] { top: 160px; left: 30px; }
        .slot[data-slot="páncél"] { top: 160px; left: 128px; }
        .slot[data-slot="pajzs"] { top: 160px; left: 226px; }
        .slot[data-slot="lábvért"] { top: 320px; left: 128px; }
        .slot[data-slot="cipő"] { top: 410px; left: 128px; }

        /* Hátizsák */
        .bag-container { 
            background: var(--card); border: 2px solid #333; padding: 20px; 
            border-radius: 12px; width: 340px; 
        }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-top: 15px; min-height: 300px; }

        .item { width: 54px; height: 54px; cursor: grab; z-index: 10; pointer-events: auto; }
        .item:active { cursor: grabbing; transform: scale(1.1); }

        .btn-back { 
            margin: 40px 0; padding: 12px 40px; background: #1a1a1a; border: 1px solid var(--gold);
            color: var(--gold); font-family: 'MedievalSharp'; cursor: pointer; text-decoration: none;
        }
    </style>
</head>
<body>

<div class="header">
    <h1 id="char-name">Karakter betöltése...</h1>
    <div class="stat-bar">
        <span>⚔️ ATK: <b id="stat-atk">0</b></span>
        <span>🛡️ DEF: <b id="stat-def">0</b></span>
    </div>
</div>

<div class="main-container">
    <div class="char-view">
        <img id="hero-img" src="" alt="">
        <div class="slots-overlay">
            <div class="slot" data-slot="sisak" ondrop="drop(event)" ondragover="allowDrop(event)">SISAK</div>
            <div class="slot" data-slot="fegyver" ondrop="drop(event)" ondragover="allowDrop(event)">FEGYVER</div>
            <div class="slot" data-slot="páncél" ondrop="drop(event)" ondragover="allowDrop(event)">PÁNCÉL</div>
            <div class="slot" data-slot="pajzs" ondrop="drop(event)" ondragover="allowDrop(event)">PAJZS</div>
            <div class="slot" data-slot="lábvért" ondrop="drop(event)" ondragover="allowDrop(event)">LÁBVÉRT</div>
            <div class="slot" data-slot="cipő" ondrop="drop(event)" ondragover="allowDrop(event)">CIPŐ</div>
        </div>
    </div>

    <div class="bag-container">
        <h3 style="margin:0; color:var(--gold); text-align:center;">HÁTIZSÁK</h3>
        <div id="inventory-grid" class="grid" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
    </div>
</div>

<a href="index.html" class="btn-back">VISSZA A VÁRBA</a>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="items.js"></script>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyBg2WzLqxt0QRDkDiUKYrGRCw0Kg-gr1OU", 
        authDomain: "dnd-tracker-4fe05.firebaseapp.com", 
        projectId: "dnd-tracker-4fe05", 
        databaseURL: "https://dnd-tracker-4fe05-default-rtdb.europe-west1.firebasedatabase.app", 
        storageBucket: "dnd-tracker-4fe05.firebasestorage.app", 
        messagingSenderId: "886037504950", 
        appId: "1:886037504950:web:46e80b46f0e26e24429717" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const myId = localStorage.getItem('selectedCharId');

    const HERO_IMAGES = { 
        "Harcos": "https://i.ibb.co/20BXyqpy/Copilot-20260403-032810.png", 
        "Mágus": "https://i.ibb.co/yFz5bcXv/Copilot-20260403-033651.png", 
        "Lovag": "https://i.ibb.co/Fk3n339M/Copilot-20260403-034043.png", 
        "Íjász": "https://i.ibb.co/whd2jNpB/Copilot-20260403-034402.png", 
        "Bérgyilkos": "https://i.ibb.co/b525CsLg/Copilot-20260403-032807.png", 
        "Nekromanta": "https://i.ibb.co/NnCwwCbR/Copilot-20260403-033301.png" 
    };

    db.ref(`characters/${myId}`).on('value', snap => {
        const c = snap.val();
        if(!c) return;

        document.getElementById('char-name').innerText = `${c.name} (LVL ${c.level || 1})`;
        const imgEl = document.getElementById('hero-img');
        if(c.charClass) imgEl.src = HERO_IMAGES[c.charClass] || "";

        // Slotok ürítése
        document.querySelectorAll('.slot').forEach(s => { s.innerHTML = s.dataset.slot.toUpperCase(); });

        let totalAtk = 10, totalDef = 5;
        ["sisak", "fegyver", "páncél", "pajzs", "lábvért", "cipő"].forEach(st => {
            const itemId = c[`equip_${st}`];
            if(itemId && ITEMS[itemId]) {
                const item = ITEMS[itemId];
                document.querySelector(`.slot[data-slot="${st}"]`).innerHTML = `<img src="${item.img}" class="item" draggable="true" ondragstart="drag(event)" data-itemid="${itemId}" data-source="${st}">`;
                totalAtk += (item.atk || 0); totalDef += (item.def || 0);
            }
        });
        document.getElementById('stat-atk').innerText = totalAtk;
        document.getElementById('stat-def').innerText = totalDef;

        // Hátizsák
        const grid = document.getElementById('inventory-grid');
        grid.innerHTML = '';
        const inv = c.inventory || {};
        Object.keys(inv).forEach(key => {
            const itemId = inv[key];
            if(ITEMS[itemId]) {
                const slot = document.createElement('div');
                slot.className = 'inv-slot';
                slot.ondrop = drop; slot.ondragover = allowDrop;
                slot.innerHTML = `<img src="${ITEMS[itemId].img}" class="item" draggable="true" ondragstart="drag(event)" data-itemid="${itemId}" data-source="inventory" data-fbkey="${key}">`;
                grid.appendChild(slot);
            }
        });
        // Üres helyek pótlása (hogy mindig legyen hova dobni)
        for(let i = Object.keys(inv).length; i < 16; i++) {
            const slot = document.createElement('div');
            slot.className = 'inv-slot';
            slot.ondrop = drop; slot.ondragover = allowDrop;
            grid.appendChild(slot);
        }
    });

    function allowDrop(ev) { ev.preventDefault(); }

    function drag(ev) {
        ev.dataTransfer.setData("itemId", ev.target.dataset.itemid);
        ev.dataTransfer.setData("source", ev.target.dataset.source);
        ev.dataTransfer.setData("fbKey", ev.target.dataset.fbkey || "");
    }

    function drop(ev) {
        ev.preventDefault();
        const itemId = ev.dataTransfer.getData("itemId");
        const source = ev.dataTransfer.getData("source");
        const fbKey = ev.dataTransfer.getData("fbKey");

        // Célpont keresés felfelé
        let target = ev.target;
        while (target && !target.classList.contains('slot') && !target.classList.contains('inv-slot') && target.id !== 'inventory-grid') {
            target = target.parentElement;
        }
        if (!target) return;

        const targetSlot = target.dataset.slot;
        const isInv = target.classList.contains('inv-slot') || target.id === 'inventory-grid';

        // Egymásra pakolás tiltása
        if (target.querySelector('.item')) return;

        // Felszerelés
        if (targetSlot) {
            if (ITEMS[itemId].type === targetSlot) {
                const updates = {};
                updates[`equip_${targetSlot}`] = itemId;
                if (source === "inventory") db.ref(`characters/${myId}/inventory/${fbKey}`).remove();
                else updates[`equip_${source}`] = null;
                db.ref(`characters/${myId}`).update(updates);
            }
        } 
        // Hátizsákba tétel
        else if (isInv) {
            if (source !== "inventory") {
                const updates = {};
                updates[`equip_${source}`] = null;
                db.ref(`characters/${myId}`).update(updates);
                db.ref(`characters/${myId}/inventory`).push(itemId);
            }
        }
    }
</script>
</body>
</html>

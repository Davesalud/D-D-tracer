<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Death's Armada - Hero Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,600;1,700&family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --bg: #0a0a0c; --card: #121214; --accent: #8b0000; --text: #d1d1d1; }
        * { box-sizing: border-box; }
        body { font-family: 'Crimson Text', serif; background-color: var(--bg); color: var(--text); margin: 0; }

        .page { display: none; min-height: 100vh; padding: 20px; }
        .page.active { display: flex; flex-direction: column; align-items: center; }

        /* --- 1. LOGIN --- */
        #login-box { background: var(--card); border: 1px solid var(--gold); padding: 40px; border-radius: 8px; width: 350px; text-align: center; margin-top: 50px; }
        .logo { font-family: 'MedievalSharp'; font-size: 3em; color: var(--accent); margin-bottom: 20px; }

        /* --- 2. HŐS PROFIL (VÁRÓ) --- */
        .profile-container { max-width: 800px; width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .hero-stats-card { background: var(--card); border: 1px solid var(--gold); padding: 20px; border-radius: 8px; }
        .inventory-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; background: #050505; padding: 10px; border-radius: 4px; }
        .inv-slot { aspect-ratio: 1/1; background: #1a1a1e; border: 1px solid #333; display: flex; align-items: center; justify-content: center; font-size: 10px; text-align: center; }
        
        .lobby-nav { grid-column: span 2; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .nav-card { background: #1a1a1e; border: 1px solid #333; padding: 20px; text-align: center; cursor: pointer; transition: 0.3s; }
        .nav-card:hover { border-color: var(--gold); background: #25252b; }

        /* --- STATS BAR --- */
        .bar-bg { height: 20px; background: #000; border: 1px solid #333; margin: 10px 0; position: relative; overflow: hidden; }
        .bar-fill { height: 100%; transition: 0.5s; background: linear-gradient(90deg, #8b0000, #ff4444); }
        .bar-text { position: absolute; width: 100%; text-align: center; line-height: 18px; font-size: 11px; font-weight: bold; color: white; text-shadow: 1px 1px 2px black; }

        /* --- DM VIEW --- */
        #dm-view { width: 100%; max-width: 1000px; }
        .dm-char-row { display: flex; justify-content: space-between; background: var(--card); padding: 15px; margin-bottom: 10px; border: 1px solid #333; }

        /* --- ARENA --- */
        .arena-view { display: grid; grid-template-columns: 1fr 100px 1fr; gap: 20px; width: 100%; max-width: 1200px; }

        button, select, input { width: 100%; padding: 12px; margin-bottom: 10px; background: #1a1a1e; border: 1px solid #333; color: white; font-family: 'MedievalSharp'; cursor: pointer; }
        .btn-gold { background: var(--gold); color: black; }
        .btn-accent { background: var(--accent); color: white; }
    </style>
</head>
<body>

<div id="page-login" class="page active">
    <div id="login-box">
        <div class="logo">Death's Armada</div>
        <p style="color:var(--gold)">Válaszd ki a hősödet</p>
        <select id="login-char-select"><option value="">Betöltés...</option></select>
        <input type="password" id="login-pin" placeholder="PIN kód..." maxlength="4">
        <button class="btn-gold" onclick="attemptLogin()">BELÉPÉS</button>
        <hr style="border:0; border-top:1px solid #333; margin: 20px 0;">
        <button onclick="attemptDMLogin()" style="background:none; color:gray; font-size:12px; border:none;">DM Belépés</button>
    </div>
</div>

<div id="page-lobby" class="page">
    <div style="width:100%; max-width:800px; display:flex; justify-content:space-between; align-items:center;">
        <h2 id="hero-name-title" style="font-family:'MedievalSharp'; color:var(--gold); font-size:2em;">-</h2>
        <button onclick="location.reload()" style="width:auto; background:none; border:none; color:gray;">Kijelentkezés</button>
    </div>

    <div class="profile-container">
        <div class="hero-stats-card">
            <h3>📊 Állapot</h3>
            <div class="bar-bg"><div class="bar-fill" id="hero-hp-bar"></div><div class="bar-text" id="hero-hp-text">0/0 HP</div></div>
            <p>Osztály: <span id="hero-class-text">-</span></p>
            <p>Győzelmek: <span id="hero-wins-text">0</span> 🏆</p>
        </div>

        <div class="hero-stats-card">
            <h3>🎒 Felszerelés</h3>
            <div id="hero-inventory" class="inventory-grid"></div>
        </div>

        <div class="lobby-nav">
            <div class="nav-card" onclick="startCampaign()">
                <h3 style="color:var(--accent)">📜 KAMPÁNY</h3>
                <p>Csatlakozz a kalandhoz</p>
            </div>
            <div class="nav-card" onclick="startArena()">
                <h3 style="color:var(--gold)">⚔️ ARÉNA</h3>
                <p>Párbaj más hősökkel</p>
            </div>
        </div>
    </div>
</div>

<div id="page-dm" class="page">
    <div style="width:100%; max-width:1000px; display:flex; justify-content:space-between; align-items:center;">
        <h1 class="logo">Kalandmester</h1>
        <button onclick="location.reload()" style="width:auto;">Kilépés</button>
    </div>
    <div id="dm-view">
        <button class="btn-accent" onclick="showCreateModal()">+ ÚJ JÁTÉKOS LÉTREHOZÁSA</button>
        <div id="dm-character-list"></div>
    </div>
</div>

<div id="page-battle" class="page">
    <h2 id="battle-mode-title" style="font-family:'MedievalSharp'; color:var(--accent);">PÁRBAJ</h2>
    <div id="battle-arena" class="arena-view">
        </div>
</div>

<div id="modal-create" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:100; align-items:center; justify-content:center;">
    <div style="background:var(--card); padding:30px; border:1px solid var(--gold); width:300px;">
        <h3>Új Hős</h3>
        <input type="text" id="new-name" placeholder="Név">
        <select id="new-class"><option value="Harcos">Harcos</option><option value="Mágus">Mágus</option><option value="Lovag">Lovag</option></select>
        <input type="password" id="new-pin" placeholder="PIN" maxlength="4">
        <button class="btn-gold" onclick="confirmCreate()">LÉTREHOZÁS</button>
        <button onclick="document.getElementById('modal-create').style.display='none'">Mégse</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBg2WzLqxt0QRDkDiUKYrGRCw0Kg-gr1OU",
        authDomain: "dnd-tracker-4fe05.firebaseapp.com",
        projectId: "dnd-tracker-4fe05",
        databaseURL: "https://dnd-tracker-4fe05-default-rtdb.europe-west1.firebasedatabase.app",
        storageBucket: "dnd-tracker-4fe05.firebasestorage.app",
        messagingSenderId: "886037504950",
        appId: "1:886037504950:web:46e80b46f0e26e24429717"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let allChars = {};
    let myCharId = null;

    // BETÖLTÉS ÉS LOGIN LISTA
    db.ref('characters').on('value', snap => {
        allChars = snap.val() || {};
        const select = document.getElementById('login-char-select');
        select.innerHTML = '<option value="">Válassz karaktert...</option>';
        Object.keys(allChars).forEach(id => {
            select.innerHTML += `<option value="${id}">${allChars[id].name}</option>`;
        });
        if(myCharId) updateLobbyUI();
        renderDMView();
    });

    function switchPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // --- LOGIN LOGIKA ---
    function attemptLogin() {
        const id = document.getElementById('login-char-select').value;
        const pin = document.getElementById('login-pin').value;
        if(!id || !pin) return alert("Válassz karaktert és írd be a PIN-t!");

        if(allChars[id].pin.toString() === pin) {
            myCharId = id;
            switchPage('page-lobby');
            updateLobbyUI();
        } else {
            alert("Hibás PIN!");
        }
    }

    function attemptDMLogin() {
        if(prompt("Kalandmester kód:") === "4469") switchPage('page-dm');
    }

    // --- LOBBY FRISSÍTÉS ---
    function updateLobbyUI() {
        const c = allChars[myCharId];
        document.getElementById('hero-name-title').innerText = c.name;
        document.getElementById('hero-class-text').innerText = c.charClass;
        document.getElementById('hero-wins-text').innerText = c.wins || 0;
        document.getElementById('hero-hp-bar').style.width = (c.hp/c.maxHp)*100 + "%";
        document.getElementById('hero-hp-text').innerText = `${c.hp} / ${c.maxHp} HP`;
        
        const inv = document.getElementById('hero-inventory');
        inv.innerHTML = '';
        (c.slots || Array(8).fill("Üres")).forEach(item => {
            inv.innerHTML += `<div class="inv-slot">${item}</div>`;
        });
    }

    // --- DM VIEW FUNKCIÓK ---
    function renderDMView() {
        const list = document.getElementById('dm-character-list');
        list.innerHTML = '<h3>Minden játékos:</h3>';
        Object.keys(allChars).forEach(id => {
            const c = allChars[id];
            list.innerHTML += `
                <div class="dm-char-row">
                    <span><strong>${c.name}</strong> (${c.charClass}) - PIN: ${c.pin}</span>
                    <button onclick="deleteChar('${id}')" style="width:auto; background:none; color:red; border:none;">TÖRLÉS</button>
                </div>
            `;
        });
    }

    function showCreateModal() { document.getElementById('modal-create').style.display = 'flex'; }
    function confirmCreate() {
        const name = document.getElementById('new-name').value;
        const cls = document.getElementById('new-class').value;
        const pin = document.getElementById('new-pin').value;
        const hp = cls === 'Lovag' ? 120 : (cls === 'Mágus' ? 60 : 100);
        db.ref('characters').push({
            name, charClass: cls, pin, wins: 0, hp: hp, maxHp: hp, type: 'player', slots: Array(8).fill("Üres")
        });
        document.getElementById('modal-create').style.display = 'none';
    }

    function deleteChar(id) { if(confirm("Törlöd?")) db.ref('characters/'+id).remove(); }

    // --- NAVIGÁCIÓ A VÁRÓBÓL ---
    function startCampaign() {
        alert("Kampányváró: Csatlakozás a DM-hez...");
        // Itt jönne a kampány nézet
    }

    function startArena() {
        alert("Aréna: Ellenfelek keresése...");
        // Itt jönne a PvP nézet
    }
</script>
</body>
</html>

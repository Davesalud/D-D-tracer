<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Death's Armada - Final</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,600;1,700&family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --bg: #050507; --card: rgba(15, 15, 18, 0.95); --accent: #8b0000; --text: #e0e0e0; }
        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; outline: none; }
        input, select { user-select: text !important; }
        body { font-family: 'Crimson Text', serif; background-color: var(--bg); color: var(--text); margin: 0; height: 100vh; overflow: hidden; }
        .master-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), url('https://i.pinimg.com/originals/26/2b/dd/262bdd02564bf6dabbe89df4f93e8e26.jpg'); background-size: cover; background-position: center; z-index: -1; }
        
        /* JOBB FELSŐ KIJELENTKEZÉS GOMB */
        .logout-corner {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: none; /* Alapból rejtve, csak belépve látszik */
        }
        .btn-logout {
            background: rgba(139, 0, 0, 0.6);
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 8px 15px;
            font-family: 'MedievalSharp';
            cursor: pointer;
            font-size: 0.8em;
            text-transform: uppercase;
            backdrop-filter: blur(5px);
            transition: 0.3s;
        }
        .btn-logout:hover { background: var(--accent); color: white; }

        .page { display: none; height: 100vh; padding: 20px; flex-direction: column; align-items: center; overflow-y: auto; }
        .page.active { display: flex; }
        .card { background: var(--card); border: 1px solid var(--gold); padding: 20px; border-radius: 4px; width: 100%; max-width: 450px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.9); backdrop-filter: blur(15px); margin-bottom: 20px; position: relative; }
        .logo { font-family: 'MedievalSharp'; font-size: 3em; color: var(--accent); text-shadow: 0 0 15px rgba(139,0,0,0.7); margin-bottom: 15px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; background: rgba(0,0,0,0.8); border: 1px solid #444; color: white; font-family: 'MedievalSharp'; }
        .btn { font-family: 'MedievalSharp'; padding: 12px; cursor: pointer; border: 1px solid var(--gold); transition: 0.3s; text-transform: uppercase; display: block; width: 100%; margin-bottom: 5px; text-decoration: none; text-align: center; color: var(--gold); }
        .btn-main { background: var(--accent); color: white; border: none; font-size: 1.1em; }
        .btn-sub { background: none; color: var(--gold); font-size: 0.8em; }
        .bar-container { height: 26px; background: #000; border: 1px solid #333; position: relative; margin: 10px 0; border-radius: 3px; overflow: hidden; }
        .bar-fill { height: 100%; transition: width 0.5s ease; background: linear-gradient(90deg, #600, #b00); width: 100%; }
        .bar-label { position: absolute; width: 100%; text-align: center; line-height: 24px; font-size: 14px; color: white; font-weight: bold; z-index: 2; text-shadow: 1px 1px 2px black; }
        .inv-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .inv-slot { background: rgba(0,0,0,0.6); border: 1px dashed var(--gold); padding: 5px; font-size: 0.7em; min-height: 60px; display: flex; flex-direction: column; justify-content: center; }
        .inv-slot b { color: var(--gold); font-size: 1em; }
        .skill-box { margin-top: 15px; padding: 10px; border: 1px solid var(--accent); background: rgba(139, 0, 0, 0.1); border-radius: 4px; text-align: left; }
        .player-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: rgba(255,255,255,0.05); margin-bottom: 5px; border-radius: 4px; border-left: 3px solid #4CAF50; }
    </style>
</head>
<body>

<div class="master-bg"></div>

<div id="logout-ui" class="logout-corner">
    <button class="btn-logout" onclick="logout()">Kilépés 🚪</button>
</div>

<div id="page-login" class="page active">
    <div class="card" style="margin-top: 10vh;">
        <div class="logo">Death's Armada</div>
        <select id="login-select"></select>
        <input type="password" id="login-pin" placeholder="PIN KÓD" maxlength="4">
        <button class="btn btn-main" onclick="login()">Belépés</button>
        <button class="btn btn-sub" onclick="document.getElementById('modal-creator').style.display='flex'">✨ Új Hős Megidézése</button>
    </div>
</div>

<div id="page-lobby" class="page">
    <div class="card">
        <h1 id="lobby-name" style="font-family:'MedievalSharp'; color:var(--gold); margin:0;">-</h1>
        <p id="lobby-class-display" style="margin:5px 0; font-style:italic; color:#aaa;">-</p>
        
        <div class="bar-container">
            <div class="bar-fill" id="lobby-hp-fill"></div>
            <div class="bar-label" id="lobby-hp-text">0/0 HP</div>
        </div>

        <div class="skill-box">
            <b style="color:var(--gold); font-family:'MedievalSharp';">Képesség:</b> <span id="skill-name">-</span><br>
            <small id="skill-desc" style="color:#bbb;">-</small>
        </div>

        <div class="inv-grid">
            <div class="inv-slot"><i>Kéz</i><b id="val-weapon">-</b></div>
            <div class="inv-slot"><i>Test</i><b id="val-armor">-</b></div>
            <div class="inv-slot"><i>Láb</i><b id="val-extra">-</b></div>
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:20px;">
            <button class="btn btn-main" style="background:#4a1a1a;">📜 KAMPÁNY</button>
            <button onclick="goToArena()" class="btn btn-main" style="background:#8b0000;">⚔️ ARÉNA</button>
        </div>

        <h3 style="font-family:'MedievalSharp'; color:var(--gold); margin-top:20px; text-align: left;">Kihívható Hősök (ONLINE)</h3>
        <div id="online-players-list" style="max-height: 150px; overflow-y: auto;"></div>
    </div>
</div>

<div id="modal-creator" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; align-items:center; justify-content:center; z-index:100;">
    <div class="card">
        <h2 style="font-family:'MedievalSharp'; color:var(--gold);">Új Hős Megidézése</h2>
        <input type="text" id="new-name" placeholder="Hős neve...">
        <select id="new-class">
            <option value="Harcos">Harcos (100 HP)</option>
            <option value="Mágus">Mágus (70 HP)</option>
            <option value="Lovag">Lovag (130 HP)</option>
            <option value="Íjász">Íjász (90 HP)</option>
            <option value="Bérgyilkos">Bérgyilkos (80 HP)</option>
            <option value="Nekromanta">Nekromanta (110 HP)</option>
        </select>
        <input type="password" id="new-pin" placeholder="PIN kód (4 szám)" maxlength="4">
        <button class="btn btn-main" onclick="saveNewHero()">Létrehozás</button>
        <button class="btn btn-sub" onclick="document.getElementById('modal-creator').style.display='none'">Mégse</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBg2WzLqxt0QRDkDiUKYrGRCw0Kg-gr1OU",
        authDomain: "dnd-tracker-4fe05.firebaseapp.com",
        projectId: "dnd-tracker-4fe05",
        databaseURL: "https://dnd-tracker-4fe05-default-rtdb.europe-west1.firebasedatabase.app",
        storageBucket: "dnd-tracker-4fe05.firebasestorage.app",
        messagingSenderId: "886037504950",
        appId: "1:886037504950:web:46e80b46f0e26e24429717"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const SKILLS = {
        "Harcos": { name: "Vérszomj", desc: "25 HP sebzés" },
        "Mágus": { name: "Tűzgolyó", desc: "35 HP sebzés" },
        "Lovag": { name: "Szent Pajzs", desc: "50% védelem" },
        "Íjász": { name: "Dupla Lövés", desc: "2x12 HP sebzés" },
        "Bérgyilkos": { name: "Mérgezett Tőr", desc: "Mérgezés" },
        "Nekromanta": { name: "Életelszívás", desc: "15 HP szívás" }
    };

    let chars = {};
    let myId = localStorage.getItem('selectedCharId');

    // --- JAVÍTOTT RÉSZ ---
    db.ref('characters').on('value', snap => {
        chars = snap.val() || {};
        updateLoginList();
        
        // Ha van elmentett hősünk, CSUPÁN betöltjük az adatait, de nem irányítunk át magunktól!
        if (myId && chars[myId]) {
            setupPresence(myId);
            document.getElementById('logout-ui').style.display = 'block';
            showPage('page-lobby');
            updateLobbyUI();
        } else {
            // Ha nincs belépve, mutassuk a bejelentkezőt
            showPage('page-login');
            document.getElementById('logout-ui').style.display = 'none';
        }
    });

    function showPage(pId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pId).classList.add('active');
    }

    function setupPresence(id) {
        const statusRef = db.ref(`characters/${id}/status`);
        db.ref(".info/connected").on("value", (snap) => {
            if (snap.val() === true) {
                statusRef.onDisconnect().set("offline").then(() => { statusRef.set("online"); });
            }
        });
    }

    function updateLoginList() {
        const sel = document.getElementById('login-select');
        if(!sel) return;
        const cur = sel.value;
        sel.innerHTML = '<option value="" disabled selected>Válaszd ki a hősöd...</option>';
        Object.keys(chars).forEach(id => { sel.innerHTML += `<option value="${id}">${chars[id].name}</option>`; });
        sel.value = cur;
    }

    function login() {
        const id = document.getElementById('login-select').value;
        const pin = document.getElementById('login-pin').value;
        if (id && chars[id] && chars[id].pin.toString() === pin) {
            myId = id;
            localStorage.setItem('selectedCharId', id);
            setupPresence(id);
            document.getElementById('logout-ui').style.display = 'block';
            showPage('page-lobby');
            updateLobbyUI();
        } else { alert("Hibás PIN!"); }
    }

    function logout() {
        if (myId) {
            db.ref(`characters/${myId}/status`).set("offline").then(() => {
                localStorage.removeItem('selectedCharId');
                location.reload();
            });
        } else { location.reload(); }
    }

    function goToArena() {
        if (!myId) return;
        // Az Aréna elérése
        window.location.href = './arena.html';
    }

    function updateLobbyUI() {
        const c = chars[myId];
        if (!c) return;
        document.getElementById('lobby-name').innerText = c.name;
        document.getElementById('lobby-class-display').innerText = c.charClass;
        document.getElementById('lobby-hp-fill').style.width = (c.hp / c.maxHp * 100) + "%";
        document.getElementById('lobby-hp-text').innerText = `${c.hp} / ${c.maxHp} HP`;
        
        const sk = SKILLS[c.charClass] || { name: "-", desc: "-" };
        document.getElementById('skill-name').innerText = sk.name;
        document.getElementById('skill-desc').innerText = sk.desc;

        document.getElementById('val-weapon').innerText = c.inventory?.weapon || "Pusztakéz";
        document.getElementById('val-armor').innerText = c.inventory?.armor || "Rongyok";
        document.getElementById('val-extra').innerText = c.inventory?.extra || "Semmi";

        const list = document.getElementById('online-players-list');
        list.innerHTML = "";
        Object.keys(chars).forEach(id => {
            if (id !== myId && chars[id].status === "online") {
                list.innerHTML += `<div class="player-item"><span>${chars[id].name}</span><b style="color:#4CAF50;">ONLINE ⚔️</b></div>`;
            }
        });
    }

    function saveNewHero() {
        const name = document.getElementById('new-name').value;
        const cls = document.getElementById('new-class').value;
        const pin = document.getElementById('new-pin').value;
        if(!name || !pin) return;
        const hpMap = { "Harcos":100, "Mágus":70, "Lovag":130, "Íjász":90, "Bérgyilkos":80, "Nekromanta":110 };
        db.ref('characters').push({ name, charClass: cls, pin, hp: hpMap[cls], maxHp: hpMap[cls], status: "offline" });
        document.getElementById('modal-creator').style.display = 'none';
    }
</script>
</body>
</html>

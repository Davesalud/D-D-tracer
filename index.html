<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Death's Armada - Főmenü</title>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --accent: #8b0000; --bg: #0d0d12; }
        body { 
            background: var(--bg); color: white; font-family: 'MedievalSharp', cursive; margin: 0;
            background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)), url('https://wallpaperaccess.com/full/1155861.jpg');
            background-size: cover; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        .container { max-width: 800px; width: 90%; text-align: center; padding: 40px 20px; }
        h1 { font-size: 4em; color: var(--gold); text-shadow: 0 0 20px black; margin-bottom: 10px; }
        .subtitle { font-style: italic; color: #aaa; margin-bottom: 40px; }

        .char-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .char-card { 
            background: rgba(20, 20, 25, 0.9); border: 2px solid #333; padding: 20px; 
            border-radius: 8px; cursor: pointer; transition: 0.3s; 
        }
        .char-card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .char-card.selected { border-color: var(--gold); background: rgba(139, 0, 0, 0.2); box-shadow: 0 0 15px var(--gold); }
        .char-card h3 { margin: 10px 0 5px 0; color: var(--gold); }
        .char-card p { font-size: 0.8em; color: #ccc; margin: 0; }

        .menu-btns { display: flex; flex-direction: column; gap: 15px; align-items: center; }
        .btn { 
            background: var(--accent); color: white; border: 1px solid var(--gold); 
            padding: 15px 40px; font-family: 'MedievalSharp'; font-size: 1.2em;
            cursor: pointer; text-transform: uppercase; width: 280px; transition: 0.3s;
        }
        .btn:hover:not(:disabled) { background: #b00000; box-shadow: 0 0 15px var(--accent); }
        .btn:disabled { background: #222; border-color: #444; color: #555; cursor: not-allowed; }

        #status-msg { margin-top: 20px; color: var(--gold); font-size: 0.9em; height: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Death's Armada</h1>
    <p class="subtitle">Válaszd ki a hősödet, és lépj az Arénába!</p>

    <div id="char-list" class="char-grid">
        <p>Hősök idézése...</p>
    </div>

    <div class="menu-btns">
        <button id="enter-btn" class="btn" onclick="enterArena()" disabled>Belépés az Arénába</button>
        <button class="btn" style="background: transparent; font-size: 0.9em; width: auto;" onclick="location.reload()">🔄 Lista Frissítése</button>
    </div>

    <div id="status-msg"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBg2WzLqxt0QRDkDiUKYrGRCw0Kg-gr1OU",
        authDomain: "dnd-tracker-4fe05.firebaseapp.com",
        projectId: "dnd-tracker-4fe05",
        databaseURL: "https://dnd-tracker-4fe05-default-rtdb.europe-west1.firebasedatabase.app",
        storageBucket: "dnd-tracker-4fe05.firebasestorage.app",
        messagingSenderId: "886037504950",
        appId: "1:886037504950:web:46e80b46f0e26e24429717"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Karakterek betöltése és listázása
    db.ref('characters').on('value', snap => {
        const chars = snap.val();
        const listDiv = document.getElementById('char-list');
        listDiv.innerHTML = "";

        if (!chars) {
            listDiv.innerHTML = "<p>Nincsenek hősök az adatbázisban.</p>";
            return;
        }

        Object.keys(chars).forEach(id => {
            const c = chars[id];
            const card = document.createElement('div');
            card.className = 'char-card';
            if (localStorage.getItem('selectedCharId') === id) card.classList.add('selected');
            
            card.onclick = () => selectChar(id);
            card.innerHTML = `
                <h3>${c.name}</h3>
                <p>${c.charClass}</p>
                <p style="color: var(--gold)">HP: ${c.maxHp}</p>
            `;
            listDiv.appendChild(card);
        });
    });

    // Karakter kiválasztása
    function selectChar(id) {
        localStorage.setItem('selectedCharId', id);
        
        document.querySelectorAll('.char-card').forEach(card => card.classList.remove('selected'));
        event.currentTarget.classList.add('selected');
        
        document.getElementById('enter-btn').disabled = false;
        document.getElementById('status-msg').innerText = "Hős kiválasztva! Készen állsz a harcra.";
    }

    // --- EZ A JAVÍTOTT RÉSZ, AMI MEGSZÜNTETI A HURKOT ---
    function enterArena() {
        const charId = localStorage.getItem('selectedCharId');
        if (!charId) {
            alert("Válassz karaktert!");
            return;
        }
        // Csak gombnyomásra váltunk, nincs automata redirect az onloadban!
        window.location.href = 'arena.html';
    }

    window.onload = function() {
        console.log("Főmenü betöltve. Várjuk a hős kiválasztását.");
        // Ellenőrizzük, van-e már kijelölve valaki, ha igen, engedjük be
        if (localStorage.getItem('selectedCharId')) {
            document.getElementById('enter-btn').disabled = false;
        }
    };
</script>

</body>
</html>

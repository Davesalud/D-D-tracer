<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Death's Armada - ANIMATED ARENA ⚔️</title>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --accent: #8b0000; --bg: #050507; --success: #4CAF50; }
        body { 
            background: var(--bg); color: white; font-family: 'MedievalSharp', cursive; margin: 0;
            background-image: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.95)), url('https://wallpaperaccess.com/full/1155861.jpg');
            background-size: cover; height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }

        /* --- ÚJ ANIMÁCIÓK ÉS EFFEKTEK --- */

        /* RÁZKÓDÓ EFFEKT SEBZÉSNÉL */
        @keyframes shake {
            0%, 100% { transform: translate(0, 0) rotate(0); }
            10%, 30%, 50%, 70%, 90% { transform: translate(-8px, 0) rotate(-2deg); }
            20%, 40%, 60%, 80% { transform: translate(8px, 0) rotate(2deg); }
        }
        .shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; border-color: red !important; }

        /* VILLANÁS */
        #flash-effect {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 0, 0, 0.5); opacity: 0; pointer-events: none; z-index: 999;
        }
        .flash-active { animation: flash-fade 0.4s ease-out; }
        @keyframes flash-fade { from { opacity: 1; } to { opacity: 0; } }

        /* PÖRGŐ KOCKA */
        .dice-box { 
            width: 100px; height: 100px; border: 3px solid var(--gold); display: flex; 
            align-items: center; justify-content: center; font-size: 3.5em; 
            background: rgba(139, 0, 0, 0.3); color: var(--gold); border-radius: 15px;
            box-shadow: 0 0 25px rgba(0,0,0,0.7);
        }
        .dice-rolling { animation: dice-spin 0.2s linear infinite; color: white; border-color: white; }
        @keyframes dice-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* BEÚSZÓ LOG BEJEGYZÉSEK */
        .log-entry { margin-bottom: 5px; border-bottom: 1px solid #222; animation: entry-slide 0.3s ease-out; }
        @keyframes entry-slide { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* GYŐZELMI MODAL BEÚSZÁS */
        @keyframes win-slide-in { from { transform: translateY(-50px) scale(0.9); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }
        #win-screen.win-active { display: flex; animation: win-slide-in 0.6s ease-out forwards; }

        /* GYÓGYULÁS (Nekromanta) */
        .heal-effect { animation: heal-pulse 0.6s ease-out; }
        @keyframes heal-pulse { 
            0% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.8); }
            70% { box-shadow: 0 0 20px 10px rgba(76, 175, 80, 0); }
            100% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0); }
        }

        /* --- ALAP STÍLUSOK (VÁLTOZATLAN) --- */
        .arena-header { padding: 10px; border-bottom: 2px solid var(--gold); text-align: center; background: rgba(0,0,0,0.7); }
        .battlefield { display: flex; flex: 1; justify-content: space-around; align-items: center; padding: 20px; gap: 20px; }
        
        .fighter-card { 
            flex: 1; max-width: 320px; padding: 25px; border: 2px solid #333; 
            background: rgba(15, 15, 20, 0.95); border-radius: 12px; text-align: center;
            transition: 0.4s ease; position: relative;
        }
        .turn-indicator {
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            background: var(--gold); color: black; padding: 4px 20px; font-size: 0.9em;
            border-radius: 20px; display: none; font-weight: bold; box-shadow: 0 0 15px var(--gold); z-index: 10;
        }
        .fighter-card.active { border-color: var(--gold); box-shadow: 0 0 30px rgba(197, 160, 89, 0.4); transform: translateY(-10px); }
        .fighter-card.active .turn-indicator { display: block; }

        .hp-bar { width: 100%; height: 26px; background: #000; border: 1px solid #444; margin: 15px 0; overflow: hidden; position: relative; border-radius: 4px; }
        .hp-fill { height: 100%; background: linear-gradient(90deg, #8b0000, #ff0000); width: 100%; transition: 0.8s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
        .hp-text { position: absolute; width: 100%; text-align: center; font-size: 14px; top: 3px; text-shadow: 1px 1px 3px black; font-weight: bold; z-index: 5; }
        
        .center-ui { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        
        .battle-log {
            width: 100%; max-width: 380px; height: 180px; background: rgba(0,0,0,0.9);
            border: 1px solid #444; padding: 12px; font-size: 0.9em; overflow-y: auto;
            text-align: left; color: #ccc; border-radius: 8px; box-shadow: inset 0 0 15px #000;
        }

        .btn { 
            background: var(--accent); color: white; border: 1px solid var(--gold); 
            padding: 14px; font-family: 'MedievalSharp'; cursor: pointer; text-transform: uppercase; width: 100%; margin-top: 10px;
            font-size: 1em; letter-spacing: 1px; transition: 0.2s;
        }
        .btn:hover:not(:disabled) { background: #b00; transform: scale(1.02); }
        .btn:disabled { background: #1a1a1a; color: #444; border-color: #222; cursor: not-allowed; }
        
        #win-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.96); display: none; flex-direction: column;
            align-items: center; justify-content: center; z-index: 1000;
        }
        .win-text { font-size: 5em; color: var(--gold); text-shadow: 0 0 30px var(--gold); margin-bottom: 20px; }

        .back-btn { position: fixed; bottom: 20px; left: 20px; color: var(--gold); text-decoration: none; font-size: 0.8em; z-index: 100; }
    </style>
</head>
<body>

<div id="flash-effect"></div>

<div id="win-screen">
    <div class="win-text">GYŐZELEM!</div>
    <div id="winner-name" style="font-size: 2.5em; margin-bottom: 40px; color: white;">-</div>
    <button class="btn" style="width: 250px;" onclick="resetArena()">Új viadal indítása</button>
</div>

<div class="arena-header"><h2 id="turn-display">A sors keze...</h2></div>

<div class="battlefield">
    <div id="p-card" class="fighter-card">
        <div class="turn-indicator">TE JÖSSZ!</div>
        <h3 id="p-name">Te</h3>
        <div class="hp-bar"><div id="p-hp-fill" class="hp-fill"></div><div class="hp-text" id="p-hp-val">0/0 HP</div></div>
        <button id="btn-attack" class="btn" onclick="performAction('attack')" disabled>⚔️ Támadás</button>
        <button id="btn-skill" class="btn" style="background:#4a1a1a;" onclick="performAction('skill')" disabled>✨ Különleges Erő</button>
    </div>

    <div class="center-ui">
        <div id="dice" class="dice-box">?</div>
        <div id="log" class="battle-log"></div>
        <button class="btn" style="font-size:0.6em; width:auto; padding:5px 15px; opacity:0.4;" onclick="resetArena()">🔄 Reset</button>
    </div>

    <div id="e-card" class="fighter-card">
        <div class="turn-indicator">ELLENFÉL TÁMAD!</div>
        <h3 id="e-name">Ellenfél</h3>
        <div class="hp-bar"><div id="e-hp-fill" class="hp-fill"></div><div class="hp-text" id="e-hp-val">0/0 HP</div></div>
        <div id="e-status" style="margin-top:10px; color:var(--gold); font-style: italic;">Várakozás...</div>
    </div>
</div>

<a href="index.html" class="back-btn">⬅ Megfutamodás</a>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBg2WzLqxt0QRDkDiUKYrGRCw0Kg-gr1OU",
        authDomain: "dnd-tracker-4fe05.firebaseapp.com",
        projectId: "dnd-tracker-4fe05",
        databaseURL: "https://dnd-tracker-4fe05-default-rtdb.europe-west1.firebasedatabase.app",
        storageBucket: "dnd-tracker-4fe05.firebasestorage.app",
        messagingSenderId: "886037504950",
        appId: "1:886037504950:web:46e80b46f0e26e24429717"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const myId = localStorage.getItem('selectedCharId');
    const bRef = db.ref('battles/global_arena');

    if (!myId) window.location.href = 'index.html';

    const SKILLS = { "Harcos": 25, "Mágus": 35, "Lovag": 15, "Íjász": 24, "Bérgyilkos": 20, "Nekromanta": 15 };

    bRef.on('value', snap => {
        const b = snap.val();
        if (!b) { startBattle(); return; }
        if (b.p1.id !== myId && b.p2.id === "waiting") { joinBattle(); return; }
        updateArena(b);
    });

    function startBattle() {
        db.ref(`characters/${myId}`).once('value', s => {
            const c = s.val();
            bRef.set({
                p1: { id: myId, name: c.name, hp: c.maxHp, maxHp: c.maxHp, class: c.charClass },
                p2: { id: "waiting", name: "Ellenfél", hp: 0, maxHp: 100 },
                turn: myId, lastRoll: "?", log: ["Kihívót várunk az Arénába..."]
            });
        });
    }

    function joinBattle() {
        db.ref(`characters/${myId}`).once('value', s => {
            const c = s.val();
            bRef.update({
                "p2": { id: myId, name: c.name, hp: c.maxHp, maxHp: c.maxHp, class: c.charClass },
                "log": ["A harc megkezdődött!"],
                "lastRoll": "?"
            });
        });
    }

    function resetArena() {
        document.getElementById('win-screen').classList.remove('win-active');
        bRef.remove().then(() => location.reload());
    }

    function updateArena(b) {
        const isP1 = b.p1.id === myId;
        const me = isP1 ? b.p1 : b.p2;
        const opp = isP1 ? b.p2 : b.p1;

        document.getElementById('p-name').innerText = me.name;
        document.getElementById('p-hp-fill').style.width = (me.hp/me.maxHp*100)+"%";
        document.getElementById('p-hp-val').innerText = Math.ceil(me.hp)+"/"+me.maxHp+" HP";
        
        document.getElementById('e-name').innerText = opp.name;
        document.getElementById('e-hp-fill').style.width = (opp.hp/opp.maxHp*100)+"%";
        document.getElementById('e-hp-val').innerText = Math.ceil(opp.hp)+"/"+opp.maxHp+" HP";

        const myTurn = (b.turn === myId && opp.id !== "waiting");
        document.getElementById('turn-display').innerText = myTurn ? "TE KÖVETKEZEL!" : "ELLENFÉL KÉSZÜLŐDIK...";
        
        document.getElementById('p-card').classList.toggle('active', b.turn === me.id && opp.id !== "waiting");
        document.getElementById('e-card').classList.toggle('active', b.turn === opp.id && opp.id !== "waiting");
        
        document.getElementById('btn-attack').disabled = !myTurn;
        document.getElementById('btn-skill').disabled = !myTurn;

        document.getElementById('dice').innerText = b.lastRoll;
        document.getElementById('log').innerHTML = b.log ? b.log.map(l => `<div class="log-entry">${l}</div>`).reverse().join('') : "";

        // EFFEKT INDÍTÓK
        if (window.lastHp !== undefined && window.lastHp > me.hp) triggerHit('p-card');
        if (window.lastHp !== undefined && window.lastHp < me.hp) triggerHeal('p-card'); // Új: gyógyulás effekt
        if (window.lastOppHp !== undefined && window.lastOppHp > opp.hp) triggerHit('e-card');
        if (window.lastOppHp !== undefined && window.lastOppHp < opp.hp) triggerHeal('e-card'); // Új: gyógyulás effekt

        window.lastHp = me.hp;
        window.lastOppHp = opp.hp;

        if (opp.id !== "waiting" && (me.hp <= 0 || opp.hp <= 0)) {
            document.getElementById('winner-name').innerText = me.hp > 0 ? me.name : opp.name;
            document.getElementById('win-screen').classList.add('win-active'); // Új: animált megjelelnés
        }
    }

    function triggerHit(id) {
        const card = document.getElementById(id);
        const flash = document.getElementById('flash-effect');
        card.classList.add('shake');
        flash.classList.add('flash-active');
        setTimeout(() => { 
            card.classList.remove('shake'); 
            flash.classList.remove('flash-active');
        }, 500);
    }

    function triggerHeal(id) {
        const card = document.getElementById(id);
        card.classList.add('heal-effect');
        setTimeout(() => { card.classList.remove('heal-effect'); }, 600);
    }

    function performAction(type) {
        const dice = document.getElementById('dice');
        dice.classList.add('dice-rolling'); // Új: brutális pörgés
        
        setTimeout(() => {
            dice.classList.remove('dice-rolling');
            bRef.once('value', snap => {
                const b = snap.val();
                if (!b) return;
                const roll = Math.floor(Math.random() * 20) + 1;
                const isP1 = b.p1.id === myId;
                const me = isP1 ? b.p1 : b.p2;
                const opp = isP1 ? b.p2 : b.p1;
                const targetKey = isP1 ? 'p2' : 'p1';
                
                let dmg = 0, heal = 0, msg = "";

                if (type === 'attack') {
                    if (roll >= 8) {
                        dmg = 15;
                        if (roll === 20) { dmg = 30; msg = "🎯 KRITIKUS! "; }
                        msg += `${me.name} eltalálta az ellenséget! (-${dmg} HP)`;
                    } else { msg = `🛡️ ${me.name} elhibázta!`; }
                } else {
                    switch(me.class) {
                        case "Harcos": dmg = SKILLS["Harcos"]; msg = `🪓 Vérszomj! ${me.name} lecsap! (-${dmg} HP)`; break;
                        case "Mágus": dmg = SKILLS["Mágus"]; msg = `🔥 Tűzgolyó! Hatalmas robbanás! (-${dmg} HP)`; break;
                        case "Lovag": dmg = SKILLS["Lovag"]; msg = `🛡️ Szent Pajzs! ${me.name} odacsap! (-${dmg} HP)`; break;
                        case "Íjász": dmg = SKILLS["Íjász"]; msg = `🏹 Dupla Lövés! Két nyíl talált! (-${dmg} HP)`; break;
                        case "Bérgyilkos": dmg = SKILLS["Bérgyilkos"]; msg = `🐍 Mérgezett Tőr! A méreg lassan öl... (-${dmg} HP)`; break;
                        case "Nekromanta": dmg = SKILLS["Nekromanta"]; heal = 15; msg = `💀 Életelszívás! -15 HP tőle, +15 HP neked!`; break;
                        default: dmg = 20; msg = `${me.name} erőt hív elő!`;
                    }
                }

                const updates = {};
                updates[`${targetKey}/hp`] = Math.max(0, opp.hp - dmg);
                updates[`${isP1 ? 'p1' : 'p2'}/hp`] = Math.min(me.maxHp, me.hp + heal);
                updates['turn'] = opp.id;
                updates['lastRoll'] = roll;
                
                let nLog = b.log || [];
                nLog.push(`[D20: ${roll}] ${msg}`);
                if (nLog.length > 6) nLog.shift();
                updates['log'] = nLog;
                
                bRef.update(updates);
            });
        }, 1000); // 1 másodperces feszült kockapörgetés
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Death's Armada - Secure 4469</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,600;1,700&family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #c5a059; --bg: #0a0a0c; --card: #121214; --accent: #8b0000; 
            --danger: #ff4444; --success: #2d5a27; --text: #d1d1d1;
        }
        
        body { 
            font-family: 'Crimson Text', serif; background-color: var(--bg); color: var(--text); 
            margin: 0; padding: 10px; background-image: radial-gradient(circle at center, #1a1a1e 0%, #0a0a0c 100%);
        }
        
        .container { max-width: 900px; margin: auto; }
        .main-header { text-align: center; margin-bottom: 20px; padding: 10px; border-bottom: 1px dashed var(--accent); }
        .main-header h1 { font-family: 'MedievalSharp', cursive; font-size: 2.5em; color: var(--accent); margin: 0; text-shadow: 2px 2px 4px #000; }

        .role-selector { background: var(--card); padding: 8px; border-radius: 4px; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; border: 1px solid var(--accent); font-size: 0.9em; }

        .dashboard { display: grid; grid-template-columns: 1fr 320px; gap: 15px; }
        @media (max-width: 900px) { .dashboard { grid-template-columns: 1fr; } }

        .card { background: var(--card); border: 1px solid #2a2a2e; border-radius: 4px; padding: 12px; margin-bottom: 15px; }
        h2 { font-family: 'MedievalSharp', cursive; color: var(--gold); border-bottom: 1px solid #2a2a2e; padding-bottom: 8px; margin-top: 0; font-size: 1.1em; }

        .char-card { border: 1px solid #2a2a2e; padding: 12px; margin-bottom: 12px; background: #08080a; position: relative; transition: 0.3s; }
        .char-card.unlocked { border: 1px solid var(--gold); box-shadow: 0 0 10px rgba(197, 160, 89, 0.2); }
        
        .char-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .lock-status { cursor: pointer; font-size: 14px; margin-right: 10px; }

        .stats-container { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
        .stat-line { display: grid; grid-template-columns: 1fr 80px; gap: 5px; align-items: center; }

        .bar-bg { height: 14px; background: #1a1a1e; border-radius: 2px; overflow: hidden; position: relative; border: 1px solid #333; width: 100%; }
        .hp-fill { height: 100%; background: linear-gradient(90deg, #8b0000, #ff4444); transition: 0.5s; }
        .mp-fill { height: 100%; background: linear-gradient(90deg, #00448b, #44aaff); transition: 0.5s; }
        .bar-text { position: absolute; width: 100%; text-align: center; font-size: 9px; line-height: 14px; font-weight: bold; color: #fff; text-shadow: 1px 1px 2px #000; }

        .mini-btn-group { display: flex; gap: 2px; }
        .mini-btn { font-family: 'MedievalSharp', cursive; cursor: pointer; border: 1px solid #444; background: #1a1a1e; color: #fff; font-size: 9px; padding: 2px 5px; min-width: 25px; }
        .mini-btn:disabled { opacity: 0.2; cursor: default; }

        .inventory-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px; margin-top: 8px; border-top: 1px solid #2a2a2e; padding-top: 8px; }
        .slot { background: #121214; border: 1px solid #2a2a2e; padding: 4px; height: 20px; display: flex; align-items: center; }
        .slot input { background: transparent; border: none; color: #666; width: 100%; font-size: 10px; outline: none; font-family: 'Crimson Text', serif; }
        .slot input:enabled { color: #aaa; }

        .log-box { background: #050505; height: 250px; overflow-y: auto; padding: 8px; font-size: 12px; border: 1px solid #2a2a2e; }
        input[type="text"], select { background: #1a1a1e; border: 1px solid #333; color: white; padding: 6px; width: 100%; margin-bottom: 5px; font-family: 'Crimson Text', serif; font-size: 12px; box-sizing: border-box; }
        
        .hidden { display: none !important; }
        .del-btn { color: #555; font-size: 10px; cursor: pointer; border: none; background: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="main-header">
        <h1>Death's Armada</h1>
    </div>

    <div class="role-selector">
        <span>📜 RANG:</span>
        <select id="currentUserRole" onchange="checkDMPassword()" style="width: auto; margin: 0;">
            <option value="PLAYER">Játékos</option>
            <option value="DM">Kalandmester (Titkos)</option>
        </select>
    </div>

    <div class="dashboard">
        <div>
            <div id="dm-panel" class="card hidden">
                <h2>Új Karakter Megidézése</h2>
                <input type="text" id="newCharName" placeholder="Karakter neve...">
                <div style="display: flex; gap: 5px;">
                    <select id="newCharType">
                        <option value="player">Hős</option>
                        <option value="monster">Szörny</option>
                    </select>
                    <select id="newCharClass">
                        <option value="Harcos">Harcos</option>
                        <option value="Mágus">Mágus</option>
                        <option value="Vándor">Vándor</option>
                    </select>
                </div>
                <button onclick="createCharacter()" style="width: 100%; font-family:'MedievalSharp'; background:#1a1a1e; color:var(--gold); border:1px solid #444; padding:5px; margin-top:5px; cursor:pointer;">MEGIDÉZÉS</button>
            </div>

            <div class="card">
                <h2>Egységek</h2>
                <div id="char-list"></div>
                <button id="end-battle-btn" onclick="clearMonsters()" class="hidden" style="width: 100%; color: var(--danger); background:none; border:1px dashed var(--danger); cursor:pointer; font-family:'MedievalSharp'; padding:5px;">💀 SZÖRNYEK TÖRLÉSE</button>
            </div>
        </div>

        <div>
            <div class="card">
                <h2>Krónika</h2>
                <div id="log" class="log-box"></div>
            </div>

            <div class="card" style="text-align: center;">
                <h2 style="border:none">Sorsvetés</h2>
                <div style="font-size: 30px; color: var(--accent); font-family: 'MedievalSharp', cursive;" id="dice-res">?</div>
                <div style="display: flex; gap: 5px; margin-top: 5px;">
                    <button onclick="roll(20)" style="flex:1; background:#1a1a1e; color:#fff; border:1px solid #444; cursor:pointer;">D20</button>
                    <button onclick="roll(6)" style="flex:1; background:#1a1a1e; color:#fff; border:1px solid #444; cursor:pointer;">D6</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBg2WzLqxt0QRDkDiUKYrGRCw0Kg-gr1OU",
        authDomain: "dnd-tracker-4fe05.firebaseapp.com",
        projectId: "dnd-tracker-4fe05",
        databaseURL: "https://dnd-tracker-4fe05-default-rtdb.europe-west1.firebasedatabase.app",
        storageBucket: "dnd-tracker-4fe05.firebasestorage.app",
        messagingSenderId: "886037504950",
        appId: "1:886037504950:web:46e80b46f0e26e24429717"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let unlockedChars = []; 

    function checkDMPassword() {
        const role = document.getElementById('currentUserRole').value;
        if (role === 'DM') {
            const pass = prompt("DM kód:");
            if (pass !== "4469") {
                alert("Sikertelen belépés!");
                document.getElementById('currentUserRole').value = 'PLAYER';
            }
        }
        updateUI();
    }

    function unlockChar(id, correctPin) {
        const input = prompt("Karakter PIN kódja:");
        if (input === correctPin.toString() || document.getElementById('currentUserRole').value === 'DM') {
            unlockedChars.push(id);
            renderCharacters();
        } else {
            alert("Hibás PIN!");
        }
    }

    function createCharacter() {
        const name = document.getElementById('newCharName').value;
        const type = document.getElementById('newCharType').value;
        const cls = document.getElementById('newCharClass').value;
        if(!name) return;
        
        const pin = prompt("Adj meg egy PIN-t a karakterhez (alapértelmezett: 4469):", "4469");
        if(!pin) return;

        const baseStats = { "Harcos": { hp: 100, mp: 20 }, "Mágus": { hp: 60, mp: 120 }, "Vándor": { hp: 80, mp: 50 } };
        db.ref('characters').push({
            name, type, charClass: cls, pin: pin,
            hp: baseStats[cls].hp, maxHp: baseStats[cls].hp,
            mp: baseStats[cls].mp, maxMp: baseStats[cls].mp,
            slots: ["Üres", "Üres", "Üres", "Üres"]
        });
        document.getElementById('newCharName').value = '';
    }

    function renderCharacters() {
        db.ref('characters').once('value', snap => {
            const list = document.getElementById('char-list');
            list.innerHTML = '';
            const role = document.getElementById('currentUserRole').value;

            snap.forEach(child => {
                const c = child.val();
                const id = child.key;
                const slots = c.slots || ["Üres", "Üres", "Üres", "Üres"];
                const isUnlocked = unlockedChars.includes(id) || role === 'DM';
                
                list.innerHTML += `
                    <div class="char-card ${isUnlocked ? 'unlocked' : ''}" style="border-left: 3px solid ${c.type === 'monster' ? 'var(--accent)' : 'var(--gold)'}">
                        <div class="char-header">
                            <span class="lock-status" onclick="unlockChar('${id}', '${c.pin}')">${isUnlocked ? '🔓' : '🔒'}</span>
                            <strong style="font-family:'MedievalSharp'; flex-grow:1;">${c.name} <span style="font-size:0.7em; font-weight:normal; opacity:0.6;">${c.charClass ? '- ' + c.charClass : ''}</span></strong>
                            ${role === 'DM' ? `<button class="del-btn" onclick="deleteChar('${id}')">X</button>` : ''}
                        </div>
                        <div class="stats-container">
                            <div class="stat-line">
                                <div class="bar-bg"><div class="hp-fill" style="width:${(c.hp/c.maxHp)*100}%"></div><div class="bar-text">${c.hp}/${c.maxHp} HP</div></div>
                                <div class="mini-btn-group">
                                    <button class="mini-btn" ${!isUnlocked ? 'disabled' : ''} onclick="modStat('${id}', 'hp', -5)">-5</button>
                                    <button class="mini-btn" ${!isUnlocked ? 'disabled' : ''} onclick="modStat('${id}', 'hp', 5)">+5</button>
                                </div>
                            </div>
                            <div class="stat-line">
                                <div class="bar-bg"><div class="mp-fill" style="width:${(c.mp/c.maxMp)*100}%"></div><div class="bar-text">${c.mp}/${c.maxMp} MP</div></div>
                                <div class="mini-btn-group">
                                    <button class="mini-btn" ${!isUnlocked ? 'disabled' : ''} onclick="modStat('${id}', 'mp', -10)">-10</button>
                                    <button class="mini-btn" ${!isUnlocked ? 'disabled' : ''} onclick="modStat('${id}', 'mp', 10)">+10</button>
                                </div>
                            </div>
                        </div>
                        <div class="inventory-grid">
                            ${slots.map((item, index) => `
                                <div class="slot"><input type="text" value="${item}" ${!isUnlocked ? 'disabled' : ''} onchange="updateSlot('${id}', ${index}, this.value)"></div>
                            `).join('')}
                        </div>
                    </div>
                `;
            });
        });
    }

    db.ref('characters').on('value', () => { renderCharacters(); });
    function updateUI() {
        const role = document.getElementById('currentUserRole').value;
        document.getElementById('dm-panel').classList.toggle('hidden', role !== 'DM');
        document.getElementById('end-battle-btn').classList.toggle('hidden', role !== 'DM');
        renderCharacters(); 
    }

    function updateSlot(charId, index, value) { db.ref(`characters/${charId}/slots/${index}`).set(value); }
    function deleteChar(id) { if(confirm("Végleg törlöd?")) db.ref(`characters/${id}`).remove(); }
    function modStat(id, stat, val) {
        db.ref(`characters/${id}`).once('value', s => {
            let newVal = (s.val()[stat] || 0) + val;
            newVal = Math.min(Math.max(0, newVal), s.val().maxHp || 100);
            db.ref(`characters/${id}`).update({ [stat]: newVal });
        });
    }

    function clearMonsters() {
        if(!confirm("Minden ellenfelet törölsz?")) return;
        db.ref('characters').once('value', snap => {
            snap.forEach(c => { if(c.val().type === 'monster') db.ref(`characters/${c.key}`).remove(); });
        });
    }

    function roll(s) {
        const r = Math.floor(Math.random() * s) + 1;
        document.getElementById('dice-res').innerText = r;
        logAction(`D${s} dobás: [ ${r} ]`);
    }

    function logAction(msg) {
        const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        db.ref('logs').push(`[${time}] ${msg}`);
    }

    db.ref('logs').on('value', snap => {
        const box = document.getElementById('log');
        box.innerHTML = '';
        snap.forEach(l => { box.innerHTML = `<div>${l.val()}</div>` + box.innerHTML; });
    });

    updateUI();
</script>
</body>
</html>

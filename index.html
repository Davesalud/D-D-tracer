<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Death's Armada - Lobby</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,600;1,700&family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --bg: #050507; --card: rgba(15, 15, 18, 0.95); --accent: #8b0000; --text: #e0e0e0; }
        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; outline: none; }
        
        body { 
            font-family: 'Crimson Text', serif; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            overflow-x: hidden;
            overflow-y: auto; 
        }
        
        .master-bg { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), url('https://i.pinimg.com/originals/26/2b/dd/262bdd02564bf6dabbe89df4f93e8e26.jpg'); 
            background-size: cover; background-position: center; z-index: -1; 
        }

        .logout-corner { position: fixed; top: 20px; right: 20px; z-index: 1000; }
        .btn-logout { 
            background: rgba(139, 0, 0, 0.3); color: #ff4444; border: 1px solid #8b0000; 
            padding: 8px 15px; font-family: 'MedievalSharp'; cursor: pointer; border-radius: 4px; 
            font-size: 0.9em; text-transform: uppercase; transition: 0.3s; backdrop-filter: blur(5px);
        }
        .btn-logout:hover { background: #8b0000; color: white; box-shadow: 0 0 10px #8b0000; }

        .dm-key-btn {
            position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px;
            background: rgba(0,0,0,0.8); border: 2px solid var(--gold); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            z-index: 1000; transition: 0.3s; box-shadow: 0 0 15px rgba(0,0,0,0.5); font-size: 24px;
        }

        .card { 
            background: var(--card); border: 1px solid var(--gold); 
            padding: 25px; border-radius: 4px; width: 95%; max-width: 480px; 
            text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,1); 
            backdrop-filter: blur(15px); margin: 40px 0; position: relative; z-index: 5;
        }
        
        .lobby-hero-portrait { 
            width: 100%; aspect-ratio: 1/1; max-height: 320px; 
            border: 2px solid var(--gold); margin: 15px 0; 
            background-size: cover; background-position: center 20%; 
            border-radius: 4px; box-shadow: inset 0 0 50px black; 
        }
        
        .bar-container { height: 20px; background: #000; border: 1px solid #333; position: relative; margin-top: 10px; border-radius: 3px; overflow: hidden; }
        .bar-fill { height: 100%; transition: width 0.5s ease; background: linear-gradient(90deg, #600, #b00); width: 0%; }
        .mana-fill { height: 100%; transition: width 0.5s ease; background: linear-gradient(90deg, #004cff, #00d4ff); width: 0%; }
        .hp-count-text { font-size: 13px; color: #ccc; margin-top: 2px; font-weight: bold; font-family: 'MedievalSharp'; }
        
        .xp-container { height: 6px; background: #111; border: 1px solid #333; margin-top: 8px; border-radius: 4px; overflow: hidden; }
        .xp-fill { height: 100%; background: linear-gradient(90deg, #c5a059, #fff); width: 0%; transition: width 1s ease-out; }

        .nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        
        /* KALANDOK SZEKCIÓ */
        .adventure-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 20px; padding-top: 15px; border-top: 1px solid rgba(197,160,89,0.3); }

        .img-btn { 
            display: flex; align-items: flex-end; justify-content: center; 
            height: 80px; border: 1px solid var(--gold); border-radius: 4px; 
            text-decoration: none; background-size: cover; background-position: center; 
            overflow: hidden; transition: 0.3s; filter: grayscale(40%);
        }
        .img-btn:hover { filter: grayscale(0%); transform: scale(1.03); box-shadow: 0 0 15px var(--gold); }
        .img-btn span { width: 100%; background: rgba(0, 0, 0, 0.85); color: var(--gold); font-family: 'MedievalSharp'; text-align: center; padding: 4px 0; font-size: 0.75em; text-transform: uppercase; }

        .btn-felszereles { background-image: url('https://i.ibb.co/F4FDF8gF/Copilot-20260405-001049.png'); }
        .btn-kereskedo { background-image: url('https://i.ibb.co/0HSGQK0/Copilot-20260405-001515.png'); }
        .btn-arena { background-image: url('https://i.ibb.co/p66KV1Vb/Copilot-20260405-021201.png'); }
        .btn-solo { background-image: url('https://i.ibb.co/S4VL891M/Copilot-20260405-021905.png'); }
        .btn-team { background-image: url('https://i.ibb.co/y1rJBhv/Copilot-20260404-235606.png'); }

        .stat-bar-clone { 
            background: rgba(0,0,0,0.8); border: 1px solid var(--gold); 
            padding: 8px; border-radius: 5px; display: flex; 
            justify-content: center; gap: 15px; margin: 15px 0; flex-wrap: wrap;
            font-family: 'MedievalSharp'; color: var(--gold); font-size: 0.9em;
        }

        .online-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .status-container { background: rgba(0,0,0,0.6); border: 1px solid rgba(197, 160, 89, 0.2); padding: 8px; border-radius: 4px; min-height: 80px; }
        .status-header { font-family: 'MedievalSharp'; color: var(--gold); font-size: 0.7em; text-transform: uppercase; border-bottom: 1px solid rgba(197, 160, 89, 0.3); margin-bottom: 5px; }
        .scroll-area { max-height: 60px; overflow-y: auto; text-align: left; }
        .player-mini-card { background: rgba(255,255,255,0.03); padding: 3px 5px; margin-bottom: 3px; border-left: 2px solid var(--gold); font-size: 0.75em; }

    </style>
</head>
<body>
<div class="master-bg"></div>

<div id="lvl-up-overlay">
    <div class="lvl-card">
        <h2 id="lvl-title">SZINTLÉPÉS!</h2>
        <p>Válassz egy maradandó bónuszt:</p>
        <button class="stat-option" onclick="chooseStat('def', 1)">🛡️ Páncél +1</button>
        <button class="stat-option" onclick="chooseStat('maxHp', 10)">❤️ Életerő +10</button>
        <button class="stat-option" onclick="chooseStat('atk', 1)">⚔️ Támadás +1</button>
    </div>
</div>

<div class="logout-corner"><button class="btn-logout" onclick="logout()">Kilépés</button></div>

<div class="card">
    <div style="display:flex; justify-content: space-between; align-items: center;">
        <h1 id="lobby-name" style="font-family:'MedievalSharp'; color:var(--gold); margin:0; font-size: 1.5em;">...</h1>
        <span id="lobby-lvl" style="color: var(--gold); font-family:'MedievalSharp'; font-size: 1em; border: 1px solid var(--gold); padding: 2px 8px;">LVL -</span>
    </div>
    <p id="lobby-class-display" style="margin:2px 0; font-style:italic; color:#aaa; text-transform: uppercase; font-size: 0.8em;">-</p>
    
    <div id="lobby-hero-img" class="lobby-hero-portrait"></div>
    
    <div class="bar-container"><div class="bar-fill" id="lobby-hp-fill"></div></div>
    <div class="hp-count-text" id="lobby-hp-val">0 / 0 HP</div>

    <div class="bar-container"><div class="mana-fill" id="lobby-mp-fill"></div></div>
    <div class="hp-count-text" id="lobby-mp-val">0 / 0 MP</div>
    
    <div class="xp-container"><div id="lobby-xp-fill" class="xp-fill"></div></div>
    <div id="xp-text" style="font-size: 10px; color: #888; text-align: right; margin-top: 2px;">XP: - / -</div>
    
    <div class="nav-grid">
        <a href="inventory.html" class="img-btn btn-felszereles"><span>Felszerelés</span></a>
        <a href="shop.html" class="img-btn btn-kereskedo"><span>Kereskedő</span></a>
    </div>

    <div class="stat-bar-clone">
        <div>💰 <b id="lobby-gold">0</b></div>
        <div>⚔️ <b id="lobby-atk">0</b></div>
        <div>🛡️ <b id="lobby-def">0</b></div>
    </div>

    <div class="adventure-grid">
        <a href="arena.html" class="img-btn btn-arena"><span>Aréna</span></a>
        <a href="solocampaign.html" class="img-btn btn-solo"><span>Szóló</span></a>
        <a href="teamcampaign.html" class="img-btn btn-team"><span>Csapat</span></a>
    </div>
    
    <div class="online-grid">
        <div class="status-container">
            <div class="status-header">Hősök ●</div>
            <div id="list-online" class="scroll-area"></div>
        </div>
        <div class="status-container">
            <div class="status-header">Aréna ⚔️</div>
            <div id="list-arena" class="scroll-area"></div>
        </div>
    </div>
</div>

<div class="dm-key-btn" onclick="enterDM()" title="DM belépés">🔑</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
    const firebaseConfig = { apiKey: "AIzaSyBg2WzLqxt0QRDkDiUKYrGRCw0Kg-gr1OU", authDomain: "dnd-tracker-4fe05.firebaseapp.com", projectId: "dnd-tracker-4fe05", databaseURL: "https://dnd-tracker-4fe05-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let chars = {}, myId = localStorage.getItem('selectedCharId');
    let isLeveling = false;

    if (!myId) { window.location.href = 'login.html'; }

    const REGEN_SETTINGS = {
        "Harcos": { hp: 7, mp: 2 },
        "Mágus": { hp: 2, mp: 10 },
        "Lovag": { hp: 9, mp: 3 },
        "Íjász": { hp: 5, mp: 5 },
        "Bérgyilkos": { hp: 4, mp: 6 },
        "Nekromanta": { hp: 5, mp: 8 }
    };

    const BASE_STATS = {
        "Harcos": { atk: 12, def: 8, maxHp: 120 },
        "Mágus": { atk: 15, def: 4, maxHp: 80 },
        "Lovag": { atk: 10, def: 12, maxHp: 150 },
        "Íjász": { atk: 14, def: 6, maxHp: 90 },
        "Bérgyilkos": { atk: 16, def: 5, maxHp: 85 },
        "Nekromanta": { atk: 13, def: 7, maxHp: 100 }
    };

    const HERO_IMAGES = { "Harcos": "https://i.ibb.co/20BXyqpy/Copilot-20260403-032810.png", "Mágus": "https://i.ibb.co/yFz5bcXv/Copilot-20260403-033651.png", "Lovag": "https://i.ibb.co/Fk3n339M/Copilot-20260403-034043.png", "Íjász": "https://i.ibb.co/whd2jNpB/Copilot-20260403-034402.png", "Bérgyilkos": "https://i.ibb.co/b525CsLg/Copilot-20260403-032807.png", "Nekromanta": "https://i.ibb.co/NnCwwCbR/Copilot-20260403-033301.png" };

    db.ref('characters').on('value', snap => { 
        chars = snap.val() || {}; 
        if (myId && chars[myId]) {
            const myChar = chars[myId];
            
            // REGENERÁCIÓ ELLENŐRZÉSE
            const now = Date.now();
            const lastUpdate = myChar.lastUpdate || now;
            const elapsed = Math.floor((now - lastUpdate) / 1000);
            const ticks = Math.floor(elapsed / 60);

            if (ticks >= 1) {
                const rates = REGEN_SETTINGS[myChar.charClass] || { hp: 5, mp: 5 };
                let newHp = Math.min(Number(myChar.maxHp), Number(myChar.hp) + (ticks * rates.hp));
                let newMp = Math.min(100, Number(myChar.mp || 0) + (ticks * rates.mp));
                
                db.ref(`characters/${myId}`).update({ 
                    hp: newHp, 
                    mp: newMp, 
                    lastUpdate: now,
                    status: "online" 
                });
            }
            updateLobbyUI(); 
        }
    });

    function updateLobbyUI() {
        const c = chars[myId]; if(!c) return;
        const now = Date.now();
        
        document.getElementById('lobby-name').innerText = c.name;
        document.getElementById('lobby-lvl').innerText = `LVL ${c.level || 1}`;
        document.getElementById('lobby-gold').innerText = c.gold || 0;
        document.getElementById('lobby-atk').innerText = (Number(c.atk) || 0) + (Number(c.bonusAtk) || 0);
        document.getElementById('lobby-def').innerText = (Number(c.def) || 0) + (Number(c.bonusDef) || 0);
        document.getElementById('lobby-class-display').innerText = c.charClass;
        document.getElementById('lobby-hero-img').style.backgroundImage = `url('${HERO_IMAGES[c.charClass]}')`;
        
        // HP Megjelenítés
        const curHp = Number(c.hp || 0), mHp = Number(c.maxHp || 100);
        document.getElementById('lobby-hp-fill').style.width = (curHp / mHp * 100) + "%";
        document.getElementById('lobby-hp-val').innerText = `${Math.ceil(curHp)} / ${mHp} HP`;

        // MANA Megjelenítés
        const curMp = Number(c.mp || 0), mMp = 100; // Alapértelmezett max mana: 100
        document.getElementById('lobby-mp-fill').style.width = (curMp / mMp * 100) + "%";
        document.getElementById('lobby-mp-val').innerText = `${Math.ceil(curMp)} / ${mMp} MP`;
        
        // XP Megjelenítés
        const curXp = Number(c.xp || 0), goalXp = Number(c.nextLvlXp || 100);
        document.getElementById('lobby-xp-fill').style.width = Math.min(100, (curXp / goalXp * 100)) + "%";
        document.getElementById('xp-text').innerText = `XP: ${curXp} / ${goalXp}`;
        
        // Online hősök listázása
        const listOnline = document.getElementById('list-online');
        const listArena = document.getElementById('list-arena');
        listOnline.innerHTML = ""; listArena.innerHTML = "";

        Object.keys(chars).forEach(id => {
            const p = chars[id];
            if ((now - (p.lastUpdate || 0) < 300000) && p.name) {
                const item = `<div class="player-mini-card"><span>${p.name}</span> <small style="color:${p.status === 'searching' ? '#ff4444' : '#4CAF50'}">${p.status === 'searching' ? 'ARÉNA' : 'ONLINE'}</small></div>`;
                if (p.status === "searching") listArena.innerHTML += item;
                else if (id !== myId && p.status !== "offline") listOnline.innerHTML += item;
            }
        });
    }

    // Folyamatos státusz frissítés (30 másodpercenként)
    setInterval(() => {
        if (myId) db.ref(`characters/${myId}`).update({ lastUpdate: Date.now(), status: "online" });
    }, 30000);

    function logout() { db.ref(`characters/${myId}`).update({ status: "offline" }).then(() => { localStorage.removeItem('selectedCharId'); window.location.href = 'login.html'; }); }
    function enterDM() { if(prompt("DM PIN:") === "4469") window.location.href = 'dm.html'; }
</script>
</body>
</html>

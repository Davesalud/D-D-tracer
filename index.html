<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Death's Armada - ARENA v2.0 ⚔️</title>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --accent: #8b0000; --bg: #050507; }
        
        body { 
            background: var(--bg); color: white; font-family: 'MedievalSharp', cursive; margin: 0;
            background-image: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.95)), url('https://wallpaperaccess.com/full/1155861.jpg');
            background-size: cover; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        .arena-header { padding: 5px; border-bottom: 2px solid var(--gold); text-align: center; background: rgba(0,0,0,0.8); z-index: 90; }
        
        .battlefield { 
            display: flex; flex: 1; justify-content: center; align-items: stretch; 
            padding: 10px; gap: 10px; width: 100%; box-sizing: border-box;
        }
        
        /* ALAP KÁRTYA STÍLUS */
        .fighter-card { 
            flex: 1; display: flex; flex-direction: column; justify-content: space-between;
            padding: 10px; border: 2px solid #333; background: rgba(15, 15, 20, 0.95); 
            border-radius: 8px; text-align: center; position: relative;
        }

        .hero-portrait {
            width: 100%; height: 250px; border: 1px solid var(--gold); margin: 5px 0;
            background-size: cover; background-repeat: no-repeat; background-position: center 20%;
            border-radius: 4px; background-color: #000;
        }

        .center-ui { 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 10px; width: 200px; flex-shrink: 0;
        }

        /* --- MOBIL KOMPAKT NÉZET (Egymás mellett, görgetés nélkül) --- */
        @media (max-width: 600px) {
            .battlefield { padding: 5px; gap: 5px; align-items: flex-start; }
            .hero-portrait { height: 120px; } /* Drasztikusan kisebb kép mobilon */
            .center-ui { width: 80px; gap: 5px; } /* Kisebb kocka rész */
            .dice-box { width: 50px !important; height: 50px !important; font-size: 1.8em !important; }
            .battle-log { display: none; } /* Mobilon a log elrejtve, hogy elférjen a HP */
            .fighter-card h3 { font-size: 0.9em; margin: 2px; }
            .hp-text { font-size: 10px !important; }
            .btn { padding: 8px !important; font-size: 0.7em !important; }
            .back-btn-container { padding: 10px; }
        }

        /* UI Elemet */
        .hp-bar { width: 100%; height: 20px; background: #000; border: 1px solid #444; margin: 5px 0; overflow: hidden; position: relative; }
        .hp-fill { height: 100%; background: linear-gradient(90deg, #8b0000, #ff0000); width: 100%; transition: 0.6s; }
        .hp-text { position: absolute; width: 100%; text-align: center; font-size: 12px; top: 1px; text-shadow: 1px 1px 2px black; font-weight: bold; }
        
        .battle-log {
            width: 100%; height: 100px; background: rgba(0,0,0,0.9);
            border: 1px solid #444; padding: 5px; font-size: 0.7em; overflow-y: auto;
            color: #ccc; border-radius: 4px;
        }
        
        .btn { 
            background: var(--accent); color: white; border: 1px solid var(--gold); 
            padding: 12px; font-family: 'MedievalSharp'; cursor: pointer; width: 100%;
        }
        .btn:disabled { opacity: 0.3; }

        .dice-box { 
            width: 70px; height: 70px; border: 2px solid var(--gold); display: flex; 
            align-items: center; justify-content: center; font-size: 2.5em; 
            background: rgba(139, 0, 0, 0.3); color: var(--gold); border-radius: 10px;
        }

        .back-btn-container { position: fixed; bottom: 0; left: 0; width: 100%; display: flex; justify-content: center; gap: 10px; padding: 15px; box-sizing: border-box; z-index: 100; pointer-events: none; }
        .back-link { pointer-events: auto; color: var(--gold); background: rgba(0,0,0,0.9); border: 1px solid var(--gold); padding: 10px 15px; font-size: 0.8em; border-radius: 4px; }
        
        #win-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; text-align: center; padding: 20px; }
        .win-active { display: flex !important; }
    </style>
</head>
<body>

<div id="win-screen">
    <h1 id="win-title" style="color: var(--gold);">GYŐZELEM!</h1>
    <div id="winner-name" style="font-size: 2em;">-</div>
    <div id="win-msg" style="margin-bottom: 20px; font-style: italic;"></div>
    <button class="btn" style="width: 200px;" onclick="exitArena()">Főmenü</button>
</div>

<div class="arena-header"><h2 id="turn-display" style="margin:0; font-size: 1em;">ARENA</h2></div>

<div class="battlefield">
    <div id="p-card" class="fighter-card">
        <h3 id="p-name">Te</h3>
        <div class="hp-bar"><div id="p-hp-fill" class="hp-fill"></div><div class="hp-text" id="p-hp-val">0/0</div></div>
        <div id="p-img" class="hero-portrait"></div>
        <button id="btn-attack" class="btn" onclick="performAction('attack')" disabled>⚔️</button>
        <button id="btn-skill" class="btn" style="background:#4a1a1a; margin-top:4px;" onclick="performAction('skill')" disabled>✨</button>
    </div>

    <div class="center-ui">
        <div id="dice" class="dice-box">?</div>
        <div id="log" class="battle-log"></div>
    </div>

    <div id="e-card" class="fighter-card">
        <h3 id="e-name">Ellenfél</h3>
        <div class="hp-bar"><div id="e-hp-fill" class="hp-fill"></div><div class="hp-text" id="e-hp-val">0/0</div></div>
        <div id="e-img" class="hero-portrait"></div>
        <div id="e-status" style="font-size: 0.7em; color: var(--gold);">Vár...</div>
    </div>
</div>

<div class="back-btn-container">
    <button id="exit-btn" class="back-link" onclick="exitArena()">⬅ Menü</button>
    <button id="forfeit-btn" class="back-link" onclick="forfeit()" style="display: none; border-color: red; color: red;">🏳️ Feladom</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
    // --- FIREBASE KONFIG (Ugyanaz) ---
    const firebaseConfig = {
        apiKey: "AIzaSyBg2WzLqxt0QRDkDiUKYrGRCw0Kg-gr1OU",
        authDomain: "dnd-tracker-4fe05.firebaseapp.com",
        projectId: "dnd-tracker-4fe05",
        databaseURL: "https://dnd-tracker-4fe05-default-rtdb.europe-west1.firebasedatabase.app",
        storageBucket: "dnd-tracker-4fe05.firebasestorage.app",
        messagingSenderId: "886037504950",
        appId: "1:886037504950:web:46e80b46f0e26e24429717"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const myId = localStorage.getItem('selectedCharId');
    const bRef = db.ref('battles/global_arena');

    const HERO_IMGS = { "Harcos":"https://i.ibb.co/20BXyqpy/Copilot-20260403-032810.png", "Mágus":"https://i.ibb.co/yFz5bcXv/Copilot-20260403-033651.png", "Lovag":"https://i.ibb.co/Fk3n339M/Copilot-20260403-034043.png", "Íjász":"https://i.ibb.co/whd2jNpB/Copilot-20260403-034402.png", "Bérgyilkos":"https://i.ibb.co/b525CsLg/Copilot-20260403-032807.png", "Nekromanta":"https://i.ibb.co/NnCwwCbR/Copilot-20260403-033301.png" };
    const SKILLS = { "Harcos": 25, "Mágus": 35, "Lovag": 15, "Íjász": 24, "Bérgyilkos": 22, "Nekromanta": 15 };

    bRef.on('value', snap => {
        const b = snap.val();
        if (!b) { startBattle(); return; }
        if (b.p1.id !== myId && b.p2.id === "waiting") { joinBattle(); return; }
        updateArena(b);
    });

    function startBattle() {
        db.ref(`characters/${myId}`).once('value', s => {
            const c = s.val();
            bRef.set({ p1: { id: myId, name: c.name, hp: c.maxHp, maxHp: c.maxHp, class: c.charClass, status: "active" }, p2: { id: "waiting", name: "Ellenfél", hp: 0, maxHp: 100, class: "" }, turn: myId, lastRoll: "?", log: ["Várakozás..."] });
        });
    }

    function joinBattle() {
        db.ref(`characters/${myId}`).once('value', s => {
            const c = s.val();
            bRef.update({ "p2": { id: myId, name: c.name, hp: c.maxHp, maxHp: c.maxHp, class: c.charClass, status: "active" }, "log": ["Harc!"] });
        });
    }

    function updateArena(b) {
        const isP1 = b.p1.id === myId;
        const me = isP1 ? b.p1 : b.p2;
        const opp = isP1 ? b.p2 : b.p1;
        const hasOpponent = (opp && opp.id !== "waiting");

        document.getElementById('exit-btn').style.display = hasOpponent ? 'none' : 'block';
        document.getElementById('forfeit-btn').style.display = hasOpponent ? 'block' : 'none';

        document.getElementById('p-img').style.backgroundImage = `url('${HERO_IMGS[me.class]}')`;
        if(hasOpponent) document.getElementById('e-img').style.backgroundImage = `url('${HERO_IMGS[opp.class]}')`;

        document.getElementById('p-hp-fill').style.width = (me.hp/me.maxHp*100)+"%";
        document.getElementById('p-hp-val').innerText = Math.ceil(me.hp);
        document.getElementById('e-hp-fill').style.width = (opp.hp/opp.maxHp*100)+"%";
        document.getElementById('e-hp-val').innerText = Math.ceil(opp.hp);
        
        document.getElementById('p-name').innerText = me.name;
        document.getElementById('e-name').innerText = opp.name;

        const myTurn = (b.turn === myId && hasOpponent && me.hp > 0 && opp.hp > 0);
        document.getElementById('turn-display').innerText = myTurn ? "TE JÖSSZ" : "VÁRAKOZÁS";
        
        document.getElementById('btn-attack').disabled = !myTurn;
        document.getElementById('btn-skill').disabled = !myTurn;
        document.getElementById('dice').innerText = b.lastRoll;
        
        if (hasOpponent && (me.hp <= 0 || opp.hp <= 0)) {
            const ws = document.getElementById('win-screen');
            ws.classList.add('win-active');
            document.getElementById('winner-name').innerText = me.hp > 0 ? me.name : opp.name;
            document.getElementById('win-msg').innerText = me.hp > 0 ? "Győztél!" : "Vesztettél!";
        }
    }

    function forfeit() { if(confirm("Feladod?")) { bRef.update({ [b.p1.id === myId ? 'p1/hp' : 'p2/hp']: 0, [b.p1.id === myId ? 'p1/status' : 'p2/status']: "coward" }); } }

    function performAction(type) {
        bRef.once('value', snap => {
            const b = snap.val();
            const roll = Math.floor(Math.random() * 20) + 1;
            const isP1 = b.p1.id === myId;
            let dmg = (type === 'attack') ? (roll >= 8 ? 15 : 0) : SKILLS[(isP1 ? b.p1.class : b.p2.class)];
            const updates = {};
            updates[isP1 ? 'p2/hp' : 'p1/hp'] = Math.max(0, (isP1 ? b.p2.hp : b.p1.hp) - dmg);
            updates['turn'] = isP1 ? b.p2.id : b.p1.id;
            updates['lastRoll'] = roll;
            bRef.update(updates);
        });
    }

    function exitArena() { bRef.remove().then(() => { window.location.replace('index.html'); }); }
</script>
</body>
</html>

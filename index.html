<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&D Karakter és Campaign Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: var(--font-sans), -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #e0e6ff;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #6b7fd1;
            padding-bottom: 20px;
        }
        
        .header h1 {
            font-size: 32px;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            margin-bottom: 5px;
        }
        
        .status {
            font-size: 12px;
            color: #b0b8e8;
            margin-top: 10px;
        }
        
        .status.connected {
            color: #00ff00;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .tab-btn {
            padding: 10px 20px;
            background: rgba(107, 127, 209, 0.2);
            border: 2px solid #6b7fd1;
            color: #e0e6ff;
            cursor: pointer;
            border-radius: 5px;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .tab-btn.active {
            background: #6b7fd1;
            color: #000;
            font-weight: bold;
        }
        
        .tab-btn:hover {
            background: rgba(107, 127, 209, 0.4);
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .section {
            background: rgba(26, 31, 58, 0.8);
            border: 2px solid #6b7fd1;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .section h2 {
            color: #ffd700;
            margin-bottom: 15px;
            font-size: 20px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #b0b8e8;
            font-size: 13px;
        }
        
        input, select {
            width: 100%;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid #6b7fd1;
            color: #e0e6ff;
            border-radius: 4px;
            font-size: 14px;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #ffd700;
            background: rgba(0, 0, 0, 0.6);
        }
        
        button {
            background: #6b7fd1;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            margin-right: 10px;
        }
        
        button:hover {
            background: #ffd700;
            transform: scale(1.05);
        }
        
        .character-card {
            background: rgba(107, 127, 209, 0.15);
            border-left: 4px solid #ffd700;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 4px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        
        .character-card h3 {
            grid-column: 1 / -1;
            color: #ffd700;
            margin-bottom: 10px;
        }
        
        .stat {
            font-size: 13px;
            color: #b0b8e8;
        }
        
        .stat-value {
            color: #e0e6ff;
            font-weight: bold;
        }
        
        .dice-area {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        
        .dice-btn {
            background: linear-gradient(135deg, #d4a574 0%, #8b7355 100%);
            color: #fff;
            border: 2px solid #ffd700;
            padding: 12px 16px;
            border-radius: 50%;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .dice-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
        }
        
        .result-display {
            background: rgba(255, 215, 0, 0.1);
            border: 2px solid #ffd700;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            margin-top: 20px;
        }
        
        .result-display h3 {
            color: #ffd700;
            margin-bottom: 10px;
        }
        
        .result-value {
            font-size: 36px;
            color: #ffd700;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }
        
        .delete-btn {
            background: #a32d2d;
            color: #fff;
            border: none;
            padding: 6px 12px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
            grid-column: 1 / -1;
        }
        
        .delete-btn:hover {
            background: #c94949;
        }
        
        .tracker-item {
            background: rgba(107, 127, 209, 0.1);
            border: 1px solid #6b7fd1;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 4px;
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        .tracker-item input {
            width: 50px;
        }
        
        .tracker-status {
            flex: 1;
        }
        
        .tracker-status p {
            margin: 2px 0;
            font-size: 13px;
            color: #b0b8e8;
        }

        .loading {
            text-align: center;
            color: #ffd700;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚔️ D&D CAMPAIGN TRACKER ⚔️</h1>
            <p>Karakterek, kocka, és kampány kezelés egy helyen</p>
            <div id="status" class="status">Csatlakozás...</div>
        </div>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('character')">Karakterek</button>
            <button class="tab-btn" onclick="switchTab('dice')">Kocka Dobó</button>
            <button class="tab-btn" onclick="switchTab('tracker')">Campaign Tracker</button>
        </div>

                    </select>

                        <option>Mágus</option>
                        <option>Paladin</option>
                        <option>Besúgó</option>
                        <option>Varázsló</option>
                    </select>

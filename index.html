<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Death's Armada - Hero Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,600;1,700&family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --bg: #050507; --card: rgba(15, 15, 18, 0.95); --accent: #8b0000; --text: #e0e0e0; }
        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; outline: none; }
        input, select { user-select: text !important; }
        body { font-family: 'Crimson Text', serif; background-color: var(--bg); color: var(--text); margin: 0; height: 100vh; overflow: hidden; }
        .master-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), url('https://i.pinimg.com/originals/26/2b/dd/262bdd02564bf6dabbe89df4f93e8e26.jpg'); background-size: cover; background-position: center; z-index: -1; }
        
        /* NAVIGÁCIÓS GOMBOK KÉPPEL ÉS ELTOLÁSSAL */
        .nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 25px 0; align-items: center; }
        .img-btn { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            background: rgba(0,0,0,0.6); border: 1px solid var(--gold); border-radius: 4px; 
            text-decoration: none; transition: 0.3s; padding: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); 
        }
        .btn-felszereles { margin-top: -5mm; }
        .btn-kereskedo { margin-top: 5mm; }
        .img-btn img { width: 100%; height: 85px; object-fit: cover; border-radius: 2px; border: 1px solid rgba(197, 160, 89, 0.3); }
        .img-btn span { color: var(--gold); font-family: 'MedievalSharp'; font-size: 0.85em; text-transform: uppercase; margin-top: 6px; letter-spacing: 1px; }
        .img-btn:hover { transform: scale(1.05); border-color: white; background: rgba(139,0,0,0.2); }

        /* KÉTOSZLOPOS ONLINE LISTA */
        #online-players-list { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; max-height: 120px; overflow-y: auto; text-align: left; }
        .player-item { background: rgba(255,255,255,0.05); padding: 8px; border-left: 3px solid var(--gold); border-radius: 2px; display: flex; flex-direction: column; }
        .player-name { font-family: 'MedievalSharp'; color: white; font-size: 0.85em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .status-tag { font-size: 0.7em; font-weight: bold; text-transform: uppercase; margin-top: 2px; }

        /* UI ALAPOK */
        .card { background: var(--card); border: 1px solid var(--gold); padding: 25px; border-radius: 4px; width: 100%; max-width: 500px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.9); backdrop-filter: blur(15px); position: relative; margin-bottom: 20px; }
        .logo { font-family: 'MedievalSharp'; font-size: 3.5em; color: var(--accent); text-shadow: 0 0 15px rgba(139,0,0,0.7); margin-bottom: 15px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 12px; background: rgba(0,0,0,0.8); border: 1px solid #444; color: white; font-family: 'MedievalSharp'; }
        .btn { font-family: 'MedievalSharp'; padding: 12px; cursor: pointer; border: 1px solid var(--gold); transition: 0.3s; text-transform: uppercase; display: block; width: 100%; margin-bottom: 8px; text-decoration: none; text-align: center; color: var(--gold); }
        .btn-main { background: var(--accent); color: white; border: none; font-size: 1.1em; }
        .lobby-hero-portrait { width: 100%; height: 320px; border: 2px solid var(--gold); margin: 15px 0; background-size: cover; background-position: center 20%; border-radius: 4px; box-shadow: inset 0 0 50px black; }
        .bar-container { height: 22px; background: #000; border: 1px solid #333; position: relative; border-radius: 3px; overflow: hidden; }
        .bar-fill { height: 100%; transition: width 0.5s ease; background: linear-gradient(90deg, #600, #b00); width: 0%; }
        .stat-row { display: flex; justify-content: center; gap: 8px; margin-top: 15px; }
        .stat-box { background: rgba(0,0,0,0.85); border: 1px solid var(--gold); padding: 6px; border-radius: 4px; color: var(--gold); font-family: 'MedievalSharp'; font-size: 0.85em; min-width: 75px; }
        #modal-creator { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .creator-container { display: flex; flex-direction: row; gap: 30px; max-width: 900px !important; padding: 40px !important; }
        .hero-img-frame { width: 250px; height: 250px; border: 3px solid var(--gold); background-size: cover; background-position: center 20%; margin-bottom: 15px; }
        .dm-trigger { position: fixed; bottom: 15px; right: 15px; width: 35px; height: 35px; background: rgba(0,0,0,0.5); border: 1px solid rgba(197, 160, 89, 0.3); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 9999; opacity: 0.4; }
    </style>
</head>
<body>
<div class="master-bg"></div>
<div id="logout-ui" style="position: fixed; top: 15px; right: 15px; z-index: 1000; display:none;"><button class="btn" style="padding: 5px 15px; font-size: 0.7em;" onclick="logout()">Kilépés 🚪</button></div>
<div class="dm-trigger" onclick="enterDM()">🔑</div>

<div id="page-login" class="page active" style="display: flex; flex-direction: column; align-items: center; padding-top: 8vh;">
    <div class="card">
        <div class="logo">Death's Armada</div>
        <input type="text" id="hero-search" placeholder="Hős neve..." autocomplete="off">
        <div id="search-results" style="display:none; background:#111; border:1px solid var(--gold); text-align:left;"></div>
        <input type="password" id="login-pin" placeholder="PIN KÓD" maxlength="4">
        <button class="btn btn-main" onclick="login()">Belépés</button>
        <button class="btn" style="font-size: 0.8em;" onclick="openCreator()">✨ Új Hős Megidézése</button>
    </div>
</div>

<div id="page-lobby" class="page" style="display:none; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto;">
    <div class="card">
        <div style="display:flex; justify-content: space-between; align-items: center;"><h1 id="lobby-name" style="font-family:'MedievalSharp'; color:var(--gold); margin:0;">-</h1><span id="lobby-lvl" style="color: var(--gold); font-family:'MedievalSharp'; border: 1px solid var(--gold); padding: 2px 8px;">LVL 1</span></div>
        <div id="lobby-hero-img" class="lobby-hero-portrait"></div>
        <div class="bar-container"><div class="bar-fill" id="lobby-hp-fill"></div></div>
        <div id="lobby-hp-val" style="font-size:12px; font-family:'MedievalSharp'; margin-top:4px;">0 / 0 HP</div>
        
        <div class="nav-grid">
            <a href="inventory.html" class="img-btn btn-felszereles">
                <img src="https://i.ibb.co/F4FDF8gF/Copilot-20260405-001049.png">
                <span>Felszerelés</span>
            </a>
            <a href="shop.html" class="img-btn btn-kereskedo">
                <img src="https://i.ibb.co/0HSGQK0/Copilot-20260405-001515.png">
                <span>Kereskedő</span>
            </a>
        </div>

        <div class="stat-row">
            <div class="stat-box">⚔️ <span id="lobby-atk">12-18</span></div>
            <div class="stat-box">🛡️ <span id="lobby-def">5</span></div>
            <div class="stat-box" style="border: 2px solid var(--gold);">💰 <span id="lobby-gold">0</span></div>
        </div>
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:20px;">
            <button class="btn btn-main" style="background:#4a1a1a;">📜 KAMPÁNY</button>
            <button onclick="goToArena()" class="btn btn-main" style="background:#8b0000;">⚔️ ARÉNA</button>
        </div>

        <h3 style="font-family:'MedievalSharp'; color:var(--gold); margin-top:25px; text-align: left; border-bottom: 1px solid var(--gold); font-size: 1em;">Online Hősök</h3>
        <div id="online-players-list"></div>
    </div>
</div>

<div id="modal-creator">
    <div class="card creator-container">
        <div style="flex: 1.2; text-align: left;">
            <h2 style="font-family:'MedievalSharp'; color:var(--gold); margin-top: 0;">Megidézés</h2>
            <input type="text" id="new-name" placeholder="A hős neve...">
            <select id="new-class" onchange="updatePreview()">
                <option value="Harcos">Harcos</option>
                <option value="Mágus">Mágus</option>
                <option value="Lovag">Lovag</option>
                <option value="Íjász">Íjász</option>
                <option value="Bérgyilkos">Bérgyilkos</option>
                <option value="Nekromanta">Nekromanta</option>
            </select>
            <input type="password" id="new-pin" placeholder="PIN KÓD" maxlength="4">
            <button class="btn btn-main" onclick="saveNewHero()">Hős Létrehozása</button>
            <button class="btn" onclick="document.getElementById('modal-creator').style.display='none'">Vissza</button>
        </div>
        <div style="flex: 1; display:flex; flex-direction:column; align-items:center; background:rgba(0,0,0,0.3); padding:20px; border-radius: 4px;">
            <div id="preview-img" class="hero-img-frame" style="background-size:cover;"></div>
            <b id="preview-skill-name" style="color:var(--gold); font-family:'MedievalSharp';"></b>
            <p id="preview-desc" style="font-size: 0.8em; color: #aaa; text-align: center;"></p>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
    const firebaseConfig = { apiKey: "AIzaSyBg2WzLqxt0QRDkDiUKYrGRCw0Kg-gr1OU", authDomain: "dnd-tracker-4fe05.firebaseapp.com", projectId: "dnd-tracker-4fe05", databaseURL: "https://dnd-tracker-4fe05-default-rtdb.europe-west1.firebasedatabase.app", storageBucket: "dnd-tracker-4fe05.firebasestorage.app", messagingSenderId: "886037504950", appId: "1:886037504950:web:46e80b46f0e26e24429717" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let chars = {}, myId = localStorage.getItem('selectedCharId'), selectedIdFromSearch = null;

    const HERO_IMAGES = { "Harcos": "https://i.ibb.co/20BXyqpy/Copilot-20260403-032810.png", "Mágus": "https://i.ibb.co/yFz5bcXv/Copilot-20260403-033651.png", "Lovag": "https://i.ibb.co/Fk3n339M/Copilot-20260403-034043.png", "Íjász": "https://i.ibb.co/whd2jNpB/Copilot-20260403-034402.png", "Bérgyilkos": "https://i.ibb.co/b525CsLg/Copilot-20260403-032807.png", "Nekromanta": "https://i.ibb.co/NnCwwCbR/Copilot-20260403-033301.png" };
    const CLASS_DATA = { "Harcos": { skill: "Tombolás", desc: "120 HP | 12-18 Atk" }, "Mágus": { skill: "Tűzgolyó", desc: "80 HP | 20-35 Atk" }, "Lovag": { skill: "Szent Pajzs", desc: "150 HP | 8-14 Atk" }, "Íjász": { skill: "Nyílzápor", desc: "100 HP | 14-22 Atk" }, "Bérgyilkos": { skill: "Hátbatámadás", desc: "90 HP | 18-28 Atk" }, "Nekromanta": { skill: "Lélekcsapolás", desc: "110 HP | 15-22 Atk" } };

    db.ref('characters').on('value', snap => { 
        chars = snap.val() || {}; 
        if (myId && chars[myId]) { 
            document.getElementById('page-login').style.display = 'none'; 
            document.getElementById('page-lobby').style.display = 'flex'; 
            document.getElementById('logout-ui').style.display = 'block'; 
            updateLobbyUI(); 
        } 
    });

    setInterval(() => { if(myId) db.ref(`characters/${myId}`).update({ lastUpdate: Date.now() }); }, 60000);

    function updateLobbyUI() {
        const c = chars[myId]; if(!c) return;
        const now = Date.now();
        document.getElementById('lobby-name').innerText = c.name;
        document.getElementById('lobby-lvl').innerText = `LVL ${c.level || 1}`;
        document.getElementById('lobby-gold').innerText = c.gold || 0;
        document.getElementById('lobby-hero-img').style.backgroundImage = `url('${HERO_IMAGES[c.charClass]}')`;
        document.getElementById('lobby-hp-fill').style.width = (c.hp / c.maxHp) * 100 + "%";
        document.getElementById('lobby-hp-val').innerText = `${Math.ceil(c.hp)} / ${c.maxHp} HP`;
        
        const list = document.getElementById('online-players-list');
        list.innerHTML = "";
        Object.keys(chars).forEach(id => {
            const p = chars[id];
            if (id !== myId && p.status !== "offline" && (now - (p.lastUpdate || 0) < 300000)) {
                let s = p.status === "searching" ? `<span class="status-tag" style="color:#ff9800;">⚔️ Kihívóra vár</span>` : `<span class="status-tag" style="color:#4CAF50;">● Online</span>`;
                list.innerHTML += `<div class="player-item"><span class="player-name">${p.name}</span>${s}</div>`;
            }
        });
    }

    const searchInput = document.getElementById('hero-search');
    searchInput.addEventListener('input', (e) => {
        const text = e.target.value.toLowerCase();
        const results = document.getElementById('search-results');
        results.innerHTML = "";
        if(text.length < 1) { results.style.display = "none"; return; }
        Object.keys(chars).forEach(id => {
            if(chars[id].name.toLowerCase().startsWith(text)) {
                const div = document.createElement('div');
                div.className = "search-item"; div.innerText = chars[id].name;
                div.onclick = () => { searchInput.value = chars[id].name; selectedIdFromSearch = id; results.style.display = "none"; };
                results.appendChild(div);
            }
        });
        results.style.display = "block";
    });

    function login() {
        const pin = document.getElementById('login-pin').value;
        if (selectedIdFromSearch && chars[selectedIdFromSearch].pin.toString() === pin) {
            myId = selectedIdFromSearch; localStorage.setItem('selectedCharId', myId);
            db.ref(`characters/${myId}`).update({ status: "online", lastUpdate: Date.now() });
            location.reload();
        } else alert("Hibás PIN!");
    }

    function openCreator() { document.getElementById('modal-creator').style.display = 'flex'; updatePreview(); }
    function updatePreview() { const cls = document.getElementById('new-class').value; document.getElementById('preview-img').style.backgroundImage = `url('${HERO_IMAGES[cls]}')`; document.getElementById('preview-skill-name').innerText = CLASS_DATA[cls].skill; document.getElementById('preview-desc').innerText = CLASS_DATA[cls].desc; }
    function saveNewHero() {
        const name = document.getElementById('new-name').value, cls = document.getElementById('new-class').value, pin = document.getElementById('new-pin').value;
        if (!name || pin.length < 4) return alert("Név és 4 jegyű PIN kell!");
        const hpMap = { "Harcos": 120, "Mágus": 80, "Lovag": 150, "Íjász": 100, "Bérgyilkos": 90, "Nekromanta": 110 };
        db.ref('characters').push({ name, charClass: cls, pin, hp: hpMap[cls], maxHp: hpMap[cls], level: 1, xp: 0, gold: 50, status: "offline", lastUpdate: Date.now() });
        document.getElementById('modal-creator').style.display = 'none';
    }
    function logout() { db.ref(`characters/${myId}`).update({ status: "offline" }).then(() => { localStorage.removeItem('selectedCharId'); location.reload(); }); }
    function goToArena() { window.location.href = 'arena.html'; }
    function enterDM() { const pin = prompt("DM:"); if(pin === "4469") window.location.href = 'dm.html'; }
</script>
</body>
</html>

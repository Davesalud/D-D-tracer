<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&D Pro Campaign Manager</title>
    <style>
        :root { --gold: #ffd700; --bg: #0d1117; --card: #161b22; --accent: #58a6ff; --danger: #f85149; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: #c9d1d9; margin: 0; padding: 15px; }
        .container { max-width: 1000px; margin: auto; }
        
        /* Grid Elrendezés */
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        @media (max-width: 768px) { .dashboard { grid-template-columns: 1fr; } }

        .card { background: var(--card); border: 1px solid #30363d; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        h2 { color: var(--gold); border-bottom: 1px solid #30363d; padding-bottom: 10px; margin-top: 0; }

        /* Karakter Kártya Extrák */
        .char-grid { display: grid; grid-template-columns: 60px 1fr auto; gap: 10px; align-items: center; border-bottom: 1px solid #30363d; padding: 10px 0; }
        .lvl-badge { background: var(--accent); color: white; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; }
        
        .stat-bar-container { flex-grow: 1; margin: 5px 0; }
        .bar { height: 10px; background: #21262d; border-radius: 5px; overflow: hidden; margin-top: 4px; }
        .hp-fill { height: 100%; background: #238636; transition: width 0.4s ease; }
        .mp-fill { height: 100%; background: #1f6feb; transition: width 0.4s ease; }
        
        .controls { display: flex; gap: 5px; }
        button { cursor: pointer; border: none; border-radius: 6px; padding: 8px 12px; font-weight: bold; transition: 0.2s; }
        .btn-plus { background: #238636; color: white; }
        .btn-minus { background: #da3633; color: white; }
        .btn-action { background: #8957e5; color: white; width: 100%; margin-top: 10px; }
        
        .log-box { background: #010409; height: 400px; overflow-y: auto; padding: 10px; border-radius: 8px; font-family: 'Courier New', Courier, monospace; font-size: 0.9em; }
        .log-item { border-left: 3px solid var(--accent); padding-left: 8px; margin-bottom: 6px; color: #8b949e; }
        
        input, select { background: #0d1117; border: 1px solid #30363d; color: white; padding: 10px; border-radius: 6px; margin-bottom: 10px; width: 100%; box-sizing: border-box; }
        .flex-row { display: flex; gap: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div style="text-align: center; margin-bottom: 20px;">
        <h1 style="color: var(--gold); margin-bottom: 5px;">⚔️ LEGENDARY TRACKER PRO</h1>
        <span id="sync-status" style="font-size: 12px; opacity: 0.6;">Kapcsolódás...</span>
    </div>

    <div class="dashboard">
        <div>
            <div class="card">
                <h2>Új Kalandor / Szörny</h2>
                <input type="text" id="name" placeholder="Név...">
                <div class="flex-row">
                    <select id="type">
                        <option value="player">Hős (Megmarad)</option>
                        <option value="monster">Szörny (Harc végén törlődik)</option>
                    </select>
                    <select id="class">
                        <option value="Warior">Harcos</option>
                        <option value="Mage">Mágus</option>
                        <option value="Ranger">Vándor</option>
                    </select>
                </div>
                <button onclick="createCharacter()" class="btn-plus" style="width: 100%;">Létrehozás a Firebase-ben</button>
            </div>

            <div class="card">
                <h2>Csapat és Ellenfelek</h2>
                <div id="char-list"></div>
                <button onclick="clearMonsters()" class="btn-minus" style="width: 100%; margin-top: 15px;">💀 HARC VÉGE (Szörnyek ürítése)</button>
            </div>
        </div>

        <div>
            <div class="card">
                <h2>Közös Harci Napló</h2>
                <div id="log" class="log-box"></div>
                <button onclick="db.ref('logs').remove()" style="margin-top: 10px; background: transparent; color: gray; font-size: 11px;">Napló törlése</button>
            </div>

            <div class="card" style="text-align: center;">
                <h2>Sorsolás</h2>
                <div style="font-size: 48px; color: var(--gold); margin: 10px 0;" id="dice-res">20</div>
                <div class="flex-row">
                    <button onclick="roll(20)" style="flex:1">D20</button>
                    <button onclick="roll(6)" style="flex:1">D6</button>
                    <button onclick="roll(100)" style="flex:1">D100</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBg2WzLqxt0QRDkDiUKYrGRCw0Kg-gr1OU",
        authDomain: "dnd-tracker-4fe05.firebaseapp.com",
        projectId: "dnd-tracker-4fe05",
        databaseURL: "https://dnd-tracker-4fe05-default-rtdb.europe-west1.firebasedatabase.app",
        storageBucket: "dnd-tracker-4fe05.firebasestorage.app",
        messagingSenderId: "886037504950",
        appId: "1:886037504950:web:46e80b46f0e26e24429717"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Adat struktúra bővítése
    function createCharacter() {
        const name = document.getElementById('name').value;
        const type = document.getElementById('type').value;
        const cls = document.getElementById('class').value;
        if(!name) return;

        const baseStats = {
            "Warior": { hp: 100, mp: 20, skill: "Pajzsütés" },
            "Mage": { hp: 60, mp: 120, skill: "Tűzgolyó" },
            "Ranger": { hp: 80, mp: 50, skill: "Dupla lövés" }
        };

        db.ref('characters').push({
            name, type, class: cls,
            hp: baseStats[cls].hp, maxHp: baseStats[cls].hp,
            mp: baseStats[cls].mp, maxMp: baseStats[cls].mp,
            lvl: 1, skill: baseStats[cls].skill
        });
        
        logAction(`🛡️ ${name} csatlakozott mint ${cls}!`);
        document.getElementById('name').value = '';
    }

    // ÉLŐ SZINKRON
    db.ref('characters').on('value', snap => {
        const list = document.getElementById('char-list');
        list.innerHTML = '';
        snap.forEach(child => {
            const c = child.val();
            const id = child.key;
            list.innerHTML += `
                <div class="char-grid">
                    <div class="lvl-badge">Lvl ${c.lvl}</div>
                    <div class="stat-bar-container">
                        <strong style="color:${c.type === 'monster' ? '#f85149' : '#58a6ff'}">${c.name}</strong>
                        <div class="bar"><div class="hp-fill" style="width:${(c.hp/c.maxHp)*100}%"></div></div>
                        <div class="bar"><div class="mp-fill" style="width:${(c.mp/c.maxMp)*100}%"></div></div>
                    </div>
                    <div class="controls">
                        <button class="btn-minus" onclick="modStat('${id}', 'hp', -10)">-</button>
                        <button class="btn-plus" onclick="modStat('${id}', 'hp', 10)">+</button>
                    </div>
                    <button class="btn-action" onclick="useSkill('${id}')" ${c.mp < 10 ? 'disabled' : ''}>
                        ${c.skill} (-10 MP)
                    </button>
                </div>
            `;
        });
        document.getElementById('sync-status').innerText = "🟢 Online Szinkron Aktív";
    });

    function modStat(id, stat, val) {
        db.ref(`characters/${id}`).once('value', s => {
            let newVal = (s.val()[stat] || 0) + val;
            if(stat === 'hp') newVal = Math.min(Math.max(0, newVal), s.val().maxHp);
            db.ref(`characters/${id}`).update({ [stat]: newVal });
        });
    }

    function useSkill(id) {
        db.ref(`characters/${id}`).once('value', s => {
            if(s.val().mp >= 10) {
                db.ref(`characters/${id}`).update({ mp: s.val().mp - 10 });
                logAction(`✨ ${s.val().name} használta: ${s.val().skill}!`);
            }
        });
    }

    function clearMonsters() {
        db.ref('characters').once('value', snap => {
            snap.forEach(c => {
                if(c.val().type === 'monster') db.ref(`characters/${c.key}`).remove();
            });
        });
        logAction("💀 A harc véget ért, a szörnyek eltakarítva.");
    }

    function roll(s) {
        const r = Math.floor(Math.random() * s) + 1;
        document.getElementById('dice-res').innerText = r;
        logAction(`🎲 Dobás d${s}: [ ${r} ]`);
    }

    function logAction(msg) {
        const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        db.ref('logs').push(`[${time}] ${msg}`);
    }

    db.ref('logs').on('value', snap => {
        const box = document.getElementById('log');
        box.innerHTML = '';
        snap.forEach(l => {
            box.innerHTML = `<div class="log-item">${l.val()}</div>` + box.innerHTML;
        });
    });
</script>
</body>
</html>

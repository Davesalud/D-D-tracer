<style>
    /* ... korábbi stílusok ... */
    .xp-container { height: 10px; background: #111; border: 1px solid #333; margin-top: 5px; border-radius: 5px; overflow: hidden; }
    .xp-fill { height: 100%; background: linear-gradient(90deg, #004cff, #00d4ff); width: 0%; transition: 1s; }
    .gold-display { color: var(--gold); font-family: 'MedievalSharp'; font-size: 1.2em; margin-top: 10px; }
</style>

<div id="page-lobby" class="page">
    <div class="card">
        <div style="display:flex; justify-content: space-between; align-items: baseline;">
            <h1 id="lobby-name" style="font-family:'MedievalSharp'; color:var(--gold); margin:0;">-</h1>
            <span id="lobby-lvl" style="color: var(--gold); font-weight: bold;">LVL 1</span>
        </div>
        <p id="lobby-class-display" style="margin:5px 0; font-style:italic; color:#aaa; text-transform: uppercase; letter-spacing: 2px;">-</p>
        
        <div id="lobby-hero-img" class="lobby-hero-portrait"></div>
        
        <div class="bar-container">
            <div class="bar-fill" id="lobby-hp-fill"></div>
            <div class="bar-label" id="lobby-hp-text">0/0 HP</div>
        </div>

        <div class="xp-container">
            <div id="lobby-xp-fill" class="xp-fill"></div>
        </div>
        <div id="xp-text" style="font-size: 10px; color: #888; text-align: right;">0 / 250 XP</div>

        <div class="gold-display">💰 <span id="lobby-gold">0</span> Arany</div>
        
        </div>
</div>

<script>
    // ... korábbi firebase és alapok ...

    // HP REGENERÁCIÓ IDŐZÍTŐ (1 percenként +10 HP)
    setInterval(() => {
        if (myId && chars[myId]) {
            const c = chars[myId];
            if (c.hp < c.maxHp) {
                let nextHp = Math.min(c.maxHp, c.hp + 10);
                db.ref(`characters/${myId}`).update({ hp: nextHp });
                console.log("Regenerálódás: +10 HP");
            }
        }
    }, 60000); // 60.000 ms = 1 perc

    function updateLobbyUI() {
        const c = chars[myId];
        if (!c) return;

        // Alap adatok
        document.getElementById('lobby-name').innerText = c.name;
        document.getElementById('lobby-lvl').innerText = `LVL ${c.level || 1}`;
        document.getElementById('lobby-gold').innerText = c.gold || 0;
        document.getElementById('lobby-class-display').innerText = c.charClass;
        
        // HP Csík
        document.getElementById('lobby-hp-fill').style.width = (c.hp / c.maxHp * 100) + "%";
        document.getElementById('lobby-hp-text').innerText = `${Math.ceil(c.hp)} / ${c.maxHp} HP`;

        // XP Kiszámítása a csíkhoz
        let lvl = c.level || 1;
        let currentXp = c.xp || 0;
        let nextReq = 0;
        let prevReq = 0;

        if(lvl == 1) { nextReq = 250; prevReq = 0; }
        else if(lvl == 2) { nextReq = 750; prevReq = 250; }
        else if(lvl < 10) { nextReq = 750 + ((lvl-2)*500); prevReq = 750 + ((lvl-3)*500); }
        else if(lvl < 20) { nextReq = 4750 + ((lvl-9)*750); prevReq = 4750 + ((lvl-10)*750); }
        else { nextReq = 12250 + ((lvl-19)*1000); prevReq = 12250 + ((lvl-20)*1000); }

        let prog = ((currentXp - prevReq) / (nextReq - prevReq)) * 100;
        document.getElementById('lobby-xp-fill').style.width = Math.min(100, prog) + "%";
        document.getElementById('xp-text').innerText = `${currentXp} / ${nextReq} XP`;

        // ... többi rész (kép, inventory) változatlan ...
    }

    // Új hős mentésekor alapértékek beállítása
    function saveNewHero() {
        const name = document.getElementById('new-name').value;
        const cls = document.getElementById('new-class').value;
        const pin = document.getElementById('new-pin').value;
        if(!name || !pin) return;
        const hpMap = { "Harcos":100, "Mágus":70, "Lovag":130, "Íjász":90, "Bérgyilkos":80, "Nekromanta":110 };
        
        db.ref('characters').push({ 
            name, charClass: cls, pin, 
            hp: hpMap[cls], maxHp: hpMap[cls], 
            level: 1, xp: 0, gold: 50, // Kezdő csomag
            status: "offline" 
        });
        document.getElementById('modal-creator').style.display = 'none';
    }
</script>

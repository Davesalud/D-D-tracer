<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Death's Armada - Updated Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,600;1,700&family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #c5a059; 
            --bg: #0a0a0c; 
            --card: rgba(18, 18, 20, 0.92); 
            --accent: #8b0000; 
            --text: #d1d1d1; 
            --win: #44ff44; 
        }

        * { 
            box-sizing: border-box; 
            -webkit-user-select: none;
            user-select: none;
        }

        input, select {
            user-select: text !important;
        }

        body { 
            font-family: 'Crimson Text', serif; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; 
            overflow-x: hidden; 
        }

        .page { display: none; min-height: 100vh; padding: 20px; flex-direction: column; align-items: center; }
        .page.active { display: flex; }

        /* --- LOGIN BACKGROUND --- */
        #page-login { 
            justify-content: center;
            background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.8)), 
                              url('https://i.pinimg.com/originals/26/2b/dd/262bdd02564bf6dabbe89df4f93e8e26.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .card { 
            background: var(--card); 
            border: 1px solid var(--gold); 
            padding: 30px; 
            border-radius: 8px; 
            width: 360px; 
            text-align: center; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.9); 
            backdrop-filter: blur(10px);
        }

        .logo { 
            font-family: 'MedievalSharp'; 
            font-size: 3.5em; 
            color: var(--accent); 
            text-shadow: 0 0 20px rgba(139,0,0,0.8), 2px 2px 4px black; 
            margin-bottom: 10px; 
        }
        
        input, select { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 10px; 
            background: rgba(26, 26, 30, 0.8); 
            border: 1px solid #444; 
            color: white; 
            font-family: 'MedievalSharp'; 
        }

        /* --- LOBBY --- */
        .hero-header { width: 100%; max-width: 800px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
        .lobby-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; max-width: 800px; }
        
        .nav-btn { background: rgba(26, 26, 30, 0.9); border: 1px solid #333; padding: 25px; cursor: pointer; transition: 0.3s; text-align: center; border-radius: 4px; }
        .nav-btn:hover { border-color: var(--gold); transform: translateY(-3px); background: #1a1a1e; }

        .bar-bg { height: 22px; background: #000; border: 1px solid #333; margin: 10px 0; position: relative; border-radius: 3px; overflow: hidden; }
        .bar-fill { height: 100%; transition: 0.8s ease-out; background: linear-gradient(90deg, #8b0000, #ff4444); }
        .bar-text { position: absolute; width: 100%; text-align: center; line-height: 20px; font-size: 12px; font-weight: bold; color: white; text-shadow: 1px 1px 2px black; z-index: 5; }

        /* --- BATTLE & QUEUE --- */
        .arena-grid { display: grid; grid-template-columns: 1fr 80px 1fr; gap: 20px; width: 100%; max-width: 1000px; margin-top: 20px; }
        .p-card { background: var(--card); border: 2px solid #2a2a2e; padding: 20px; border-radius: 12px; position: relative; }
        .p-card.active-turn { border-color: var(--gold); box-shadow: 0 0 20px rgba(197, 160, 89, 0.3); }

        .battle-log { background: rgba(5, 5, 5, 0.9); border: 1px solid #2a2a2e; height: 160px; overflow-y: auto; padding: 15px; font-size: 14px; color: #888; width: 100%; max-width: 1000px; margin-top: 20px; }

        button { font-family: 'MedievalSharp'; cursor: pointer; border: none; transition: 0.2s; border-radius: 4px; }
        .btn-atk { background: var(--accent); color: white; padding: 12px; width: 100%; }
        .btn-cancel { background: #333; color: #ccc; padding: 10px 20px; margin-top: 20px; border: 1px solid #555; }
        .btn-cancel:hover { background: #444; color: white; }
        
        .modal-overlay { position: fixed; top:0; left:0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; display: none; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="page-login" class="page active">
    <div class="card">
        <div class="logo">Death's Armada</div>
        <select id="login-select"></select>
        <input type="password" id="login-pin" placeholder="PIN kód" maxlength="4">
        <button class="btn-atk" onclick="login()" style="font-size: 1.2em;">BELÉPÉS</button>
        
        <div style="display: flex; justify-content: space-between; margin-top: 20px; padding-top: 15px; border-top: 1px solid #333;">
            <button onclick="openCreator()" style="background:none; color:var(--gold); font-size: 12px; border:1px solid var(--gold); padding:8px; width:48%;">✨ ÚJ HŐS TEREMTÉSE</button>
            <button onclick="dmDashboard()" style="background:none; color:gray; font-size: 12px; width:48%;">🛡️ DM PANEL</button>
        </div>
    </div>
</div>

<div id="page-lobby" class="page">
    <div class="hero-header">
        <h1 id="lobby-name" style="font-family:'MedievalSharp'; color:var(--gold); margin:0;">-</h1>
        <button onclick="location.reload()" style="background:none; color:gray; border:none;">Kijelentkezés</button>
    </div>
    
    <div class="lobby-grid">
        <div class="p-card">
            <h3>Állapot</h3>
            <div class="bar-bg"><div class="bar-fill" id="lobby-hp-fill"></div><div class="bar-text" id="lobby-hp-text">0/0 HP</div></div>
            <p>Kaszt: <span id="lobby-class" style="color:var(--gold)">-</span></p>
            <p>Győzelmek: <span id="lobby-wins" style="color:var(--win)">0</span></p>
        </div>
        <div class="p-card"><h3>Táska</h3><div style="font-size:0.9em; color:#666;">Üres...</div></div>
        <div class="nav-btn" onclick="startCampaign()"><h2>📜 KAMPÁNY</h2></div>
        <div class="nav-btn" onclick="enterArenaQueue()"><h2>⚔️ ARÉNA</h2></div>
    </div>
</div>

<div id="page-arena" class="page">
    <h2 id="arena-status" style="font-family:'MedievalSharp'; color:var(--accent);">ELLENFÉL KERESÉSE...</h2>
    
    <div id="queue-box" style="text-align:center;">
        <p>Kérlek várj, amíg valaki csatlakozik...</p>
        <button class="btn-cancel" onclick="cancelSearch()">MÉGSE / VISSZALÉPÉS</button>
    </div>

    <div class="arena-grid" id="arena-ui" style="display:none;">
        <div class="p-card" id="card-p1">
            <h3 id="name-p1">-</h3>
            <div class="bar-bg"><div class="bar-fill" id="hp-p1-fill"></div><div class="bar-text" id="hp-p1-text">0/0</div></div>
            <button class="btn-atk" onclick="arenaAttack()">TÁMADÁS</button>
        </div>
        <div style="display:flex; align-items:center; justify-content:center; font-family:'MedievalSharp'; font-size:2em; color:var(--gold);">VS</div>
        <div class="p-card" id="card-p2">
            <h3 id="name-p2">-</h3>
            <div class="bar-bg"><div class="bar-fill" id="hp-p2-fill"></div><div class="bar-text" id="hp-p2-text">0/0</div></div>
        </div>
    </div>
    <div class="battle-log" id="battle-log"></div>
</div>

<div id="modal-creator" class="modal-overlay">
    <div class="card" style="border-color: var(--accent);">
        <h2 style="font-family:'MedievalSharp'; color:var(--accent);">Új hős megidézése</h2>
        <input type="text" id="new-name" placeholder="Hős neve...">
        <select id="new-class">
            <option value="Harcos">Harcos (100 HP)</option>
            <option value="Mágus">Mágus (60 HP)</option>
            <option value="Lovag">Lovag (120 HP)</option>
        </select>
        <input type="password" id="new-pin" placeholder="PIN kód (4 jegyű)" maxlength="4">
        <button class="btn-atk" onclick="saveNewHero()">LÉTREHOZÁS</button>
        <button onclick="closeModal('modal-creator')" style="background:none; color:gray; border:none; margin-top:10px;">Mégse</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBg2WzLqxt0QRDkDiUKYrGRCw0Kg-gr1OU",
        authDomain: "dnd-tracker-4fe05.firebaseapp.com",
        projectId: "dnd-tracker-4fe05",
        databaseURL: "https://dnd-tracker-4fe05-default-rtdb.europe-west1.firebasedatabase.app",
        storageBucket: "dnd-tracker-4fe05.firebasestorage.app",
        messagingSenderId: "886037504950",
        appId: "1:886037504950:web:46e80b46f0e26e24429717"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let chars = {};
    let myId = null;
    let activeRoom = null;

    db.ref('characters').on('value', snap => {
        chars = snap.val() || {};
        const sel = document.getElementById('login-select');
        const val = sel.value;
        sel.innerHTML = '<option value="">Ki vagy?</option>';
        Object.keys(chars).forEach(id => sel.innerHTML += `<option value="${id}">${chars[id].name}</option>`);
        sel.value = val;
        if(myId) updateLobbyUI();
    });

    function switchPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function login() {
        const id = document.getElementById('login-select').value;
        const pin = document.getElementById('login-pin').value;
        if(id && chars[id].pin.toString() === pin) { myId = id; switchPage('page-lobby'); }
        else alert("Rossz PIN!");
    }

    // --- KARAKTERALKOTÁS (MINDENKINEK) ---
    function openCreator() { document.getElementById('modal-creator').style.display='flex'; }
    function closeModal(id) { document.getElementById(id).style.display='none'; }

    function saveNewHero() {
        const name = document.getElementById('new-name').value;
        const cls = document.getElementById('new-class').value;
        const pin = document.getElementById('new-pin').value;
        if(!name || !pin) return alert("Tölts ki mindent!");
        let hp = cls === "Lovag" ? 120 : (cls === "Mágus" ? 60 : 100);
        db.ref('characters').push({ name, charClass: cls, pin, hp, maxHp: hp, wins: 0 });
        closeModal('modal-creator');
    }

    function updateLobbyUI() {
        const c = chars[myId];
        document.getElementById('lobby-name').innerText = c.name;
        document.getElementById('lobby-class').innerText = c.charClass;
        document.getElementById('lobby-wins').innerText = c.wins || 0;
        document.getElementById('lobby-hp-fill').style.width = (c.hp/c.maxHp)*100 + "%";
        document.getElementById('lobby-hp-text').innerText = `${c.hp}/${c.maxHp} HP`;
    }

    // --- ARENA SEARCH & CANCEL ---
    function enterArenaQueue() {
        switchPage('page-arena');
        document.getElementById('queue-box').style.display = 'block';
        document.getElementById('arena-ui').style.display = 'none';
        db.ref('arena_queue').child(myId).set({ name: chars[myId].name, time: Date.now() });
        
        db.ref('arena_queue').on('value', snap => {
            const keys = Object.keys(snap.val() || {});
            if(keys.length >= 2) {
                const p1 = keys[0], p2 = keys[1];
                if(myId === p1 || myId === p2) {
                    activeRoom = `room_${p1}_vs_${p2}`;
                    db.ref('arena_queue').remove();
                    db.ref('rooms/'+activeRoom).set({ p1, p2, turn: p1, log: ["Harc!"], active: true });
                    db.ref('rooms/'+activeRoom).on('value', rSnap => { if(rSnap.val()) renderArena(rSnap.val()); });
                }
            }
        });
    }

    function cancelSearch() {
        db.ref('arena_queue').child(myId).remove(); // Törlés a várólistáról
        switchPage('page-lobby'); // Vissza a profilhoz
    }

    function renderArena(room) {
        document.getElementById('queue-box').style.display = 'none';
        document.getElementById('arena-ui').style.display = 'grid';
        const enemyId = myId === room.p1 ? room.p2 : room.p1;
        const me = chars[myId], enemy = chars[enemyId];

        document.getElementById('name-p1').innerText = me.name;
        document.getElementById('hp-p1-fill').style.width = (me.hp/me.maxHp)*100 + "%";
        document.getElementById('hp-p1-text').innerText = `${me.hp}/${me.maxHp}`;
        document.getElementById('name-p2').innerText = enemy.name;
        document.getElementById('hp-p2-fill').style.width = (enemy.hp/enemy.maxHp)*100 + "%";
        document.getElementById('hp-p2-text').innerText = `${enemy.hp}/${enemy.maxHp}`;
    }

    function arenaAttack() { /* ... meglévő harc logika ... */ }
    function dmDashboard() { if(prompt("DM Kód:") === "4469") alert("DM Panel."); }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Death's Armada - Final Fix</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,600;1,700&family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --bg: #050507; --card: rgba(15, 15, 18, 0.95); --accent: #8b0000; --text: #e0e0e0; }
        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; outline: none; }
        input, select { user-select: text !important; }
        body { font-family: 'Crimson Text', serif; background-color: var(--bg); color: var(--text); margin: 0; height: 100vh; overflow: hidden; }
        .master-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), url('https://i.pinimg.com/originals/26/2b/dd/262bdd02564bf6dabbe89df4f93e8e26.jpg'); background-size: cover; background-position: center; z-index: -1; }
        .page { display: none; height: 100vh; padding: 20px; flex-direction: column; align-items: center; overflow-y: auto; }
        .page.active { display: flex; }
        .card { background: var(--card); border: 1px solid var(--gold); padding: 20px; border-radius: 4px; width: 100%; max-width: 450px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.9); backdrop-filter: blur(15px); }
        .logo { font-family: 'MedievalSharp'; font-size: 3em; color: var(--accent); text-shadow: 0 0 15px rgba(139,0,0,0.7); margin-bottom: 15px; }
        .btn { font-family: 'MedievalSharp'; padding: 12px; cursor: pointer; border: 1px solid var(--gold); transition: 0.3s; text-transform: uppercase; display: block; width: 100%; margin-bottom: 5px; text-decoration: none; text-align: center; }
        .btn-main { background: var(--accent); color: white; border: none; font-size: 1.1em; }
        .btn-sub { background: none; color: var(--gold); font-size: 0.8em; }
        .bar-container { height: 26px; background: #000; border: 1px solid #333; position: relative; margin: 10px 0; border-radius: 3px; overflow: hidden; }
        .bar-fill { height: 100%; transition: width 0.5s ease; background: linear-gradient(90deg, #600, #b00); width: 100%; }
        .bar-label { position: absolute; width: 100%; text-align: center; line-height: 24px; font-size: 14px; color: white; font-weight: bold; z-index: 2; }
        .inv-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .inv-slot { background: rgba(0,0,0,0.6); border: 1px dashed var(--gold); padding: 5px; font-size: 0.7em; min-height: 60px; display: flex; flex-direction: column; justify-content: center; }
        .player-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: rgba(255,255,255,0.05); margin-bottom: 5px; border-radius: 4px; }
        .skill-box { margin-top: 15px; padding: 10px; border: 1px solid var(--accent); background: rgba(139, 0, 0, 0.1); border-radius: 4px; text-align: left; }
    </style>
</head>
<body>

<div class="master-bg"></div>

<div id="page-login" class="page active">
    <div class="card" style="margin-top: 10vh;">
        <div class="logo">Death's Armada</div>
        <select id="login-select" style="width:100%; padding:10px; margin-bottom:10px; background:#000; color:#fff; border:1px solid var(--gold);"></select>
        <input type="password" id="login-pin" placeholder="PIN KÓD" maxlength="4" style="width:100%; padding:10px; margin-bottom:10px; background:#000; color:#fff; border:1px solid var(--gold);">
        <button class="btn btn-main" onclick="login()">Belépés</button>
    </div>
</div>

<div id="page-lobby" class="page">
    <div class="card">
        <h1 id="lobby-name" style="font-family:'MedievalSharp'; color:var(--gold); margin:0; font-size: 2.2em;">Betöltés...</h1>
        <p id="lobby-class-display" style="margin:5px 0; font-style:italic; color:#aaa; font-size: 1.1em;">-</p>
        
        <div class="bar-container">
            <div class="bar-fill" id="lobby-hp-fill"></div>
            <div class="bar-label" id="lobby-hp-text">0/0 HP</div>
        </div>

        <div id="skill-container" class="skill-box">
            <b style="color:var(--gold); font-family:'MedievalSharp';">Speciális Képesség:</b><br>
            <span id="skill-name">-</span> <br>
            <small id="skill-desc" style="color:#bbb;">-</small>
        </div>

        <div style="margin-top: 20px; text-align: left;">
            <h3 style="font-family:'MedievalSharp'; color:var(--gold); border-bottom: 1px solid #333; margin:0;">Táska (Inventory)</h3>
            <div class="inv-grid">
                <div class="inv-slot"><i>Kéz</i><b id="val-weapon">-</b></div>
                <div class="inv-slot"><i>Test</i><b id="val-armor">-</b></div>
                <div class="inv-slot"><i>Láb</i><b id="val-extra">-</b></div>
            </div>
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:20px;">
            <button class="btn btn-main" style="background:#4a1a1a;">📜 KAMPÁNY</button>
            <a href="https://IDE-IRD-AZ-ARENA-LINKET.hu" class="btn btn-main" target="_blank">⚔️ ARÉNA</a>
        </div>

        <h3 style="font-family:'MedievalSharp'; color:var(--gold); margin-top:20px; text-align: left;">Kihívható Hősök</h3>
        <div id="online-players-list" style="max-height: 150px; overflow-y: auto;"></div>
        
        <button class="btn btn-sub" onclick="location.reload()">Kijelentkezés</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBg2WzLqxt0QRDkDiUKYrGRCw0Kg-gr1OU",
        authDomain: "dnd-tracker-4fe05.firebaseapp.com",
        projectId: "dnd-tracker-4fe05",
        databaseURL: "https://dnd-tracker-4fe05-default-rtdb.europe-west1.firebasedatabase.app",
        storageBucket: "dnd-tracker-4fe05.firebasestorage.app",
        messagingSenderId: "886037504950",
        appId: "1:886037504950:web:46e80b46f0e26e24429717"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const SKILLS = {
        "Harcos": { name: "Vérszomj", desc: "Sebzés: 25 HP | CD: 3 kör (Önsebzés: 5 HP)" },
        "Mágus": { name: "Tűzgolyó", desc: "Sebzés: 35 HP | CD: 5 kör" },
        "Lovag": { name: "Szent Pajzs", desc: "Védelem: 50% csökkentés | CD: 4 kör" },
        "Íjász": { name: "Dupla Lövés", desc: "Sebzés: 2x12 HP | CD: 3 kör" },
        "Bérgyilkos": { name: "Mérgezett Tőr", desc: "Sebzés: 10 + 3 körön át 5 HP | CD: 5 kör" },
        "Nekromanta": { name: "Életelszívás", desc: "Sebzés: 15 HP + 10 HP gyógyulás | CD: 4 kör" }
    };

    let chars = {};
    let myId = null;

    db.ref('characters').on('value', snap => {
        chars = snap.val() || {};
        const sel = document.getElementById('login-select');
        const cur = sel.value;
        sel.innerHTML = '<option value="" disabled selected>Válaszd ki a hősöd...</option>';
        Object.keys(chars).forEach(id => sel.innerHTML += `<option value="${id}">${chars[id].name}</option>`);
        sel.value = cur;
        if(myId) updateLobbyUI();
    });

    function login() {
        const id = document.getElementById('login-select').value;
        const pin = document.getElementById('login-pin').value;
        if (id && chars[id].pin.toString() === pin) { 
            myId = id; 
            document.getElementById('page-login').style.display = 'none';
            document.getElementById('page-lobby').style.display = 'flex';
            updateLobbyUI(); 
        } else alert("Hibás adatok!");
    }

    function updateLobbyUI() {
        const c = chars[myId];
        if(!c) return;

        // Név és Kaszt frissítése
        document.getElementById('lobby-name').innerText = c.name;
        document.getElementById('lobby-class-display').innerText = c.charClass;
        
        // HP Csík
        document.getElementById('lobby-hp-fill').style.width = (c.hp / c.maxHp * 100) + "%";
        document.getElementById('lobby-hp-text').innerText = c.hp + "/" + c.maxHp + " HP";

        // Képesség betöltése
        const skill = SKILLS[c.charClass] || { name: "Alap ütés", desc: "Nincs különleges képesség." };
        document.getElementById('skill-name').innerText = skill.name;
        document.getElementById('skill-desc').innerText = skill.desc;

        // Inventory
        const inv = c.inventory || { weapon: "-", armor: "-", extra: "-" };
        document.getElementById('val-weapon').innerText = inv.weapon;
        document.getElementById('val-armor').innerText = inv.armor;
        document.getElementById('val-extra').innerText = inv.extra;

        // Online lista
        const list = document.getElementById('online-players-list');
        list.innerHTML = "";
        Object.keys(chars).forEach(id => {
            if(id !== myId) {
                list.innerHTML += `<div class="player-item"><span>${chars[id].name}</span><span style="color:var(--gold); font-size:0.8em;">ONLINE</span></div>`;
            }
        });
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Death's Armada - Lobby</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,600;1,700&family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --bg: #050507; --card: rgba(15, 15, 18, 0.95); --accent: #8b0000; --text: #e0e0e0; }
        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; outline: none; }
        
        body { 
            font-family: 'Crimson Text', serif; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            overflow-x: hidden;
            overflow-y: auto; 
        }
        
        .master-bg { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), url('https://i.ibb.co/5XNkZKLq/fantasy-group-adventurers.jpg'); 
            background-size: cover; background-position: center; z-index: -1; 
        }

        .lobby-wrapper {
            position: relative;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            width: fit-content;
            margin: 60px auto;
        }

        /* Bal és jobb gompcsoport konténerek */
        .side-group {
            display: flex;
            flex-direction: row;
            gap: 8px;
            align-self: flex-end;
            z-index: 10;
        }

        .side-action-btn { 
            position: relative;
            bottom: auto;
            transform: none;
            width: 200px;
            height: 300px;
            border: 2px solid var(--gold); 
            border-radius: 8px;
            background-size: cover;
            background-position: center; 
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; 
            text-decoration: none;
            overflow: hidden;
            transition: 0.4s ease;
        }

        .side-action-btn span { 
            background: rgba(0, 0, 0, 0.85);
            color: var(--gold); 
            font-family: 'MedievalSharp';
            text-align: center;
            padding: 8px 4px; 
            width: 100%;
            text-transform: uppercase;
            border-top: 1px solid var(--gold); 
            font-size: 0.75em;
            letter-spacing: 1px;
        }

        #btn-side-kampany    { background-image: url('https://i.ibb.co/GfFbXvNH/Copilot-20260409-011839.png'); }
        #btn-side-teamkampany{ background-image: url('https://i.ibb.co/9khLvQKW/Copilot-20260409-012347.png'); }
        #btn-side-arena      { background-image: url('https://i.ibb.co/p66KV1Vb/Copilot-20260405-021201.png'); }
        #btn-side-ranklist   { background-image: url('https://i.ibb.co/8gD9gBxM/Copilot-20260409-005600.png'); }

        .side-action-btn:hover {
            box-shadow: 0 0 20px var(--gold);
            transform: scale(1.05);
            filter: brightness(1.2);
        }

        .card { 
            background: var(--card); border: 1px solid var(--gold); 
            padding: 25px; border-radius: 4px; width: 420px; 
            text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,1); 
            backdrop-filter: blur(15px); position: relative; z-index: 5;
        }
        
        .lobby-hero-portrait { width: 100%; aspect-ratio: 1/1; border: 2px solid var(--gold); margin: 15px 0; background-size: cover; background-position: center 20%; border-radius: 4px; }
        .bar-container { height: 20px; background: #000; border: 1px solid #333; position: relative; margin-top: 8px; border-radius: 3px; overflow: hidden; }
        .bar-fill { height: 100%; transition: width 0.5s ease; background: linear-gradient(90deg, #600, #b00); width: 0%; }
        .mana-fill { height: 100%; transition: width 0.5s ease; background: linear-gradient(90deg, #004cff, #00d4ff); width: 0%; }
        .hp-count-text { font-size: 13px; color: #ccc; margin-top: 2px; font-family: 'MedievalSharp'; }
        .xp-container { height: 6px; background: #111; border: 1px solid #333; margin-top: 8px; border-radius: 4px; }
        .xp-fill { height: 100%; background: var(--gold); width: 0%; transition: width 1s ease; }
        .nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
        .img-btn { display: flex; align-items: flex-end; justify-content: center; height: 80px; border: 1px solid var(--gold); border-radius: 4px; text-decoration: none; background-size: cover; background-position: center; overflow: hidden; }
        .img-btn span { width: 100%; background: rgba(0, 0, 0, 0.8); color: var(--gold); font-family: 'MedievalSharp'; text-align: center; padding: 4px 0; font-size: 0.8em; }
        .stat-bar-clone { background: rgba(0,0,0,0.8); border: 1px solid var(--gold); padding: 10px; border-radius: 5px; display: flex; justify-content: center; gap: 20px; margin-top: 15px; font-family: 'MedievalSharp'; color: var(--gold); }
        .online-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .status-container { background: rgba(0,0,0,0.6); border: 1px solid rgba(197, 160, 89, 0.2); padding: 8px; border-radius: 4px; }
        .status-header { font-family: 'MedievalSharp'; color: var(--gold); font-size: 0.7em; text-transform: uppercase; border-bottom: 1px solid rgba(197, 160, 89, 0.3); margin-bottom: 5px; }
        .scroll-area { max-height: 70px; overflow-y: auto; text-align: left; font-size: 0.8em; }
        .player-mini-card { background: rgba(255,255,255,0.03); padding: 3px 6px; margin-bottom: 3px; border-left: 2px solid var(--gold); }
        .logout-corner { position: fixed; top: 20px; right: 20px; z-index: 1000; }
        .btn-logout { background: rgba(139, 0, 0, 0.3); color: #ff4444; border: 1px solid #8b0000; padding: 8px 15px; font-family: 'MedievalSharp'; cursor: pointer; border-radius: 4px; }
        .dm-key-btn { position: fixed; bottom: 20px; right: 20px; width: 40px; height: 40px; background: rgba(0,0,0,0.8); border: 2px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1000; color: var(--gold); }

        #lvl-up-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .lvl-card { background: #111; border: 2px solid var(--gold); padding: 30px; border-radius: 8px; text-align: center; }
        .stat-option { background: rgba(255,255,255,0.05); border: 1px solid #444; color: #fff; padding: 12px; margin: 8px 0; border-radius: 4px; cursor: pointer; width: 100%; font-family: 'MedievalSharp'; }
        .stat-option:hover { background: var(--gold); color: #000; }

        .side-group-left  { margin-right: 8px; }
        .side-group-right { margin-left: 8px; }
            .lobby-wrapper { flex-direction: column; }
            .side-group { width: 95vw; justify-content: center; margin: 5px 0 !important; }
            .side-action-btn { width: 48%; height: 80px; flex-direction: row; align-items: center; }
            .side-action-btn span { border-top: none; border-left: 1px solid var(--gold); width: auto; height: 100%; display: flex; align-items: center; padding: 0 10px; font-size: 0.7em; }
            .card { width: 95vw; margin: 10px 0; }
        }
        /* CHAT */
        #chat-widget { position: fixed; bottom: 20px; right: 70px; width: 300px; z-index: 500; font-family: 'MedievalSharp'; }
        #chat-toggle { width: 100%; background: rgba(0,0,0,0.9); border: 1px solid var(--gold); color: var(--gold); padding: 8px 12px; cursor: pointer; text-align: left; font-family: 'MedievalSharp'; font-size: 0.85em; border-radius: 6px 6px 0 0; display: flex; justify-content: space-between; align-items: center; }
        #chat-body { background: rgba(5,5,7,0.97); border: 1px solid var(--gold); border-top: none; border-radius: 0 0 6px 6px; display: none; flex-direction: column; }
        #chat-body.open { display: flex; }
        #chat-messages { height: 220px; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 4px; }
        #chat-messages::-webkit-scrollbar { width: 3px; }
        #chat-messages::-webkit-scrollbar-thumb { background: var(--gold); }
        .chat-msg { font-size: 0.72em; color: #ccc; background: rgba(255,255,255,0.03); border-left: 2px solid var(--gold); padding: 3px 6px; border-radius: 2px; word-break: break-word; }
        .chat-msg .msg-name { color: var(--gold); font-weight: bold; }
        .chat-msg .msg-time { color: #555; font-size: 0.85em; margin-left: 5px; }
        #chat-input-row { display: flex; border-top: 1px solid #333; }
        #chat-input { flex: 1; background: rgba(0,0,0,0.8); border: none; color: #eee; padding: 8px; font-family: 'MedievalSharp'; font-size: 0.8em; outline: none; }
        #chat-send { background: var(--accent); color: white; border: none; border-left: 1px solid var(--gold); padding: 8px 12px; cursor: pointer; font-family: 'MedievalSharp'; font-size: 0.8em; }
        #chat-send:hover { background: #b00; }
    
</head>
<body>
<div class="master-bg"></div>

<div id="lvl-up-overlay">
    <div class="lvl-card">
        <h2>SZINTLÉPÉS!</h2>
        <p>Válassz bónuszt:</p>
        <button class="stat-option" onclick="chooseStat('def', 1)">🛡️ Páncél +1</button>
        <button class="stat-option" onclick="chooseStat('maxHp', 10)">❤️ Életerő +10</button>
        <button class="stat-option" onclick="chooseStat('atk', 1)">⚔️ Támadás +1</button>
    </div>
</div>

<div class="logout-corner"><button class="btn-logout" onclick="logout()">Kilépés</button></div>

<div class="lobby-wrapper">
    <!-- BAL OLDAL: Solo Kampány + Csapat Kampány -->
    <div class="side-group side-group-left">
        <a href="campaign.html" id="btn-side-kampany" class="side-action-btn"><span>📜 Solo Kampány</span></a>
        <a href="teamcampaign.html" id="btn-side-teamkampany" class="side-action-btn"><span>⚔️ Csapat Kampány</span></a>
    </div>

    <div class="card">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <h1 id="lobby-name" style="font-family:'MedievalSharp'; color:var(--gold); margin:0; font-size: 1.5em;">...</h1>
            <span id="lobby-lvl" style="color: var(--gold); font-family:'MedievalSharp'; border: 1px solid var(--gold); padding: 2px 8px;">LVL -</span>
        </div>
        <p id="lobby-class-display" style="margin:5px 0; font-style:italic; color:#aaa; font-size: 0.8em;">-</p>
        
        <div id="lobby-hero-img" class="lobby-hero-portrait"></div>
        
        <div class="bar-container"><div class="bar-fill" id="lobby-hp-fill"></div></div>
        <div class="hp-count-text" id="lobby-hp-val">0 / 0 HP</div>

        <div class="bar-container"><div class="mana-fill" id="lobby-mp-fill"></div></div>
        <div class="hp-count-text" id="lobby-mp-val">0 / 0 MP</div>
        
        <div class="xp-container"><div id="lobby-xp-fill" class="xp-fill"></div></div>
        <div id="xp-text" style="font-size: 10px; color: #888; text-align: right; margin-top: 2px;">XP: - / -</div>
        
        <div class="nav-grid">
            <a href="inventory.html" class="img-btn" style="background-image: url('https://i.ibb.co/F4FDF8gF/Copilot-20260405-001049.png');"><span>Felszerelés</span></a>
            <a href="shop.html" class="img-btn" style="background-image: url('https://i.ibb.co/0HSGQK0/Copilot-20260405-001515.png');"><span>Kereskedő</span></a>
        </div>

        <div class="stat-bar-clone">
            <div class="stat-item">💰 <b id="lobby-gold">0</b></div>
            <div class="stat-item">⚔️ <b id="lobby-atk">0</b></div>
            <div class="stat-item">🛡️ <b id="lobby-def">0</b></div>
        </div>
        
        <div class="online-grid">
            <div class="status-container">
                <div class="status-header">Hősök ●</div>
                <div id="list-online" class="scroll-area"></div>
            </div>
            <div class="status-container">
                <div class="status-header">Aréna ⚔️</div>
                <div id="list-arena" class="scroll-area"></div>
            </div>
        </div>
    </div>

    <!-- JOBB OLDAL: Aréna + Ranglista -->
    <div class="side-group side-group-right">
        <a href="javascript:void(0)" onclick="enterArena()" id="btn-side-arena" class="side-action-btn"><span>⚔️ Aréna</span></a>
        <a href="ranklist.html" id="btn-side-ranklist" class="side-action-btn"><span>🏆 Ranglista</span></a>
    </div>
</div>

<!-- CHAT WIDGET -->
<div id="chat-widget">
    <button id="chat-toggle" onclick="toggleChat()">
        💬 Birodalom csevegő
        <span id="chat-arrow">▲</span>
    </button>
    <div id="chat-body">
        <div id="chat-messages"></div>
        <div id="chat-input-row">
            <input id="chat-input" type="text" placeholder="Üzenet..." maxlength="120" onkeydown="if(event.key==='Enter') sendChat()">
            <button id="chat-send" onclick="sendChat()">KÜLD</button>
        </div>
    </div>
</div>

<div class="dm-key-btn" onclick="enterDM()">🔑</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="regen.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBg2WzLqxt0QRDkDiUKYrGRCw0Kg-gr1OU", authDomain: "dnd-tracker-4fe05.firebaseapp.com", projectId: "dnd-tracker-4fe05", databaseURL: "https://dnd-tracker-4fe05-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let chars = {}, myId = localStorage.getItem('selectedCharId');
    let isLeveling = false;

    if (!myId) { window.location.href = 'login.html'; }

    // Frissítéses szökés büntetés üzenete
    if (localStorage.getItem('fled_penalty') === '1') {
        localStorage.removeItem('fled_penalty');
        setTimeout(() => alert("⚠️ Megszöktel a csatából frissítéssel!\nBüntetés: -15 Arany levonva."), 500);
    }

    const HERO_IMAGES = { "Harcos": "https://i.ibb.co/20BXyqpy/Copilot-20260403-032810.png", "Mágus": "https://i.ibb.co/yFz5bcXv/Copilot-20260403-033651.png", "Lovag": "https://i.ibb.co/Fk3n339M/Copilot-20260403-034043.png", "Íjász": "https://i.ibb.co/whd2jNpB/Copilot-20260403-034402.png", "Bérgyilkos": "https://i.ibb.co/b525CsLg/Copilot-20260403-032807.png", "Nekromanta": "https://i.ibb.co/NnCwwCbR/Copilot-20260403-033301.png" };

    checkAndApplyRegen(myId);
    db.ref(`characters/${myId}/status`).once('value', s => {
        const currentStatus = s.val();
        if (currentStatus !== "fighting" && currentStatus !== "searching") {
            db.ref(`characters/${myId}`).update({ status: "online" });
        }
    });

    db.ref('characters').on('value', snap => { 
        chars = snap.val() || {}; 
        if (myId && chars[myId]) updateLobbyUI(); 
    });

    function enterArena() {
        db.ref(`characters/${myId}`).update({ status: "searching", lastUpdate: Date.now() }).then(() => {
            window.location.href = 'arena.html';
        });
    }

    function checkLevelUp(c) {
        if (Number(c.level || 1) >= 30 || isLeveling) return;
        if (Number(c.xp || 0) >= Number(c.nextLvlXp || 100)) {
            isLeveling = true;
            document.getElementById('lvl-up-overlay').style.display = 'flex';
        }
    }

    function chooseStat(statField, amount) {
        const c = chars[myId];
        const nextXp = Number(c.nextLvlXp || 100);
        let updates = { 
            level: Number(c.level || 1) + 1, 
            xp: Math.max(0, Number(c.xp || 0) - nextXp), 
            nextLvlXp: Math.floor(nextXp * 1.2) 
        };
        updates[statField] = Number(c[statField] || 0) + amount;
        if(statField === 'maxHp') updates.hp = updates.maxHp;

        db.ref(`characters/${myId}`).update(updates).then(() => {
            document.getElementById('lvl-up-overlay').style.display = 'none';
            isLeveling = false;
        });
    }

    function updateLobbyUI() {
        const c = chars[myId]; if(!c) return;
        checkLevelUp(c);
        const now = Date.now();
        
        document.getElementById('lobby-name').innerText = c.name;
        document.getElementById('lobby-lvl').innerText = `LVL ${c.level || 1}`;
        document.getElementById('lobby-gold').innerText = c.gold || 0;
        document.getElementById('lobby-atk').innerText = (Number(c.atk) || 0) + (Number(c.bonusAtk) || 0);
        document.getElementById('lobby-def').innerText = (Number(c.def) || 0) + (Number(c.bonusDef) || 0);
        document.getElementById('lobby-class-display').innerText = c.charClass;
        document.getElementById('lobby-hero-img').style.backgroundImage = `url('${HERO_IMAGES[c.charClass]}')`;
        
        const maxHp = Number(c.maxHp) || 100;
        const hpPercent = (Number(c.hp || 0) / maxHp) * 100;
        document.getElementById('lobby-hp-fill').style.width = Math.min(100, Math.max(0, hpPercent)) + "%";
        document.getElementById('lobby-hp-val').innerText = `${Math.ceil(c.hp || 0)} / ${maxHp} HP`;
        
        const maxMp = Number(c.maxMp) || 50; 
        const mpPercent = (Number(c.mp || 0) / maxMp) * 100;
        document.getElementById('lobby-mp-fill').style.width = Math.min(100, Math.max(0, mpPercent)) + "%";
        document.getElementById('lobby-mp-val').innerText = `${Math.ceil(c.mp || 0)} / ${maxMp} MP`;
        
        document.getElementById('lobby-xp-fill').style.width = (Number(c.xp)/Number(c.nextLvlXp)*100) + "%";
        document.getElementById('xp-text').innerText = `XP: ${c.xp} / ${c.nextLvlXp}`;
        
        const listOnline = document.getElementById('list-online');
        const listArena = document.getElementById('list-arena');
        listOnline.innerHTML = ""; listArena.innerHTML = "";
        Object.keys(chars).forEach(id => {
            const p = chars[id];
            if ((now - (p.lastUpdate || 0) < 300000) && p.name && id !== myId) {
                const item = `<div class="player-mini-card"><span>${p.name}</span></div>`;
                if (p.status === "searching" || p.status === "fighting") listArena.innerHTML += item;
                else if (p.status === "online") listOnline.innerHTML += item;
            }
        });
    }

    setInterval(() => {
        if (myId) checkAndApplyRegen(myId);
    }, 60000);

    // ---- CHAT ----
    let chatOpen = false;

    function toggleChat() {
        chatOpen = !chatOpen;
        document.getElementById('chat-body').classList.toggle('open', chatOpen);
        document.getElementById('chat-arrow').innerText = chatOpen ? '▼' : '▲';
        if (chatOpen) scrollChatDown();
    }

    function scrollChatDown() {
        const box = document.getElementById('chat-messages');
        box.scrollTop = box.scrollHeight;
    }

    function formatTime(ts) {
        const d = new Date(ts);
        return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
    }

    // Firebase chat figyelő — max 15 üzenet
    db.ref('chat').limitToLast(15).on('child_added', snap => {
        const msg = snap.val();
        if (!msg) return;
        const box = document.getElementById('chat-messages');
        const div = document.createElement('div');
        div.className = 'chat-msg';
        div.innerHTML = `<span class="msg-name">${msg.name}</span><span class="msg-time">${formatTime(msg.ts)}</span><br>${msg.text}`;
        box.appendChild(div);
        // Max 15 üzenet a DOM-ban
        while (box.children.length > 15) box.removeChild(box.firstChild);
        if (chatOpen) scrollChatDown();
    });

    function sendChat() {
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        if (!text || !myId || !chars[myId]) return;
        const name = chars[myId].name || "Ismeretlen";
        db.ref('chat').push({ name, text, ts: Date.now() });
        input.value = '';
    }

    function logout() { 
        db.ref(`characters/${myId}`).update({ status: "offline" }).then(() => { 
            localStorage.removeItem('selectedCharId'); 
            window.location.href = 'login.html'; 
        }); 
    }

    function enterDM() { if(prompt("DM PIN:") === "4469") window.location.href = 'dm.html'; }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Death's Armada - Ultimate UI</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,600;1,700&family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #c5a059; 
            --gold-bright: #f1d392;
            --bg: #050507; 
            --card: rgba(15, 15, 18, 0.85); 
            --accent: #8b0000; 
            --text: #e0e0e0; 
            --win: #44ff44; 
        }

        /* ALAPOK ÉS TILTÁSOK */
        * { 
            box-sizing: border-box; 
            -webkit-user-select: none;
            user-select: none;
            outline: none;
        }

        body { 
            font-family: 'Crimson Text', serif; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; 
            overflow: hidden; /* Nincs görgetés, app érzetet kelt */
            height: 100vh;
        }

        /* HÁTTÉRKÉP AZ EGÉSZ APP MÖGÉ */
        .master-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.7)), 
                              url('https://i.pinimg.com/originals/26/2b/dd/262bdd02564bf6dabbe89df4f93e8e26.jpg'); 
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        .page { 
            display: none; 
            height: 100vh; 
            padding: 40px 20px; 
            flex-direction: column; 
            align-items: center; 
            overflow-y: auto;
        }
        .page.active { display: flex; }

        /* KÁRTYA STÍLUS */
        .card { 
            background: var(--card); 
            border: 1px solid var(--gold); 
            padding: 30px; 
            border-radius: 4px; 
            width: 100%;
            max-width: 400px; 
            text-align: center; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.8); 
            backdrop-filter: blur(12px);
            border-image: linear-gradient(to bottom, var(--gold), #332a18) 1;
        }

        .logo { 
            font-family: 'MedievalSharp'; 
            font-size: 3.8em; 
            color: var(--accent); 
            text-shadow: 0 0 25px rgba(139,0,0,0.7), 2px 4px 4px black; 
            margin-bottom: 20px; 
            letter-spacing: 2px;
        }
        
        /* INPUTOK */
        input, select { 
            width: 100%; 
            padding: 14px; 
            margin-bottom: 15px; 
            background: rgba(0, 0, 0, 0.6); 
            border: 1px solid #444; 
            color: white; 
            font-family: 'MedievalSharp'; 
            font-size: 1.1em;
            transition: 0.3s;
            user-select: text !important;
        }
        input:focus { border-color: var(--gold); background: rgba(0,0,0,0.8); }

        /* GOMBOK - PRÉMIUM ÉRZET */
        .btn {
            font-family: 'MedievalSharp';
            padding: 15px 25px;
            cursor: pointer;
            border: 1px solid var(--gold);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }
        .btn-main { background: var(--accent); color: white; width: 100%; font-size: 1.2em; border: none; }
        .btn-main:hover { background: #b30000; box-shadow: 0 0 20px rgba(139,0,0,0.5); transform: translateY(-2px); }
        
        .btn-sub { background: none; color: var(--gold); font-size: 0.9em; margin-top: 10px; }
        .btn-sub:hover { color: var(--gold-bright); border-color: var(--gold-bright); background: rgba(197, 160, 89, 0.1); }

        /* LOBBY GRID */
        .lobby-container { width: 100%; max-width: 900px; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        
        .stat-box { background: rgba(0,0,0,0.5); padding: 20px; border-left: 3px solid var(--gold); text-align: left; }
        .stat-box h3 { margin: 0 0 10px 0; font-family: 'MedievalSharp'; color: var(--gold); font-size: 1.4em; }

        /* HP BAR */
        .bar-container { height: 26px; background: #111; border: 1px solid #444; position: relative; border-radius: 2px; overflow: hidden; margin: 10px 0; }
        .bar-fill { height: 100%; transition: width 1s ease-in-out; background: linear-gradient(90deg, #600, #b00); box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
        .bar-label { position: absolute; width: 100%; text-align: center; line-height: 24px; font-size: 13px; font-weight: bold; color: #fff; z-index: 2; text-shadow: 1px 1px 2px #000; }

        /* ARENA SPECIFIC */
        .queue-spinner { width: 50px; height: 50px; border: 3px solid rgba(197, 160, 89, 0.2); border-top: 3px solid var(--gold); border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .battle-view { width: 100%; max-width: 1000px; display: grid; grid-template-columns: 1fr 100px 1fr; align-items: center; gap: 30px; margin-top: 30px; }
    </style>
</head>
<body>

<div class="master-bg"></div>

<div id="page-login" class="page active">
    <div class="card" style="margin-top: 5vh;">
        <div class="logo">Death's Armada</div>
        <p style="color:var(--gold); font-style:italic; margin-bottom: 20px;">Válaszd ki hősödet a seregbe...</p>
        
        <select id="login-select"></select>
        <input type="password" id="login-pin" placeholder="PIN KÓD" maxlength="4">
        
        <button class="btn btn-main" onclick="login()">Belépés a Csarnokba</button>
        
        <div style="display: flex; gap: 10px; margin-top: 25px;">
            <button class="btn btn-sub" onclick="openCreator()" style="flex:1;">✨ Új Hős</button>
            <button class="btn btn-sub" onclick="dmDashboard()" style="flex:1;">🛡️ DM Panel</button>
        </div>
    </div>
</div>

<div id="page-lobby" class="page">
    <div style="width:100%; max-width:900px; display:flex; justify-content:space-between; align-items:flex-end; border-bottom: 1px solid rgba(197, 160, 89, 0.3); padding-bottom: 15px;">
        <div>
            <span style="color:var(--gold); font-family:'MedievalSharp';">Üdvözlünk,</span>
            <h1 id="lobby-name" style="margin:0; font-family:'MedievalSharp'; font-size:2.5em; color:#fff;">-</h1>
        </div>
        <button class="btn btn-sub" onclick="location.reload()" style="padding: 8px 15px;">Kijelentkezés</button>
    </div>

    <div class="lobby-container">
        <div class="card" style="max-width: none;">
            <div class="stat-box">
                <h3>Életerő & Rang</h3>
                <div class="bar-container">
                    <div class="bar-fill" id="lobby-hp-fill" style="width: 100%;"></div>
                    <div class="bar-label" id="lobby-hp-text">100 / 100 HP</div>
                </div>
                <div style="display:flex; justify-content:space-between; margin-top:15px;">
                    <span>Osztály: <b id="lobby-class" style="color:var(--gold);">-</b></span>
                    <span>Győzelmek: <b id="lobby-wins" style="color:var(--win);">0</b></span>
                </div>
            </div>
        </div>

        <div style="display:flex; flex-direction:column; gap:15px;">
            <button class="btn btn-main" onclick="startCampaign()" style="height:80px; font-size:1.4em; background: linear-gradient(45deg, #400, #800);">📜 Kampány Indítása</button>
            <button class="btn btn-main" onclick="enterArenaQueue()" style="height:80px; font-size:1.4em; background: linear-gradient(45deg, #640, #c5a059); color:black;">⚔️ Aréna Párbaj</button>
        </div>
    </div>
</div>

<div id="page-arena" class="page">
    <div class="card" id="arena-loader">
        <div class="logo" style="font-size:2.5em;">Aréna</div>
        <div class="queue-spinner"></div>
        <h2 id="arena-status" style="color:var(--gold); font-family:'MedievalSharp';">Ellenfel keresése...</h2>
        <p style="font-size:0.9em; opacity:0.7;">A sorsod hamarosan eldől.</p>
        <button class="btn btn-sub" onclick="cancelSearch()">Vissza a biztonságba</button>
    </div>

    <div class="battle-view" id="arena-ui" style="display:none;">
        </div>
</div>

<div id="modal-creator" class="modal-overlay">
    <div class="card" style="max-width: 350px;">
        <h2 style="font-family:'MedievalSharp'; color:var(--gold);">Új Hős Megidézése</h2>
        <input type="text" id="new-name" placeholder="Hős neve...">
        <select id="new-class">
            <option value="Harcos">Harcos (Szívós)</option>
            <option value="Mágus">Mágus (Pusztító)</option>
            <option value="Lovag">Lovag (Védelmező)</option>
        </select>
        <input type="password" id="new-pin" placeholder="PIN kód (4 szám)" maxlength="4">
        <button class="btn btn-main" onclick="saveNewHero()">Létrehozás</button>
        <button class="btn btn-sub" onclick="closeModal('modal-creator')">Mégse</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
    // A Firebase konfigurációd változatlan marad
    const firebaseConfig = {
        apiKey: "AIzaSyBg2WzLqxt0QRDkDiUKYrGRCw0Kg-gr1OU",
        authDomain: "dnd-tracker-4fe05.firebaseapp.com",
        projectId: "dnd-tracker-4fe05",
        databaseURL: "https://dnd-tracker-4fe05-default-rtdb.europe-west1.firebasedatabase.app",
        storageBucket: "dnd-tracker-4fe05.firebasestorage.app",
        messagingSenderId: "886037504950",
        appId: "1:886037504950:web:46e80b46f0e26e24429717"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let chars = {};
    let myId = null;

    // GLOBÁLIS ADATKEZELÉS
    db.ref('characters').on('value', snap => {
        chars = snap.val() || {};
        const sel = document.getElementById('login-select');
        const val = sel.value;
        sel.innerHTML = '<option value="" disabled selected>Válaszd ki a neved...</option>';
        Object.keys(chars).forEach(id => {
            sel.innerHTML += `<option value="${id}">${chars[id].name}</option>`;
        });
        sel.value = val;
        if(myId) updateLobbyUI();
    });

    function switchPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function login() {
        const id = document.getElementById('login-select').value;
        const pin = document.getElementById('login-pin').value;
        if(id && chars[id].pin.toString() === pin) {
            myId = id;
            switchPage('page-lobby');
        } else alert("A PIN kód vagy a név nem stimmel, vándor!");
    }

    function openCreator() { document.getElementById('modal-creator').style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    function saveNewHero() {
        const name = document.getElementById('new-name').value;
        const cls = document.getElementById('new-class').value;
        const pin = document.getElementById('new-pin').value;
        if(!name || !pin) return alert("Minden mezőt tölts ki!");
        
        let hp = (cls === "Lovag") ? 130 : (cls === "Mágus" ? 70 : 100);
        db.ref('characters').push({
            name, charClass: cls, pin, hp, maxHp: hp, wins: 0
        }).then(() => closeModal('modal-creator'));
    }

    function updateLobbyUI() {
        const c = chars[myId];
        document.getElementById('lobby-name').innerText = c.name;
        document.getElementById('lobby-class').innerText = c.charClass;
        document.getElementById('lobby-wins').innerText = c.wins || 0;
        document.getElementById('lobby-hp-fill').style.width = (c.hp / c.maxHp * 100) + "%";
        document.getElementById('lobby-hp-text').innerText = `${c.hp} / ${c.maxHp} HP`;
    }

    function enterArenaQueue() {
        switchPage('page-arena');
        db.ref('arena_queue').child(myId).set({ name: chars[myId].name, time: Date.now() });
        // Itt figyeli a párosítást (maradt a régi logika)
    }

    function cancelSearch() {
        db.ref('arena_queue').child(myId).remove();
        switchPage('page-lobby');
    }

    function dmDashboard() {
        if(prompt("Kalandmesteri kód:") === "4469") alert("Irányítópult aktív.");
    }
</script>
</body>
</html>

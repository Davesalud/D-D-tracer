<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Death's Armada - War of the Six</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,600;1,700&family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --bg: #050507; --card: rgba(15, 15, 18, 0.95); --accent: #8b0000; --text: #e0e0e0; }
        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; outline: none; }
        input, select { user-select: text !important; }
        body { font-family: 'Crimson Text', serif; background-color: var(--bg); color: var(--text); margin: 0; height: 100vh; overflow: hidden; }
        .master-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), url('https://i.pinimg.com/originals/26/2b/dd/262bdd02564bf6dabbe89df4f93e8e26.jpg'); background-size: cover; background-position: center; z-index: -1; }
        .page { display: none; height: 100vh; padding: 20px; flex-direction: column; align-items: center; overflow-y: auto; }
        .page.active { display: flex; }
        .card { background: var(--card); border: 1px solid var(--gold); padding: 20px; border-radius: 4px; width: 100%; max-width: 450px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.9); backdrop-filter: blur(15px); margin-bottom: 20px; }
        .logo { font-family: 'MedievalSharp'; font-size: 3em; color: var(--accent); text-shadow: 0 0 15px rgba(139,0,0,0.7); margin-bottom: 15px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; background: rgba(0,0,0,0.8); border: 1px solid #444; color: white; font-family: 'MedievalSharp'; }
        .btn { font-family: 'MedievalSharp'; padding: 12px; cursor: pointer; border: 1px solid var(--gold); transition: 0.3s; text-transform: uppercase; display: block; width: 100%; margin-bottom: 5px; }
        .btn-main { background: var(--accent); color: white; border: none; font-size: 1.1em; }
        .btn-sub { background: none; color: var(--gold); font-size: 0.8em; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(1); }
        .bar-container { height: 26px; background: #000; border: 1px solid #333; position: relative; margin: 10px 0; border-radius: 3px; overflow: hidden; }
        .bar-fill { height: 100%; transition: width 0.5s ease; background: linear-gradient(90deg, #600, #b00); }
        .bar-label { position: absolute; width: 100%; text-align: center; line-height: 24px; font-size: 14px; color: white; font-weight: bold; z-index: 2; text-shadow: 1px 1px 2px black; }
        .inv-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .inv-slot { background: rgba(0,0,0,0.6); border: 1px dashed var(--gold); padding: 5px; font-size: 0.7em; min-height: 60px; display: flex; flex-direction: column; justify-content: center; }
        .inv-slot b { color: var(--gold); display: block; font-size: 1.1em; }
        .player-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: rgba(255,255,255,0.05); margin-bottom: 8px; border-radius: 4px; border-left: 3px solid var(--gold); }
    </style>
</head>
<body>

<div class="master-bg"></div>

<div id="page-login" class="page active">
    <div class="card" style="margin-top: 10vh;">
        <div class="logo">Death's Armada</div>
        <select id="login-select"></select>
        <input type="password" id="login-pin" placeholder="PIN VAGY DM KÓD" maxlength="4">
        <button class="btn btn-main" onclick="login()">Belépés a Seregbe</button>
        <button class="btn btn-sub" onclick="document.getElementById('modal-creator').style.display='flex'">✨ Új Hős Megidézése</button>
    </div>
</div>

<div id="page-lobby" class="page">
    <div class="card">
        <h1 id="lobby-name" style="font-family:'MedievalSharp'; color:var(--gold); margin:0;">...</h1>
        <p id="lobby-class-display" style="margin:5px 0; font-style:italic; color:#aaa;">-</p>
        <div class="bar-container"><div class="bar-fill" id="lobby-hp-fill"></div><div class="bar-label" id="lobby-hp-text">0/0 HP</div></div>
        
        <div style="margin-top: 20px; text-align: left;">
            <h3 style="font-family:'MedievalSharp'; color:var(--gold); border-bottom: 1px solid #333;">Táska (Inventory)</h3>
            <div class="inv-grid">
                <div class="inv-slot"><i>Kéz</i><b id="val-weapon">-</b></div>
                <div class="inv-slot"><i>Test</i><b id="val-armor">-</b></div>
                <div class="inv-slot"><i>Láb</i><b id="val-extra">-</b></div>
            </div>
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:20px;">
            <button class="btn btn-main" style="background:#4a1a1a;">📜 KAMPÁNY</button>
            <button class="btn btn-main" onclick="alert('Válassz ellenfelet alább!')">⚔️ ARÉNA</button>
        </div>

        <h3 style="font-family:'MedievalSharp'; color:var(--gold); margin-top:20px; text-align: left;">Kihívható Hősök</h3>
        <div id="online-players-list" style="max-height: 200px; overflow-y: auto;"></div>
        <button class="btn btn-sub" onclick="location.reload()">Kijelentkezés</button>
    </div>
</div>

<div id="page-dm" class="page">
    <div style="width:100%; max-width:900px;">
        <h1 style="font-family:'MedievalSharp'; color:var(--accent); text-align:center;">DM IRÁNYÍTÓPULT</h1>
        <div id="dm-player-list" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap:15px;"></div>
        <button class="btn btn-sub" onclick="location.reload()">Kilépés</button>
    </div>
</div>

<div id="page-arena" class="page">
    <div class="card">
        <h2 style="font-family:'MedievalSharp'; color:var(--accent);">PÁRBAJ</h2>
        <div id="arena-ui">
            </div>
        <div id="battle-log" style="background:black; padding:10px; height:100px; overflow-y:auto; font-size:0.8em; text-align:left; border:1px solid #333; margin-top:10px;"></div>
    </div>
</div>

<div id="modal-creator" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; align-items:center; justify-content:center; z-index:100;">
    <div class="card">
        <h2 style="font-family:'MedievalSharp'; color:var(--gold);">Új Hős Megidézése</h2>
        <input type="text" id="new-name" placeholder="Hős neve...">
        <select id="new-class">
            <option value="Harcos">Harcos (100 HP)</option>
            <option value="Mágus">Mágus (70 HP)</option>
            <option value="Lovag">Lovag (130 HP)</option>
            <option value="Íjász">Íjász (90 HP)</option>
            <option value="Bérgyilkos">Bérgyilkos (80 HP)</option>
            <option value="Nekromanta">Nekromanta (110 HP)</option>
        </select>
        <input type="password" id="new-pin" placeholder="PIN kód (4 szám)" maxlength="4">
        <button class="btn btn-main" onclick="saveNewHero()">Létrehozás</button>
        <button class="btn btn-sub" onclick="document.getElementById('modal-creator').style.display='none'">Mégse</button>
    </div>
</div>

<div id="modal-challenge" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; align-items:center; justify-content:center; z-index:1000;">
    <div class="card" style="border: 2px solid var(--accent);">
        <h2 style="font-family:'MedievalSharp'; color:var(--accent);">PÁRBAJRA HÍVTAK!</h2>
        <p id="challenge-text" style="font-size:1.2em;">-</p>
        <button class="btn btn-main" onclick="acceptChallenge()" style="background:green; margin-bottom:10px;">ELFOGADOM</button>
        <button class="btn btn-sub" onclick="declineChallenge()">ELUTASÍTOM</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBg2WzLqxt0QRDkDiUKYrGRCw0Kg-gr1OU",
        authDomain: "dnd-tracker-4fe05.firebaseapp.com",
        projectId: "dnd-tracker-4fe05",
        databaseURL: "https://dnd-tracker-4fe05-default-rtdb.europe-west1.firebasedatabase.app",
        storageBucket: "dnd-tracker-4fe05.firebasestorage.app",
        messagingSenderId: "886037504950",
        appId: "1:886037504950:web:46e80b46f0e26e24429717"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let chars = {};
    let myId = null;
    let cooldowns = { special: 0 };

    const CLASS_DATA = {
        "Harcos": { hp: 100, spec: "Vérszomj", cd: 3 },
        "Mágus": { hp: 70, spec: "Tűzgolyó", cd: 5 },
        "Lovag": { hp: 130, spec: "Szent Pajzs", cd: 4 },
        "Íjász": { hp: 90, spec: "Dupla Lövés", cd: 3 },
        "Bérgyilkos": { hp: 80, spec: "Mérgezett Tőr", cd: 5 },
        "Nekromanta": { hp: 110, spec: "Életelszívás", cd: 4 }
    };

    db.ref('characters').on('value', snap => {
        chars = snap.val() || {};
        updateLoginList();
        if(myId) updateLobbyUI();
    });

    function updateLoginList() {
        const sel = document.getElementById('login-select');
        const cur = sel.value;
        sel.innerHTML = '<option value="" disabled selected>Válaszd ki a hősöd...</option>';
        Object.keys(chars).forEach(id => sel.innerHTML += `<option value="${id}">${chars[id].name}</option>`);
        sel.value = cur;
    }

    function switchPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function login() {
        const id = document.getElementById('login-select').value;
        const pin = document.getElementById('login-pin').value;
        if (pin === "4469") { switchPage('page-dm'); loadDMData(); return; }
        if (id && chars[id].pin.toString() === pin) { 
            myId = id; 
            switchPage('page-lobby'); 
            initPVPListeners(); 
        } else alert("Rossz PIN!");
    }

    function saveNewHero() {
        const name = document.getElementById('new-name').value;
        const cls = document.getElementById('new-class').value;
        const pin = document.getElementById('new-pin').value;
        if(!name || !pin) return alert("Tölts ki mindent!");
        const hp = CLASS_DATA[cls].hp;
        db.ref('characters').push({ 
            name, charClass: cls, pin, hp, maxHp: hp, wins: 0,
            inventory: { weapon: "Pusztakéz", armor: "Rongyok", extra: "Mezítláb" }
        });
        document.getElementById('modal-creator').style.display='none';
    }

    function updateLobbyUI() {
        const c = chars[myId];
        if(!c) return;
        document.getElementById('lobby-name').innerText = c.name;
        document.getElementById('lobby-class-display').innerText = c.charClass;
        document.getElementById('lobby-hp-fill').style.width = (c.hp/c.maxHp)*100 + "%";
        document.getElementById('lobby-hp-text').innerText = `${c.hp}/${c.maxHp} HP`;
        const inv = c.inventory || {};
        document.getElementById('val-weapon').innerText = inv.weapon || "Üres";
        document.getElementById('val-armor').innerText = inv.armor || "Üres";
        document.getElementById('val-extra').innerText = inv.extra || "Üres";
    }

    function initPVPListeners() {
        db.ref('characters').on('value', snap => {
            const list = document.getElementById('online-players-list');
            list.innerHTML = "";
            Object.keys(chars).forEach(id => {
                if(id !== myId) {
                    list.innerHTML += `<div class="player-item"><span>${chars[id].name}</span><button class="btn" style="width:auto; padding:5px 15px;" onclick="sendChallenge('${id}')">⚔️</button></div>`;
                }
            });
        });
        db.ref('challenges/' + myId).on('value', snap => {
            const chal = snap.val();
            if(chal && chal.status === 'pending') {
                document.getElementById('challenge-text').innerText = chal.fromName + " párbajra hívott!";
                document.getElementById('modal-challenge').style.display = 'flex';
            }
        });
    }

    function sendChallenge(tid) {
        db.ref('challenges/' + tid).set({ fromId: myId, fromName: chars[myId].name, status: 'pending' });
        alert("Kihívás elküldve!");
    }

    function acceptChallenge() {
        db.ref('challenges/' + myId).update({ status: 'accepted' });
        document.getElementById('modal-challenge').style.display = 'none';
        switchPage('page-arena');
    }

    function declineChallenge() {
        db.ref('challenges/' + myId).remove();
        document.getElementById('modal-challenge').style.display = 'none';
    }

    function loadDMData() {
        db.ref('characters').on('value', snap => {
            const cont = document.getElementById('dm-player-list');
            cont.innerHTML = "";
            Object.keys(chars).forEach(id => {
                const p = chars[id];
                cont.innerHTML += `<div class="card" style="max-width:none; text-align:left;">
                    <b>${p.name} (${p.charClass})</b>
                    <div class="bar-container"><div class="bar-fill" style="width:${(p.hp/p.maxHp)*100}%;"></div></div>
                    <div style="display:flex; gap:5px;">
                        <button class="btn" onclick="modHP('${id}', 10)">+10</button>
                        <button class="btn" onclick="modHP('${id}', -10)">-10</button>
                        <button class="btn" onclick="giveItem('${id}')">🎒</button>
                    </div>
                </div>`;
            });
        });
    }

    function modHP(id, amt) {
        let n = Math.max(0, Math.min(chars[id].maxHp, chars[id].hp + amt));
        db.ref('characters/'+id).update({ hp: n });
    }

    function giveItem(id) {
        const t = prompt("Hova? (weapon / armor / extra)");
        const n = prompt("Tárgy neve?");
        if(t && n) db.ref('characters/'+id+'/inventory/'+t).set(n);
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Death's Armada - Lobby</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,600;1,700&family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --bg: #050507; --card: rgba(15, 15, 18, 0.95); --accent: #8b0000; --text: #e0e0e0; }
        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; outline: none; }
        
        body { 
            font-family: 'Crimson Text', serif; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            overflow-x: hidden;
            overflow-y: auto; 
        }
        
        .master-bg { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), url('https://i.pinimg.com/originals/26/2b/dd/262bdd02564bf6dabbe89df4f93e8e26.jpg'); 
            background-size: cover; background-position: center; z-index: -1; 
        }
        
        .logout-corner { 
            position: fixed; 
            top: 20px; 
            right: 20px; 
            z-index: 1000; 
        }
        .btn-logout { 
            background: rgba(139, 0, 0, 0.3); 
            color: #ff4444; 
            border: 1px solid #8b0000; 
            padding: 8px 15px; 
            font-family: 'MedievalSharp'; 
            cursor: pointer; 
            border-radius: 4px; 
            font-size: 0.9em;
            text-transform: uppercase;
            transition: 0.3s;
            backdrop-filter: blur(5px);
        }
        .btn-logout:hover { background: #8b0000; color: white; box-shadow: 0 0 10px #8b0000; }

        .dm-key-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: rgba(0,0,0,0.8);
            border: 2px solid var(--gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            font-size: 24px;
        }
        .dm-key-btn:hover { transform: rotate(-15deg) scale(1.1); box-shadow: 0 0 20px var(--gold); }

        .side-action-btn { 
            position: fixed; top: 50%; transform: translateY(-50%); 
            width: 240px; height: 350px; border: 2px solid var(--gold); 
            border-radius: 8px; background-size: cover; background-position: center; 
            cursor: pointer; display: flex; flex-direction: column; justify-content: flex-end; 
            text-decoration: none; overflow: hidden; transition: 0.3s; 
            box-shadow: 0 0 25px rgba(0,0,0,0.9); z-index: 10; 
        }
        .side-action-btn span { 
            background: rgba(0, 0, 0, 0.85); color: var(--gold); 
            font-family: 'MedievalSharp'; text-align: center; padding: 15px 0; 
            width: 100%; text-transform: uppercase; border-top: 1px solid var(--gold); 
            font-size: 1.2em; letter-spacing: 2px; 
        }
        #btn-side-kampany { left: 2%; background-image: url('https://i.ibb.co/S4VL891M/Copilot-20260405-021905.png'); }
        #btn-side-arena { right: 2%; background-image: url('https://i.ibb.co/p66KV1Vb/Copilot-20260405-021201.png'); }

        .card { 
            background: var(--card); border: 1px solid var(--gold); 
            padding: 25px; border-radius: 4px; width: 95%; max-width: 480px; 
            text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,1); 
            backdrop-filter: blur(15px); margin: 60px 0; position: relative; z-index: 5;
        }
        
        .lobby-hero-portrait { 
            width: 100%; aspect-ratio: 1/1; max-height: 320px; 
            border: 2px solid var(--gold); margin: 15px 0; 
            background-size: cover; background-position: center 20%; 
            border-radius: 4px; box-shadow: inset 0 0 50px black; 
        }
        
        .bar-container { height: 24px; background: #000; border: 1px solid #333; position: relative; margin-top: 10px; border-radius: 3px; overflow: hidden; }
        .bar-fill { height: 100%; transition: width 0.5s ease; background: linear-gradient(90deg, #600, #b00); width: 0%; }
        .hp-count-text { font-size: 14px; color: #ccc; margin-top: 4px; font-weight: bold; font-family: 'MedievalSharp'; }
        
        .xp-container { height: 8px; background: #111; border: 1px solid #333; margin-top: 8px; border-radius: 4px; overflow: hidden; }
        .xp-fill { height: 100%; background: linear-gradient(90deg, #004cff, #00d4ff); width: 0%; transition: 1s; }

        .nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
        .img-btn { 
            display: flex; align-items: flex-end; justify-content: center; 
            height: 100px; border: 1px solid var(--gold); border-radius: 4px; 
            text-decoration: none; background-size: cover; background-position: center; 
            transition: 0.3s; overflow: hidden;
        }
        .btn-felszereles { background-image: url('https://i.ibb.co/F4FDF8gF/Copilot-20260405-001049.png'); }
        .btn-kereskedo { background-image: url('https://i.ibb.co/0HSGQK0/Copilot-20260405-001515.png'); }
        .img-btn span { width: 100%; background: rgba(0, 0, 0, 0.8); color: var(--gold); font-family: 'MedievalSharp'; text-align: center; padding: 6px 0; font-size: 0.85em; text-transform: uppercase; }

        .stat-row { display: flex; justify-content: center; gap: 10px; margin: 15px 0; flex-wrap: wrap; }
        .stat-box { background: rgba(0,0,0,0.8); border: 1px solid var(--gold); padding: 8px 12px; border-radius: 4px; color: var(--gold); font-family: 'MedievalSharp'; font-size: 1em; display: flex; align-items: center; gap: 6px; min-width: 90px; justify-content: center; }
        .gold-status-box { background: rgba(0,0,0,0.9); border: 2px solid var(--gold); padding: 8px 15px; border-radius: 6px; color: var(--gold); font-family: 'MedievalSharp'; font-size: 1.1em; display: flex; align-items: center; gap: 8px; }

        .online-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .status-container { background: rgba(0,0,0,0.6); border: 1px solid rgba(197, 160, 89, 0.2); padding: 10px; border-radius: 4px; min-height: 100px; }
        .status-header { font-family: 'MedievalSharp'; color: var(--gold); font-size: 0.75em; text-transform: uppercase; border-bottom: 1px solid rgba(197, 160, 89, 0.3); margin-bottom: 5px; padding-bottom: 3px; }
        .scroll-area { max-height: 80px; overflow-y: auto; }
        .player-mini-card { background: rgba(255,255,255,0.03); padding: 4px 6px; margin-bottom: 4px; border-left: 2px solid var(--gold); font-size: 0.8em; }

        @media (max-width: 1200px) {
            .side-action-btn { position: relative; top: 0; transform: none; width: 100%; max-width: 480px; height: 120px; margin: 10px 0; flex-direction: row; align-items: center; justify-content: space-between; }
            .side-action-btn span { width: auto; height: 100%; display: flex; align-items: center; padding: 0 30px; border-top: none; border-left: 2px solid var(--gold); background: linear-gradient(90deg, transparent, rgba(0,0,0,0.9)); }
            .logout-corner { top: 10px; right: 10px; }
        }
    </style>
</head>
<body>
<div class="master-bg"></div>

<div class="logout-corner"><button class="btn-logout" onclick="logout()">Kilépés</button></div>

<a href="campaign.html" id="btn-side-kampany" class="side-action-btn"><span>📜 KAMPÁNY</span></a>

<div class="card">
    <div style="display:flex; justify-content: space-between; align-items: center; margin-top: 10px;">
        <h1 id="lobby-name" style="font-family:'MedievalSharp'; color:var(--gold); margin:0; font-size: 1.6em;">...</h1>
        <span id="lobby-lvl" style="color: var(--gold); font-family:'MedievalSharp'; font-size: 1.1em; border: 1px solid var(--gold); padding: 2px 10px;">LVL -</span>
    </div>
    <p id="lobby-class-display" style="margin:5px 0; font-style:italic; color:#aaa; text-transform: uppercase; font-size: 0.9em;">-</p>
    
    <div id="lobby-hero-img" class="lobby-hero-portrait"></div>
    
    <div class="bar-container"><div class="bar-fill" id="lobby-hp-fill"></div></div>
    <div class="hp-count-text" id="lobby-hp-val">0 / 0 HP</div>
    
    <div class="xp-container"><div id="lobby-xp-fill" class="xp-fill"></div></div>
    <div id="xp-text" style="font-size: 11px; color: #888; text-align: right; margin-top: 4px;">XP: - / -</div>
    
    <div class="nav-grid">
        <a href="inventory.html" class="img-btn btn-felszereles"><span>Felszerelés</span></a>
        <a href="shop.html" class="img-btn btn-kereskedo"><span>Kereskedő</span></a>
    </div>

    <div class="stat-row">
        <div class="stat-box">⚔️ <span id="lobby-atk">0</span></div>
        <div class="stat-box">🛡️ <span id="lobby-def">0</span></div>
        <div class="gold-status-box">
            <img src="https://i.ibb.co/ksL53vBf/Copilot-20260405-044028.png" style="width:20px;" alt="Gold">
            <span id="lobby-gold">0</span>
        </div>
    </div>
    
    <div class="online-grid">
        <div class="status-container">
            <div class="status-header">Hősök ●</div>
            <div id="list-online" class="scroll-area"></div>
        </div>
        <div class="status-container">
            <div class="status-header">Aréna ⚔️</div>
            <div id="list-arena" class="scroll-area"></div>
        </div>
    </div>
</div>

<a href="arena.html" id="btn-side-arena" class="side-action-btn"><span>⚔️ ARÉNA</span></a>

<div class="dm-key-btn" onclick="enterDM()" title="DM belépés">🔑</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
    const firebaseConfig = { apiKey: "AIzaSyBg2WzLqxt0QRDkDiUKYrGRCw0Kg-gr1OU", authDomain: "dnd-tracker-4fe05.firebaseapp.com", projectId: "dnd-tracker-4fe05", databaseURL: "https://dnd-tracker-4fe05-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let chars = {}, myId = localStorage.getItem('selectedCharId');
    if (!myId) { window.location.href = 'login.html'; }

    db.ref(`characters/${myId}`).update({ status: "online", lastUpdate: Date.now() });

    const HERO_IMAGES = { "Harcos": "https://i.ibb.co/20BXyqpy/Copilot-20260403-032810.png", "Mágus": "https://i.ibb.co/yFz5bcXv/Copilot-20260403-033651.png", "Lovag": "https://i.ibb.co/Fk3n339M/Copilot-20260403-034043.png", "Íjász": "https://i.ibb.co/whd2jNpB/Copilot-20260403-034402.png", "Bérgyilkos": "https://i.ibb.co/b525CsLg/Copilot-20260403-032807.png", "Nekromanta": "https://i.ibb.co/NnCwwCbR/Copilot-20260403-033301.png" };

    db.ref('characters').on('value', snap => { 
        chars = snap.val() || {}; 
        if (myId && chars[myId]) updateLobbyUI(); 
    });

    // ÚJ: SZINTLÉPÉS LOGIKA
    function checkLevelUp(c) {
        if (c.level >= 30) return; // 30-as szintplafon

        if (c.xp !== undefined && c.nextLvlXp && c.xp >= c.nextLvlXp) {
            const currentLvl = c.level || 1;
            const newLevel = currentLvl + 1;
            const leftoverXp = c.xp - c.nextLvlXp; // Megmaradt XP átvitele
            const newNextLvlXp = Math.floor(c.nextLvlXp * 1.6); // 60%-os skálázódás
            
            // Fejlődési bónuszok
            const newMaxHp = Math.floor(c.maxHp * 1.1); // +10% életerő
            const newAtk = (c.atk || 0) + 2; // +2 sebzés
            const newDef = (c.def || 0) + 1; // +1 védelem

            db.ref(`characters/${myId}`).update({
                level: newLevel,
                xp: leftoverXp,
                nextLvlXp: newNextLvlXp,
                maxHp: newMaxHp,
                hp: newMaxHp, // Szintlépéskor gyógyulás
                atk: newAtk,
                def: newDef
            }).then(() => {
                alert(`SZINTLÉPÉS! Elérted a ${newLevel}. szintet!`);
            });
        }
    }

    function updateLobbyUI() {
        const c = chars[myId]; if(!c) return;

        // Szintlépés ellenőrzése
        checkLevelUp(c);

        const now = Date.now();
        
        document.getElementById('lobby-name').innerText = c.name;
        document.getElementById('lobby-lvl').innerText = `LVL ${c.level || 1}`;
        document.getElementById('lobby-gold').innerText = c.gold || 0;
        document.getElementById('lobby-atk').innerText = c.atk || 0;
        document.getElementById('lobby-def').innerText = c.def || 0;
        document.getElementById('lobby-class-display').innerText = c.charClass;
        document.getElementById('lobby-hero-img').style.backgroundImage = `url('${HERO_IMAGES[c.charClass]}')`;
        
        const hpPercent = (c.hp / c.maxHp) * 100;
        document.getElementById('lobby-hp-fill').style.width = hpPercent + "%";
        document.getElementById('lobby-hp-val').innerText = `${Math.ceil(c.hp)} / ${c.maxHp} HP`;
        
        if(c.xp !== undefined && c.nextLvlXp) {
            const xpPercent = (c.xp / c.nextLvlXp) * 100;
            document.getElementById('lobby-xp-fill').style.width = xpPercent + "%";
            document.getElementById('xp-text').innerText = `XP: ${c.xp} / ${c.nextLvlXp}`;
        }
        
        const listOnline = document.getElementById('list-online');
        const listArena = document.getElementById('list-arena');
        listOnline.innerHTML = ""; listArena.innerHTML = "";

        Object.keys(chars).forEach(id => {
            const p = chars[id];
            const isRecent = (now - (p.lastUpdate || 0) < 300000);
            const statusColor = p.status === 'searching' ? '#ff4444' : '#4CAF50';
            const statusText = p.status === 'searching' ? 'ARÉNÁBAN' : 'ONLINE';
            const item = `<div class="player-mini-card"><span class="p-name">${p.name}</span><span style="font-size:0.7em; color:${statusColor}">${statusText}</span></div>`;
            
            if (p.status === "searching" && isRecent) listArena.innerHTML += item;
            else if (isRecent && id !== myId && p.status !== "offline") listOnline.innerHTML += item;
        });
    }

    // HP Regen & Update
    setInterval(() => {
        if (!myId || !chars[myId]) return;
        const c = chars[myId];
        if (c.hp < c.maxHp) {
            let regen = Math.max(1, Math.floor(c.maxHp * 0.02));
            db.ref(`characters/${myId}`).update({ hp: Math.min(c.maxHp, c.hp + regen), lastUpdate: Date.now() });
        } else {
            db.ref(`characters/${myId}`).update({ lastUpdate: Date.now() });
        }
    }, 10000);

    function logout() { 
        db.ref(`characters/${myId}`).update({ status: "offline" }).then(() => { 
            localStorage.removeItem('selectedCharId'); 
            window.location.href = 'login.html'; 
        }); 
    }
    function enterDM() { const pin = prompt("DM PIN:"); if(pin === "4469") window.location.href = 'dm.html'; }
</script>
</body>
</html>

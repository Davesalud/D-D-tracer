<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Death's Armada - Lobby</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,600;1,700&family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --bg: #050507; --card: rgba(15, 15, 18, 0.95); --accent: #8b0000; --text: #e0e0e0; }
        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; outline: none; }
        
        body { 
            font-family: 'Crimson Text', serif; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            overflow-x: hidden;
            overflow-y: auto; 
        }
        
        .master-bg { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), url('https://i.pinimg.com/originals/26/2b/dd/262bdd02564bf6dabbe89df4f93e8e26.jpg'); 
            background-size: cover; background-position: center; z-index: -1; 
        }

        /* --- STYLED BUTTONS --- */
        .side-action-btn, .img-btn { transition: 0.4s ease; filter: grayscale(30%); will-change: transform; }
        .side-action-btn:hover, .img-btn:hover { filter: grayscale(0%) brightness(1.2); box-shadow: 0 0 20px var(--gold); transform: scale(1.02); }

        .logout-corner { position: fixed; top: 20px; right: 20px; z-index: 1000; }
        .btn-logout { 
            background: rgba(139, 0, 0, 0.3); color: #ff4444; border: 1px solid #8b0000; 
            padding: 8px 15px; font-family: 'MedievalSharp'; cursor: pointer; border-radius: 4px; 
            text-transform: uppercase; transition: 0.3s;
        }

        .side-action-btn { 
            position: fixed; top: 50%; transform: translateY(-50%); 
            width: 220px; height: 320px; border: 2px solid var(--gold); 
            border-radius: 8px; background-size: cover; background-position: center; 
            cursor: pointer; display: flex; flex-direction: column; justify-content: flex-end; 
            text-decoration: none; overflow: hidden; z-index: 10; 
        }
        .side-action-btn span { 
            background: rgba(0, 0, 0, 0.85); color: var(--gold); 
            font-family: 'MedievalSharp'; text-align: center; padding: 12px 0; 
            width: 100%; border-top: 1px solid var(--gold); font-size: 1.1em;
        }
        #btn-side-kampany { left: 2%; background-image: url('https://i.ibb.co/S4VL891M/Copilot-20260405-021905.png'); }
        #btn-side-arena { right: 2%; background-image: url('https://i.ibb.co/p66KV1Vb/Copilot-20260405-021201.png'); }

        .card { 
            background: var(--card); border: 1px solid var(--gold); 
            padding: 25px; border-radius: 4px; width: 95%; max-width: 480px; 
            text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,1); 
            backdrop-filter: blur(15px); margin: 60px 0; position: relative; z-index: 5;
        }
        
        .lobby-hero-portrait { 
            width: 100%; aspect-ratio: 1/1; max-height: 300px; 
            border: 2px solid var(--gold); margin: 15px 0; 
            background-size: cover; background-position: center 20%; 
            border-radius: 4px;
        }
        
        /* HP & XP BARS */
        .bar-container { height: 20px; background: #000; border: 1px solid #333; position: relative; margin-top: 10px; border-radius: 3px; overflow: hidden; }
        .bar-fill { height: 100%; transition: width 0.5s ease; background: linear-gradient(90deg, #600, #b00); width: 0%; }
        .xp-container { height: 6px; background: #111; border: 1px solid #333; margin-top: 8px; border-radius: 3px; overflow: hidden; }
        .xp-fill { height: 100%; background: linear-gradient(90deg, #004cff, #00d4ff); width: 0%; }

        /* --- INVENTORY STÍLUSÚ STAT BAR --- */
        .stat-bar-clone { 
            background: rgba(0,0,0,0.8); border: 1px solid var(--gold); 
            padding: 10px; border-radius: 5px; display: flex; 
            justify-content: center; gap: 20px; margin: 15px 0;
            font-family: 'MedievalSharp'; color: var(--gold);
        }
        .stat-item { display: flex; align-items: center; gap: 8px; font-size: 1.1em; }

        .nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
        .img-btn { 
            display: flex; align-items: flex-end; justify-content: center; 
            height: 90px; border: 1px solid var(--gold); border-radius: 4px; 
            text-decoration: none; background-size: cover; background-position: center; 
        }
        .btn-felszereles { background-image: url('https://i.ibb.co/F4FDF8gF/Copilot-20260405-001049.png'); }
        .btn-kereskedo { background-image: url('https://i.ibb.co/0HSGQK0/Copilot-20260405-001515.png'); }
        .img-btn span { width: 100%; background: rgba(0, 0, 0, 0.8); color: var(--gold); font-family: 'MedievalSharp'; padding: 5px 0; font-size: 0.8em; }

        .status-container { background: rgba(0,0,0,0.6); border: 1px solid rgba(197, 160, 89, 0.2); padding: 10px; border-radius: 4px; margin-top: 10px; text-align: left; }
        .status-header { font-family: 'MedievalSharp'; color: var(--gold); font-size: 0.8em; border-bottom: 1px solid #333; margin-bottom: 5px; }
        
        @media (max-width: 1100px) {
            .side-action-btn { position: relative; top: 0; transform: none; width: 100%; max-width: 480px; height: 100px; margin: 5px 0; left: auto; right: auto; }
        }
    </style>
</head>
<body>
<div class="master-bg"></div>

<div class="logout-corner"><button class="btn-logout" onclick="logout()">Kilépés</button></div>

<a href="campaign.html" id="btn-side-kampany" class="side-action-btn"><span>📜 KAMPÁNY</span></a>

<div class="card">
    <div style="display:flex; justify-content: space-between; align-items: center;">
        <h1 id="lobby-name" style="font-family:'MedievalSharp'; color:var(--gold); margin:0;">...</h1>
        <span id="lobby-lvl" style="color: var(--gold); font-family:'MedievalSharp'; border: 1px solid var(--gold); padding: 2px 8px;">LVL -</span>
    </div>
    
    <div id="lobby-hero-img" class="lobby-hero-portrait"></div>
    
    <div class="bar-container"><div class="bar-fill" id="lobby-hp-fill"></div></div>
    <div id="lobby-hp-val" style="font-size: 13px; font-family: 'MedievalSharp'; margin-top: 4px;">0 / 0 HP</div>
    
    <div class="xp-container"><div id="lobby-xp-fill" class="xp-fill"></div></div>

    <div class="stat-bar-clone">
        <div class="stat-item">💰 <b id="lobby-gold">0</b></div>
        <div class="stat-item">⚔️ <b id="lobby-atk">0</b></div>
        <div class="stat-item">🛡️ <b id="lobby-def">0</b></div>
    </div>
    
    <div class="nav-grid">
        <a href="inventory.html" class="img-btn btn-felszereles"><span>Felszerelés</span></a>
        <a href="shop.html" class="img-btn btn-kereskedo"><span>Kereskedő</span></a>
    </div>

    <div class="status-container">
        <div class="status-header">Hősök Online</div>
        <div id="list-online" style="font-size: 0.85em; max-height: 60px; overflow-y: auto;"></div>
    </div>
</div>

<a href="arena.html" id="btn-side-arena" class="side-action-btn"><span>⚔️ ARÉNA</span></a>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
    const firebaseConfig = { apiKey: "AIzaSyBg2WzLqxt0QRDkDiUKYrGRCw0Kg-gr1OU", authDomain: "dnd-tracker-4fe05.firebaseapp.com", projectId: "dnd-tracker-4fe05", databaseURL: "https://dnd-tracker-4fe05-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const myId = localStorage.getItem('selectedCharId');

    const HERO_IMAGES = { "Harcos": "https://i.ibb.co/20BXyqpy/Copilot-20260403-032810.png", "Mágus": "https://i.ibb.co/yFz5bcXv/Copilot-20260403-033651.png", "Lovag": "https://i.ibb.co/Fk3n339M/Copilot-20260403-034043.png", "Íjász": "https://i.ibb.co/whd2jNpB/Copilot-20260403-034402.png", "Bérgyilkos": "https://i.ibb.co/b525CsLg/Copilot-20260403-032807.png", "Nekromanta": "https://i.ibb.co/NnCwwCbR/Copilot-20260403-033301.png" };

    if (!myId) window.location.href = 'login.html';

    db.ref(`characters/${myId}`).on('value', snap => {
        const c = snap.val();
        if(c) {
            document.getElementById('lobby-name').innerText = c.name;
            document.getElementById('lobby-lvl').innerText = `LVL ${c.level || 1}`;
            document.getElementById('lobby-gold').innerText = c.gold || 0;
            
            // Kiszámolt statok (Alap + Felszerelés bónusz)
            const totalAtk = (Number(c.atk) || 10) + (Number(c.bonusAtk) || 0);
            const totalDef = (Number(c.def) || 5) + (Number(c.bonusDef) || 0);
            document.getElementById('lobby-atk').innerText = totalAtk;
            document.getElementById('lobby-def').innerText = totalDef;

            document.getElementById('lobby-hero-img').style.backgroundImage = `url('${HERO_IMAGES[c.charClass]}')`;
            
            const hp = Number(c.hp || 0), mHp = Number(c.maxHp || 100);
            document.getElementById('lobby-hp-fill').style.width = (hp / mHp * 100) + "%";
            document.getElementById('lobby-hp-val').innerText = `${hp} / ${mHp} HP`;
            
            const xp = Number(c.xp || 0), nXp = Number(c.nextLvlXp || 100);
            document.getElementById('lobby-xp-fill').style.width = (xp / nXp * 100) + "%";
        }
    });

    // Online lista frissítése
    db.ref('characters').on('value', snap => {
        const list = document.getElementById('list-online');
        list.innerHTML = "";
        const all = snap.val();
        Object.keys(all).forEach(id => {
            if(id !== myId && all[id].status === "online") {
                list.innerHTML += `<span>• ${all[id].name} (${all[id].charClass})</span> `;
            }
        });
    });

    function logout() {
        db.ref(`characters/${myId}`).update({ status: "offline" }).then(() => {
            localStorage.removeItem('selectedCharId');
            window.location.href = 'login.html';
        });
    }
</script>
</body>
</html>

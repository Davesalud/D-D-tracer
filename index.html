<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Death's Armada - Hero Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,600;1,700&family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --bg: #050507; --card: rgba(15, 15, 18, 0.95); --accent: #8b0000; --text: #e0e0e0; }
        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; outline: none; }
        input, select { user-select: text !important; }
        body { font-family: 'Crimson Text', serif; background-color: var(--bg); color: var(--text); margin: 0; height: 100vh; overflow: hidden; }
        .master-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), url('https://i.pinimg.com/originals/26/2b/dd/262bdd02564bf6dabbe89df4f93e8e26.jpg'); background-size: cover; background-position: center; z-index: -1; }
        .logout-corner { position: fixed; top: 20px; right: 20px; z-index: 1000; display: none; }
        .btn-logout { background: rgba(139, 0, 0, 0.6); color: var(--gold); border: 1px solid var(--gold); padding: 8px 15px; font-family: 'MedievalSharp'; cursor: pointer; font-size: 0.8em; text-transform: uppercase; transition: 0.3s; }
        .page { display: none; height: 100vh; padding: 20px; flex-direction: column; align-items: center; overflow-y: auto; }
        .page.active { display: flex; }
        .card { background: var(--card); border: 1px solid var(--gold); padding: 20px; border-radius: 4px; width: 100%; max-width: 450px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.9); backdrop-filter: blur(15px); margin-bottom: 20px; }
        .logo { font-family: 'MedievalSharp'; font-size: 3em; color: var(--accent); text-shadow: 0 0 15px rgba(139,0,0,0.7); margin-bottom: 15px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; background: rgba(0,0,0,0.8); border: 1px solid #444; color: white; font-family: 'MedievalSharp'; }
        .btn { font-family: 'MedievalSharp'; padding: 12px; cursor: pointer; border: 1px solid var(--gold); transition: 0.3s; text-transform: uppercase; display: block; width: 100%; margin-bottom: 5px; text-decoration: none; text-align: center; color: var(--gold); }
        .btn-main { background: var(--accent); color: white; border: none; font-size: 1.1em; }
        .btn-sub { background: none; color: var(--gold); font-size: 0.8em; }
        .lobby-hero-portrait { width: 100%; height: 300px; border: 2px solid var(--gold); margin: 15px 0; background-size: cover; background-position: center 20%; border-radius: 4px; }
        .bar-container { height: 24px; background: #000; border: 1px solid #333; position: relative; margin-top: 10px; border-radius: 3px; overflow: hidden; }
        .bar-fill { height: 100%; transition: width 0.5s ease; background: linear-gradient(90deg, #600, #b00); width: 0%; }
        .bar-label { position: absolute; width: 100%; text-align: center; line-height: 22px; font-size: 13px; color: white; font-weight: bold; z-index: 2; text-shadow: 1px 1px 2px black; }
        .xp-container { height: 8px; background: #111; border: 1px solid #333; margin-top: 5px; border-radius: 4px; overflow: hidden; }
        .xp-fill { height: 100%; background: linear-gradient(90deg, #004cff, #00d4ff); width: 0%; transition: 1s; }
        .gold-display { color: var(--gold); font-family: 'MedievalSharp'; font-size: 1.3em; margin: 10px 0; }
        .inv-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .inv-slot { background: rgba(0,0,0,0.6); border: 1px dashed var(--gold); padding: 5px; font-size: 0.7em; min-height: 50px; display: flex; flex-direction: column; justify-content: center; }
        .inv-slot b { color: var(--gold); }
        .creator-container { display: flex; flex-direction: row; gap: 20px; align-items: stretch; max-width: 800px !important; }
        .hero-img-frame { width: 200px; height: 200px; border: 2px solid var(--gold); background-size: cover; background-position: center 20%; margin-bottom: 10px; }
        .player-item { display: flex; justify-content: space-between; padding: 8px; background: rgba(255,255,255,0.05); margin-bottom: 5px; border-left: 3px solid var(--gold); font-size: 0.9em; }
    </style>
</head>
<body>

<div class="master-bg"></div>
<div id="logout-ui" class="logout-corner"><button class="btn-logout" onclick="logout()">Kilépés 🚪</button></div>

<div id="page-login" class="page active">
    <div class="card" style="margin-top: 10vh;">
        <div class="logo">Death's Armada</div>
        <select id="login-select"></select>
        <input type="password" id="login-pin" placeholder="PIN KÓD" maxlength="4">
        <button class="btn btn-main" onclick="login()">Belépés</button>
        <button class="btn btn-sub" onclick="openCreator()">✨ Új Hős Megidézése</button>
    </div>
</div>

<div id="page-lobby" class="page">
    <div class="card">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <h1 id="lobby-name" style="font-family:'MedievalSharp'; color:var(--gold); margin:0;">-</h1>
            <span id="lobby-lvl" style="color: var(--gold); font-family:'MedievalSharp'; font-size: 1.2em;">LVL 1</span>
        </div>
        <p id="lobby-class-display" style="margin:5px 0; font-style:italic; color:#aaa; text-transform: uppercase;">-</p>
        <div id="lobby-hero-img" class="lobby-hero-portrait"></div>
        
        <div class="bar-container">
            <div class="bar-fill" id="lobby-hp-fill"></div>
            <div class="bar-label" id="lobby-hp-text">0/0 HP</div>
        </div>
        <div class="xp-container"><div id="lobby-xp-fill" class="xp-fill"></div></div>
        <div id="xp-text" style="font-size: 10px; color: #888; text-align: right; margin-top: 2px;">0 / 250 XP</div>

        <div class="gold-display">💰 <span id="lobby-gold">0</span> Arany</div>

        <div class="inv-grid">
            <div class="inv-slot"><i>Kéz</i><b id="val-weapon">-</b></div>
            <div class="inv-slot"><i>Test</i><b id="val-armor">-</b></div>
            <div class="inv-slot"><i>Láb</i><b id="val-extra">-</b></div>
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:20px;">
            <button class="btn btn-main" style="background:#4a1a1a;">📜 KAMPÁNY</button>
            <button onclick="goToArena()" class="btn btn-main" style="background:#8b0000;">⚔️ ARÉNA</button>
        </div>
        <h3 style="font-family:'MedievalSharp'; color:var(--gold); margin-top:20px; text-align: left; border-bottom: 1px solid var(--gold);">Online Hősök</h3>
        <div id="online-players-list" style="max-height: 100px; overflow-y: auto; margin-top: 10px;"></div>
    </div>
</div>

<div id="modal-creator" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; align-items:center; justify-content:center; z-index:100;">
    <div class="card creator-container">
        <div style="flex: 1.2; text-align: left;">
            <h2 style="font-family:'MedievalSharp'; color:var(--gold);">Megidézés</h2>
            <input type="text" id="new-name" placeholder="Hős neve...">
            <select id="new-class" onchange="updatePreview()">
                <option value="Harcos">Harcos</option>
                <option value="Mágus">Mágus</option>
                <option value="Lovag">Lovag</option>
                <option value="Íjász">Íjász</option>
                <option value="Bérgyilkos">Bérgyilkos</option>
                <option value="Nekromanta">Nekromanta</option>
            </select>
            <input type="password" id="new-pin" placeholder="PIN (4 szám)" maxlength="4">
            <button class="btn btn-main" onclick="saveNewHero()">Létrehozás</button>
            <button class="btn btn-sub" onclick="document.getElementById('modal-creator').style.display='none'">Mégse</button>
        </div>
        <div style="flex: 1; display:flex; flex-direction:column; align-items:center; justify-content:center; background:rgba(0,0,0,0.3); padding:10px;">
            <div id="preview-img" class="hero-img-frame"></div>
            <b id="preview-skill-name" style="color:var(--gold);"></b>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBg2WzLqxt0QRDkDiUKYrGRCw0Kg-gr1OU",
        authDomain: "dnd-tracker-4fe05.firebaseapp.com",
        projectId: "dnd-tracker-4fe05",
        databaseURL: "https://dnd-tracker-4fe05-default-rtdb.europe-west1.firebasedatabase.app",
        storageBucket: "dnd-tracker-4fe05.firebasestorage.app",
        messagingSenderId: "886037504950",
        appId: "1:886037504950:web:46e80b46f0e26e24429717"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const HERO_IMAGES = { "Harcos": "https://i.ibb.co/20BXyqpy/Copilot-20260403-032810.png", "Mágus": "https://i.ibb.co/yFz5bcXv/Copilot-20260403-033651.png", "Lovag": "https://i.ibb.co/Fk3n339M/Copilot-20260403-034043.png", "Íjász": "https://i.ibb.co/whd2jNpB/Copilot-20260403-034402.png", "Bérgyilkos": "https://i.ibb.co/b525CsLg/Copilot-20260403-032807.png", "Nekromanta": "https://i.ibb.co/NnCwwCbR/Copilot-20260403-033301.png" };
    
    let chars = {}, myId = localStorage.getItem('selectedCharId');

    // REGENERÁCIÓ: 1 percenként +10 HP
    setInterval(() => {
        if(myId && chars[myId]) {
            const c = chars[myId];
            if(c.hp < c.maxHp) {
                db.ref(`characters/${myId}`).update({ hp: Math.min(c.maxHp, c.hp + 10) });
            }
        }
    }, 60000);

    db.ref('characters').on('value', snap => {
        chars = snap.val() || {};
        updateLoginList();
        if (myId && chars[myId]) {
            showPage('page-lobby');
            document.getElementById('logout-ui').style.display = 'block';
            updateLobbyUI();
        }
    });

    function updateLobbyUI() {
        const c = chars[myId];
        document.getElementById('lobby-name').innerText = c.name;
        document.getElementById('lobby-lvl').innerText = `LVL ${c.level || 1}`;
        document.getElementById('lobby-gold').innerText = c.gold || 0;
        document.getElementById('lobby-class-display').innerText = c.charClass;
        document.getElementById('lobby-hero-img').style.backgroundImage = `url('${HERO_IMAGES[c.charClass]}')`;
        
        // HP Kijelzés
        document.getElementById('lobby-hp-fill').style.width = (c.hp / c.maxHp * 100) + "%";
        document.getElementById('lobby-hp-text').innerText = `${Math.ceil(c.hp)} / ${c.maxHp} HP`;

        // XP Csík számítás
        let lvl = c.level || 1, xp = c.xp || 0, next = 0, prev = 0;
        if(lvl == 1) { next = 250; prev = 0; }
        else if(lvl == 2) { next = 750; prev = 250; }
        else if(lvl < 10) { next = 750 + ((lvl-2)*500); prev = 750 + ((lvl-3)*500); }
        else if(lvl < 20) { next = 4750 + ((lvl-9)*750); prev = 4750 + ((lvl-10)*750); }
        else { next = 12250 + ((lvl-19)*1000); prev = 12250 + ((lvl-20)*1000); }

        let prog = ((xp - prev) / (next - prev)) * 100;
        document.getElementById('lobby-xp-fill').style.width = Math.min(100, Math.max(0, prog)) + "%";
        document.getElementById('xp-text').innerText = `${xp} / ${next} XP`;

        // Online lista
        const list = document.getElementById('online-players-list');
        list.innerHTML = "";
        Object.keys(chars).forEach(id => {
            if (id !== myId && chars[id].status === "online") {
                list.innerHTML += `<div class="player-item"><span>${chars[id].name}</span><b style="color:#4CAF50;">ONLINE</b></div>`;
            }
        });
    }

    function login() {
        const id = document.getElementById('login-select').value;
        const pin = document.getElementById('login-pin').value;
        if (id && chars[id] && chars[id].pin.toString() === pin) {
            myId = id; localStorage.setItem('selectedCharId', id);
            db.ref(`characters/${id}/status`).set("online");
            location.reload();
        } else alert("Hibás PIN!");
    }

    function logout() {
        db.ref(`characters/${myId}/status`).set("offline").then(() => {
            localStorage.removeItem('selectedCharId'); location.reload();
        });
    }

    function saveNewHero() {
        const name = document.getElementById('new-name').value, cls = document.getElementById('new-class').value, pin = document.getElementById('new-pin').value;
        if(!name || !pin) return;
        const hps = { "Harcos":100, "Mágus":70, "Lovag":130, "Íjász":90, "Bérgyilkos":80, "Nekromanta":110 };
        db.ref('characters').push({ name, charClass: cls, pin, hp: hps[cls], maxHp: hps[cls], level: 1, xp: 0, gold: 50, status: "offline" });
        document.getElementById('modal-creator').style.display = 'none';
    }

    function openCreator() { document.getElementById('modal-creator').style.display = 'flex'; updatePreview(); }
    function updatePreview() { const cls = document.getElementById('new-class').value; document.getElementById('preview-img').style.backgroundImage = `url('${HERO_IMAGES[cls]}')`; }
    function showPage(pId) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(pId).classList.add('active'); }
    function updateLoginList() {
        const sel = document.getElementById('login-select'); if(!sel) return;
        sel.innerHTML = '<option value="" disabled selected>Válaszd ki a hősöd...</option>';
        Object.keys(chars).forEach(id => { sel.innerHTML += `<option value="${id}">${chars[id].name}</option>`; });
    }
    function goToArena() { window.location.href = './arena.html'; }
</script>
</body>
</html>

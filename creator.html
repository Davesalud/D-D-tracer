<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Death's Armada - Megidézés</title>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Crimson+Text:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --bg: #050507; --accent: #8b0000; --glass: rgba(15, 15, 18, 0.9); }
        body { font-family: 'MedievalSharp', cursive; background-color: var(--bg); color: white; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        
        .master-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.9)), url('https://i.ibb.co/PvWryRcS/Gemini-Generated-Image-7rk5117rk5117rk5.png'); background-size: cover; background-position: center; z-index: -1; }

        .card { background: var(--glass); border: 2px solid var(--gold); padding: 30px; border-radius: 4px; width: 95%; max-width: 600px; box-shadow: 0 0 50px black; backdrop-filter: blur(10px); text-align: center; margin: 20px; }
        
        h1 { color: var(--gold); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 20px; font-size: 2em; }
        
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; background: rgba(0,0,0,0.7); border: 1px solid #444; color: var(--gold); font-family: 'MedievalSharp'; font-size: 1.1em; }
        
        /* Hős Info Box */
        .class-info { background: rgba(139, 0, 0, 0.1); border: 1px dashed var(--gold); padding: 15px; margin-bottom: 20px; border-radius: 4px; min-height: 100px; text-align: left; }
        .class-title { color: var(--gold); font-size: 1.3em; margin-bottom: 5px; display: block; }
        .class-desc { font-family: 'Crimson Text', serif; font-style: italic; color: #ccc; font-size: 1.1em; line-height: 1.4; }
        .special-ability { color: #ff4d4d; font-weight: bold; margin-top: 10px; display: block; }

        .btn-create { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; cursor: pointer; font-family: 'MedievalSharp'; font-size: 1.2em; text-transform: uppercase; transition: 0.3s; }
        .btn-create:hover { background: #b00000; box-shadow: 0 0 20px var(--accent); }
        .back-link { display: block; margin-top: 15px; color: var(--gold); text-decoration: none; font-size: 0.9em; opacity: 0.7; }
    </style>
</head>
<body>
<div class="master-bg"></div>

<div class="card">
    <h1>Hős Megidézése</h1>
    
    <input type="text" id="hero-name" placeholder="Hős neve..." maxlength="12">
    <input type="password" id="hero-pin" placeholder="PIN KÓD (4 számjegy)" maxlength="4">
    
    <select id="class-select" onchange="updateClassInfo()">
        <option value="Harcos">Harcos</option>
        <option value="Mágus">Mágus</option>
        <option value="Lovag">Lovag</option>
        <option value="Íjász">Íjász</option>
        <option value="Bérgyilkos">Bérgyilkos</option>
        <option value="Nekromanta">Nekromanta</option>
    </select>

    <div class="class-info" id="info-box">
        <span class="class-title" id="display-name">Harcos</span>
        <span class="class-desc" id="display-desc">Magas életerővel rendelkező, közelharci specialista. Ideális azoknak, akik szeretnek a sűrűjében lenni.</span>
        <span class="special-ability" id="display-special">✨ Speciális: Pajzsütés (Kábítás esélye)</span>
    </div>

    <button class="btn-create" onclick="createHero()">Létrehozás</button>
    <a href="login.html" class="back-link">← Vissza a kapuhoz</a>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyBg2WzLqxt0QRDkDiUKYrGRCw0Kg-gr1OU", 
        authDomain: "dnd-tracker-4fe05.firebaseapp.com", 
        projectId: "dnd-tracker-4fe05", 
        databaseURL: "https://dnd-tracker-4fe05-default-rtdb.europe-west1.firebasedatabase.app" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const CLASS_DATA = {
        "Harcos": { desc: "Magas életerővel rendelkező, közelharci specialista. Szívós és bátor.", spec: "Pajzsütés: Esély az ellenfél kábítására.", hp: 150, atk: 12, def: 10 },
        "Mágus": { desc: "A misztikus tanok mestere. Kevés védelme van, de pusztító ereje.", spec: "Tűzgolyó: Hatalmas robbanásos sebzés.", hp: 80, atk: 22, def: 4 },
        "Lovag": { desc: "A becsület bajnoka. A legvastagabb páncélt hordja a birodalomban.", spec: "Szent Áldás: Lassú HP regeneráció harc alatt.", hp: 130, atk: 10, def: 15 },
        "Íjász": { desc: "Messziről sújt le, mielőtt az ellenfél észrevenné. Gyors és pontos.", spec: "Dupla Lövés: Esély két egymást követő nyílra.", hp: 100, atk: 16, def: 7 },
        "Bérgyilkos": { desc: "Az árnyékok közt vadászik. Egyetlen precíz csapással végez bárkivel.", spec: "Hátbaszúrás: Extra kritikus sebzés az első körben.", hp: 90, atk: 20, def: 5 },
        "Nekromanta": { desc: "A holtak ura. Sötét mágiával szívja el az életet másokból.", spec: "Lélekelszívás: Győzelemkor HP-t tölt vissza.", hp: 110, atk: 15, def: 8 }
    };

    function updateClassInfo() {
        const val = document.getElementById('class-select').value;
        const data = CLASS_DATA[val];
        document.getElementById('display-name').innerText = val;
        document.getElementById('display-desc').innerText = data.desc;
        document.getElementById('display-special').innerText = "✨ Speciális: " + data.spec;
    }

    function createHero() {
        const name = document.getElementById('hero-name').value;
        const pin = document.getElementById('hero-pin').value;
        const charClass = document.getElementById('class-select').value;

        if(name.length < 3 || pin.length !== 4) {
            alert("A név min. 3 karakter, a PIN pontosan 4 szám legyen!");
            return;
        }

        const stats = CLASS_DATA[charClass];
        const newId = db.ref('characters').push().key;

        db.ref('characters/' + newId).set({
            id: newId,
            name: name,
            pin: pin,
            charClass: charClass,
            level: 1,
            gold: 50,
            xp: 0,
            hp: stats.hp,
            maxHp: stats.hp,
            atk: stats.atk,
            def: stats.def,
            status: "offline",
            lastUpdate: Date.now()
        }).then(() => {
            alert("Sikeres megidézés! Most már beléphetsz.");
            window.location.href = 'login.html';
        });
    }
</script>
</body>
</html>

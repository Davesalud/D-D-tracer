<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&D Karakter és Campaign Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: var(--font-sans), -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #e0e6ff;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #6b7fd1;
            padding-bottom: 20px;
        }
        
        .header h1 {
            font-size: 32px;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            margin-bottom: 5px;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .tab-btn {
            padding: 10px 20px;
            background: rgba(107, 127, 209, 0.2);
            border: 2px solid #6b7fd1;
            color: #e0e6ff;
            cursor: pointer;
            border-radius: 5px;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .tab-btn.active {
            background: #6b7fd1;
            color: #000;
            font-weight: bold;
        }
        
        .tab-btn:hover {
            background: rgba(107, 127, 209, 0.4);
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .section {
            background: rgba(26, 31, 58, 0.8);
            border: 2px solid #6b7fd1;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .section h2 {
            color: #ffd700;
            margin-bottom: 15px;
            font-size: 20px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #b0b8e8;
            font-size: 13px;
        }
        
        input, select {
            width: 100%;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid #6b7fd1;
            color: #e0e6ff;
            border-radius: 4px;
            font-size: 14px;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #ffd700;
            background: rgba(0, 0, 0, 0.6);
        }
        
        button {
            background: #6b7fd1;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            margin-right: 10px;
        }
        
        button:hover {
            background: #ffd700;
            transform: scale(1.05);
        }
        
        .character-card {
            background: rgba(107, 127, 209, 0.15);
            border-left: 4px solid #ffd700;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 4px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        
        .character-card h3 {
            grid-column: 1 / -1;
            color: #ffd700;
            margin-bottom: 10px;
        }
        
        .stat {
            font-size: 13px;
            color: #b0b8e8;
        }
        
        .stat-value {
            color: #e0e6ff;
            font-weight: bold;
        }
        
        .dice-area {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        
        .dice-btn {
            background: linear-gradient(135deg, #d4a574 0%, #8b7355 100%);
            color: #fff;
            border: 2px solid #ffd700;
            padding: 12px 16px;
            border-radius: 50%;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .dice-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
        }
        
        .result-display {
            background: rgba(255, 215, 0, 0.1);
            border: 2px solid #ffd700;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            margin-top: 20px;
        }
        
        .result-display h3 {
            color: #ffd700;
            margin-bottom: 10px;
        }
        
        .result-value {
            font-size: 36px;
            color: #ffd700;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }
        
        .delete-btn {
            background: #a32d2d;
            color: #fff;
            border: none;
            padding: 6px 12px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
            grid-column: 1 / -1;
        }
        
        .delete-btn:hover {
            background: #c94949;
        }
        
        .tracker-item {
            background: rgba(107, 127, 209, 0.1);
            border: 1px solid #6b7fd1;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 4px;
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        .tracker-item input {
            width: 50px;
        }
        
        .tracker-status {
            flex: 1;
        }
        
        .tracker-status p {
            margin: 2px 0;
            font-size: 13px;
            color: #b0b8e8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚔️ D&D CAMPAIGN TRACKER ⚔️</h1>
            <p>Karakterek, kocka, és kampány kezelés egy helyen</p>
        </div>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('character')">Karakterek</button>
            <button class="tab-btn" onclick="switchTab('dice')">Kocka Dobó</button>
            <button class="tab-btn" onclick="switchTab('tracker')">Campaign Tracker</button>
        </div>
        
        <!-- CHARACTER SHEET TAB -->
        <div id="character" class="tab-content active">
            <div class="section">
                <h2>Új Karakter Létrehozása</h2>
                <div class="form-group">
                    <label>Karakter Neve</label>
                    <input type="text" id="charName" placeholder="pl. Aragorn">
                </div>
                <div class="form-group">
                    <label>Faj</label>
                    <select id="charRace">
                        <option>Ember</option>
                        <option>Elf</option>
                        <option>Félork</option>
                        <option>Törpe</option>
                        <option>Halfling</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Osztály</label>
                    <select id="charClass">
                        <option>Barbár</option>
                        <option>Bárd</option>
                        <option>Klérikus</option>
                        <option>Druid</option>
                        <option>Fighter</option>
                        <option>Mágus</option>
                        <option>Paladin</option>
                        <option>Besúgó</option>
                        <option>Varázsló</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>HP (Élet)</label>
                    <input type="number" id="charHP" placeholder="pl. 25">
                </div>
                <button onclick="addCharacter()">➕ Karakter Hozzáadása</button>
            </div>
            
            <div class="section">
                <h2>Létrehozott Karakterek</h2>
                <div id="characterList"></div>
            </div>
        </div>
        
        <!-- DICE ROLLER TAB -->
        <div id="dice" class="tab-content">
            <div class="section">
                <h2>Kocka Dobó</h2>
                <div class="dice-area">
                    <button class="dice-btn" onclick="rollDice(4)">d4</button>
                    <button class="dice-btn" onclick="rollDice(6)">d6</button>
                    <button class="dice-btn" onclick="rollDice(8)">d8</button>
                    <button class="dice-btn" onclick="rollDice(10)">d10</button>
                    <button class="dice-btn" onclick="rollDice(12)">d12</button>
                    <button class="dice-btn" onclick="rollDice(20)">d20</button>
                    <button class="dice-btn" onclick="rollDice(100)">d100</button>
                </div>
                
                <div class="form-group" style="margin-top: 20px;">
                    <label>Több Kocka Dobása</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="number" id="diceCount" value="1" min="1" max="10" style="width: 80px;" placeholder="Darab">
                        <select id="diceType" style="flex: 1;">
                            <option value="4">d4</option>
                            <option value="6" selected>d6</option>
                            <option value="8">d8</option>
                            <option value="10">d10</option>
                            <option value="12">d12</option>
                            <option value="20">d20</option>
                        </select>
                        <button onclick="rollMultipleDice()">Dob!</button>
                    </div>
                </div>
                
                <div id="diceResult" class="result-display" style="display: none;">
                    <h3>Rezultátum</h3>
                    <div class="result-value" id="resultValue">-</div>
                    <p id="diceDetails" style="margin-top: 10px; color: #b0b8e8; font-size: 13px;"></p>
                </div>
            </div>
        </div>
        
        <!-- CAMPAIGN TRACKER TAB -->
        <div id="tracker" class="tab-content">
            <div class="section">
                <h2>Campaign Tracker (Max 6 Karakter)</h2>
                <p style="color: #b0b8e8; margin-bottom: 15px; font-size: 13px;">Kövesd nyomon a karakterek életerőjét és státuszát a kampányban</p>
                
                <div style="margin-bottom: 20px;">
                    <label>Válassz Karaktert</label>
                    <div style="display: flex; gap: 10px;">
                        <select id="trackerCharacter" style="flex: 1;">
                            <option value="">-- Válassz egy karaktert --</option>
                        </select>
                        <button onclick="addToTracker()">Hozzáadás</button>
                    </div>
                </div>
                
                <div id="trackerList"></div>
            </div>
        </div>
    </div>
    
    <script>
        let characters = [];
        let trackerCharacters = [];
        
        function addCharacter() {
            const name = document.getElementById('charName').value;
            const race = document.getElementById('charRace').value;
            const className = document.getElementById('charClass').value;
            const hp = parseInt(document.getElementById('charHP').value);
            
            if (!name || !hp) {
                alert('Töltsd ki az összes mezőt!');
                return;
            }
            
            const character = {
                id: Date.now(),
                name,
                race,
                className,
                maxHP: hp,
                currentHP: hp
            };
            
            characters.push(character);
            updateCharacterDisplay();
            updateTrackerSelect();
            
            document.getElementById('charName').value = '';
            document.getElementById('charHP').value = '';
        }
        
        function updateCharacterDisplay() {
            const list = document.getElementById('characterList');
            list.innerHTML = '';
            
            characters.forEach(char => {
                const card = document.createElement('div');
                card.className = 'character-card';
                
                const hpPercent = (char.currentHP / char.maxHP) * 100;
                const hpColor = hpPercent > 50 ? '#00ff00' : hpPercent > 25 ? '#ffaa00' : '#ff3333';
                
                card.innerHTML = `
                    <h3>${char.name}</h3>
                    <div class="stat">Faj: <span class="stat-value">${char.race}</span></div>
                    <div class="stat">Osztály: <span class="stat-value">${char.className}</span></div>
                    <div class="stat" style="grid-column: 1 / -1;">
                        HP: <span class="stat-value" style="color: ${hpColor};">${char.currentHP}/${char.maxHP}</span>
                        <div style="background: rgba(0,0,0,0.3); height: 8px; border-radius: 4px; margin-top: 5px; overflow: hidden;">
                            <div style="background: ${hpColor}; height: 100%; width: ${hpPercent}%;"></div>
                        </div>
                    </div>
                    <input type="number" id="hp-${char.id}" value="${char.currentHP}" min="0" max="${char.maxHP}" style="grid-column: 1; width: 80px;" onchange="updateCharacterHP(${char.id})">
                    <button class="delete-btn" style="grid-column: 2;" onclick="deleteCharacter(${char.id})">Törlés</button>
                `;
                
                list.appendChild(card);
            });
        }
        
        function updateCharacterHP(id) {
            const newHP = parseInt(document.getElementById(`hp-${id}`).value);
            const character = characters.find(c => c.id === id);
            if (character) {
                character.currentHP = Math.max(0, Math.min(newHP, character.maxHP));
                updateCharacterDisplay();
            }
        }
        
        function deleteCharacter(id) {
            characters = characters.filter(c => c.id !== id);
            trackerCharacters = trackerCharacters.filter(c => c.id !== id);
            updateCharacterDisplay();
            updateTrackerSelect();
            updateTrackerDisplay();
        }
        
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
        }
        
        function rollDice(sides) {
            const result = Math.floor(Math.random() * sides) + 1;
            showResult(result, `d${sides}`);
        }
        
        function rollMultipleDice() {
            const count = parseInt(document.getElementById('diceCount').value);
            const sides = parseInt(document.getElementById('diceType').value);
            
            let total = 0;
            let rolls = [];
            
            for (let i = 0; i < count; i++) {
                const roll = Math.floor(Math.random() * sides) + 1;
                rolls.push(roll);
                total += roll;
            }
            
            const resultDiv = document.getElementById('diceResult');
            resultDiv.style.display = 'block';
            document.getElementById('resultValue').textContent = total;
            document.getElementById('diceDetails').textContent = `${count}d${sides}: [${rolls.join(', ')}]`;
        }
        
        function showResult(value, diceType) {
            const resultDiv = document.getElementById('diceResult');
            resultDiv.style.display = 'block';
            document.getElementById('resultValue').textContent = value;
            document.getElementById('diceDetails').textContent = diceType;
        }
        
        function updateTrackerSelect() {
            const select = document.getElementById('trackerCharacter');
            const existingIds = trackerCharacters.map(c => c.id);
            
            select.innerHTML = '<option value="">-- Válassz egy karaktert --</option>';
            
            characters.forEach(char => {
                if (!existingIds.includes(char.id) && trackerCharacters.length < 6) {
                    const option = document.createElement('option');
                    option.value = char.id;
                    option.textContent = char.name;
                    select.appendChild(option);
                }
            });
        }
        
        function addToTracker() {
            const charId = parseInt(document.getElementById('trackerCharacter').value);
            if (!charId) return;
            
            if (trackerCharacters.length >= 6) {
                alert('Maximum 6 karakter a Trackerben!');
                return;
            }
            
            const character = characters.find(c => c.id === charId);
            if (character && !trackerCharacters.find(c => c.id === charId)) {
                trackerCharacters.push({...character});
                updateTrackerSelect();
                updateTrackerDisplay();
            }
        }
        
        function updateTrackerDisplay() {
            const list = document.getElementById('trackerList');
            list.innerHTML = '';
            
            trackerCharacters.forEach((char, index) => {
                const hpPercent = (char.currentHP / char.maxHP) * 100;
                const item = document.createElement('div');
                item.className = 'tracker-item';
                
                item.innerHTML = `
                    <div style="font-weight: bold; color: #ffd700; min-width: 100px;">${index + 1}. ${char.name}</div>
                    <div class="tracker-status">
                        <p>${char.race} • ${char.className}</p>
                        <div style="display: flex; gap: 10px; align-items: center; margin-top: 5px;">
                            <input type="number" value="${char.currentHP}" min="0" max="${char.maxHP}" onchange="updateTrackerHP(${index}, this.value)">
                            <span style="color: #b0b8e8;">/ ${char.maxHP}</span>
                            <div style="flex: 1; background: rgba(0,0,0,0.3); height: 6px; border-radius: 3px;">
                                <div style="background: ${hpPercent > 50 ? '#00ff00' : hpPercent > 25 ? '#ffaa00' : '#ff3333'}; height: 100%; width: ${hpPercent}%;"></div>
                            </div>
                            <button class="delete-btn" onclick="removeFromTracker(${index})" style="padding: 4px 8px; width: auto;">✕</button>
                        </div>
                    </div>
                `;
                
                list.appendChild(item);
            });
        }
        
        function updateTrackerHP(index, value) {
            if (trackerCharacters[index]) {
                trackerCharacters[index].currentHP = Math.max(0, Math.min(parseInt(value), trackerCharacters[index].maxHP));
                updateTrackerDisplay();
            }
        }
        
        function removeFromTracker(index) {
            trackerCharacters.splice(index, 1);
            updateTrackerSelect();
            updateTrackerDisplay();
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Death's Armada - WELL TO COME THE ARMADA</title>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Crimson+Text:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --accent: #8b0000; --glass: rgba(10, 10, 12, 0.96); }
        
        /* TELJES KITÖLTÉS */
        html, body {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            background-color: #000;
            background-image: linear-gradient(to right, rgba(0,0,0,0.9) 20%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.8) 100%), 
                             url('https://i.ibb.co/bZBtvtf/Copilot-20260406-162751.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex; align-items: center; justify-content: flex-start;
            overflow: hidden;
        }

        .side-panel {
            margin-left: 5%; /* A képernyő szélétől mért távolság */
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 450px;
            z-index: 10;
        }

        .card { 
            background: var(--glass); 
            border: 2px solid var(--gold); 
            padding: 35px; 
            text-align: center; 
            backdrop-filter: blur(15px);
            border-image: linear-gradient(to bottom, #c5a059, #4a3511) 1;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }
        
        .logo { 
            font-size: 52px;
            color: #fff;
            text-shadow: 0px 0px 15px var(--accent), 2px 2px 2px #000; 
            margin-bottom: 25px; 
            text-transform: uppercase;
            font-family: 'MedievalSharp';
        }
        
        .search-container {
            position: relative;
            width: 100%;
            margin-bottom: 15px;
        }

        input { 
            width: 100%; padding: 16px; background: rgba(255,255,255,0.9); 
            border: 1px solid #000; color: #000; font-family: 'MedievalSharp'; 
            font-size: 22px; box-sizing: border-box; text-align: center;
        }

        /* LEBEGŐ LISTA - Nem tol el semmit! */
        .autocomplete-box {
            position: absolute; 
            top: 100%; left: 0; width: 100%; 
            background: #111; border: 1px solid var(--gold); 
            max-height: 200px; overflow-y: auto; 
            display: none; z-index: 9999;
        }

        .suggestion-item { padding: 12px; color: var(--gold); font-size: 20px; cursor: pointer; text-align: left; border-bottom: 1px solid #222; }
        .suggestion-item:hover { background: var(--accent); color: white; }

        .btn { 
            width: 100%; padding: 18px; cursor: pointer; 
            text-transform: uppercase; font-family: 'MedievalSharp'; 
            font-weight: bold; border: none; font-size: 22px;
        }
        .btn-main { background: var(--accent); color: white; margin-bottom: 10px; }
        .btn-sub { background: transparent; color: var(--gold); border: 1px solid rgba(197, 160, 89, 0.4); font-size: 16px; }

        .patch-notes { 
            background: rgba(0, 0, 0, 0.9); 
            border-left: 5px solid var(--accent);
            padding: 20px;
        }
        .patch-header { color: var(--gold); font-size: 22px; margin-bottom: 5px; font-family: 'MedievalSharp'; }
        .patch-content { font-family: 'Crimson Text', serif; font-style: italic; color: #aaa; font-size: 18px; }
    </style>
</head>
<body>

    <div class="side-panel">
        <div class="card">
            <div class="logo">Death's Armada</div>
            
            <div class="search-container">
                <input type="text" id="hero-search" placeholder="Kalandor neve..." autocomplete="off">
                <div id="autocomplete-list" class="autocomplete-box"></div>
            </div>

            <input type="password" id="login-pin" placeholder="PIN KÓD" maxlength="4" style="margin-bottom: 15px;">
            
            <button class="btn btn-main" onclick="login()">Belépés</button>
            <button class="btn btn-sub" onclick="location.href='creator.html'">Új Karakter Indítása</button>
        </div>

        <div class="patch-notes">
            <div class="patch-header">📜 Krónikák</div>
            <div id="patch-text" class="patch-content">A birodalom békés.</div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyBg2WzLqxt0QRDkDiUKYrGRCw0Kg-gr1OU", 
            authDomain: "dnd-tracker-4fe05.firebaseapp.com", 
            projectId: "dnd-tracker-4fe05", 
            databaseURL: "https://dnd-tracker-4fe05-default-rtdb.europe-west1.firebasedatabase.app" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let chars = {};
        let selId = null;

        db.ref('characters').on('value', s => { chars = s.val() || {}; });
        db.ref('settings/patchNotes').on('value', s => { document.getElementById('patch-text').innerHTML = s.val() || ""; });

        const inp = document.getElementById('hero-search');
        const list = document.getElementById('autocomplete-list');

        inp.addEventListener('input', function() {
            const val = this.value.toLowerCase();
            list.innerHTML = '';
            if (!val) { list.style.display = 'none'; return; }
            Object.keys(chars).forEach(id => {
                if (chars[id].name && chars[id].name.toLowerCase().includes(val)) {
                    const d = document.createElement('div');
                    d.className = 'suggestion-item';
                    d.innerText = chars[id].name;
                    d.onclick = () => {
                        inp.value = chars[id].name;
                        selId = id;
                        list.style.display = 'none';
                    };
                    list.appendChild(d);
                }
            });
            list.style.display = list.childElementCount > 0 ? 'block' : 'none';
        });

        function login() {
            const pin = document.getElementById('login-pin').value;
            if (selId && chars[selId].pin.toString() === pin) {
                localStorage.setItem('selectedCharId', selId);
                window.location.href = 'index.html';
            } else { alert("Hiba!"); }
        }
    </script>
</body>
</html>

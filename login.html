<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Death's Armada - Adventurers</title>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Crimson+Text:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --accent: #8b0000; --glass: rgba(10, 10, 12, 0.95); }
        
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000;
            background-image: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0) 50%, rgba(0,0,0,0.8) 100%), 
                             url('https://i.ibb.co/5XNkZKLq/fantasy-group-adventurers.jpg');
            background-size: cover; background-position: center center;
            background-repeat: no-repeat; background-attachment: fixed;
            overflow: hidden; display: flex; align-items: center; justify-content: center;
            font-family: 'MedievalSharp', serif;
        }

        /* KRÓNIKÁK - JOBB FENT */
        .patch-notes { 
            position: fixed; top: 30px; right: 30px; width: 320px;
            background: rgba(0, 0, 0, 0.85); 
            border-right: 5px solid var(--accent);
            padding: 15px; z-index: 10;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5); text-align: right;
        }
        .patch-header { color: var(--gold); font-size: 20px; margin-bottom: 5px; text-transform: uppercase; border-bottom: 1px solid #333; }
        .patch-content { font-family: 'Crimson Text', serif; font-style: italic; color: #aaa; font-size: 17px; }

        /* BEJELENTKEZÉS KONTÉNER */
        .login-container { position: relative; margin-top: 40vh; width: 440px; z-index: 20; }

        .card { 
            background: var(--glass); border: 2px solid var(--gold); 
            padding: 30px; text-align: center; backdrop-filter: blur(15px);
            border-image: linear-gradient(to bottom, #c5a059, #4a3511) 1;
            box-shadow: 0 10px 50px rgba(0,0,0,0.9);
        }
        
        .logo { 
            font-size: 40px; color: #fff;
            text-shadow: 0px 0px 15px var(--accent), 2px 2px 2px #000; 
            margin-bottom: 25px; text-transform: uppercase;
        }
        
        .search-container { position: relative; width: 100%; margin-bottom: 15px; }

        input { 
            width: 100%; padding: 15px; background: rgba(255,255,255,0.95); 
            border: 1px solid #000; color: #000; font-family: 'MedievalSharp'; 
            font-size: 22px; box-sizing: border-box; text-align: center;
        }

        .autocomplete-box {
            position: absolute; bottom: 100%; left: 0; width: 100%; 
            background: #111; border: 1px solid var(--gold); 
            max-height: 180px; overflow-y: auto; display: none; z-index: 999;
        }

        .suggestion-item { padding: 12px; color: var(--gold); font-size: 18px; cursor: pointer; text-align: left; }
        .suggestion-item:hover { background: var(--accent); color: white; }

        .btn { 
            width: 100%; padding: 18px; cursor: pointer; 
            text-transform: uppercase; font-family: 'MedievalSharp'; 
            font-weight: bold; border: none; font-size: 22px; transition: 0.3s;
        }
        .btn-main { background: var(--accent); color: white; margin-bottom: 10px; }
        .btn-main:hover { background: #b00000; letter-spacing: 2px; }
        .btn-sub { background: transparent; color: var(--gold); border: 1px solid rgba(197, 160, 89, 0.4); font-size: 15px; opacity: 0.8; }
        .btn-sub:hover { opacity: 1; border-color: var(--gold); }
    </style>
</head>
<body>

    <div class="patch-notes">
        <div class="patch-header">📜 Krónikák</div>
        <div id="patch-text" class="patch-content">A birodalom békés...</div>
    </div>

    <div class="login-container">
        <div class="card">
            <div class="logo">Death's Armada</div>
            
            <div class="search-container">
                <input type="text" id="hero-search" placeholder="Kalandor neve..." autocomplete="off">
                <div id="autocomplete-list" class="autocomplete-box"></div>
            </div>

            <input type="password" id="login-pin" placeholder="PIN KÓD" maxlength="4" style="margin-bottom: 15px;">
            
            <button type="button" class="btn btn-main" onclick="login()">Belépés</button>
            <button type="button" class="btn btn-sub" onclick="location.href='creator.html'">Új Karakter Indítása</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyBg2WzLqxt0QRDkDiUKYrGRCw0Kg-gr1OU", 
            authDomain: "dnd-tracker-4fe05.firebaseapp.com", 
            projectId: "dnd-tracker-4fe05", 
            databaseURL: "https://dnd-tracker-4fe05-default-rtdb.europe-west1.firebasedatabase.app" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let chars = {};
        let selId = null;
        let charsReady = false;

        // Karakterek és Krónikák betöltése
        db.ref('characters').on('value', s => {
            chars = s.val() || {};
            charsReady = true;
        });
        db.ref('settings/patchNotes').on('value', s => { 
            document.getElementById('patch-text').innerText = s.val() || "A birodalom békés."; 
        });

        const inp = document.getElementById('hero-search');
        const list = document.getElementById('autocomplete-list');

        // Kereső logika
        inp.addEventListener('input', function() {
            const val = this.value.toLowerCase();
            list.innerHTML = '';
            selId = null; // Ha gépel, reseteljük a kiválasztást
            
            if (!val) { list.style.display = 'none'; return; }
            
            Object.keys(chars).forEach(id => {
                if (chars[id].name && chars[id].name.toLowerCase().includes(val)) {
                    const d = document.createElement('div');
                    d.className = 'suggestion-item';
                    d.innerText = chars[id].name;
                    d.onclick = () => { 
                        inp.value = chars[id].name; 
                        selId = id; 
                        list.style.display = 'none'; 
                    };
                    list.appendChild(d);
                }
            });
            list.style.display = list.childElementCount > 0 ? 'block' : 'none';
        });

        function normalizeName(s) {
            return (s || '').trim().replace(/\s+/g, ' ');
        }

        function resolveCharIdByName(nameInput) {
            const want = normalizeName(nameInput).toLowerCase();
            if (!want) return null;
            return Object.keys(chars).find(id => {
                const c = chars[id];
                return c && normalizeName(c.name).toLowerCase() === want;
            }) || null;
        }

        // Belépés logika
        function login() {
            if (!charsReady) {
                alert("Még töltődnek a kalandorok az adatbázisból — várj egy másodpercet, és próbáld újra.");
                return;
            }
            const pin = document.getElementById('login-pin').value.trim();
            const nameInput = normalizeName(inp.value);

            let id = selId;
            const selStillMatches = id && chars[id] && normalizeName(chars[id].name).toLowerCase() === nameInput.toLowerCase();
            if (!id || !selStillMatches) {
                id = resolveCharIdByName(nameInput);
            }

            const row = id ? chars[id] : null;
            if (row && row.pin != null && String(row.pin) === pin) {
                localStorage.setItem('selectedCharId', id);
                window.location.href = 'index.html';
            } else {
                alert("Hiba a névben vagy PIN kódban!");
                selId = null;
            }
        }

        document.getElementById('login-pin').addEventListener('keydown', function (e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                login();
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Death's Armada - Anchor Fix</title>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Crimson+Text:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --accent: #8b0000; --glass: rgba(10, 10, 12, 0.98); }
        
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        #game-container {
            position: relative;
            width: 2048px;
            height: 1024px;
            background-image: linear-gradient(to right, rgba(0,0,0,0.85) 15%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.8) 100%), 
                             url('https://i.ibb.co/bZBtvtf/Copilot-20260406-162751.png');
            background-size: 100% 100%;
            transform-origin: center center;
            box-shadow: 0 0 100px rgba(0,0,0,1);
            flex-shrink: 0;
        }

        /* PATCH NOTES - MARAD A BAL FELSŐ SAROKBAN */
        .patch-notes { 
            position: absolute;
            top: 30px;
            left: 30px;
            width: 380px;
            background: rgba(0, 0, 0, 0.85); 
            border-left: 5px solid var(--accent);
            padding: 20px;
            z-index: 10;
        }
        .patch-header { color: var(--gold); font-size: 22px; margin-bottom: 5px; text-transform: uppercase; border-bottom: 1px solid #333; }
        .patch-content { font-family: 'Crimson Text', serif; font-style: italic; color: #aaa; font-size: 18px; max-height: 150px; overflow-y: auto; }

        /* EZ A LÉNYEG: Láthatatlan Igazító a halálfejhez */
        .focus-aligner {
            position: absolute;
            top: 400px; /* A halálfej hozzávetőleges függőleges pozíciója */
            left: 1100px; /* A halálfej hozzávetőleges vízszintes pozíciója */
            width: 1px;
            height: 1px;
            /* background: magenta; // Vedd ki a kommentet az igazításhoz! */
        }

        /* A Bejelentkezési panel az igazítóhoz láncolva alul */
        .anchored-panel {
            position: absolute;
            top: 350px; /* Távolság az igazító ponttól (lefelé tolva a völgybe) */
            left: 50%;
            transform: translateX(-50%); /* Középre igazítja magát a panelen */
            width: 480px;
            z-index: 20;
        }

        .card { 
            background: var(--glass); 
            border: 2px solid var(--gold); 
            padding: 35px; 
            text-align: center; 
            backdrop-filter: blur(15px);
            border-image: linear-gradient(to bottom, #c5a059, #4a3511) 1;
        }
        
        .logo { 
            font-size: 52px;
            color: #fff;
            text-shadow: 0px 0px 15px var(--accent), 2px 2px 2px #000; 
            margin-bottom: 30px; 
            text-transform: uppercase;
            font-family: 'MedievalSharp';
        }
        
        .search-container { position: relative; width: 100%; margin-bottom: 15px; }

        input { 
            width: 100%; padding: 18px; background: rgba(255,255,255,0.95); 
            border: 1px solid #444; color: #000; font-family: 'MedievalSharp'; 
            font-size: 24px; box-sizing: border-box; text-align: center;
        }

        .autocomplete-box {
            position: absolute; top: 100%; left: 0; width: 100%; 
            background: #0a0a0a; border: 1px solid var(--gold); 
            max-height: 250px; overflow-y: auto; display: none; z-index: 999; 
        }

        .suggestion-item { padding: 15px; color: var(--gold); font-size: 20px; cursor: pointer; text-align: left; }
        .suggestion-item:hover { background: var(--accent); color: white; }

        .btn { 
            width: 100%; padding: 20px; cursor: pointer; 
            text-transform: uppercase; font-family: 'MedievalSharp'; 
            font-weight: bold; border: none; font-size: 24px; transition: 0.3s;
        }
        .btn-main { background: var(--accent); color: white; margin-bottom: 15px; }
        .btn-sub { background: transparent; color: var(--gold); border: 1px solid rgba(197, 160, 89, 0.3); font-size: 16px; opacity: 0.7; }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="patch-notes">
            <div class="patch-header">📜 Krónikák</div>
            <div id="patch-text" class="patch-content">A birodalom békés.</div>
        </div>

        <div class="focus-aligner">
            <div class="anchored-panel">
                <div class="card">
                    <div class="logo">Death's Armada</div>
                    
                    <div class="search-container">
                        <input type="text" id="hero-search" placeholder="Kalandor neve..." autocomplete="off">
                        <div id="autocomplete-list" class="autocomplete-box"></div>
                    </div>

                    <input type="password" id="login-pin" placeholder="PIN KÓD" maxlength="4" style="margin-bottom: 20px;">
                    
                    <button class="btn btn-main" onclick="login()">Belépés</button>
                    <button class="btn btn-sub" onclick="location.href='creator.html'">Új Karakter Indítása</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script>
        function scale() {
            const c = document.getElementById('game-container');
            const s = Math.min(window.innerWidth / 2048, window.innerHeight / 1024);
            c.style.transform = `scale(${s})`;
        }
        window.onresize = scale;
        window.onload = scale;

        // Firebase Config (eredeti)
        const firebaseConfig = { 
            apiKey: "AIzaSyBg2WzLqxt0QRDkDiUKYrGRCw0Kg-gr1OU", 
            authDomain: "dnd-tracker-4fe05.firebaseapp.com", 
            projectId: "dnd-tracker-4fe05", 
            databaseURL: "https://dnd-tracker-4fe05-default-rtdb.europe-west1.firebasedatabase.app" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let chars = {};
        let selId = null;

        db.ref('characters').on('value', s => { chars = s.val() || {}; });
        db.ref('settings/patchNotes').on('value', s => { document.getElementById('patch-text').innerHTML = s.val() || "A birodalom békés."; });

        const inp = document.getElementById('hero-search');
        const list = document.getElementById('autocomplete-list');

        inp.addEventListener('input', function() {
            const val = this.value.toLowerCase();
            list.innerHTML = '';
            if (!val) { list.style.display = 'none'; return; }
            Object.keys(chars).forEach(id => {
                if (chars[id].name && chars[id].name.toLowerCase().includes(val)) {
                    const d = document.createElement('div');
                    d.className = 'suggestion-item';
                    d.innerText = chars[id].name;
                    d.onclick = () => {
                        inp.value = chars[id].name;
                        selId = id;
                        list.style.display = 'none';
                    };
                    list.appendChild(d);
                }
            });
            list.style.display = list.childElementCount > 0 ? 'block' : 'none';
        });

        function login() {
            const pin = document.getElementById('login-pin').value;
            if (selId && chars[selId].pin.toString() === pin) {
                localStorage.setItem('selectedCharId', selId);
                window.location.href = 'index.html';
            } else { alert("Hiba a névben vagy PIN kódban!"); }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Death's Armada - Square Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Crimson+Text:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --bg: #050507; --accent: #8b0000; --glass: rgba(10, 10, 12, 0.95); }
        
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        /* FIX NÉGYZETES KONTÉNER (1024x1024) */
        #game-container {
            position: relative;
            width: 1024px;
            height: 1024px;
            /* A háttérkép most pontosan 1:1 arányban tölti ki a területet */
            background: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.8) 100%), 
                        url('https://i.ibb.co/4QPwwQM/Copilot-20260406-153524.png');
            background-size: 100% 100%; 
            background-position: center;
            overflow: hidden;
            transform-origin: center center;
            box-shadow: 0 0 100px rgba(0,0,0,1);
            flex-shrink: 0;
        }

        /* A panel középre vagy egy kicsit eltolva a négyzetben */
        .side-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%); /* Teljesen középre igazítva a négyzetben */
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 400px;
            z-index: 10;
        }

        .card { 
            background: var(--glass); 
            border: 2px solid var(--gold); 
            padding: 30px; 
            text-align: center; 
            backdrop-filter: blur(8px);
            border-image: linear-gradient(to bottom, #c5a059, #4a3511) 1;
        }
        
        .logo { 
            font-size: 48px;
            color: #fff;
            text-shadow: 0px 0px 15px var(--accent), 2px 2px 2px #000; 
            margin-bottom: 20px; 
            text-transform: uppercase;
            font-family: 'MedievalSharp';
        }
        
        input { 
            width: 100%; padding: 15px; background: rgba(0,0,0,0.8); 
            border: 1px solid #444; color: var(--gold); font-family: 'MedievalSharp'; 
            font-size: 20px; margin-bottom: 12px; box-sizing: border-box; text-align: center;
        }

        .btn { 
            width: 100%; padding: 15px; cursor: pointer; 
            text-transform: uppercase; font-family: 'MedievalSharp'; 
            font-weight: bold; border: 1px solid var(--gold);
            font-size: 20px;
        }
        .btn-main { background: var(--accent); color: white; margin-bottom: 10px; }
        .btn-sub { background: transparent; color: var(--gold); font-size: 16px; opacity: 0.7; }

        .patch-notes { 
            background: rgba(0, 0, 0, 0.85); 
            border-left: 4px solid var(--accent);
            padding: 20px;
        }
        .patch-header { color: var(--gold); font-size: 22px; margin-bottom: 8px; border-bottom: 1px solid #333; }
        .patch-content { font-family: 'Crimson Text', serif; font-style: italic; font-size: 18px; color: #aaa; max-height: 100px; overflow-y: auto; }

        .autocomplete-box {
            position: absolute; width: 100%; background: #0a0a0a; 
            border: 1px solid var(--gold); max-height: 200px; overflow-y: auto; 
            display: none; z-index: 9999;
        }
        .suggestion-item { padding: 12px; color: var(--gold); font-size: 18px; cursor: pointer; text-align: left; }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="side-panel">
            <div class="card">
                <div class="logo">Death's Armada</div>
                
                <div style="position: relative;">
                    <input type="text" id="hero-search" placeholder="Kalandor neve..." autocomplete="off">
                    <div id="autocomplete-list" class="autocomplete-box"></div>
                </div>

                <input type="password" id="login-pin" placeholder="PIN KÓD" maxlength="4">
                
                <button class="btn btn-main" onclick="login()">Belépés</button>
                <button class="btn btn-sub" onclick="location.href='creator.html'">Új Karakter Indítása</button>
            </div>

            <div class="patch-notes">
                <div class="patch-header">📜 Krónikák</div>
                <div id="patch-text" class="patch-content">A birodalom hírei...</div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script>
        function scaleContainer() {
            const container = document.getElementById('game-container');
            // Most 1024-re skálázunk minden irányba
            const scale = Math.min(window.innerWidth / 1024, window.innerHeight / 1024);
            container.style.transform = `scale(${scale})`;
        }
        window.addEventListener('resize', scaleContainer);
        window.addEventListener('load', scaleContainer);

        const firebaseConfig = { 
            apiKey: "AIzaSyBg2WzLqxt0QRDkDiUKYrGRCw0Kg-gr1OU", 
            authDomain: "dnd-tracker-4fe05.firebaseapp.com", 
            projectId: "dnd-tracker-4fe05", 
            databaseURL: "https://dnd-tracker-4fe05-default-rtdb.europe-west1.firebasedatabase.app" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let characters = {};
        let selectedId = null;

        db.ref('characters').on('value', snap => { characters = snap.val() || {}; });

        const searchInput = document.getElementById('hero-search');
        const listContainer = document.getElementById('autocomplete-list');

        searchInput.addEventListener('input', function() {
            const val = this.value.trim().toLowerCase();
            listContainer.innerHTML = '';
            if (!val) { listContainer.style.display = 'none'; return; }

            Object.keys(characters).forEach(id => {
                const char = characters[id];
                if (char && char.name && char.name.toLowerCase().includes(val)) {
                    const item = document.createElement('div');
                    item.className = 'suggestion-item';
                    item.innerText = char.name;
                    item.onclick = () => {
                        searchInput.value = char.name;
                        selectedId = id;
                        listContainer.style.display = 'none';
                    };
                    listContainer.appendChild(item);
                }
            });
            listContainer.style.display = listContainer.childElementCount > 0 ? 'block' : 'none';
        });

        function login() {
            const pin = document.getElementById('login-pin').value;
            if (selectedId && characters[selectedId] && characters[selectedId].pin.toString() === pin) {
                localStorage.setItem('selectedCharId', selectedId);
                window.location.href = 'index.html';
            } else { alert("Hiba!"); }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Death's Armada - Fixed Ratio</title>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Crimson+Text:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --bg: #050507; --accent: #8b0000; --glass: rgba(10, 10, 12, 0.95); }
        
        /* Teljes sötétség a háttérben, ha nem passzol az arány */
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        /* A KÉP ARÁNYÁHOZ IGAZÍTOTT KONTÉNER (1792x1024) */
        .page-wrapper {
            position: relative;
            width: 100vw;
            height: 57.14vw; /* 1024/1792 arány */
            max-height: 100vh;
            max-width: 175vh; /* 1792/1024 arány */
            background-image: linear-gradient(to right, rgba(0,0,0,0.85) 10%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.8) 100%), 
                             url('https://i.ibb.co/4QPwwQM/Copilot-20260406-153524.png');
            background-size: 100% 100%; /* Kitölti a fix területet */
            background-position: center;
            display: flex;
            align-items: center;
            padding-left: 6%;
            box-sizing: border-box;
            box-shadow: 0 0 100px rgba(0,0,0,1);
        }

        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 25%; /* A szélességet is arányosítottam */
            min-width: 350px;
            z-index: 10;
        }

        .card { 
            background: var(--glass); 
            border: 2px solid var(--gold); 
            padding: 30px; 
            border-radius: 2px; 
            text-align: center; 
            box-shadow: 0 0 50px rgba(0,0,0,1); 
            backdrop-filter: blur(10px);
            border-image: linear-gradient(to bottom, #c5a059, #4a3511) 1;
        }
        
        .logo { 
            font-size: 2.8vw; /* Betűméret is arányosan változik */
            min-size: 28px;
            color: #fff;
            text-shadow: 0px 0px 15px var(--accent), 2px 2px 2px #000; 
            margin-bottom: 25px; 
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        
        .input-group { position: relative; margin-bottom: 15px; }

        input { 
            width: 100%; padding: 14px; background: rgba(0,0,0,0.8); 
            border: 1px solid #444; color: var(--gold); font-family: 'MedievalSharp'; 
            font-size: 1.1em; transition: 0.3s; box-sizing: border-box; text-align: center;
        }
        input:focus { border-color: var(--gold); outline: none; box-shadow: 0 0 10px rgba(197, 160, 89, 0.3); }
        
        .autocomplete-box {
            position: absolute; top: 100%; left: 0; width: 100%;
            background: #0a0a0a; border: 1px solid var(--gold);
            max-height: 180px; overflow-y: auto; display: none;
            z-index: 9999 !important;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .suggestion-item {
            padding: 12px; text-align: left; cursor: pointer;
            border-bottom: 1px solid #222; color: var(--gold); font-size: 0.95em;
        }
        .suggestion-item:hover { background: var(--accent); color: white; }

        .patch-notes { 
            background: rgba(0, 0, 0, 0.8); 
            border-left: 3px solid var(--accent);
            padding: 20px;
        }
        .patch-header { 
            color: var(--gold); font-size: 1.1em; text-transform: uppercase; 
            margin-bottom: 8px; border-bottom: 1px solid #333; padding-bottom: 5px;
        }
        .patch-content { 
            font-family: 'Crimson Text', serif; font-style: italic; 
            font-size: 1em; color: #aaa; max-height: 120px; overflow-y: auto; line-height: 1.4; 
        }

        .btn { 
            width: 100%; padding: 14px; cursor: pointer; 
            text-transform: uppercase; transition: 0.3s; font-family: 'MedievalSharp'; 
            font-weight: bold; letter-spacing: 2px; border: 1px solid var(--gold);
        }
        .btn-main { background: var(--accent); color: white; margin-bottom: 10px; }
        .btn-main:hover { background: #b00000; letter-spacing: 3px; }
        .btn-sub { background: transparent; color: var(--gold); font-size: 0.8em; opacity: 0.6; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: var(--gold); }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <div class="side-panel">
            <div class="card">
                <div class="logo">Death's Armada</div>
                
                <div class="input-group">
                    <input type="text" id="hero-search" placeholder="Kalandor neve..." autocomplete="off">
                    <div id="autocomplete-list" class="autocomplete-box"></div>
                    <div id="found-hint" class="name-exists-hint" style="color: #59c559; font-size: 0.85em; margin-top: 5px; display: none;">✓ Ismert kalandor</div>
                </div>

                <input type="password" id="login-pin" placeholder="PIN KÓD" maxlength="4" inputmode="numeric">
                
                <button class="btn btn-main" onclick="login()">Belépés</button>
                <button class="btn btn-sub" onclick="location.href='creator.html'">Új Karakter Indítása</button>
            </div>

            <div class="patch-notes">
                <div class="patch-header">📜 Krónikák</div>
                <div id="patch-text" class="patch-content">Tollasodnak a hírek...</div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyBg2WzLqxt0QRDkDiUKYrGRCw0Kg-gr1OU", 
            authDomain: "dnd-tracker-4fe05.firebaseapp.com", 
            projectId: "dnd-tracker-4fe05", 
            databaseURL: "https://dnd-tracker-4fe05-default-rtdb.europe-west1.firebasedatabase.app" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let characters = {};
        let selectedId = null;

        db.ref('settings/patchNotes').on('value', snap => {
            document.getElementById('patch-text').innerHTML = snap.val() || "A birodalom békés.";
        });

        db.ref('characters').on('value', snap => { characters = snap.val() || {}; });

        const searchInput = document.getElementById('hero-search');
        const listContainer = document.getElementById('autocomplete-list');
        const hint = document.getElementById('found-hint');

        searchInput.addEventListener('input', function() {
            const val = this.value.trim().toLowerCase();
            listContainer.innerHTML = '';
            hint.style.display = 'none';
            selectedId = null;

            if (!val) { listContainer.style.display = 'none'; return; }

            let matches = 0;
            Object.keys(characters).forEach(id => {
                const charData = characters[id];
                if (charData && charData.name) {
                    const charName = charData.name;
                    if (charName.toLowerCase().includes(val)) {
                        const item = document.createElement('div');
                        item.className = 'suggestion-item';
                        const regex = new RegExp(`(${val})`, 'gi');
                        item.innerHTML = charName.replace(regex, "<b>$1</b>");
                        item.onclick = () => {
                            searchInput.value = charName;
                            selectedId = id;
                            listContainer.style.display = 'none';
                            hint.style.display = 'block';
                        };
                        listContainer.appendChild(item);
                        matches++;
                    }
                }
            });
            listContainer.style.display = matches > 0 ? 'block' : 'none';
        });

        function login() {
            const nameInput = searchInput.value.trim().toLowerCase();
            const pin = document.getElementById('login-pin').value;
            if (!selectedId) {
                selectedId = Object.keys(characters).find(id => 
                    characters[id] && characters[id].name && characters[id].name.toLowerCase() === nameInput
                );
            }
            if (selectedId && characters[selectedId].pin.toString() === pin) {
                localStorage.setItem('selectedCharId', selectedId);
                window.location.href = 'index.html';
            } else { alert("Hiba!"); }
        }
    </script>
</body>
</html>

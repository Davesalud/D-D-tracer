<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Death's Armada - Adventurers</title>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Crimson+Text:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="responsive.css">
    <style>

        /* KRÓNIKÁK - JOBB FENT */
        .patch-notes { 
            position: fixed; top: 30px; right: 30px; width: 320px;
            background: rgba(0, 0, 0, 0.85); 
            border-right: 5px solid var(--accent);
            padding: 15px; z-index: 10;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5); text-align: right;
        }
        .patch-header { color: var(--gold); font-size: 20px; margin-bottom: 5px; text-transform: uppercase; border-bottom: 1px solid #333; }
        .patch-content { font-family: 'Crimson Text', serif; font-style: italic; color: #aaa; font-size: 17px; }

        /* BEJELENTKEZÉS KONTÉNER */
        .login-container { position: relative; margin: 24px auto; width: min(440px, 92vw); z-index: 20; flex-shrink: 0; }

        
        
        .logo { 
            font-size: 40px; color: #fff;
            text-shadow: 0px 0px 15px var(--accent), 2px 2px 2px #000; 
            margin-bottom: 25px; text-transform: uppercase;
        }
        
        /* Csak az input és a lista kapjon kattintást — így nem „nyel el” eseményt a kártya más része felé */
        .search-container { position: relative; width: 100%; margin-bottom: 15px; pointer-events: none; }
        .search-container #hero-search,
        .search-container .autocomplete-box,
        .search-container .suggestion-item { pointer-events: auto; }

        input { 
            width: 100%; padding: 15px; background: rgba(255,255,255,0.95); 
            border: 1px solid #000; color: #000; font-family: 'MedievalSharp'; 
            font-size: 22px; box-sizing: border-box; text-align: center;
        }

        .autocomplete-box {
            position: absolute; bottom: 100%; left: 0; width: 100%; 
            background: #111; border: 1px solid var(--gold); 
            max-height: 180px; overflow-y: auto; display: none; z-index: 5;
        }

        .suggestion-item { padding: 12px; color: var(--gold); font-size: 18px; cursor: pointer; text-align: left; }
        .suggestion-item:hover { background: var(--accent); color: white; }
.login-actions {
            margin-top: 4px;
            position: relative;
            z-index: 50;
            isolation: isolate;
        }
        .btn-main {
            background: var(--accent); color: white; margin: 0; min-height: 52px;
            width: 100%;
            touch-action: manipulation;
            position: relative;
            z-index: 2;
        }
        .btn-main:hover { background: #b00000; filter: brightness(1.05); }
        /* A creator nem <a href> — csak JS, és a kártyán kívül van, hogy ne érjen rá a Belépésre */
        .creator-below {
            margin-top: 20px;
            text-align: center;
        }
        .btn-text-creator {
            background: none;
            border: none;
            padding: 8px 12px;
            font-size: 14px;
            font-family: 'MedievalSharp', serif;
            color: rgba(197, 160, 89, 0.75);
            text-decoration: underline;
            cursor: pointer;
            touch-action: manipulation;
        }
        .btn-text-creator:hover { color: var(--gold); }
    </style>
</head>
<body class="page-login">

    <div class="patch-notes">
        <div class="patch-header">📜 Krónikák</div>
        <div id="patch-text" class="patch-content">A birodalom békés...</div>
    </div>

    <div class="login-container">
        <div class="card">
            <div class="logo">Death's Armada</div>
            
            <div class="search-container">
                <input type="text" id="hero-search" placeholder="Kalandor neve..." autocomplete="off">
                <div id="autocomplete-list" class="autocomplete-box"></div>
            </div>

            <input type="password" id="login-pin" placeholder="PIN KÓD" maxlength="4" style="margin-bottom: 15px;">

            <div class="login-actions">
                <button type="button" class="btn btn-main" id="btn-login">Belépés</button>
            </div>
        </div>
        <div class="creator-below">
            <button type="button" class="btn-text-creator" id="btn-go-creator" title="Új karakter létrehozása">Új karakter indítása</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="firebase-credentials.js"></script>
    <script>
        const db = window.initFirebaseDb();

        let chars = {};
        let selId = null;

        // Karakterek és Krónikák betöltése
        db.ref('characters').on('value', s => { chars = s.val() || {}; });
        db.ref('settings/patchNotes').on('value', s => { 
            document.getElementById('patch-text').innerText = s.val() || "A birodalom békés."; 
        });

        const inp = document.getElementById('hero-search');
        const list = document.getElementById('autocomplete-list');
        document.getElementById('btn-login').addEventListener('click', function (e) {
            e.preventDefault();
            e.stopImmediatePropagation();
            login();
        }, true);
        document.getElementById('btn-go-creator').addEventListener('click', function (e) {
            e.preventDefault();
            e.stopPropagation();
            window.location.href = 'creator.html';
        });
        document.getElementById('login-pin').addEventListener('keydown', function (e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                login();
            }
        });

        // Kereső logika
        inp.addEventListener('input', function() {
            const val = this.value.toLowerCase();
            list.innerHTML = '';
            selId = null; // Ha gépel, reseteljük a kiválasztást
            
            if (!val) { list.style.display = 'none'; return; }
            
            Object.keys(chars).forEach(id => {
                if (chars[id].name && chars[id].name.toLowerCase().includes(val)) {
                    const d = document.createElement('div');
                    d.className = 'suggestion-item';
                    d.innerText = chars[id].name;
                    d.onclick = () => { 
                        inp.value = chars[id].name; 
                        selId = id; 
                        list.style.display = 'none'; 
                    };
                    list.appendChild(d);
                }
            });
            list.style.display = list.childElementCount > 0 ? 'block' : 'none';
        });

        // Belépés logika
        function login() {
            const pin = document.getElementById('login-pin').value;
            const nameInput = inp.value.trim();

            // Ha nem kattintott a listára, megkeressük név alapján
            if (!selId) {
                selId = Object.keys(chars).find(id => chars[id].name === nameInput);
            }

            if (selId && chars[selId].pin && chars[selId].pin.toString() === pin) {
                try { localStorage.setItem('selectedCharId', selId); } catch (e) {}
                try { sessionStorage.setItem('selectedCharId', selId); } catch (e2) {}
                /* ?c= — az auth-guard akkor is felismeri a karaktert, ha a tároló nem elérhető */
                window.location.href = 'index.html?c=' + encodeURIComponent(selId);
            } else { 
                alert("Hiba a névben vagy PIN kódban!"); 
                selId = null;
            }
        }
    </script>
</body>
</html>

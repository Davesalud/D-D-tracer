<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Death's Armada - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Crimson+Text:ital@1&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --bg: #050507; --accent: #8b0000; --glass: rgba(15, 15, 18, 0.95); }
        
        body { 
            font-family: 'MedievalSharp', cursive; 
            background-color: var(--bg); 
            color: white; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            overflow-x: hidden;
            overflow-y: auto;
        }

        .master-bg { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.7)), url('https://i.ibb.co/k2cqD5TF/1b9b48cc-e761-4b0b-a9ea-578e6672b24e.jpg'); 
            background-size: cover; 
            background-position: center top; 
            z-index: -1; 
        }
        
        .main-container { 
            display: flex; 
            gap: 30px; 
            max-width: 1000px; 
            width: 95%; 
            align-items: stretch; 
            z-index: 10; 
            padding: 20px 0;
        }

        .patch-notes { 
            flex: 1; background: var(--glass); border: 1px solid rgba(197, 160, 89, 0.2); 
            padding: 25px; border-radius: 4px; box-shadow: 0 10px 40px black;
            backdrop-filter: blur(8px); display: flex; flex-direction: column;
        }
        .patch-header { color: var(--gold); border-bottom: 1px solid var(--gold); margin-bottom: 15px; font-size: 1.3em; text-transform: uppercase; letter-spacing: 2px; }
        .patch-content { font-family: 'Crimson Text', serif; font-style: italic; font-size: 1.1em; color: #ddd; overflow-y: auto; max-height: 350px; line-height: 1.6; }

        .card { 
            width: 420px; background: var(--glass); border: 2px solid var(--gold); 
            padding: 40px; border-radius: 4px; text-align: center; 
            box-shadow: 0 0 60px rgba(0,0,0,1); 
            backdrop-filter: blur(12px); position: relative;
            box-sizing: border-box;
        }
        
        .logo { font-size: 3.2em; color: var(--accent); text-shadow: 2px 2px 10px black, 0 0 20px rgba(139,0,0,0.5); margin-bottom: 35px; letter-spacing: -1px; }
        
        input { 
            width: 100%; padding: 16px; margin-bottom: 20px; background: rgba(0,0,0,0.7); 
            border: 1px solid #444; color: var(--gold); font-family: 'MedievalSharp'; 
            font-size: 1.1em; transition: 0.3s; box-sizing: border-box; text-align: center;
        }
        input:focus { border-color: var(--gold); outline: none; background: rgba(20,20,20,0.8); }

        /* --- KERESÉSI LISTA JAVÍTÁSA --- */
        #search-results { 
            background: #111 !important; 
            border: 1px solid var(--gold); 
            border-top: none;
            max-height: 200px; 
            overflow-y: auto; 
            margin-top: -20px; 
            margin-bottom: 20px; 
            display: none; 
            position: absolute; 
            width: 100%; 
            z-index: 9999; /* Legyen legfelül */
            box-shadow: 0 10px 30px black;
            left: 0;
        }
        .search-item { 
            padding: 14px; 
            cursor: pointer; 
            border-bottom: 1px solid #222; 
            text-align: left; 
            color: var(--gold);
            background: #111;
        }
        .search-item:hover { background: var(--accent); color: white; }

        .btn { 
            width: 100%; padding: 16px; cursor: pointer; border: 1px solid var(--gold); 
            text-transform: uppercase; transition: 0.3s; font-family: 'MedievalSharp'; 
            margin-bottom: 12px; font-weight: bold; letter-spacing: 2px; display: flex; align-items: center; justify-content: center;
        }
        .btn-main { background: var(--accent); color: white; border: none; font-size: 1.2em; }
        .btn-main:hover { background: #b00000; transform: translateY(-3px); }

        .btn-sub { background: transparent; color: var(--gold); font-size: 0.9em; opacity: 0.8; margin-top: 10px; border: 1px solid transparent; }
        .btn-sub:hover { opacity: 1; border-color: var(--gold); }

        @media (max-width: 850px) {
            body { align-items: flex-start; }
            .main-container { flex-direction: column-reverse; width: 90%; gap: 20px; padding: 40px 0; }
            .card { width: 100%; padding: 25px; }
            .logo { font-size: 2.2em; }
        }
    </style>
</head>
<body>
    <div class="master-bg"></div>

    <div class="main-container">
        <div class="patch-notes">
            <div class="patch-header">📜 Fejlesztői Napló</div>
            <div id="patch-text" class="patch-content">Betöltés...</div>
        </div>

        <div class="card">
            <div class="logo">Death's Armada</div>
            <div style="position: relative; width: 100%;">
                <input type="text" id="hero-search" placeholder="Kalandor neve..." autocomplete="off">
                <div id="search-results"></div>
            </div>
            <input type="password" id="login-pin" placeholder="PIN KÓD" maxlength="4" inputmode="numeric">
            <button class="btn btn-main" onclick="login()">Belépés</button>
            <button class="btn btn-sub" onclick="location.href='creator.html'">✨ Új Kalandor Létrehozása</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyBg2WzLqxt0QRDkDiUKYrGRCw0Kg-gr1OU", 
            authDomain: "dnd-tracker-4fe05.firebaseapp.com", 
            projectId: "dnd-tracker-4fe05", 
            databaseURL: "https://dnd-tracker-4fe05-default-rtdb.europe-west1.firebasedatabase.app" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let chars = {}, selectedId = null;

        db.ref('settings/patchNotes').on('value', snap => {
            document.getElementById('patch-text').innerHTML = snap.val() || "Üdvözöllek vándor!";
        });

        db.ref('characters').on('value', snap => { 
            chars = snap.val() || {}; 
        });

        const searchInput = document.getElementById('hero-search');
        const resDiv = document.getElementById('search-results');

        // KERESÉS ÉS MEGJELENÍTÉS
        searchInput.addEventListener('input', (e) => {
            const text = e.target.value.toLowerCase().trim();
            resDiv.innerHTML = "";
            selectedId = null;

            if(text.length < 1) { resDiv.style.display = "none"; return; }

            let found = false;
            Object.keys(chars).forEach(id => {
                if(chars[id].name.toLowerCase().includes(text)) {
                    const d = document.createElement('div');
                    d.className = "search-item";
                    d.innerText = chars[id].name;
                    d.onclick = (event) => { 
                        event.stopPropagation();
                        searchInput.value = chars[id].name; 
                        selectedId = id; 
                        resDiv.style.display = "none"; 
                    };
                    resDiv.appendChild(d);
                    found = true;
                }
            });
            resDiv.style.display = found ? "block" : "none";
        });

        document.addEventListener('click', (e) => {
            if (e.target !== searchInput) resDiv.style.display = "none";
        });

        function login() {
            const nameInput = searchInput.value.toLowerCase().trim();
            const pin = document.getElementById('login-pin').value;

            if (!selectedId) {
                selectedId = Object.keys(chars).find(id => chars[id].name.toLowerCase() === nameInput);
            }

            if (selectedId && chars[selectedId].pin.toString() === pin) {
                localStorage.setItem('selectedCharId', selectedId);
                window.location.href = 'index.html';
            } else {
                alert("Hibás név vagy PIN!");
            }
        }
    </script>
</body>
</html>

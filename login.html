<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Death's Armada - 2048 Fix</title>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Crimson+Text:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --bg: #050507; --accent: #8b0000; --glass: rgba(10, 10, 12, 0.95); }
        
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        #game-container {
            position: relative;
            width: 2048px;
            height: 1024px;
            background: linear-gradient(to right, rgba(0,0,0,0.85) 20%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.8) 100%), 
                        url('https://i.ibb.co/bZBtvtf/Copilot-20260406-162751.png');
            background-size: 100% 100%;
            background-position: center;
            overflow: hidden;
            transform-origin: center center;
            box-shadow: 0 0 100px rgba(0,0,0,1);
            flex-shrink: 0;
        }

        .side-panel {
            position: absolute;
            top: 50%;
            left: 100px;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 30px;
            width: 500px; /* Szélesebb panel a jobb olvashatóságért */
            z-index: 10;
        }

        .card { 
            background: var(--glass); 
            border: 2px solid var(--gold); 
            padding: 40px; 
            text-align: center; 
            backdrop-filter: blur(15px);
            border-image: linear-gradient(to bottom, #c5a059, #4a3511) 1;
        }
        
        .logo { 
            font-size: 60px;
            color: #fff;
            text-shadow: 0px 0px 20px var(--accent), 2px 2px 2px #000; 
            margin-bottom: 40px; 
            text-transform: uppercase;
            font-family: 'MedievalSharp';
        }
        
        /* INPUT CSOPORT JAVÍTÁSA */
        .input-wrapper {
            position: relative;
            width: 100%;
            margin-bottom: 20px;
        }

        input { 
            width: 100%; padding: 20px; background: rgba(0,0,0,0.8); 
            border: 1px solid #444; color: var(--gold); font-family: 'MedievalSharp'; 
            font-size: 26px; box-sizing: border-box; text-align: center;
        }

        .autocomplete-box {
            position: absolute; 
            top: 100%; 
            left: 0; 
            width: 100%; 
            background: #0a0a0a; 
            border: 1px solid var(--gold); 
            max-height: 250px; 
            overflow-y: auto; 
            display: none; 
            z-index: 9999; /* Minden felett jelenjen meg */
            box-shadow: 0 10px 30px rgba(0,0,0,0.9);
        }

        .suggestion-item { padding: 15px; color: var(--gold); font-size: 22px; cursor: pointer; text-align: left; border-bottom: 1px solid #222; }
        .suggestion-item:hover { background: var(--accent); color: white; }

        .btn { 
            width: 100%; padding: 20px; cursor: pointer; 
            text-transform: uppercase; font-family: 'MedievalSharp'; 
            font-weight: bold; border: 1px solid var(--gold);
            font-size: 24px; margin-top: 10px;
        }
        .btn-main { background: var(--accent); color: white; }
        .btn-sub { background: transparent; color: var(--gold); font-size: 18px; opacity: 0.7; margin-top: 15px; }

        .patch-notes { 
            background: rgba(0, 0, 0, 0.85); 
            border-left: 6px solid var(--accent);
            padding: 30px;
        }
        .patch-header { color: var(--gold); font-size: 28px; margin-bottom: 10px; font-family: 'MedievalSharp'; border-bottom: 1px solid #333; }
        .patch-content { font-family: 'Crimson Text', serif; font-style: italic; color: #ccc; font-size: 22px; }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="side-panel">
            <div class="card">
                <div class="logo">Death's Armada</div>
                
                <div class="input-wrapper">
                    <input type="text" id="hero-search" placeholder="Kalandor neve..." autocomplete="off">
                    <div id="autocomplete-list" class="autocomplete-box"></div>
                </div>

                <input type="password" id="login-pin" placeholder="PIN KÓD" maxlength="4" style="margin-bottom: 20px;">
                
                <button class="btn btn-main" onclick="login()">Belépés</button>
                <button class="btn btn-sub" onclick="location.href='creator.html'">Új Karakter Indítása</button>
            </div>

            <div class="patch-notes">
                <div class="patch-header">📜 Krónikák</div>
                <div id="patch-text" class="patch-content">A birodalom békés.</div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script>
        function scaleContainer() {
            const container = document.getElementById('game-container');
            const scale = Math.min(window.innerWidth / 2048, window.innerHeight / 1024);
            container.style.transform = `scale(${scale})`;
        }
        window.onresize = scaleContainer;
        window.onload = scaleContainer;

        // Firebase config (maradt az eredeti)
        const firebaseConfig = { 
            apiKey: "AIzaSyBg2WzLqxt0QRDkDiUKYrGRCw0Kg-gr1OU", 
            authDomain: "dnd-tracker-4fe05.firebaseapp.com", 
            projectId: "dnd-tracker-4fe05", 
            databaseURL: "https://dnd-tracker-4fe05-default-rtdb.europe-west1.firebasedatabase.app" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let characters = {};
        let selectedId = null;

        db.ref('characters').on('value', snap => { characters = snap.val() || {}; });
        db.ref('settings/patchNotes').on('value', snap => { document.getElementById('patch-text').innerHTML = snap.val() || "A birodalom békés."; });

        const searchInput = document.getElementById('hero-search');
        const listContainer = document.getElementById('autocomplete-list');

        searchInput.addEventListener('input', function() {
            const val = this.value.toLowerCase();
            listContainer.innerHTML = '';
            if (!val) { listContainer.style.display = 'none'; return; }

            Object.keys(characters).forEach(id => {
                if (characters[id].name && characters[id].name.toLowerCase().includes(val)) {
                    const item = document.createElement('div');
                    item.className = 'suggestion-item';
                    item.innerText = characters[id].name;
                    item.onclick = () => {
                        searchInput.value = characters[id].name;
                        selectedId = id;
                        listContainer.style.display = 'none';
                    };
                    listContainer.appendChild(item);
                }
            });
            listContainer.style.display = listContainer.childElementCount > 0 ? 'block' : 'none';
        });

        function login() {
            const pin = document.getElementById('login-pin').value;
            if (selectedId && characters[selectedId].pin.toString() === pin) {
                localStorage.setItem('selectedCharId', selectedId);
                window.location.href = 'index.html';
            } else { alert("Hiba!"); }
        }
    </script>
</body>
</html>

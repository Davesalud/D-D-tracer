<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Death's Armada - Responsive</title>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Crimson+Text:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --bg: #050507; --accent: #8b0000; --glass: rgba(10, 10, 12, 0.95); }
        
        html, body {
            margin: 0; padding: 0; width: 100%; min-height: 100vh;
            background-color: #000;
            /* A háttérkép most a teljes body-ra kerül, telibe */
            background: linear-gradient(to right, rgba(0,0,0,0.9) 10%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.8) 100%), 
                        url('https://i.ibb.co/bZBtvtf/Copilot-20260406-162751.png');
            background-size: cover; 
            background-position: center;
            background-attachment: fixed;
            display: flex; align-items: center; justify-content: flex-start;
            font-family: 'MedievalSharp', serif;
        }

        .side-panel {
            margin-left: 8%; /* Rugalmas távolság a szélétől */
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 450px;
            z-index: 10;
            padding: 20px;
        }

        .card { 
            background: var(--glass); 
            border: 2px solid var(--gold); 
            padding: 40px; 
            text-align: center; 
            backdrop-filter: blur(10px);
            border-image: linear-gradient(to bottom, #c5a059, #4a3511) 1;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }
        
        .logo { 
            font-size: clamp(32px, 5vw, 58px); /* Alkalmazkodik a kijelzőhöz */
            color: #fff;
            text-shadow: 0px 0px 15px var(--accent), 2px 2px 2px #000; 
            margin-bottom: 30px; 
            text-transform: uppercase;
        }
        
        .input-group { position: relative; width: 100%; }

        input { 
            width: 100%; padding: 18px; background: rgba(0,0,0,0.8); 
            border: 1px solid #444; color: var(--gold); font-family: 'MedievalSharp'; 
            font-size: 20px; margin-bottom: 15px; box-sizing: border-box; text-align: center;
        }
        input:focus { border-color: var(--gold); outline: none; box-shadow: 0 0 15px rgba(197, 160, 89, 0.3); }

        .btn { 
            width: 100%; padding: 18px; cursor: pointer; 
            text-transform: uppercase; transition: 0.3s; font-family: 'MedievalSharp'; 
            font-weight: bold; letter-spacing: 2px; border: 1px solid var(--gold);
            font-size: 20px;
        }
        .btn-main { background: var(--accent); color: white; margin-bottom: 15px; }
        .btn-main:hover { background: #b00000; letter-spacing: 4px; }
        .btn-sub { background: transparent; color: var(--gold); font-size: 16px; opacity: 0.7; }

        .patch-notes { 
            background: rgba(0, 0, 0, 0.8); 
            border-left: 5px solid var(--accent);
            padding: 25px;
        }
        .patch-header { 
            color: var(--gold); font-size: 22px; text-transform: uppercase; 
            margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 5px;
        }
        .patch-content { 
            font-family: 'Crimson Text', serif; font-style: italic; 
            font-size: 18px; color: #aaa; max-height: 150px; overflow-y: auto; line-height: 1.4; 
        }

        .autocomplete-box {
            position: absolute; width: 100%; background: #0a0a0a; 
            border: 1px solid var(--gold); max-height: 200px; overflow-y: auto; 
            display: none; z-index: 9999; top: 100%; margin-top: -15px;
        }
        .suggestion-item { padding: 12px; color: var(--gold); font-size: 18px; cursor: pointer; text-align: left; border-bottom: 1px solid #222; }
        .suggestion-item:hover { background: var(--accent); color: white; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--gold); }
    </style>
</head>
<body>

    <div class="side-panel">
        <div class="card">
            <div class="logo">Death's Armada</div>
            
            <div class="input-group">
                <input type="text" id="hero-search" placeholder="Kalandor neve..." autocomplete="off">
                <div id="autocomplete-list" class="autocomplete-box"></div>
                <div id="found-hint" style="color: #59c559; font-size: 16px; margin-bottom: 10px; display: none;">✓ Ismert kalandor</div>
            </div>

            <input type="password" id="login-pin" placeholder="PIN KÓD" maxlength="4" inputmode="numeric">
            
            <button class="btn btn-main" onclick="login()">Belépés</button>
            <button class="btn btn-sub" onclick="location.href='creator.html'">Új Karakter Indítása</button>
        </div>

        <div class="patch-notes">
            <div class="patch-header">📜 Krónikák</div>
            <div id="patch-text" class="patch-content">A birodalom hírei érkeznek...</div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyBg2WzLqxt0QRDkDiUKYrGRCw0Kg-gr1OU", 
            authDomain: "dnd-tracker-4fe05.firebaseapp.com", 
            projectId: "dnd-tracker-4fe05", 
            databaseURL: "https://dnd-tracker-4fe05-default-rtdb.europe-west1.firebasedatabase.app" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let characters = {};
        let selectedId = null;

        db.ref('settings/patchNotes').on('value', snap => {
            document.getElementById('patch-text').innerHTML = snap.val() || "A birodalom békés.";
        });

        db.ref('characters').on('value', snap => { characters = snap.val() || {}; });

        const searchInput = document.getElementById('hero-search');
        const listContainer = document.getElementById('autocomplete-list');
        const hint = document.getElementById('found-hint');

        searchInput.addEventListener('input', function() {
            const val = this.value.trim().toLowerCase();
            listContainer.innerHTML = '';
            hint.style.display = 'none';
            selectedId = null;

            if (!val) { listContainer.style.display = 'none'; return; }

            Object.keys(characters).forEach(id => {
                const char = characters[id];
                if (char && char.name && char.name.toLowerCase().includes(val)) {
                    const item = document.createElement('div');
                    item.className = 'suggestion-item';
                    item.innerText = char.name;
                    item.onclick = () => {
                        searchInput.value = char.name;
                        selectedId = id;
                        listContainer.style.display = 'none';
                        hint.style.display = 'block';
                    };
                    listContainer.appendChild(item);
                }
            });
            listContainer.style.display = listContainer.childElementCount > 0 ? 'block' : 'none';
        });

        function login() {
            const pin = document.getElementById('login-pin').value;
            if (selectedId && characters[selectedId] && characters[selectedId].pin.toString() === pin) {
                localStorage.setItem('selectedCharId', selectedId);
                window.location.href = 'index.html';
            } else { 
                alert("Hiba a névben vagy a PIN kódban!"); 
            }
        }
    </script>
</body>
</html>

        .cd-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.65); display: flex; align-items: center; justify-content: center; color: red; font-size: 1.2em; border-radius: 4px; }

<script>
// =====================================================
// COMBAT ENGINE - BEÁGYAZVA (nem kell külső combat.js)
// =====================================================
const CombatEngine = {
    roll: function(count, sides, bonus) {
        count = count || 1; sides = sides || 20; bonus = bonus || 0;
        let total = 0, rolls = [];
        for (let i = 0; i < count; i++) {
            let r = Math.floor(Math.random() * sides) + 1;
            rolls.push(r); total += r;
        }
        return {
            total: total + bonus, rolls: rolls,
            display: count > 1 ? `${total+bonus} (${rolls.join('+')})` : `${total+bonus}`
        };
    },
    calculatePhysicalDamage: function(attacker, defender) {
        const diceResult = this.roll(1, 20);
        const roll = diceResult.total;
        const isCrit = roll === 20;
        let baseDmg;
        if (attacker.isMonster) {
            const md = this.roll(2, 10);
            baseDmg = md.total + (attacker.atk * 0.5);
        } else {
            baseDmg = attacker.atk * (0.8 + Math.random() * 0.4);
            if (isCrit) baseDmg *= 2.5;
        }
        let effectiveDef = defender.def || 0;
        if (defender.isDefending) effectiveDef *= 2;
        const cap = defender.isDefending ? 0.9 : 0.8;
        const reduction = Math.min(cap, effectiveDef / 100);
        const finalDmg = Math.max(1, Math.floor(baseDmg * (1 - reduction)));
        return { damage: finalDmg, isCrit: isCrit, roll: diceResult.display };
    },
    calculateSkillEffect: function(attacker, defender, skill) {
        let rawDmg = Math.floor(attacker.atk * skill.power * (0.9 + Math.random() * 0.2));
        let effectiveDef = defender.def || 0;
        if (defender.isDefending) effectiveDef *= 1.5;
        const reduction = Math.min(0.85, effectiveDef / 100);
        let finalDmg = Math.max(1, Math.floor(rawDmg * (1 - reduction)));
        let effect = { damage: finalDmg, healing: 0 };
        if (attacker.charClass === "Nekromanta" && skill.name === "Életelszívás") {
            effect.healing = Math.floor(finalDmg * 0.8);
        }
        return effect;
    }
};

// =====================================================
// FIREBASE + VÁLTOZÓK
// =====================================================
const firebaseConfig = { apiKey: "AIzaSyBg2WzLqxt0QRDkDiUKYrGRCw0Kg-gr1OU", authDomain: "dnd-tracker-4fe05.firebaseapp.com", projectId: "dnd-tracker-4fe05", databaseURL: "https://dnd-tracker-4fe05-default-rtdb.europe-west1.firebasedatabase.app" };

const db = firebase.database();

const myId = localStorage.getItem('selectedCharId');
let myHero = null, currentMonster = null, isMyTurn = true;
let myCooldowns = [0, 0, 0], myClassData = null;
let playerStatus = { burn: 0, stun: 0, weakened: 0 };
let monsterStatus = { burn: 0 };
let monsterAbilityCooldown = 0, monsterAbilityUsedCount = 0;

const HERO_IMGS = {

    "Mágus":"https://i.ibb.co/yFz5bcXv/Copilot-20260403-033651.png",

    "Bérgyilkos":"https://i.ibb.co/b525CsLg/Copilot-20260403-032807.png",

};

// =====================================================
// ANIMÁCIÓK
// =====================================================
function playAttackAnim(attackerId, defenderId, damage, isCrit) {
    return new Promise(resolve => {
        const attacker = document.getElementById(attackerId);
        const defender = document.getElementById(defenderId);
        const animClass = attackerId === 'p-img' ? 'anim-attack-player' : 'anim-attack-monster';
        attacker.classList.add(animClass);
        setTimeout(() => {
            attacker.classList.remove(animClass);
            const hitClass = damage <= 5 ? 'anim-hit-weak' : isCrit ? 'anim-hit-crit' : 'anim-hit-normal';
            defender.classList.add(hitClass);
            setTimeout(() => { defender.classList.remove(hitClass); resolve(); }, 250);
        }, 180);
    });
}

function playSkillAnim(id) {
    return new Promise(resolve => {
        const el = document.getElementById(id);
        el.classList.add('anim-skill');
        setTimeout(() => { el.classList.remove('anim-skill'); resolve(); }, 350);
    });
}

function flashMonsterAbility() {
    const el = document.getElementById('ability-flash');
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 400);
}

// =====================================================
// KAMPÁNY INDÍTÁS
// =====================================================
async function startCampaign(difficulty) {
    if (!myId) return alert("Hiba: Nincs karakter kiválasztva!");
    try {
        const snap = await db.ref(`characters/${myId}`).once('value');
        myHero = snap.val();
        if (!myHero) return alert("Hiba: Karakter nem található!");

        myClassData = SKILLS_DATA[myHero.charClass];
        myHero.maxMp = myHero.maxMp || 100;
        myHero.mp = myHero.maxMp;
        myHero.isDefending = false;

        currentMonster = rollMonsterWithChances(difficulty);
        currentMonster.isDefending = false;
        currentMonster.isMonster = true;

        myCooldowns = [0, 0, 0];
        monsterAbilityCooldown = 0;
        monsterAbilityUsedCount = 0;
        playerStatus = { burn: 0, stun: 0, weakened: 0 };
        monsterStatus = { burn: 0 };

        document.getElementById('campaign-menu').style.display = 'none';
        document.getElementById('arena-header').style.display = 'flex';
        document.getElementById('battlefield').style.display = 'flex';

        initBattleUI();
        addLog(`⚔️ Egy vad <span style="color:#ff4444">${currentMonster.name}</span> támadt rád!`);
        addLog(`⚙️ Passzív: <span style="color:var(--gold)">${currentMonster.passiveName}</span> — ${currentMonster.passiveDesc}`);
    } catch(e) {
        console.error(e);
        alert("Hiba történt: " + e.message);
    }
}

function rollMonsterWithChances(diff) {
    const roll = Math.random();
    let cat = diff;
    if (diff === 'easy' && roll < 0.05) cat = 'medium';
    else if (diff === 'medium' && roll < 0.08) cat = 'hard';
    else if (diff === 'hard') {
        if (roll < 0.02) cat = 'boss';
        else {
            const pool = MONSTERS.medium.concat(MONSTERS.hard);
            return JSON.parse(JSON.stringify(pool[Math.floor(Math.random() * pool.length)]));
        }
    }
    return getRandomMonster(cat);
}

// =====================================================
// UI INIT
// =====================================================
function initBattleUI() {
    document.getElementById('p-name').innerText = myHero.name;
    document.getElementById('p-img').style.backgroundImage = `url('${HERO_IMGS[myHero.charClass] || ""}')`;
    document.getElementById('e-name').innerText = currentMonster.name;

    const eImg = (currentMonster.image && currentMonster.image !== "placeholder_link")
        ? currentMonster.image
        : `https://via.placeholder.com/300/111111/c5a059?text=${encodeURIComponent(currentMonster.name)}`;
    document.getElementById('e-img').style.backgroundImage = `url('${eImg}')`;

    document.getElementById('monster-passive-name').innerText = currentMonster.passiveName;
    document.getElementById('monster-passive-desc').innerText = currentMonster.passiveDesc;

    const activeInfo = getMonsterActiveAbilityInfo(currentMonster.passiveLogic);
    document.getElementById('monster-active-name').innerText = activeInfo.name;
    document.getElementById('monster-active-cooldown').innerText = `Cooldown: ${activeInfo.cd} kör | Max: ${MONSTER_ABILITY_MAX_USES}x`;

    myClassData.skills.forEach((s, i) => {
        const btn = document.getElementById(`sk-${i}`);
        btn.style.backgroundImage = `url('${s.img}')`;
        btn.innerHTML = '';
        btn.title = `${s.name} (${s.cost} MP)`;
    });

    updateBars();
    updateStatusBadges();
    toggleBtns(false);
}

// =====================================================
// SZÖRNY PASSZÍV (minden játékos ütésnél)
// =====================================================
function applyMonsterPassive(damage, isCrit) {
    const logic = currentMonster.passiveLogic;
    let d = damage;
    switch(logic) {
        case "enrage_20":
            if (currentMonster.hp / currentMonster.maxHp < 0.2) { d += 2; addLog(`🔴 Dühroham! +2 sebzés visszacsapás!`); }
            break;
        case "arrow_resist":
            if (myHero.charClass === "Íjász") { d = Math.floor(d * 0.8); addLog(`🦴 Csontvázszerkezet: -20% sebzés`); }
            break;
        case "steal_gold":
            if (Math.random() < 0.4) { myHero.gold = Math.max(0,(myHero.gold||0)-1); addLog(`💰 Zsebmetszés! -1 arany`); }
            break;
        case "crit_immune":
            if (isCrit) { d = Math.floor(d * 0.5); addLog(`🟫 Amorf test: kritikus felezve`); }
            break;
        case "flat_reduction_3":
            d = Math.max(1, d - 3); addLog(`⚔️ Acélfal: -3 sebzés`);
            break;
        case "regen_5":
            currentMonster.hp = Math.min(currentMonster.maxHp, currentMonster.hp + 5); addLog(`🌿 Regeneráció: +5 HP`);
            break;
        case "mana_shield":
            if (currentMonster.mana > 0) {
                const abs = Math.min(currentMonster.mana, Math.floor(d * 0.5));
                currentMonster.mana -= abs; d = Math.max(1, d - abs);
                addLog(`🔮 Mana Pajzs: ${abs} sebzés elnyelve`);
            }
            break;
        case "reflect_15":
            { const ref = Math.floor(d * 0.15); myHero.hp -= ref; addLog(`🔄 Visszaverés: -${ref} HP neked`); }
            break;
        case "lifesteal_30":
            { const h = Math.floor(d * 0.3); currentMonster.hp = Math.min(currentMonster.maxHp, currentMonster.hp + h); addLog(`🩸 Életszívás: +${h} HP`); }
            break;
    }
    return d;
}

// =====================================================
// SZÖRNY AKTÍV KÉPESSÉG VÉGREHAJTÁS
// =====================================================
function executeMonsterActiveAbility() {
    const logic = currentMonster.passiveLogic;
    const info = getMonsterActiveAbilityInfo(logic);
    monsterAbilityCooldown = info.cd;
    monsterAbilityUsedCount++;
    flashMonsterAbility();
    addLog(`🔥 <span style="color:#ff9900">${currentMonster.name}: ${info.name}!</span>`);

    switch(logic) {
        case "enrage_20": case "low_hp_crit": case "d12_enrage": {
            const d = Math.max(1, Math.floor(currentMonster.atk * 1.5) - myHero.def);
            myHero.hp -= d; addLog(`💢 Dühödt csapás! -${d} HP`);
            playAttackAnim('e-img','p-img',d,true); break;
        }
        case "double_attack": {
            const d1 = Math.max(1, currentMonster.atk - myHero.def);
            const d2 = Math.max(1, Math.floor(currentMonster.atk*0.7) - myHero.def);
            myHero.hp -= (d1+d2); addLog(`🐀 Seregcsapás! -${d1}+-${d2} HP`);
            playAttackAnim('e-img','p-img',d1+d2,false); break;
        }
        case "burn_aura": case "burn_dot_5": {
            const t = logic==="burn_dot_5"?5:3;
            playerStatus.burn = t; addLog(`🔥 Égés! ${t} kör`); updateStatusBadges(); break;
        }
        case "web_trap": case "stun_immune": case "stun_on_d20":
            playerStatus.stun = 1; addLog(`🕸️ Kábulás! 1 kör`); updateStatusBadges(); break;
        case "silence_3":
            playerStatus.stun = 2; addLog(`😶 Elnémítva! 2 kör`); updateStatusBadges(); break;
        case "steal_gold": {
            const s = Math.min(myHero.gold||0, 5);
            myHero.gold = Math.max(0,(myHero.gold||0)-s); addLog(`💰 Lopás! -${s} arany`); break;
        }
        case "regen_5":
            currentMonster.hp = Math.min(currentMonster.maxHp, currentMonster.hp+20); addLog(`🌿 +20 HP`); break;
        case "mana_only_dmg":
            myHero.mp = Math.max(0, myHero.mp-20); addLog(`👻 Manaszívás! -20 MP`); updateBars(); break;
        case "mass_cd":
            myCooldowns = myCooldowns.map(()=>3); addLog(`💀 Csontvihar! Minden skill CD!`); updateSkillBtns(); break;
        case "half_dmg_curse":
            playerStatus.weakened = 2; addLog(`☠️ Átok! Következő 2 sebzésed feleződik`); updateStatusBadges(); break;
        case "tri_action": {
            const d = Math.max(1, currentMonster.atk - myHero.def);
            myHero.hp -= d; currentMonster.hp = Math.min(currentMonster.maxHp, currentMonster.hp+15);
            addLog(`🔱 Háromfejű roham! -${d} HP, +15 HP szörnynek`);
            playAttackAnim('e-img','p-img',d,false); break;
        }
        case "revive_once":
            currentMonster._canRevive = true; addLog(`💫 A szörny feltámad majd!`); break;
        case "mirror_skill_50":
            currentMonster._mirrorNext = true; addLog(`🪞 Következő skill tükrözve!`); break;
        case "lifesteal_30": {
            const l = Math.floor(currentMonster.atk*0.5);
            currentMonster.hp = Math.min(currentMonster.maxHp, currentMonster.hp+l); addLog(`🩸 +${l} HP`); break;
        }
        case "d20_only": {
            const d = Math.max(1, 60-myHero.def);
            myHero.hp -= d; addLog(`🐉 Sárkánylehelet! -${d} HP`);
            playAttackAnim('e-img','p-img',d,true); break;
        }
        case "time_rewind_4":
            currentMonster.hp = currentMonster.maxHp; addLog(`⏳ Időtekercs! Szörny teljesen meggyógyult!`); break;
        case "shield_break":
            { const orig = myHero.def; myHero.def = 0; addLog(`🔨 Pajzszúzás! DEF = 0 (2 kör)`);
              setTimeout(()=>{ myHero.def = orig; }, 2*2000); break; }
        case "reflect_15":
            currentMonster._reflectActive = true; addLog(`🔄 Visszaverés aktív!`); break;
        default: {
            const d = Math.max(1, Math.floor(currentMonster.atk*1.2) - myHero.def);
            myHero.hp -= d; addLog(`⚡ Vad csapás! -${d} HP`);
            playAttackAnim('e-img','p-img',d,false);
        }
    }
}

// =====================================================
// JÁTÉKOS AKCIÓK — async/await a helyes sorrendért
// =====================================================
async function playerAction(type) {
    if (!isMyTurn) return;
    isMyTurn = false;
    toggleBtns(true);
    myHero.isDefending = false;

    if (type === 'attack') {
        const result = CombatEngine.calculatePhysicalDamage(myHero, currentMonster);
        let dmg = result.damage;
        const isCrit = result.isCrit;

        if (currentMonster.passiveLogic === "hard_skin_15" && parseInt(result.roll) < 15) {
            dmg = 1; addLog(`🪨 Sziklabőr! Csak 1 sebzés!`);
        }
        if (currentMonster.passiveLogic === "dodge_30" && Math.random() < 0.3) {
            addLog(`🦇 ${currentMonster.name} kitért!`);
            document.getElementById('dice').innerText = "💨";
            updateBars();
            checkTurnEnd(); return;
        }
        if (playerStatus.weakened > 0) {
            dmg = Math.floor(dmg / 2); playerStatus.weakened--;
            addLog(`☠️ Átok! Sebzés felezve.`); updateStatusBadges();
        }

        dmg = applyMonsterPassive(dmg, isCrit);
        currentMonster.hp -= dmg;

        document.getElementById('dice').innerText = isCrit ? `💥${result.roll}` : result.roll;
        addLog(`⚔️ ${myHero.name}: <span style="color:${dmg<=5?'#80c8ff':isCrit?'#ffd700':'#ff6666'}">${dmg}</span>${isCrit?' (KRITIKUS!)':''}`);

        await playAttackAnim('p-img', 'e-img', dmg, isCrit);
    } else {
        myHero.isDefending = true;
        addLog(`🛡️ Védekező állást vettél fel!`);
    }

    updateBars();
    checkTurnEnd();
}

async function playerSkill(idx) {
    if (!isMyTurn) return;
    if (playerStatus.stun > 0) { addLog(`😵 Kábult vagy! Nem tudsz cselekedni!`); return; }
    const s = myClassData.skills[idx];
    if (myHero.mp < s.cost) { addLog(`❌ Nincs elég MP! (kell: ${s.cost})`); return; }
    if (myCooldowns[idx] > 0) { addLog(`⏳ Cooldown: ${myCooldowns[idx]} kör!`); return; }

    isMyTurn = false;
    toggleBtns(true);

    myHero.mp -= s.cost;
    myCooldowns[idx] = s.cd;
    updateBars(); // azonnal frissül a mana csík

    const res = CombatEngine.calculateSkillEffect(myHero, currentMonster, s);
    let dmg = res.damage;

    if (playerStatus.weakened > 0) {
        dmg = Math.floor(dmg / 2); playerStatus.weakened--;
        addLog(`☠️ Átok! Sebzés felezve.`); updateStatusBadges();
    }
    if (currentMonster._mirrorNext) {
        const mirror = Math.floor(dmg * 0.5);
        myHero.hp -= mirror; currentMonster._mirrorNext = false;
        addLog(`🪞 Tükrözés! -${mirror} HP neked`);
    }

    dmg = applyMonsterPassive(dmg, false);
    currentMonster.hp -= dmg;

    if (res.healing > 0) {
        myHero.hp = Math.min(myHero.maxHp, myHero.hp + res.healing);
        addLog(`💚 Életelszívás: +${res.healing} HP`);
    }

    document.getElementById('dice').innerText = "✨";
    addLog(`✨ <span style="color:var(--gold)">${s.name}</span> — <span style="color:#ffd700">${dmg}</span> sebzés`);

    await playSkillAnim('p-img');
    updateBars();
    checkTurnEnd();
}

// =====================================================
// KÖR VÉGE
// =====================================================
function checkTurnEnd() {
    updateBars();
    updateSkillBtns();

    if (currentMonster.hp <= 0) {
        if (currentMonster._canRevive) {
            currentMonster._canRevive = false;
            currentMonster.hp = 50;
            addLog(`💫 <span style="color:#ff9900">${currentMonster.name} feltámadt 50 HP-val!</span>`);
            updateBars();
        } else {
            return endBattle(true);
        }
    }

    document.getElementById('turn-display').innerText = "ELLENSÉG KÖRE...";
    setTimeout(enemyTurn, 900);
}

// =====================================================
// SZÖRNY KÖRE
// =====================================================
function enemyTurn() {
    // égés tickek
    if (monsterStatus.burn > 0) {
        currentMonster.hp -= 4; monsterStatus.burn--;
        addLog(`🔥 ${currentMonster.name} ég! -4 HP`); updateBars();
        if (currentMonster.hp <= 0) return endBattle(true);
    }
    if (playerStatus.burn > 0) {
        const ba = currentMonster.passiveLogic === "burn_dot_5" ? 5 : 3;
        myHero.hp -= ba; playerStatus.burn--;
        addLog(`🔥 Égésben vagy! -${ba} HP (${playerStatus.burn} kör)`); updateStatusBadges();
    }

    // kábulás
    if (playerStatus.stun > 0) {
        playerStatus.stun--;
        addLog(`😵 Kábult vagy! Kör kihagyva. (${playerStatus.stun} kör maradt)`);
        updateBars(); updateStatusBadges();
        myCooldowns = myCooldowns.map(c => c > 0 ? c-1 : 0);
        if (myHero.hp <= 0) return endBattle(false);
        isMyTurn = true; toggleBtns(false);
        document.getElementById('turn-display').innerText = "TE KÖVETKEZEL!";
        return;
    }

    // aktív képesség?
    const canUse = monsterAbilityCooldown === 0
        && monsterAbilityUsedCount < MONSTER_ABILITY_MAX_USES
        && Math.random() < 0.28;

    if (canUse) {
        executeMonsterActiveAbility();
    } else {
        if (Math.random() > 0.15) {
            const result = CombatEngine.calculatePhysicalDamage(currentMonster, myHero);
            myHero.hp -= result.damage;
            document.getElementById('dice').innerText = result.roll;
            addLog(`👹 ${currentMonster.name}: <span style="color:#ff6666">-${result.damage} HP</span>`);
            playAttackAnim('e-img', 'p-img', result.damage, result.isCrit);
        } else {
            currentMonster.isDefending = true;
            addLog(`🛡️ ${currentMonster.name} védekezik!`);
        }
    }

    if (monsterAbilityCooldown > 0) monsterAbilityCooldown--;
    myCooldowns = myCooldowns.map(c => c > 0 ? c-1 : 0);
    updateStatusBadges();
    updateBars();
    updateSkillBtns();

    document.getElementById('monster-active-cooldown').innerText =
        monsterAbilityCooldown > 0
            ? `Cooldown: ${monsterAbilityCooldown} kör | Használva: ${monsterAbilityUsedCount}/${MONSTER_ABILITY_MAX_USES}x`
            : monsterAbilityUsedCount >= MONSTER_ABILITY_MAX_USES
                ? `Limit elérve (${MONSTER_ABILITY_MAX_USES}x)`
                : `Kész! | Használva: ${monsterAbilityUsedCount}/${MONSTER_ABILITY_MAX_USES}x`;

    if (myHero.hp <= 0) return endBattle(false);

    isMyTurn = true;
    toggleBtns(false);
    document.getElementById('turn-display').innerText = "TE KÖVETKEZEL!";
}

// =====================================================
// UI SEGÉDEK
// =====================================================
function updateBars() {
    document.getElementById('p-hp-fill').style.width = Math.max(0, myHero.hp/myHero.maxHp*100)+"%";
    document.getElementById('p-hp-val').innerText = `${Math.max(0,Math.ceil(myHero.hp))} / ${myHero.maxHp} HP`;
    document.getElementById('p-mp-fill').style.width = (myHero.mp/myHero.maxMp*100)+"%";
    document.getElementById('p-mp-val').innerText = `${Math.ceil(myHero.mp)} / ${myHero.maxMp} MP`;
    document.getElementById('e-hp-fill').style.width = Math.max(0, currentMonster.hp/currentMonster.maxHp*100)+"%";
    document.getElementById('e-hp-val').innerText = `${Math.max(0,Math.ceil(currentMonster.hp))} / ${currentMonster.maxHp} HP`;
}

function updateSkillBtns() {
    myClassData.skills.forEach((s, i) => {
        const btn = document.getElementById(`sk-${i}`);
        const onCd = myCooldowns[i] > 0;
        btn.disabled = !isMyTurn || onCd || myHero.mp < s.cost || playerStatus.stun > 0;
        btn.innerHTML = onCd ? `<div class="cd-overlay">${myCooldowns[i]}</div>` : '';
        if (!onCd) btn.style.backgroundImage = `url('${s.img}')`;
    });
}

function updateStatusBadges() {
    const el = document.getElementById('status-effects');
    el.innerHTML = '';
    if (playerStatus.burn > 0)    el.innerHTML += `<span class="status-badge status-burn">🔥 Égés <b>${playerStatus.burn}</b> kör</span>`;
    if (playerStatus.stun > 0)    el.innerHTML += `<span class="status-badge status-stun">😵 Kábult <b>${playerStatus.stun}</b> kör</span>`;
    if (playerStatus.weakened > 0) el.innerHTML += `<span class="status-badge status-weak">☠️ Gyengült <b>${playerStatus.weakened}</b> kör</span>`;
}

function toggleBtns(disable) {
    document.getElementById('btn-attack').disabled = disable;
    document.getElementById('btn-defend').disabled = disable;
    if (!disable) updateSkillBtns();
    else for (let i=0; i<3; i++) document.getElementById(`sk-${i}`).disabled = true;
}

function addLog(msg) {
    const log = document.getElementById('log');
    const div = document.createElement('div');
    div.style.cssText = 'border-bottom:1px solid #222; padding-bottom:3px; margin-bottom:3px;';
    div.innerHTML = msg;
    log.insertBefore(div, log.firstChild);
    while (log.children.length > 30) log.removeChild(log.lastChild);
}

// =====================================================
// HARC VÉGE
// =====================================================
function endBattle(win) {
    toggleBtns(true);
    document.getElementById('win-screen').style.display = 'flex';
    document.getElementById('win-title').innerText = win ? "GYŐZELEM!" : "VERESÉG!";
    document.getElementById('win-title').style.color = win ? "var(--gold)" : "#ff4444";

    const xp = win ? currentMonster.xp : Math.floor(currentMonster.xp / 5);
    const gold = win ? currentMonster.gold : 0;
    const finalHp = Math.max(1, Math.ceil(myHero.hp));

    document.getElementById('reward-xp').innerText = `+${xp} XP`;
    document.getElementById('reward-gold').innerText = `+${gold} Arany`;
    document.getElementById('reward-hp').innerText = `Maradék HP: ${finalHp}`;

    db.ref(`characters/${myId}`).update({
        xp: (myHero.xp || 0) + xp,
        gold: Math.max(0, (myHero.gold || 0) + gold),
        hp: finalHp
    });
}
</script>

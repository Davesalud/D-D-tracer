<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Death's Armada - KAMPÁNY ⚔️</title>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --accent: #8b0000; --bg: #050507; --glass: rgba(15, 15, 20, 0.95); }

        body { 
            background: var(--bg); color: white; font-family: 'MedievalSharp', cursive; margin: 0;
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.9)), url('https://i.ibb.co/qFhK4jhF/Copilot-20260409-020526.png');
            background-size: cover; background-position: center; height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }

        .arena-header { 
            padding: 10px; border-bottom: 2px solid var(--gold); text-align: center; 
            background: rgba(0,0,0,0.8); display: none; justify-content: space-between; align-items: center; 
        }

        .battlefield { 
            display: none; flex: 1; justify-content: space-around; 
            align-items: center; padding: 10px; gap: 15px; 
        }

        #campaign-menu { 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; height: 100%; gap: 20px; position: relative; z-index: 10; 
        }

        #menu-image { 
            max-width: 600px; border: 3px solid var(--gold); border-radius: 15px; 
            box-shadow: 0 0 20px rgba(197, 160, 89, 0.5); 
        }

        .fighter-card { 
            flex: 1; max-width: 320px; padding: 12px; border: 2px solid #333; 
            background: var(--glass); border-radius: 12px; text-align: center; 
            position: relative; overflow: visible; 
        }

        .hero-portrait { 
            width: 100%; height: 320px; border: 1px solid var(--gold); margin: 8px 0; 
            background-size: cover; background-position: center top; border-radius: 6px; 
            background-color: #111;
            transition: transform 0.18s cubic-bezier(0.25, 0.46, 0.45, 0.94), 
                        filter 0.15s ease,
                        box-shadow 0.15s ease;
            position: relative; z-index: 2;
        }

        /* Animációk */
        .hero-portrait.anim-attack-player { transform: translateX(55px) scale(1.04); }
        .hero-portrait.anim-attack-monster { transform: translateX(-55px) scale(1.04); }
        .hero-portrait.anim-hit-normal { filter: brightness(2.5) sepia(1) saturate(8) hue-rotate(300deg); box-shadow: 0 0 30px rgba(255, 0, 0, 0.9); }
        .hero-portrait.anim-hit-crit { filter: brightness(3) sepia(1) saturate(10) hue-rotate(30deg); box-shadow: 0 0 40px rgba(255, 220, 0, 1); }
        .hero-portrait.anim-hit-weak { filter: brightness(2) sepia(1) saturate(5) hue-rotate(180deg); box-shadow: 0 0 20px rgba(0, 150, 255, 0.8); }
        .hero-portrait.anim-skill { filter: brightness(2) saturate(3) hue-rotate(240deg); transform: scale(1.06); box-shadow: 0 0 30px rgba(150, 0, 255, 0.8); }

        .bar-container { width: 100%; height: 18px; background: #000; border: 1px solid #444; margin: 4px 0; overflow: hidden; position: relative; border-radius: 3px; }
        .hp-fill { height: 100%; background: linear-gradient(90deg, #600, #f00); width: 100%; transition: 0.6s; }
        .mp-fill { height: 100%; background: linear-gradient(90deg, #003366, #0088ff); width: 100%; transition: 0.6s; }
        .bar-text { position: absolute; width: 100%; text-align: center; font-size: 10px; top: 1px; font-weight: bold; text-shadow: 1px 1px 2px black; z-index: 5; }

        .skill-slot { 
            width: 55px; height: 55px; background: #111; border: 2px solid var(--gold); 
            border-radius: 6px; cursor: pointer; background-size: cover; margin: 0 4px;
            position: relative; transition: 0.2s;
        }
        .skill-slot:disabled { opacity: 0.4; cursor: not-allowed; }
        .skill-slot:not(:disabled):hover { box-shadow: 0 0 10px var(--gold); }

        .dice-box { 
            width: 70px; height: 70px; border: 2px solid var(--gold); font-size: 1.5em; 
            background: #000; color: var(--gold); border-radius: 10px; 
            display: flex; align-items: center; justify-content: center; 
        }
        .battle-log { 
            width: 100%; max-width: 250px; height: 150px; background: rgba(0,0,0,0.85); 
            border: 1px solid #444; padding: 8px; font-size: 0.75em; overflow-y: auto; 
            color: #ddd; border-radius: 6px; 
        }

        .btn { 
            background: var(--accent); color: white; border: 1px solid var(--gold); 
            padding: 12px; font-family: 'MedievalSharp'; cursor: pointer; border-radius: 4px; 
            font-weight: bold; transition: 0.2s; position: relative; z-index: 20; pointer-events: auto;
        }
        .btn:hover { background: #b30000; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .cd-overlay {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.75); color: white; display:flex;
            align-items:center; justify-content:center; font-size:1.4em;
            border-radius:4px; font-weight:bold;
        }

        #win-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); display: none; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 2000; 
        }
    </style>
</head>
<body>

<div id="campaign-menu">
    <img id="menu-image" src="https://i.ibb.co/GfFbXvNH/Copilot-20260409-011839.png">
    <h1 style="color:var(--gold)">Válassz nehézséget!</h1>
    <div style="display:flex; gap:20px;">
        <button class="btn" onclick="startCampaign('easy')">KÖNNYŰ</button>
        <button class="btn" onclick="startCampaign('medium')">KÖZEPES</button>
        <button class="btn" onclick="startCampaign('hard')">NEHÉZ</button>
    </div>
    <button class="btn" style="background:#444; margin-top:20px;" onclick="location.href='index.html'">VISSZA A VÁROSBA</button>
</div>

<div class="arena-header" id="arena-header">
    <button class="btn" style="padding: 5px 15px;" onclick="location.reload()">🏰 MENEKÜLÉS</button>
    <h2 id="turn-display" style="color:var(--gold)">CSATA!</h2>
    <div style="width:100px;"></div>
</div>

<div class="battlefield" id="battlefield">
    <div class="fighter-card">
        <h3 id="p-name" style="color: var(--gold)">Hősöd</h3>
        <div id="p-img" class="hero-portrait"></div>
        
        <div class="bar-container">
            <div id="p-hp-fill" class="hp-fill"></div>
            <div class="bar-text" id="p-hp-val">100/100</div>
        </div>
        
        <div class="bar-container" style="height:12px;">
            <div id="p-mp-fill" class="mp-fill"></div>
            <div class="bar-text" id="p-mp-val">50/50</div>
        </div>

        <div style="display: flex; justify-content: center; margin: 10px 0;">
            <button class="skill-slot" id="sk-0" onclick="playerSkill(0)"></button>
            <button class="skill-slot" id="sk-1" onclick="playerSkill(1)"></button>
            <button class="skill-slot" id="sk-2" onclick="playerSkill(2)"></button>
        </div>

        <button id="btn-attack" class="btn" style="width:100%" onclick="playerAction('attack')">⚔️ TÁMADÁS</button>
    </div>

    <div style="display:flex; flex-direction:column; align-items:center; gap:15px;">
        <div id="dice" class="dice-box">🎲</div>
        <div id="log" class="battle-log"></div>
    </div>

    <div class="fighter-card">
        <h3 id="e-name" style="color: #ff4444">Ellenfél</h3>
        <div id="e-img" class="hero-portrait"></div>
        
        <div class="bar-container">
            <div id="e-hp-fill" class="hp-fill"></div>
            <div class="bar-text" id="e-hp-val">HP</div>
        </div>
        <div id="monster-ability-box">
            <div class="passive-label">Képesség:</div>
            <div class="passive-name" id="e-skill-name">-</div>
        </div>
    </div>
</div>

<div id="win-screen">
    <h1 id="win-title">GYŐZELEM!</h1>
    <div style="padding: 20px; border: 1px solid var(--gold); text-align: center; background: rgba(0,0,0,0.5); min-width: 250px;">
        <p id="reward-xp" style="font-size: 1.5em; margin: 10px 0;"></p>
        <p id="reward-gold" style="color: gold; font-size: 1.5em; margin: 10px 0;"></p>
        <p id="reward-hp" style="color: #44ff44; font-size: 1.1em;"></p>
    </div>
    <button class="btn" style="margin-top:20px; padding: 15px 40px;" onclick="location.reload()">VISSZA</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
    // =====================================================
    // BEÉPÍTETT ADATOK (Külső fájlok helyett)
    // =====================================================
    const SKILLS_DATA = {
        "Harcos": { "manaPool": 50, "skills": [
            { name: "Pajzsütés", cost: 15, cd: 2, power: 1.2, img: "https://i.ibb.co/kVDdHFxb/1.jpg" },
            { name: "Vérszomj", cost: 20, cd: 3, power: 1.5, img: "https://i.ibb.co/FbvFzFGJ/N-vtelen.jpg" },
            { name: "Birodalmi Roham", cost: 40, cd: 99, power: 2.5, img: "https://i.ibb.co/3ykRxmmq/ulti.jpg" }
        ]},
        "Mágus": { "manaPool": 150, "skills": [
            { name: "Tűzgolyó", cost: 30, cd: 1, power: 1.8, img: "https://i.ibb.co/XZNf106p/1.jpg" },
            { name: "Jégcsap", cost: 25, cd: 2, power: 1.4, img: "https://i.ibb.co/cKWxyMbJ/1.jpg" },
            { name: "Apokalipszis", cost: 80, cd: 99, power: 3.5, img: "https://i.ibb.co/nMRzGwF2/ulti.jpg" }
        ]},
        "Lovag": { "manaPool": 60, "skills": [
            { name: "Szent Csapás", cost: 20, cd: 1, power: 1.3, img: "https://i.ibb.co/Z1NGqhdh/1.jpg" },
            { name: "Védelmező Aura", cost: 30, cd: 3, power: 0.5, img: "https://i.ibb.co/ym80gy3B/2.jpg" },
            { name: "Égi Ítélet", cost: 50, cd: 99, power: 2.2, img: "https://i.ibb.co/VcJDZhQk/ulti.jpg" }
        ]},
        "Íjász": { "manaPool": 70, "skills": [
            { name: "Mérgezett Nyíl", cost: 20, cd: 1, power: 1.2, img: "https://i.ibb.co/Kp5b2WZD/2.jpg" },
            { name: "Sólyomszem", cost: 25, cd: 2, power: 1.6, img: "https://i.ibb.co/GfRZ1ng5/ulti.jpg" },
            { name: "Nyíleső", cost: 50, cd: 99, power: 2.8, img: "https://i.ibb.co/Lhkdcqmb/1.jpg" }
        ]},
        "Bérgyilkos": { "manaPool": 80, "skills": [
            { name: "Hátbaszúrás", cost: 25, cd: 1, power: 2.0, img: "https://i.ibb.co/mFT1D4xL/Blood-Mage-7.png" },
            { name: "Füstbomba", cost: 30, cd: 3, power: 0.8, img: "https://i.ibb.co/qFrHMFXN/Engineer-7.png" },
            { name: "Halálos Tánc", cost: 60, cd: 99, power: 4.0, img: "https://i.ibb.co/Kc3L2P33/Blood-Mage-8.png" }
        ]},
        "Nekromanta": { "manaPool": 120, "skills": [
            { name: "Léleknyíl", cost: 25, cd: 1, power: 1.4, img: "https://i.ibb.co/hxcGJzqZ/N-vtelen.jpg" },
            { name: "Életelszívás", cost: 40, cd: 4, power: 1.1, img: "https://i.ibb.co/S4ft5vJT/2.jpg" },
            { name: "Holtak Serege", cost: 90, cd: 99, power: 3.2, img: "https://i.ibb.co/CKhc0K9m/ulti.jpg" }
        ]}
    };

    const MONSTERS = {
        easy: [
            { name: "Éhes Goblin", hp: 45, atk: 7, def: 3, xp: 15, gold: 8, img: "https://i.ibb.co/VWVm0LzZ/monster.png" },
            { name: "Kóbor Csontváz", hp: 35, atk: 9, def: 2, xp: 12, gold: 5, img: "https://i.ibb.co/VWVm0LzZ/monster.png" }
        ],
        medium: [
            { name: "Ork Harcos", hp: 85, atk: 14, def: 6, xp: 40, gold: 25, img: "https://i.ibb.co/VWVm0LzZ/monster.png" },
            { name: "Mocsári Troll", hp: 120, atk: 10, def: 8, xp: 50, gold: 30, img: "https://i.ibb.co/VWVm0LzZ/monster.png" }
        ],
        hard: [
            { name: "Sötét Lovag", hp: 180, atk: 22, def: 12, xp: 100, gold: 75, img: "https://i.ibb.co/VWVm0LzZ/monster.png" },
            { name: "Ősi Démon", hp: 250, atk: 28, def: 10, xp: 150, gold: 120, img: "https://i.ibb.co/VWVm0LzZ/monster.png" }
        ]
    };

    // =====================================================
    // HARCI MOTOR (Logic)
    // =====================================================
    const CombatEngine = {
        calculatePhysicalDamage: function(attacker, defender) {
            const roll = Math.floor(Math.random() * 20) + 1;
            const isCrit = (roll === 20);
            
            // Sebzés képlet: Támadás + (dobás fele) - védekezés
            let dmg = (attacker.atk || 10) + Math.floor(roll / 2) - (defender.def || 5);
            dmg = Math.max(2, dmg); // Minimum 2 sebzés
            
            if (isCrit) dmg = Math.floor(dmg * 1.5);
            
            return { damage: dmg, roll, isCrit };
        },
        calculateSkillDamage: function(hero, skill) {
            // Képesség sebzés: Támadás * szorzó
            return Math.floor((hero.atk || 10) * (skill.power || 1));
        }
    };

    // =====================================================
    // FIREBASE & RENDELKEZÉS
    // =====================================================
    const firebaseConfig = { 
        apiKey: "AIzaSyBg2WzLqxt0QRDkDiUKYrGRCw0Kg-gr1OU", 
        authDomain: "dnd-tracker-4fe05.firebaseapp.com", 
        projectId: "dnd-tracker-4fe05", 
        databaseURL: "https://dnd-tracker-4fe05-default-rtdb.europe-west1.firebasedatabase.app" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const myId = localStorage.getItem('selectedCharId');
    let myHero, currentMonster;
    let isMyTurn = true;
    let myCooldowns = [0, 0, 0];

    // =====================================================
    // JÁTÉK INDÍTÁSA
    // =====================================================
    async function startCampaign(difficulty) {
        if (!myId) { alert("Válassz karaktert a főmenüben!"); return; }

        const snap = await db.ref(`characters/${myId}`).once('value');
        myHero = snap.val();

        // Szörny kiválasztása
        const pool = MONSTERS[difficulty];
        const raw = pool[Math.floor(Math.random() * pool.length)];
        currentMonster = { ...raw, maxHp: raw.hp };

        // Mana beállítása az osztály alapján
        myHero.maxMp = SKILLS_DATA[myHero.charClass]?.manaPool || 50;
        myHero.mp = myHero.maxMp;

        // UI váltás
        document.getElementById('campaign-menu').style.display = 'none';
        document.getElementById('arena-header').style.display = 'flex';
        document.getElementById('battlefield').style.display = 'flex';

        initUI();
        addLog(`⚔️ Egy <b>${currentMonster.name}</b> állta utad!`);
    }

    function initUI() {
        document.getElementById('p-name').innerText = myHero.name;
        document.getElementById('e-name').innerText = currentMonster.name;
        document.getElementById('p-img').style.backgroundImage = `url('https://i.ibb.co/20BXyqpy/Copilot-20260403-032810.png')`;
        document.getElementById('e-img').style.backgroundImage = `url('${currentMonster.img}')`;

        // Képesség gombok képei
        const skills = SKILLS_DATA[myHero.charClass].skills;
        skills.forEach((s, i) => {
            const btn = document.getElementById(`sk-${i}`);
            btn.style.backgroundImage = `url('${s.img}')`;
            btn.title = `${s.name} (${s.cost} MP)`;
        });

        updateBars();
    }

    // =====================================================
    // HARCI CSELEKMÉNYEK
    // =====================================================
    async function playerAction(type) {
        if (!isMyTurn) return;
        isMyTurn = false;
        toggleBtns(true);

        const res = CombatEngine.calculatePhysicalDamage(myHero, currentMonster);
        currentMonster.hp -= res.damage;
        
        document.getElementById('dice').innerText = res.roll;
        addLog(`⚔️ ${myHero.name} támad: <b>${res.damage}</b> sebzés ${res.isCrit ? '(KRITIKUS!)' : ''}`);

        await playAnim('p-img', 'e-img', res.isCrit ? 'crit' : 'normal');
        checkBattleState();
    }

    async function playerSkill(idx) {
        if (!isMyTurn || myCooldowns[idx] > 0) return;

        const skill = SKILLS_DATA[myHero.charClass].skills[idx];
        if (myHero.mp < skill.cost) {
            addLog("❌ Nincs elég manád!");
            return;
        }

        isMyTurn = false;
        toggleBtns(true);
        
        myHero.mp -= skill.cost;
        myCooldowns[idx] = skill.cd;

        const dmg = CombatEngine.calculateSkillDamage(myHero, skill);
        currentMonster.hp -= dmg;

        addLog(`✨ <b>${skill.name}</b>! Sebzés: <b>${dmg}</b>`);
        
        await playAnim('p-img', 'e-img', 'skill');
        checkBattleState();
    }

    async function enemyTurn() {
        document.getElementById('turn-display').innerText = "ELLENFÉL KÖRE...";
        document.getElementById('turn-display').style.color = "#ff4444";

        await new Promise(r => setTimeout(r, 600));

        const res = CombatEngine.calculatePhysicalDamage(currentMonster, myHero);
        myHero.hp -= res.damage;

        document.getElementById('dice').innerText = res.roll;
        addLog(`👹 ${currentMonster.name} visszatámad: <b>${res.damage}</b> sebzés.`);

        await playAnim('e-img', 'p-img', 'normal');

        // Cooldownok csökkentése kör végén
        myCooldowns = myCooldowns.map(c => Math.max(0, c - 1));
        
        updateBars();

        if (myHero.hp <= 0) {
            endBattle(false);
        } else {
            isMyTurn = true;
            toggleBtns(false);
            document.getElementById('turn-display').innerText = "TE KÖVETKEZEL!";
            document.getElementById('turn-display').style.color = "var(--gold)";
        }
    }

    // =====================================================
    // SEGÉDFÜGGVÉNYEK
    // =====================================================
    function checkBattleState() {
        updateBars();
        if (currentMonster.hp <= 0) {
            endBattle(true);
        } else {
            setTimeout(enemyTurn, 600);
        }
    }

    function updateBars() {
        // Hős
        const pHpPerc = Math.max(0, (myHero.hp / myHero.maxHp) * 100);
        document.getElementById('p-hp-fill').style.width = pHpPerc + "%";
        document.getElementById('p-hp-val').innerText = `${Math.ceil(myHero.hp)} / ${myHero.maxHp}`;

        const pMpPerc = Math.max(0, (myHero.mp / myHero.maxMp) * 100);
        document.getElementById('p-mp-fill').style.width = pMpPerc + "%";
        document.getElementById('p-mp-val').innerText = `${myHero.mp} / ${myHero.maxMp}`;

        // Szörny
        const eHpPerc = Math.max(0, (currentMonster.hp / currentMonster.maxHp) * 100);
        document.getElementById('e-hp-fill').style.width = eHpPerc + "%";
        document.getElementById('e-hp-val').innerText = `${Math.ceil(currentMonster.hp)} / ${currentMonster.maxHp}`;

        // Cooldown megjelenítés
        for (let i = 0; i < 3; i++) {
            const btn = document.getElementById(`sk-${i}`);
            if (myCooldowns[i] > 0) {
                btn.innerHTML = `<div class="cd-overlay">${myCooldowns[i]}</div>`;
            } else {
                btn.innerHTML = "";
            }
        }
    }

    function toggleBtns(disable) {
        document.getElementById('btn-attack').disabled = disable;
        for (let i = 0; i < 3; i++) {
            const btn = document.getElementById(`sk-${i}`);
            btn.disabled = disable || (myCooldowns[i] > 0);
        }
    }

    function addLog(msg) {
        const log = document.getElementById('log');
        const div = document.createElement('div');
        div.style.borderBottom = '1px solid #222';
        div.style.padding = '4px 0';
        div.innerHTML = msg;
        log.insertBefore(div, log.firstChild);
    }

    function playAnim(attackerId, defenderId, type) {
        return new Promise(resolve => {
            const att = document.getElementById(attackerId);
            const def = document.getElementById(defenderId);
            
            // Támadó animáció
            const animClass = (attackerId === 'p-img') ? 'anim-attack-player' : 'anim-attack-monster';
            const hitClass = (type === 'skill') ? 'anim-skill' : (type === 'crit' ? 'anim-hit-crit' : 'anim-hit-normal');

            att.classList.add(animClass);

            setTimeout(() => {
                att.classList.remove(animClass);
                def.classList.add(hitClass);
                
                setTimeout(() => {
                    def.classList.remove(hitClass);
                    resolve();
                }, 250);
            }, 200);
        });
    }

    function endBattle(win) {
        toggleBtns(true);
        document.getElementById('win-screen').style.display = 'flex';
        document.getElementById('win-title').innerText = win ? "GYŐZELEM!" : "VERESÉG!";
        document.getElementById('win-title').style.color = win ? "var(--gold)" : "#ff4444";

        const xp = win ? currentMonster.xp : Math.floor(currentMonster.xp / 4);
        const gold = win ? currentMonster.gold : 0;

        document.getElementById('reward-xp').innerText = `+${xp} XP`;
        document.getElementById('reward-gold').innerText = `+${gold} Arany`;
        document.getElementById('reward-hp').innerText = `Maradék életerő: ${Math.max(0, Math.ceil(myHero.hp))}`;

        // Mentés Firebase-be
        db.ref(`characters/${myId}`).update({
            xp: (myHero.xp || 0) + xp,
            gold: (myHero.gold || 0) + gold
        });
    }
</script>
</body>
</html>

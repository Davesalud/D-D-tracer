<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <script src="auth-guard.js"></script>
    <script src="combat.js"></script>

    <title>Death's Armada - KAMPÁNY ⚔️</title>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
#campaign-menu { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 20px; position: relative; z-index: 10; }
        #menu-image { max-width: 600px; border: 3px solid var(--gold); border-radius: 15px; box-shadow: 0 0 20px rgba(197,160,89,0.5); }
.hero-portrait.anim-attack-player { transform: translateX(55px) scale(1.04); }
        .hero-portrait.anim-attack-monster { transform: translateX(-55px) scale(1.04); }
        .hero-portrait.anim-hit-normal { filter: brightness(2.5) sepia(1) saturate(8) hue-rotate(300deg); box-shadow: 0 0 30px rgba(255,0,0,0.9); }
        .hero-portrait.anim-hit-crit { filter: brightness(3) sepia(1) saturate(10) hue-rotate(30deg); box-shadow: 0 0 40px rgba(255,220,0,1); }
        .hero-portrait.anim-hit-weak { filter: brightness(2) sepia(1) saturate(5) hue-rotate(180deg); box-shadow: 0 0 20px rgba(0,150,255,0.8); }
        .hero-portrait.anim-skill { filter: brightness(2) saturate(3) hue-rotate(240deg); transform: scale(1.06); box-shadow: 0 0 30px rgba(150,0,255,0.8); }
.skill-slot:disabled { opacity: 0.4; cursor: not-allowed; }
        .skill-slot:not(:disabled):hover { box-shadow: 0 0 10px var(--gold); }
        .cd-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.65); display: flex; align-items: center; justify-content: center; color: red; font-size: 1.2em; border-radius: 4px; }
.btn:hover { background: #b30000; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }

        #monster-ability-box { font-size: 0.8em; color: #ddd; text-align: center; padding: 8px; background: rgba(0,0,0,0.5); border-radius: 4px; min-height: 80px; margin-top: 10px; border: 1px solid #444; }
        .passive-label { color: #aaa; font-size: 0.85em; }
        .active-label { color: #ff9900; font-size: 0.85em; }
        .passive-name { color: var(--gold); font-weight: bold; }

        .ability-flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,150,0,0.3); border-radius: 12px; pointer-events: none; opacity: 0; transition: opacity 0.1s; }
        .ability-flash.show { opacity: 1; }

        #status-effects { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; margin: 6px 0; min-height: 28px; }
        .status-badge { font-size: 0.78em; padding: 3px 8px; border-radius: 10px; border: 1px solid; font-family: 'MedievalSharp'; box-shadow: 0 0 6px rgba(0,0,0,0.5); }
        .status-burn  { background: rgba(255,80,0,0.25);  border-color: #ff5000; color: #ff9060; }
        .status-stun  { background: rgba(255,220,0,0.2);  border-color: #ffdd00; color: #ffee80; }
        .status-weak  { background: rgba(180,0,255,0.2);  border-color: #aa00ff; color: #cc80ff; }

        #win-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; }
        #hardcore-modal, #equip-prompt-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.92); display: none; align-items: center; justify-content: center; z-index: 3000; padding: 16px; }
        .modal-box { max-width: 420px; background: #121218; border: 2px solid var(--gold); border-radius: 12px; padding: 24px; text-align: center; }
        .modal-box p { color: #ccc; line-height: 1.5; margin: 12px 0; }
        .modal-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 18px; }
        #challenge-hud { display: none; color: #e74c3c; font-size: 0.85em; font-weight: bold; text-shadow: 0 0 8px rgba(0,0,0,0.8); }
    </style>
</head>
<body class="page-campaign">

<div id="campaign-menu">
    <img id="menu-image" src="https://i.ibb.co/GfFbXvNH/Copilot-20260409-011839.png" alt="Banner">
    <h1 style="color:var(--gold); text-shadow: 2px 2px 5px black;">Válassz nehézséget!</h1>
    <div style="display:flex; gap:20px; flex-wrap:wrap; justify-content:center;">
        <button class="btn" style="width:150px; background:#27ae60;" onclick="startCampaign('easy')">KÖNNYŰ</button>
        <button class="btn" style="width:150px; background:#2980b9;" onclick="startCampaign('medium')">KÖZEPES</button>
        <button class="btn" style="width:150px; background:#c0392b;" onclick="startCampaign('hard')">NEHÉZ</button>
    </div>
    <button class="btn" style="width:280px; margin-top:14px; background:#6c1a3d; border:2px solid #c0392b;" type="button" onclick="openHardcoreModal()">🔥 KIHÍVÁS (1–10)</button>
    <button class="btn" style="background:#444; margin-top:20px;" onclick="location.href='index.html'">VISSZA A VÁROSBA</button>
</div>

<div id="hardcore-modal" onclick="if(event.target===this) closeHardcoreModal()">
    <div class="modal-box" onclick="event.stopPropagation()">
        <h2 style="color:var(--gold); margin-top:0;">Hardcore kihívás</h2>
        <p>Ez a kihívás Hardcore játékosoknak van fenntartva.</p>
        <div class="modal-actions">
            <button type="button" class="btn" onclick="confirmHardcoreStart()">Rendben</button>
            <button type="button" class="btn" style="background:#444;" onclick="closeHardcoreModal()">Inkább kihagyom</button>
        </div>
    </div>
</div>

<div id="equip-prompt-modal" onclick="if(event.target===this) {}">
    <div class="modal-box" onclick="event.stopPropagation()">
        <h2 style="color:var(--gold); margin-top:0;">Felszerelés szünet</h2>
        <p id="equip-prompt-text">Szeretnéd módosítani a felszerelésedet, vagy folytatod?</p>
        <div class="modal-actions">
            <button type="button" class="btn" style="background:#2980b9;" onclick="goToInventoryFromChallenge()">Felszerelés (leltár)</button>
            <button type="button" class="btn" onclick="dismissEquipPromptContinue()">Tovább a következő szintre</button>
        </div>
    </div>
</div>

<div class="arena-header" id="arena-header">
    <button class="btn" style="padding:5px 15px; background:#444;" id="btn-arena-back" onclick="handleCampaignBack()">🏰 VISSZA</button>
    <div style="flex:1; text-align:center;">
        <div id="challenge-hud">KIHÍVÁS — Szint <span id="challenge-lvl-num">1</span> / 10</div>
        <h2 id="turn-display" style="color:var(--gold); margin:4px 0 0;">TE KÖVETKEZEL!</h2>
    </div>
    <div style="width:100px;"></div>
</div>

<div class="battlefield" id="battlefield">
    <div class="fighter-card">
        <h3 id="p-name" style="color:var(--gold); margin:0;">Hősöm</h3>
        <div id="p-img" class="hero-portrait"></div>
        <div id="status-effects"></div>
        <div class="bar-container"><div id="p-hp-fill" class="hp-fill"></div><div class="bar-text" id="p-hp-val">100/100 HP</div></div>
        <div class="bar-container"><div id="p-mp-fill" class="mp-fill"></div><div class="bar-text" id="p-mp-val">50/50 MP</div></div>
        <div style="display:flex; justify-content:center; margin:10px 0;">
            <button class="skill-slot" id="sk-0" onclick="playerSkill(0)" disabled></button>
            <button class="skill-slot" id="sk-1" onclick="playerSkill(1)" disabled></button>
            <button class="skill-slot" id="sk-2" onclick="playerSkill(2)" disabled></button>
        </div>
        <button id="btn-attack" class="btn" style="width:100%; margin-bottom:5px;" onclick="playerAction('attack')">⚔️ TÁMADÁS</button>
        <button id="btn-defend" class="btn" style="width:100%; background:#2c3e50;" onclick="playerAction('defend')">🛡️ VÉDEKEZÉS</button>
    </div>

    <div style="display:flex; flex-direction:column; align-items:center; gap:15px;">
        <div id="dice" class="dice-box">🎲</div>
        <div id="log" class="battle-log"></div>
    </div>

    <div class="fighter-card" style="position:relative;">
        <div class="ability-flash" id="ability-flash"></div>
        <h3 id="e-name" style="color:#ff4444; margin:0;">Ellenfél</h3>
        <div id="e-img" class="hero-portrait"></div>
        <div class="bar-container"><div id="e-hp-fill" class="hp-fill"></div><div class="bar-text" id="e-hp-val">HP:---</div></div>
        <div id="monster-ability-box">
            <div class="passive-label">⚙️ PASSZÍV</div>
            <div class="passive-name" id="monster-passive-name">-</div>
            <div id="monster-passive-desc" style="color:#aaa; font-size:0.85em;">-</div>
            <hr style="border-color:#333; margin:5px 0;">
            <div class="active-label">🔥 AKTÍV KÉPESSÉG</div>
            <div id="monster-active-name" style="color:#ff9900;">-</div>
            <div id="monster-active-cooldown" style="color:#888; font-size:0.8em;"></div>
        </div>
    </div>
</div>

<div id="win-screen">
    <h1 id="win-title" style="color:var(--gold); font-size:3em;">GYŐZELEM!</h1>
    <div style="padding:20px; border:1px solid var(--gold); width:280px; margin:20px 0; background:rgba(255,255,255,0.05); text-align:center;">
        <p id="reward-xp" style="font-size:1.4em;"></p>
        <p id="reward-gold" style="font-size:1.4em; color:gold;"></p>
        <p id="reward-hp" style="color:#ff6666; font-size:1em; margin-top:5px;"></p>
    </div>
    <div style="display:flex; flex-direction:column; gap:10px; align-items:center;">
        <button class="btn" style="width:250px" id="win-screen-primary-btn" onclick="handleWinScreenPrimary()">🏰 VISSZA A VÁROSBA</button>
        <button class="btn" style="width:250px; display:none; background:#2c3e50;" id="win-screen-secondary-btn" onclick="handleWinScreenSecondary()">Kilépés jutalommal</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="firebase-credentials.js"></script>
<script src="skills.js"></script>
<script src="monsters.js"></script>

<script>
const db = window.initFirebaseDb();

const myId = localStorage.getItem('selectedCharId');
let myHero = null, currentMonster = null, isMyTurn = true;
let myCooldowns = [0, 0, 0], myClassData = null;
let playerStatus = { burn: 0, stun: 0, weakened: 0 };
let monsterStatus = { burn: 0 };
let monsterAbilityCooldown = 0, monsterAbilityUsedCount = 0;
const MONSTER_ABILITY_MAX_USES = 3;

let campaignMode = 'solo';
let challengeLevel = 1;
let challengeStartGold = 0, challengeStartXp = 0;
let soloStartGold = 0, soloStartXp = 0;
let winScreenMode = 'solo';
const CHALLENGE_KEY = 'challengeRun_v1';

const HERO_IMGS = {
    "Harcos":"https://i.ibb.co/20BXyqpy/Copilot-20260403-032810.png",
    "Mágus":"https://i.ibb.co/yFz5bcXv/Copilot-20260403-033651.png",
    "Lovag":"https://i.ibb.co/Fk3n339M/Copilot-20260403-034043.png",
    "Bérgyilkos":"https://i.ibb.co/b525CsLg/Copilot-20260403-032807.png",
    "Nekromanta":"https://i.ibb.co/NnCwwCbR/Copilot-20260403-033301.png",
    "Íjász":"https://i.ibb.co/whd2jNpB/Copilot-20260403-034402.png"
};

function playAttackAnim(attackerId, defenderId, damage, isCrit) {
    return new Promise(resolve => {
        const attacker = document.getElementById(attackerId);
        const defender = document.getElementById(defenderId);
        const animClass = attackerId === 'p-img' ? 'anim-attack-player' : 'anim-attack-monster';
        attacker.classList.add(animClass);
        setTimeout(() => {
            attacker.classList.remove(animClass);
            const hitClass = damage <= 5 ? 'anim-hit-weak' : isCrit ? 'anim-hit-crit' : 'anim-hit-normal';
            defender.classList.add(hitClass);
            setTimeout(() => { defender.classList.remove(hitClass); resolve(); }, 250);
        }, 180);
    });
}

function playSkillAnim(id) {
    return new Promise(resolve => {
        const el = document.getElementById(id);
        el.classList.add('anim-skill');
        setTimeout(() => { el.classList.remove('anim-skill'); resolve(); }, 350);
    });
}

function flashMonsterAbility() {
    const el = document.getElementById('ability-flash');
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 400);
}

function applyHeroHpMpFromDb(raw) {
    const maxHp = Number(raw.maxHp) || 100;
    const maxMp = Number(raw.maxMp) || 100;
    raw.maxHp = maxHp;
    raw.maxMp = maxMp;
    let hp = raw.hp !== undefined && raw.hp !== null ? Number(raw.hp) : maxHp;
    let mp = raw.mp !== undefined && raw.mp !== null ? Number(raw.mp) : maxMp;
    if (hp <= 0) hp = 1;
    hp = Math.min(maxHp, Math.max(1, hp));
    mp = Math.min(maxMp, Math.max(0, mp));
    raw.hp = hp;
    raw.mp = mp;
}

function openHardcoreModal() {
    document.getElementById('hardcore-modal').style.display = 'flex';
}
function closeHardcoreModal() {
    document.getElementById('hardcore-modal').style.display = 'none';
}
function confirmHardcoreStart() {
    closeHardcoreModal();
    startChallengeRun();
}

async function startChallengeRun() {
    if (!myId) return alert("Hiba: Nincs karakter kiválasztva!");
    try {
        const snap = await db.ref(`characters/${myId}`).once('value');
        myHero = snap.val();
        if (!myHero) return alert("Hiba: Karakter nem található!");

        campaignMode = 'challenge';
        challengeLevel = 1;
        challengeStartGold = Number(myHero.gold) || 0;
        challengeStartXp = Number(myHero.xp) || 0;

        myClassData = SKILLS_DATA[myHero.charClass];
        applyHeroHpMpFromDb(myHero);
        myHero.isDefending = false;

        persistChallengeState();

        document.getElementById('challenge-hud').style.display = 'block';
        document.getElementById('challenge-lvl-num').innerText = '1';

        document.getElementById('campaign-menu').style.display = 'none';
        document.getElementById('arena-header').style.display = 'flex';
        document.getElementById('battlefield').style.display = 'flex';

        beginChallengeBattle();
    } catch (e) {
        console.error(e);
        alert("Hiba történt: " + e.message);
    }
}

function persistChallengeState() {
    try {
        sessionStorage.setItem(CHALLENGE_KEY, JSON.stringify({
            nextLevel: challengeLevel,
            startGold: challengeStartGold,
            startXp: challengeStartXp,
            runGold: myHero ? (Number(myHero.gold) || 0) : null,
            runXp: myHero ? (Number(myHero.xp) || 0) : null,
            ts: Date.now()
        }));
    } catch (e) {}
}

function difficultyForChallengeStage(level) {
    if (level <= 3) return 'easy';
    if (level <= 6) return 'medium';
    if (level <= 9) return 'hard';
    return 'boss';
}

function rollMonsterForChallengeLevel(level) {
    const tier = difficultyForChallengeStage(level);
    if (tier === 'boss') {
        const list = MONSTERS.boss;
        const raw = list[Math.floor(Math.random() * list.length)];
        return JSON.parse(JSON.stringify(raw));
    }
    return rollMonsterWithChances(tier);
}

function beginChallengeBattle() {
    document.getElementById('battlefield').style.display = 'flex';
    document.getElementById('challenge-lvl-num').innerText = String(challengeLevel);
    document.getElementById('win-screen').style.display = 'none';
    currentMonster = rollMonsterForChallengeLevel(challengeLevel);
    currentMonster.isDefending = false;
    currentMonster.isMonster = true;

    myCooldowns = [0, 0, 0];
    monsterAbilityCooldown = 0;
    monsterAbilityUsedCount = 0;
    playerStatus = { burn: 0, stun: 0, weakened: 0 };
    monsterStatus = { burn: 0 };

    initBattleUI();
    addLog(`🔥 <span style="color:#e74c3c">Kihívás ${challengeLevel}/10</span> — <span style="color:#ff4444">${currentMonster.name}</span>!`);
}

function handleCampaignBack() {
    if (campaignMode === 'challenge') {
        if (!confirm('Biztosan feladod a kihívást? Az eddig megszerzett kihívás-jutalom elvész.')) return;
        challengeAbortToLobby();
        return;
    }
    location.href = 'index.html';
}

function challengeAbortToLobby() {
    db.ref(`characters/${myId}`).update({
        hp: 1,
        mp: Math.max(0, Math.ceil(myHero.mp)),
        gold: challengeStartGold,
        xp: challengeStartXp,
        lastUpdate: Date.now()
    }).finally(() => {
        try { sessionStorage.removeItem(CHALLENGE_KEY); } catch (e) {}
        location.href = 'index.html';
    });
}

function goToInventoryFromChallenge() {
    persistChallengeState();
    try { sessionStorage.setItem('challengeReturn', '1'); } catch (e) {}
    document.getElementById('equip-prompt-modal').style.display = 'none';
    location.href = 'inventory.html';
}

function dismissEquipPromptContinue() {
    document.getElementById('equip-prompt-modal').style.display = 'none';
    challengeContinueAfterVictory();
}

async function startCampaign(difficulty) {
    if (!myId) return alert("Hiba: Nincs karakter kiválasztva!");
    try {
        const snap = await db.ref(`characters/${myId}`).once('value');
        myHero = snap.val();
        if (!myHero) return alert("Hiba: Karakter nem található!");

        campaignMode = 'solo';
        document.getElementById('challenge-hud').style.display = 'none';

        myClassData = SKILLS_DATA[myHero.charClass];
        applyHeroHpMpFromDb(myHero);
        soloStartGold = Number(myHero.gold) || 0;
        soloStartXp = Number(myHero.xp) || 0;
        myHero.isDefending = false;

        currentMonster = rollMonsterWithChances(difficulty);
        currentMonster.isDefending = false;
        currentMonster.isMonster = true;

        myCooldowns = [0, 0, 0];
        monsterAbilityCooldown = 0;
        monsterAbilityUsedCount = 0;
        playerStatus = { burn: 0, stun: 0, weakened: 0 };
        monsterStatus = { burn: 0 };

        document.getElementById('campaign-menu').style.display = 'none';
        document.getElementById('arena-header').style.display = 'flex';
        document.getElementById('battlefield').style.display = 'flex';

        initBattleUI();
        addLog(`⚔️ Egy vad <span style="color:#ff4444">${currentMonster.name}</span> támadt rád!`);
    } catch(e) { console.error(e); alert("Hiba történt: " + e.message); }
}

function rollMonsterWithChances(diff) {
    const roll = Math.random();
    let cat = diff;
    if (diff === 'easy' && roll < 0.05) cat = 'medium';
    else if (diff === 'medium' && roll < 0.08) cat = 'hard';
    else if (diff === 'hard') {
        if (roll < 0.02) cat = 'boss';
        else {
            const pool = MONSTERS.medium.concat(MONSTERS.hard);
            return JSON.parse(JSON.stringify(pool[Math.floor(Math.random() * pool.length)]));
        }
    }
    return getRandomMonster(cat);
}

function initBattleUI() {
    document.getElementById('p-name').innerText = myHero.name;
    document.getElementById('p-img').style.backgroundImage = `url('${HERO_IMGS[myHero.charClass] || ""}')`;
    document.getElementById('e-name').innerText = currentMonster.name;
    const eImg = (currentMonster.image && currentMonster.image !== "placeholder_link") ? currentMonster.image : `https://via.placeholder.com/300/111111/c5a059?text=${encodeURIComponent(currentMonster.name)}`;
    document.getElementById('e-img').style.backgroundImage = `url('${eImg}')`;
    document.getElementById('monster-passive-name').innerText = currentMonster.passiveName;
    document.getElementById('monster-passive-desc').innerText = currentMonster.passiveDesc;
    const activeInfo = getMonsterActiveAbilityInfo(currentMonster.passiveLogic);
    document.getElementById('monster-active-name').innerText = activeInfo.name;
    document.getElementById('monster-active-cooldown').innerText = `Cooldown: ${activeInfo.cd} kör | Max: ${MONSTER_ABILITY_MAX_USES}x`;
    myClassData.skills.forEach((s, i) => {
        const btn = document.getElementById(`sk-${i}`);
        btn.style.backgroundImage = `url('${s.img}')`;
        btn.innerHTML = '';
        btn.title = `${s.name} (${s.cost} MP)`;
    });
    updateBars();
    updateStatusBadges();
    toggleBtns(false);
}

function getMonsterActiveAbilityInfo(logic) {
    const map = {
        "enrage_20": { name: "🔴 Dühroham — Dupla sebzés", cd: 4 },
        "double_attack": { name: "🐀 Seregcsapás — 2x sebzés", cd: 3 },
        "arrow_resist": { name: "🦴 Csontpajzs — 1 kör immunis", cd: 5 },
        "cowardice": { name: "💨 Menekülés — Kihagyja a kört", cd: 4 },

        "mana_only_dmg": { name: "👻 Manaszívás — Elvon 20 MP-t", cd: 3 },
        "lifesteal_30": { name: "🩸 Nagy Életszívás — 50% visszaéled", cd: 4 },
        "shield_break": { name: "🔨 Pajzszúzás — Def nullára 2 körre", cd: 5 },
        "mass_cd": { name: "💀 Csontvihar — Minden skill CD-re kerül", cd: 6 },
        "mana_shield": { name: "🔮 Mana Pajzs — 50% sebzés csökkentés", cd: 5 },
        "hard_skin_15": { name: "🪨 Sziklabőr — 1 kör csak 1 sebzést kap", cd: 5 },
        "tri_action": { name: "🔱 Háromfejű roham — Sebez+gyógyít+pajzsol", cd: 4 },
        "burn_dot_5": { name: "🔥 Pokoltűz — 5 kör égés -5 HP/kör", cd: 5 },
        "revive_once": { name: "💫 Feltámadás — Visszajön 50 HP-val", cd: 99 },
        "death_timer_10": { name: "☠️ Halálos méreg — Azonnali mérgezés", cd: 99 },
        "reflect_15": { name: "🔄 Visszaverés — Sebzés 20%-a visszamegy", cd: 4 },
        "d20_only": { name: "🐉 Sárkánylehelet — 60 fix tűzsebzés", cd: 5 },
        "time_rewind_4": { name: "⏳ Időtekercs — Full HP visszatöltés", cd: 99 },
        "mirror_skill_50": { name: "🪞 Tükröz — Visszalövi a skill sebzésedet", cd: 4 },
    };
    return map[logic] || { name: "⚡ Vad csapás — Extra sebzés", cd: 4 };
}

function applyMonsterPassive(damage, isCrit) {
    const logic = currentMonster.passiveLogic;
    let d = damage;
    switch(logic) {
        case "enrage_20": if (currentMonster.hp / currentMonster.maxHp < 0.2) { d += 2; addLog(`🔴 Dühroham! +2 sebzés visszacsapás!`); } break;
        case "arrow_resist": if (myHero.charClass === "Íjász") { d = Math.floor(d * 0.8); addLog(`🦴 Csontvázszerkezet: -20% sebzés`); } break;
        case "steal_gold": if (Math.random() < 0.4) { myHero.gold = Math.max(0,(myHero.gold||0)-1); addLog(`💰 Zsebmetszés! -1 arany`); } break;
        case "crit_immune": if (isCrit) { d = Math.floor(d * 0.5); addLog(`🟫 Amorf test: kritikus felezve`); } break;
        case "flat_reduction_3": d = Math.max(1, d - 3); addLog(`⚔️ Acélfal: -3 sebzés`); break;
        case "regen_5": currentMonster.hp = Math.min(currentMonster.maxHp, currentMonster.hp + 5); addLog(`🌿 Regeneráció: +5 HP`); break;
        case "mana_shield": if (currentMonster.mana > 0) { const abs = Math.min(currentMonster.mana, Math.floor(d * 0.5)); currentMonster.mana -= abs; d = Math.max(1, d - abs); addLog(`🔮 Mana Pajzs: ${abs} sebzés elnyelve`); } break;
        case "reflect_15": { const ref = Math.floor(d * 0.15); myHero.hp -= ref; addLog(`🔄 Visszaverés: -${ref} HP neked`); } break;
        case "lifesteal_30": { const h = Math.floor(d * 0.3); currentMonster.hp = Math.min(currentMonster.maxHp, currentMonster.hp + h); addLog(`🩸 Életszívás: +${h} HP`); } break;
    }
    return d;
}

function executeMonsterActiveAbility() {
    const logic = currentMonster.passiveLogic;
    const info = getMonsterActiveAbilityInfo(logic);
    monsterAbilityCooldown = info.cd;
    monsterAbilityUsedCount++;
    flashMonsterAbility();
    addLog(`🔥 <span style="color:#ff9900">${currentMonster.name}: ${info.name}!</span>`);
    switch(logic) {
        case "enrage_20": case "low_hp_crit": case "d12_enrage": { const d = Math.max(1, Math.floor(currentMonster.atk * 1.5) - myHero.def); myHero.hp -= d; playAttackAnim('e-img','p-img',d,true); break; }
        case "double_attack": { const d1 = Math.max(1, currentMonster.atk - myHero.def); const d2 = Math.max(1, Math.floor(currentMonster.atk*0.7) - myHero.def); myHero.hp -= (d1+d2); playAttackAnim('e-img','p-img',d1+d2,false); break; }
        case "burn_aura": case "burn_dot_5": { const t = logic==="burn_dot_5"?5:3; playerStatus.burn = t; updateStatusBadges(); break; }
        case "web_trap": case "stun_immune": case "stun_on_d20": playerStatus.stun = 1; updateStatusBadges(); break;
        case "silence_3": playerStatus.stun = 2; updateStatusBadges(); break;
        case "steal_gold": { const s = Math.min(myHero.gold||0, 5); myHero.gold = Math.max(0,(myHero.gold||0)-s); break; }
        case "regen_5": currentMonster.hp = Math.min(currentMonster.maxHp, currentMonster.hp+20); break;
        case "mana_only_dmg": myHero.mp = Math.max(0, myHero.mp-20); updateBars(); break;
        case "mass_cd": myCooldowns = myCooldowns.map(()=>3); updateSkillBtns(); break;
        case "half_dmg_curse": playerStatus.weakened = 2; updateStatusBadges(); break;
        case "tri_action": { const d = Math.max(1, currentMonster.atk - myHero.def); myHero.hp -= d; currentMonster.hp = Math.min(currentMonster.maxHp, currentMonster.hp+15); playAttackAnim('e-img','p-img',d,false); break; }
        case "revive_once": currentMonster._canRevive = true; break;
        case "mirror_skill_50": currentMonster._mirrorNext = true; break;
        case "lifesteal_30": { const l = Math.floor(currentMonster.atk*0.5); currentMonster.hp = Math.min(currentMonster.maxHp, currentMonster.hp+l); break; }
        case "d20_only": { const d = Math.max(1, 60-myHero.def); myHero.hp -= d; playAttackAnim('e-img','p-img',d,true); break; }
        case "time_rewind_4": currentMonster.hp = currentMonster.maxHp; break;
        case "shield_break": { const orig = myHero.def; myHero.def = 0; setTimeout(()=>{ myHero.def = orig; }, 2*2000); break; }
        case "reflect_15": currentMonster._reflectActive = true; break;
        default: { const d = Math.max(1, Math.floor(currentMonster.atk*1.2) - myHero.def); myHero.hp -= d; playAttackAnim('e-img','p-img',d,false); }
    }
}

async function playerAction(type) {
    if (!isMyTurn) return;
    isMyTurn = false; toggleBtns(true); myHero.isDefending = false;
    if (type === 'attack') {
        const result = CombatEngine.calculatePhysicalDamage(myHero, currentMonster);
        let dmg = result.damage;
        const isCrit = result.isCrit;
        if (currentMonster.passiveLogic === "hard_skin_15" && parseInt(result.roll) < 15) { dmg = 1; addLog(`🪨 Sziklabőr!`); }
        if (currentMonster.passiveLogic === "dodge_30" && Math.random() < 0.3) { addLog(`🦇 Kitérés!`); document.getElementById('dice').innerText = "💨"; updateBars(); checkTurnEnd(); return; }
        if (playerStatus.weakened > 0) { dmg = Math.floor(dmg / 2); playerStatus.weakened--; updateStatusBadges(); }
        dmg = applyMonsterPassive(dmg, isCrit);
        currentMonster.hp -= dmg;
        document.getElementById('dice').innerText = isCrit ? `💥${result.roll}` : result.roll;
        addLog(`⚔️ ${myHero.name}: ${dmg}${isCrit?' (KRIT!)':''}`);
        await playAttackAnim('p-img', 'e-img', dmg, isCrit);
    } else { myHero.isDefending = true; addLog(`🛡️ Védekezés!`); }
    updateBars(); checkTurnEnd();
}

async function playerSkill(idx) {
    if (!isMyTurn || playerStatus.stun > 0) return;
    const s = myClassData.skills[idx];
    if (myHero.mp < s.cost || myCooldowns[idx] > 0) return;
    isMyTurn = false; toggleBtns(true);
    myHero.mp -= s.cost; myCooldowns[idx] = s.cd; updateBars();
    const res = CombatEngine.calculateSkillEffect(myHero, currentMonster, s);
    let dmg = res.damage;
    if (playerStatus.weakened > 0) { dmg = Math.floor(dmg / 2); playerStatus.weakened--; updateStatusBadges(); }
    if (currentMonster._mirrorNext) { const mirror = Math.floor(dmg * 0.5); myHero.hp -= mirror; currentMonster._mirrorNext = false; }
    dmg = applyMonsterPassive(dmg, false);
    currentMonster.hp -= dmg;
    if (res.healing > 0) { myHero.hp = Math.min(myHero.maxHp, myHero.hp + res.healing); }
    document.getElementById('dice').innerText = "✨";
    addLog(`✨ ${s.name}: ${dmg}`);
    await playSkillAnim('p-img');
    updateBars(); checkTurnEnd();
}

function checkTurnEnd() {
    updateBars(); updateSkillBtns();
    if (currentMonster.hp <= 0) {
        if (currentMonster._canRevive) { currentMonster._canRevive = false; currentMonster.hp = 50; updateBars(); } 
        else return endBattle(true);
    }
    document.getElementById('turn-display').innerText = "ELLENSÉG KÖRE...";
    setTimeout(enemyTurn, 900);
}

function enemyTurn() {
    if (monsterStatus.burn > 0) { currentMonster.hp -= 4; monsterStatus.burn--; updateBars(); if (currentMonster.hp <= 0) return endBattle(true); }
    if (playerStatus.burn > 0) { const ba = currentMonster.passiveLogic === "burn_dot_5" ? 5 : 3; myHero.hp -= ba; playerStatus.burn--; updateStatusBadges(); }
    if (playerStatus.stun > 0) { playerStatus.stun--; updateBars(); updateStatusBadges(); myCooldowns = myCooldowns.map(c => c > 0 ? c-1 : 0); if (myHero.hp <= 0) return endBattle(false); isMyTurn = true; toggleBtns(false); document.getElementById('turn-display').innerText = "TE KÖVETKEZEL!"; return; }
    const canUse = monsterAbilityCooldown === 0 && monsterAbilityUsedCount < MONSTER_ABILITY_MAX_USES && Math.random() < 0.28;
    if (canUse) executeMonsterActiveAbility();
    else {
        if (Math.random() > 0.15) {
            const result = CombatEngine.calculatePhysicalDamage(currentMonster, myHero);
            myHero.hp -= result.damage; document.getElementById('dice').innerText = result.roll;
            playAttackAnim('e-img', 'p-img', result.damage, result.isCrit);
        } else { currentMonster.isDefending = true; addLog(`🛡️ Szörny véd!`); }
    }
    if (monsterAbilityCooldown > 0) monsterAbilityCooldown--;
    myCooldowns = myCooldowns.map(c => c > 0 ? c-1 : 0);
    updateStatusBadges(); updateBars(); updateSkillBtns();
    if (myHero.hp <= 0) return endBattle(false);
    isMyTurn = true; toggleBtns(false); document.getElementById('turn-display').innerText = "TE KÖVETKEZEL!";
}

function updateBars() {
    document.getElementById('p-hp-fill').style.width = Math.max(0, myHero.hp/myHero.maxHp*100)+"%";
    document.getElementById('p-hp-val').innerText = `${Math.max(0,Math.ceil(myHero.hp))} / ${myHero.maxHp} HP`;
    document.getElementById('p-mp-fill').style.width = (myHero.mp/myHero.maxMp*100)+"%";
    document.getElementById('p-mp-val').innerText = `${Math.ceil(myHero.mp)} / ${myHero.maxMp} MP`;
    document.getElementById('e-hp-fill').style.width = Math.max(0, currentMonster.hp/currentMonster.maxHp*100)+"%";
    document.getElementById('e-hp-val').innerText = `${Math.max(0,Math.ceil(currentMonster.hp))} / ${currentMonster.maxHp} HP`;
}

function updateSkillBtns() {
    myClassData.skills.forEach((s, i) => {
        const btn = document.getElementById(`sk-${i}`);
        const onCd = myCooldowns[i] > 0;
        btn.disabled = !isMyTurn || onCd || myHero.mp < s.cost || playerStatus.stun > 0;
        btn.innerHTML = onCd ? `<div class="cd-overlay">${myCooldowns[i]}</div>` : '';
    });
}

function updateStatusBadges() {
    const el = document.getElementById('status-effects'); el.innerHTML = '';
    if (playerStatus.burn > 0) el.innerHTML += `<span class="status-badge status-burn">🔥 Égés ${playerStatus.burn}</span>`;
    if (playerStatus.stun > 0) el.innerHTML += `<span class="status-badge status-stun">😵 Kábult ${playerStatus.stun}</span>`;
    if (playerStatus.weakened > 0) el.innerHTML += `<span class="status-badge status-weak">☠️ Gyengült ${playerStatus.weakened}</span>`;
}

function toggleBtns(disable) {
    document.getElementById('btn-attack').disabled = disable;
    document.getElementById('btn-defend').disabled = disable;
    if (!disable) updateSkillBtns();
    else for (let i=0; i<3; i++) document.getElementById(`sk-${i}`).disabled = true;
}

function addLog(msg) {
    const log = document.getElementById('log'); const div = document.createElement('div');
    div.style.cssText = 'border-bottom:1px solid #222; padding-bottom:3px; margin-bottom:3px;';
    div.innerHTML = msg; log.insertBefore(div, log.firstChild);
    while (log.children.length > 30) log.removeChild(log.lastChild);
}

// =====================================================
// HARC VÉGE — kampány / kihívás
// =====================================================
function setWinScreenButtons(primaryText, showSecondary) {
    document.getElementById('win-screen-primary-btn').innerText = primaryText;
    document.getElementById('win-screen-secondary-btn').style.display = showSecondary ? 'block' : 'none';
}

function showChallengeStepUI() {
    document.getElementById('battlefield').style.display = 'none';
    winScreenMode = 'challenge_step';
    document.getElementById('win-screen').style.display = 'flex';
    document.getElementById('win-title').innerText = 'Szakasz kész';
    document.getElementById('win-title').style.color = 'var(--gold)';
    const gainedXp = Math.max(0, Math.floor((Number(myHero.xp) || 0) - challengeStartXp));
    const gainedG = Math.max(0, Math.floor((Number(myHero.gold) || 0) - challengeStartGold));
    document.getElementById('reward-xp').innerText = `Futamban összesen: +${gainedXp} XP`;
    document.getElementById('reward-gold').innerText = `Futamban összesen: +${gainedG} arany`;
    const next = Math.min(10, challengeLevel);
    document.getElementById('reward-hp').innerText = `HP: ${Math.ceil(myHero.hp)} / ${myHero.maxHp} · Következő szint: ${next}/10`;
    setWinScreenButtons('Tovább a következő szintre', true);
    document.getElementById('win-screen-secondary-btn').innerText = 'Kilépés jutalommal (város)';
}

function afterChallengeWin(xpGain, goldGain) {
    document.getElementById('battlefield').style.display = 'none';
    myHero.xp = (Number(myHero.xp) || 0) + xpGain;
    myHero.gold = (Number(myHero.gold) || 0) + goldGain;
    const justCompleted = challengeLevel;
    challengeLevel++;
    persistChallengeState();
    if (justCompleted >= 10) {
        finishChallengeFullSuccess();
        return;
    }
    if ([2, 4, 6, 8].includes(justCompleted)) {
        document.getElementById('equip-prompt-modal').style.display = 'flex';
        return;
    }
    showChallengeStepUI();
}

function finishChallengeFullSuccess() {
    const finalHp = Math.max(1, Math.ceil(myHero.hp));
    const finalMp = Math.max(0, Math.ceil(myHero.mp));
    db.ref(`characters/${myId}`).update({
        xp: Math.max(0, Math.ceil(myHero.xp)),
        gold: Math.max(0, Math.ceil(myHero.gold)),
        hp: finalHp,
        mp: finalMp,
        lastUpdate: Date.now()
    }).then(() => {
        try { sessionStorage.removeItem(CHALLENGE_KEY); } catch (e) {}
        winScreenMode = 'challenge_done';
        document.getElementById('win-screen').style.display = 'flex';
        document.getElementById('win-title').innerText = 'KIHÍVÁS TELJESÍTVE!';
        document.getElementById('win-title').style.color = 'var(--gold)';
        const gainedXp = Math.max(0, Math.floor((Number(myHero.xp) || 0) - challengeStartXp));
        const gainedG = Math.max(0, Math.floor((Number(myHero.gold) || 0) - challengeStartGold));
        document.getElementById('reward-xp').innerText = `+${gainedXp} XP`;
        document.getElementById('reward-gold').innerText = `+${gainedG} arany`;
        document.getElementById('reward-hp').innerText = `Maradék HP: ${finalHp} · MP: ${finalMp}`;
        setWinScreenButtons('🏰 Vissza a városba', false);
    }).catch(err => console.error(err));
}

function challengeCashOutAndExit() {
    db.ref(`characters/${myId}`).update({
        xp: Math.max(0, Math.ceil(myHero.xp)),
        gold: Math.max(0, Math.ceil(myHero.gold)),
        hp: Math.max(1, Math.ceil(myHero.hp)),
        mp: Math.max(0, Math.ceil(myHero.mp)),
        lastUpdate: Date.now()
    }).finally(() => {
        try { sessionStorage.removeItem(CHALLENGE_KEY); } catch (e) {}
        location.href = 'index.html';
    });
}

function challengeContinueAfterVictory() {
    showChallengeStepUI();
}

function handleWinScreenPrimary() {
    if (winScreenMode === 'challenge_step') {
        document.getElementById('win-screen').style.display = 'none';
        beginChallengeBattle();
        return;
    }
    location.href = 'index.html';
}

function handleWinScreenSecondary() {
    if (winScreenMode === 'challenge_step') {
        challengeCashOutAndExit();
    }
}

function endBattle(win) {
    toggleBtns(true);

    if (campaignMode === 'challenge') {
        if (win) {
            const xpGain = Number(currentMonster.xp) || 0;
            const goldGain = Number(currentMonster.gold) || 0;
            document.getElementById('win-screen').style.display = 'none';
            document.getElementById('equip-prompt-modal').style.display = 'none';
            afterChallengeWin(xpGain, goldGain);
            return;
        }
        const finalMp = Math.max(0, Math.ceil(myHero.mp));
        db.ref(`characters/${myId}`).update({
            hp: 1,
            mp: finalMp,
            gold: challengeStartGold,
            xp: challengeStartXp,
            lastUpdate: Date.now()
        }).then(() => {
            try { sessionStorage.removeItem(CHALLENGE_KEY); } catch (e) {}
            winScreenMode = 'solo';
            document.getElementById('win-screen').style.display = 'flex';
            document.getElementById('win-title').innerText = 'VERESÉG!';
            document.getElementById('win-title').style.color = '#ff4444';
            document.getElementById('reward-xp').innerText = '0 XP (kihívás elbukva)';
            document.getElementById('reward-gold').innerText = '0 arany';
            document.getElementById('reward-hp').innerText = 'A városban 1 HP-val ébredsz.';
            setWinScreenButtons('🏰 Vissza a városba', false);
        });
        return;
    }

    document.getElementById('win-screen').style.display = 'flex';
    document.getElementById('win-title').innerText = win ? 'GYŐZELEM!' : 'VERESÉG!';
    document.getElementById('win-title').style.color = win ? 'var(--gold)' : '#ff4444';
    winScreenMode = 'solo';

    if (win) {
        const xp = currentMonster.xp;
        const gold = currentMonster.gold;
        const finalHp = Math.max(1, Math.ceil(myHero.hp));
        const finalMp = Math.max(0, Math.ceil(myHero.mp));
        document.getElementById('reward-xp').innerText = `+${xp} XP`;
        document.getElementById('reward-gold').innerText = `+${gold} Arany`;
        document.getElementById('reward-hp').innerText = `Maradék HP: ${finalHp}`;
        setWinScreenButtons('🏰 Vissza a városba', false);
        db.ref(`characters/${myId}`).update({
            xp: (Number(myHero.xp) || 0) + xp,
            gold: Math.max(0, (Number(myHero.gold) || 0) + gold),
            hp: finalHp,
            mp: finalMp,
            lastUpdate: Date.now()
        });
        return;
    }

    const finalMpLoss = Math.max(0, Math.ceil(myHero.mp));
    document.getElementById('reward-xp').innerText = '0 XP';
    document.getElementById('reward-gold').innerText = '0 arany';
    document.getElementById('reward-hp').innerText = 'A városban 1 HP-val ébredsz.';
    setWinScreenButtons('🏰 Vissza a városba', false);
    db.ref(`characters/${myId}`).update({
        xp: soloStartXp,
        gold: soloStartGold,
        hp: 1,
        mp: finalMpLoss,
        lastUpdate: Date.now()
    });
}

(function initChallengeResume() {
    try {
        if (sessionStorage.getItem('challengeReturn') !== '1') return;
        sessionStorage.removeItem('challengeReturn');
        const raw = sessionStorage.getItem(CHALLENGE_KEY);
        if (!raw || !myId) return;
        const data = JSON.parse(raw);
        if (!data || !data.nextLevel) return;
        campaignMode = 'challenge';
        challengeLevel = data.nextLevel;
        challengeStartGold = data.startGold;
        challengeStartXp = data.startXp;
        db.ref(`characters/${myId}`).once('value').then(snap => {
            myHero = snap.val();
            if (!myHero) return;
            myClassData = SKILLS_DATA[myHero.charClass];
            applyHeroHpMpFromDb(myHero);
            if (data.runGold != null) myHero.gold = data.runGold;
            if (data.runXp != null) myHero.xp = data.runXp;
            document.getElementById('campaign-menu').style.display = 'none';
            document.getElementById('arena-header').style.display = 'flex';
            document.getElementById('battlefield').style.display = 'flex';
            document.getElementById('challenge-hud').style.display = 'block';
            document.getElementById('challenge-lvl-num').innerText = String(challengeLevel);
            showChallengeStepUI();
        });
    } catch (e) { console.warn(e); }
})();
</script>

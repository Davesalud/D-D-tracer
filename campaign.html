<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kampány Mód</title>
    <style>
        /* Kis alap stílus, hogy ne essen szét */
        body { background-color: #1a1a1a; color: white; font-family: sans-serif; text-align: center; }
        .btn { padding: 15px 30px; margin: 10px; font-size: 18px; cursor: pointer; background: #444; color: #fff; border: 2px solid #666; border-radius: 5px; }
        .btn:hover { background: #666; }
        #combat-arena { display: none; margin-top: 50px; }
        .monster-card { border: 2px solid #880000; padding: 20px; display: inline-block; background: #222; }
        #campaign-menu img { max-width: 100%; height: auto; border: 2px solid #444; border-radius: 8px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="campaign-menu">
        <a href="https://ibb.co/sJcnDRcJ" target="_blank">
            <img src="https://i.ibb.co/qFhK4jhF/Copilot-20260409-020526.png" alt="Copilot-20260409-020526">
        </a>
        <h1>Válaszd ki a nehézséget!</h1>
        <button class="btn" onclick="startCampaign('easy')">Könnyű</button>
        <button class="btn" onclick="startCampaign('medium')">Közepes</button>
        <button class="btn" onclick="startCampaign('hard')">Nehéz</button>
    </div>

    <div id="combat-arena">
        <h2>Harc indul!</h2>
        
        <div class="monster-card">
            <img id="monster-img" src="" alt="Szörny Képe" style="max-width: 200px; display: block; margin: 0 auto 10px;">
            <h3 id="monster-name">Szörny Neve</h3>
            <p>HP: <strong id="monster-hp">0</strong> / <span id="monster-maxhp">0</span></p>
            <p><strong>Passzív:</strong> <span id="monster-passive"></span></p>
        </div>

        </div>

    <script src="monsters.js"></script>
    <script src="campaign.js"></script>
</body>
</html>

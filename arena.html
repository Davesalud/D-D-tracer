<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Death's Armada - ARENA v2.4 ⚔️</title>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --accent: #8b0000; --bg: #050507; }
        body { 
            background: var(--bg); color: white; font-family: 'MedievalSharp', cursive; margin: 0;
            background-image: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.95)), url('https://wallpaperaccess.com/full/1155861.jpg');
            background-size: cover; height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }

        .arena-header { padding: 10px; border-bottom: 2px solid var(--gold); text-align: center; background: rgba(0,0,0,0.8); }
        .battlefield { display: flex; flex: 1; justify-content: space-around; align-items: center; padding: 10px; gap: 10px; }
        
        .fighter-card { flex: 1; max-width: 320px; padding: 15px; border: 2px solid #333; background: rgba(15, 15, 20, 0.95); border-radius: 12px; text-align: center; position: relative; transition: 0.3s; }
        .fighter-card.active { border-color: var(--gold); box-shadow: 0 0 15px var(--gold); }
        
        .hero-portrait { width: 100%; height: 200px; border: 1px solid var(--gold); margin: 10px 0; background-size: cover; background-position: center 20%; border-radius: 4px; background-color: #000; }
        
        .hp-bar { width: 100%; height: 22px; background: #000; border: 1px solid #444; margin: 10px 0; overflow: hidden; position: relative; }
        .hp-fill { height: 100%; background: linear-gradient(90deg, #8b0000, #ff0000); width: 100%; transition: 0.6s; }
        .hp-text { position: absolute; width: 100%; text-align: center; font-size: 12px; top: 2px; font-weight: bold; text-shadow: 1px 1px 2px black; }

        .dice-box { width: 60px; height: 60px; border: 2px solid var(--gold); display: flex; align-items: center; justify-content: center; font-size: 2em; background: rgba(139, 0, 0, 0.3); color: var(--gold); border-radius: 10px; }
        .dice-rolling { animation: rotate 0.2s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .battle-log { width: 100%; max-width: 280px; height: 120px; background: rgba(0,0,0,0.8); border: 1px solid #444; padding: 8px; font-size: 0.85em; overflow-y: auto; color: #ccc; border-radius: 5px; text-align: left; }

        .btn { background: var(--accent); color: white; border: 1px solid var(--gold); padding: 12px; font-family: 'MedievalSharp'; cursor: pointer; width: 100%; margin-top: 5px; text-transform: uppercase; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; display: flex; justify-content: center; gap: 10px; padding: 15px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); pointer-events: none; }
        .nav-link { pointer-events: auto; color: var(--gold); background: rgba(0,0,0,0.9); border: 1px solid var(--gold); padding: 10px 20px; cursor: pointer; font-family: 'MedievalSharp'; border-radius: 4px; }

        #win-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; text-align: center; }
        .win-active { display: flex !important; }
    </style>
</head>
<body>

<div id="win-screen">
    <h1 id="win-title" style="color: var(--gold); font-size: 3em; margin: 0;">GYŐZELEM!</h1>
    <div id="winner-name" style="font-size: 1.8em; margin-bottom: 10px;">-</div>
    <div id="win-msg" style="margin-bottom: 30px; font-style: italic; color: #ccc;"></div>
    <div style="display: flex; flex-direction: column; gap: 10px; width: 260px;">
        <button class="btn" onclick="rematch()">⚔️ Visszavágó</button>
        <button class="btn" style="background:#444;" onclick="findNewMatch()">🔍 Új ellenfél</button>
        <button class="btn" style="background:#222;" onclick="safeExit()">⬅ Főmenü</button>
    </div>
</div>

<div class="arena-header"><h2 id="turn-display" style="margin:0;">KERESÉS...</h2></div>

<div class="battlefield">
    <div id="p-card" class="fighter-card">
        <h3 id="p-name">Te</h3>
        <div class="hp-bar"><div id="p-hp-fill" class="hp-fill"></div><div class="hp-text" id="p-hp-val">0/0</div></div>
        <div id="p-img" class="hero-portrait"></div>
        <button id="btn-attack" class="btn" onclick="performAction('attack')" disabled>⚔️ Támadás</button>
        <button id="btn-skill" class="btn" style="background:#4a1a1a;" onclick="performAction('skill')" disabled>✨ Speciál (D20 > 10)</button>
    </div>

    <div style="display:flex; flex-direction:column; align-items:center; gap:10px;">
        <div id="dice" class="dice-box">?</div>
        <div id="log" class="battle-log"></div>
    </div>

    <div id="e-card" class="fighter-card">
        <h3 id="e-name">Várakozás...</h3>
        <div class="hp-bar"><div id="e-hp-fill" class="hp-fill"></div><div class="hp-text" id="e-hp-val">---</div></div>
        <div id="e-img" class="hero-portrait"></div>
        <div id="e-status" style="font-size: 0.8em; color: var(--gold); font-style: italic;">Ellenfélre várva...</div>
    </div>
</div>

<div class="bottom-nav">
    <button id="exit-btn" class="nav-link" onclick="safeExit()">⬅ VISSZA A LOBBYBA</button>
    <button id="forfeit-btn" class="nav-link" style="display:none; color:red; border-color:red;" onclick="forfeit()">🏳️ MEGFUTAMODÁS</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBg2WzLqxt0QRDkDiUKYrGRCw0Kg-gr1OU",
        authDomain: "dnd-tracker-4fe05.firebaseapp.com",
        projectId: "dnd-tracker-4fe05",
        databaseURL: "https://dnd-tracker-4fe05-default-rtdb.europe-west1.firebasedatabase.app",
        storageBucket: "dnd-tracker-4fe05.firebasestorage.app",
        messagingSenderId: "886037504950",
        appId: "1:886037504950:web:46e80b46f0e26e24429717"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const myId = localStorage.getItem('selectedCharId');
    let currentRoom = null, bRef = null;

    const HERO_IMGS = { "Harcos":"https://i.ibb.co/20BXyqpy/Copilot-20260403-032810.png", "Mágus":"https://i.ibb.co/yFz5bcXv/Copilot-20260403-033651.png", "Lovag":"https://i.ibb.co/Fk3n339M/Copilot-20260403-034043.png", "Íjász":"https://i.ibb.co/whd2jNpB/Copilot-20260403-034402.png", "Bérgyilkos":"https://i.ibb.co/b525CsLg/Copilot-20260403-032807.png", "Nekromanta":"https://i.ibb.co/NnCwwCbR/Copilot-20260403-033301.png" };
    const SKILLS = { "Harcos": 30, "Mágus": 45, "Lovag": 25, "Íjász": 32, "Bérgyilkos": 35, "Nekromanta": 28 };

    function findMatch() {
        db.ref('battles').once('value', snap => {
            const rooms = snap.val();
            let found = null;
            if (rooms) {
                for (let id in rooms) { 
                    if (rooms[id].p2 && rooms[id].p2.id === "waiting" && rooms[id].p1.id !== myId) { 
                        found = id; break; 
                    } 
                }
            }
            found ? joinBattle(found) : createNewBattle();
        });
    }

    function createNewBattle() {
        currentRoom = "room_" + Math.random().toString(36).substr(2, 6);
        bRef = db.ref('battles/' + currentRoom);
        db.ref(`characters/${myId}`).once('value', s => {
            const c = s.val();
            bRef.set({
                p1: { id: myId, name: c.name, hp: c.maxHp, maxHp: c.maxHp, class: c.charClass },
                p2: { id: "waiting", name: "Ellenfél", hp: 0, maxHp: 100 },
                turn: myId, lastRoll: "?", log: ["Várjuk az ellenfelet..."]
            });
            listen();
        });
    }

    function joinBattle(id) {
        currentRoom = id; bRef = db.ref('battles/' + currentRoom);
        db.ref(`characters/${myId}`).once('value', s => {
            const c = s.val();
            bRef.update({ 
                "p2": { id: myId, name: c.name, hp: c.maxHp, maxHp: c.maxHp, class: c.charClass }, 
                "log": ["A viadal elkezdődött!"] 
            });
            listen();
        });
    }

    function listen() { bRef.on('value', snap => { if(snap.val()) updateArena(snap.val()); }); }

    function updateArena(b) {
        const isP1 = b.p1.id === myId;
        const me = isP1 ? b.p1 : b.p2;
        const opp = isP1 ? b.p2 : b.p1;
        const hasOpp = (opp && opp.id !== "waiting");

        // Nevek és UI fixálása
        document.getElementById('p-name').innerText = me.name || "Te";
        if (hasOpp) {
            document.getElementById('e-name').innerText = opp.name;
            document.getElementById('e-status').style.display = 'none';
            document.getElementById('e-img').style.backgroundImage = `url('${HERO_IMGS[opp.class]}')`;
        }

        document.getElementById('exit-btn').style.display = hasOpp ? 'none' : 'block';
        document.getElementById('forfeit-btn').style.display = hasOpp ? 'block' : 'none';
        document.getElementById('p-img').style.backgroundImage = `url('${HERO_IMGS[me.class]}')`;

        // Életerő
        document.getElementById('p-hp-fill').style.width = (me.hp/me.maxHp*100)+"%";
        document.getElementById('p-hp-val').innerText = Math.ceil(me.hp) + " HP";
        document.getElementById('e-hp-fill').style.width = hasOpp ? (opp.hp/opp.maxHp*100)+"%" : "0%";
        document.getElementById('e-hp-val').innerText = hasOpp ? Math.ceil(opp.hp) + " HP" : "---";

        // Körök kezelése
        const myTurn = (b.turn === myId && hasOpp && me.hp > 0 && opp.hp > 0);
        document.getElementById('turn-display').innerText = myTurn ? "TE KÖVETKEZEL!" : (hasOpp ? "ELLENFÉL KÖRE..." : "VÁRAKOZÁS...");
        document.getElementById('p-card').classList.toggle('active', myTurn);
        document.getElementById('btn-attack').disabled = !myTurn;
        document.getElementById('btn-skill').disabled = !myTurn;
        
        document.getElementById('dice').innerText = b.lastRoll;
        document.getElementById('log').innerHTML = b.log ? b.log.map(l => `<div>${l}</div>`).reverse().join('') : "";

        // Játék vége
        if (hasOpp && (me.hp <= 0 || opp.hp <= 0)) {
            const ws = document.getElementById('win-screen');
            ws.classList.add('win-active');
            document.getElementById('winner-name').innerText = me.hp > 0 ? me.name : opp.name;
            if (me.hp <= 0) {
                document.getElementById('win-title').innerText = "VERESÉG!";
                document.getElementById('win-msg').innerText = "Fuss csak, gyáva nyúl, a sötétség úgyis elér!";
            } else {
                document.getElementById('win-title').innerText = "GYŐZELEM!";
                document.getElementById('win-msg').innerText = "Hatalmas győzelmet arattál!";
            }
        }
    }

    function performAction(type) {
        const dice = document.getElementById('dice');
        dice.classList.add('dice-rolling');
        setTimeout(() => {
            dice.classList.remove('dice-rolling');
            bRef.once('value', snap => {
                const b = snap.val();
                const roll = Math.floor(Math.random() * 20) + 1;
                const isP1 = b.p1.id === myId;
                const me = isP1 ? b.p1 : b.p2;
                let dmg = 0, msg = "";

                if (type === 'attack') {
                    if (roll === 1) { dmg = 0; msg = `❌ HIBA! ${me.name} melléütött.`; }
                    else if (roll === 20) { 
                        dmg = Math.floor(Math.random() * 10) + 30; 
                        msg = `🎯 KRITIKUS! ${me.name} hatalmasat sújt! (${dmg})`; 
                    }
                    else { 
                        dmg = Math.floor(Math.random() * 12) + 10; 
                        msg = `⚔️ ${me.name} betalált! (${dmg} sebzés)`; 
                    }
                } else {
                    if (roll > 10) {
                        dmg = SKILLS[me.class] + Math.floor(roll/2);
                        msg = `✨ SIKERES SPECIÁL! ${me.name} ereje elsöprő! (${dmg})`;
                    } else {
                        dmg = 0;
                        msg = `☁️ Kudarc! Túl kevés a koncentráció. (Dobás: ${roll})`;
                    }
                }

                const updates = {};
                updates[isP1 ? 'p2/hp' : 'p1/hp'] = Math.max(0, (isP1 ? b.p2.hp : b.p1.hp) - dmg);
                updates['turn'] = isP1 ? b.p2.id : b.p1.id;
                updates['lastRoll'] = roll;
                let nLog = b.log || []; nLog.push(`[${roll}] ${msg}`);
                if (nLog.length > 5) nLog.shift();
                updates['log'] = nLog;
                bRef.update(updates);
            });
        }, 600);
    }

    function forfeit() {
        if(confirm("Valóban megfutamodsz, te gyáva nyúl?")) {
            bRef.once('value', snap => {
                const b = snap.val();
                const isP1 = b.p1.id === myId;
                const updates = {};
                updates[isP1 ? 'p1/hp' : 'p2/hp'] = 0;
                let nLog = b.log || [];
                nLog.push(`🏃‍♂️ ${isP1 ? b.p1.name : b.p2.name} megfutamodott, mint egy gyáva nyúl!`);
                updates['log'] = nLog;
                bRef.update(updates);
            });
        }
    }

    function rematch() { bRef.once('value', s => { const b = s.val(); bRef.update({ "p1/hp": b.p1.maxHp, "p2/hp": b.p2.maxHp, "turn": b.p1.id, "log": ["Újabb kör kezdődik!"], "lastRoll": "?" }); document.getElementById('win-screen').classList.remove('win-active'); }); }
    function findNewMatch() { bRef.off(); bRef.remove(); location.reload(); }
    function safeExit() { bRef.off(); bRef.once('value', s => { if(!s.val() || s.val().p2.id === "waiting") bRef.remove(); window.location.replace('index.html'); }); }

    findMatch();
</script>
</body>
</html>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyBg2WzLqxt0QRDkDiUKYrGRCw0Kg-gr1OU", 
        authDomain: "dnd-tracker-4fe05.firebaseapp.com", 
        projectId: "dnd-tracker-4fe05", 
        databaseURL: "https://dnd-tracker-4fe05-default-rtdb.europe-west1.firebasedatabase.app" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const myId = localStorage.getItem('selectedCharId');
    
    let currentRoom = null, bRef = null, isFighting = false, rewarded = false, hasFled = false;
    let myCooldowns = [0, 0, 0], lastTurnOwner = "";
    let turnTimer = null, timeLeft = 15;
    let myClassData = null, myHero = null;

    const HERO_IMGS = { 
        "Harcos":"https://i.ibb.co/20BXyqpy/Copilot-20260403-032810.png", 
        "Mágus":"https://i.ibb.co/yFz5bcXv/Copilot-20260403-033651.png", 
        "Lovag":"https://i.ibb.co/Fk3n339M/Copilot-20260403-034043.png", 
        "Bérgyilkos":"https://i.ibb.co/b525CsLg/Copilot-20260403-032807.png", 
        "Nekromanta":"https://i.ibb.co/NnCwwCbR/Copilot-20260403-033301.png",
        "Íjász":"https://i.ibb.co/whd2jNpB/Copilot-20260403-034402.png"
    };

    function showSkillInfo(idx) {
        if(!myClassData) return;
        const s = myClassData.skills[idx];
        document.getElementById('skill-desc').innerHTML = `<strong>${s.name}</strong>: ${s.desc} <br><span style="color:#ff4444">Sebzés: ~${s.power}</span> | <span style="color:#0088ff">MP: ${s.cost}</span>`;
    }

    function clearSkillInfo() { document.getElementById('skill-desc').innerText = "Hop-up: Vigye fölé az egeret!"; }

    function initArena() {
        if(!myId) return safeExit();
        document.getElementById('ready-overlay').style.display = 'flex';
        
        db.ref(`characters/${myId}`).once('value', s => {
            myHero = s.val();
            if(!myHero) return safeExit();
            myClassData = SKILLS_DATA[myHero.charClass];
            const minHp = myHero.maxHp * 0.2;

            if (myHero.hp < minHp) {
                document.getElementById('ready-text').innerHTML = `<span style="color:#ff4444;">NINCS ELÉG HP!</span><br><small>Legalább ${Math.ceil(minHp)} HP kell.</small>`;
                return;
            }
            
            document.getElementById('p-name').innerText = myHero.name;
            document.getElementById('p-hp-val').innerText = `${Math.ceil(myHero.hp)} / ${myHero.maxHp} HP`;
            document.getElementById('p-hp-fill').style.width = (myHero.hp / myHero.maxHp * 100) + "%";
            document.getElementById('p-img').style.backgroundImage = `url('${HERO_IMGS[myHero.charClass]}')`;
            
            findMatch();
        });
    }

    function findMatch() {
        document.getElementById('ready-text').innerText = "Szabad szoba keresése...";
        db.ref('battles').once('value', snap => {
            const rooms = snap.val();
            let foundRoomId = null;
            if (rooms) {
                for (let id in rooms) {
                    // Itt a javítás: p2.id === "waiting" ÉS nem mi vagyunk a p1
                    if (rooms[id].p2 && rooms[id].p2.id === "waiting" && rooms[id].p1.id !== myId) {
                        foundRoomId = id;
                        break;
                    }
                }
            }
            foundRoomId ? joinBattle(foundRoomId) : createNewBattle();
        });
    }

    function createNewBattle() {
        currentRoom = "room_" + Math.random().toString(36).substr(2, 6);
        bRef = db.ref('battles/' + currentRoom);
        bRef.set({
            p1: { id: myId, name: myHero.name, hp: Number(myHero.hp), maxHp: Number(myHero.maxHp), mp: Number(myHero.mp || 0), maxMp: Number(myHero.maxMp || 100), class: myHero.charClass, atk: Number(myHero.atk), def: Number(myHero.def), ready: false, roll: 0 },
            p2: { id: "waiting", ready: false },
            status: "waiting", turn: "none", log: ["Várakozás ellenfélre..."], winner: "none", lastRoll: "?"
        }).then(() => {
            bRef.onDisconnect().remove();
            listen();
        });
    }

    function joinBattle(id) {
        currentRoom = id;
        bRef = db.ref('battles/' + currentRoom);
        bRef.update({ 
            "p2": { id: myId, name: myHero.name, hp: Number(myHero.hp), maxHp: Number(myHero.maxHp), mp: Number(myHero.mp || 0), maxMp: Number(myHero.maxMp || 100), class: myHero.charClass, atk: Number(myHero.atk), def: Number(myHero.def), ready: false, roll: 0 },
            "status": "setup"
        }).then(() => {
            // Ha kilépsz várakozás közben, a szoba visszaugrik "waiting"-re a többieknek
            bRef.child('p2').onDisconnect().set({ id: "waiting", ready: false });
            bRef.child('status').onDisconnect().set("waiting");
            listen();
        });
    }

    function markReady() {
        bRef.once('value', snap => {
            const isP1 = snap.val().p1.id === myId;
            bRef.update({ [isP1 ? 'p1/ready' : 'p2/ready']: true });
            document.getElementById('btn-ready').style.display = 'none';
        });
    }

    function rollForInitiative() {
        const roll = Math.floor(Math.random() * 20) + 1;
        bRef.once('value', snap => {
            const isP1 = snap.val().p1.id === myId;
            bRef.update({ [isP1 ? 'p1/roll' : 'p2/roll']: roll });
            document.getElementById('btn-roll-start').disabled = true;
        });
    }

    function listen() {
        bRef.on('value', snap => {
            const b = snap.val(); if(!b) return;
            const isP1 = b.p1.id === myId;
            const me = isP1 ? b.p1 : b.p2;
            const opp = isP1 ? b.p2 : b.p1;

            // KÉSZ gomb és státusz szövegek
            if (!me.ready && b.status !== "fighting" && b.winner === "none") {
                document.getElementById('btn-ready').style.display = 'block';
                document.getElementById('ready-text').innerText = (opp.id === "waiting") ? "Várakozás ellenfélre..." : "Ellenfél megérkezett: " + opp.name;
            } else if (me.ready && !isFighting) {
                document.getElementById('btn-ready').style.display = 'none';
                document.getElementById('ready-text').innerText = (opp.id === "waiting" || !opp.ready) ? "Várakozás a másik félre..." : "Mindenki kész!";
            }

            // Kezdő dobás logika
            if (b.p1.ready && b.p2.ready && me.roll === 0 && b.status !== "fighting") {
                document.getElementById('btn-ready').style.display = 'none';
                document.getElementById('btn-roll-start').style.display = 'block';
                document.getElementById('ready-text').innerText = "Dobjatok a kezdésért!";
            }
            if (me.roll > 0 && b.status !== "fighting") {
                document.getElementById('btn-roll-start').style.display = 'none';
                document.getElementById('ready-text').innerText = "Dobásod: " + me.roll + " (Várakozás...)";
            }

            // Harc indítása és UI váltás
            if (b.p1.roll > 0 && b.p2.roll > 0 && b.status !== "fighting") {
                const firstId = b.p1.roll >= b.p2.roll ? b.p1.id : b.p2.id;
                bRef.update({ status: "fighting", turn: firstId, log: ["A harc elkezdődött!"] });
            }
            if (b.status === "fighting") {
                document.getElementById('ready-overlay').style.display = 'none';
                document.getElementById('header-exit-btn').innerText = "🏃 MEGFUTAMODÁS";
                document.getElementById('header-exit-btn').style.background = "var(--accent)";
                isFighting = true;
            }

            // Vége kezelés
            if (b.winner !== "none" && !rewarded) {
                rewarded = true;
                bRef.onDisconnect().cancel();
                if(b.winner === "fled") { if(!hasFled) safeExit(); } 
                else { showEndScreen(b.winner === myId, me.hp); }
                return;
            }
            updateUI(b, me, opp);
        });
    }

    function updateUI(b, me, opp) {
        document.getElementById('p-hp-fill').style.width = (me.hp/me.maxHp*100) + "%";
        document.getElementById('p-hp-val').innerText = `${Math.ceil(me.hp)} / ${me.maxHp} HP`;
        document.getElementById('p-mp-fill').style.width = (me.mp/me.maxMp*100) + "%";
        document.getElementById('p-mp-val').innerText = `${Math.ceil(me.mp)} / ${me.maxMp} MP`;
        document.getElementById('p-name').innerText = me.name + (me.isDefending ? " 🛡️" : "");

        if (opp.id !== "waiting") {
            document.getElementById('e-name').innerText = opp.name + (opp.isDefending ? " 🛡️" : "");
            document.getElementById('e-hp-fill').style.width = (opp.hp/opp.maxHp*100) + "%";
            document.getElementById('e-hp-val').innerText = `${Math.ceil(opp.hp)} / ${opp.maxHp} HP`;
            document.getElementById('e-img').style.backgroundImage = `url('${HERO_IMGS[opp.class]}')`;
        }

        const myTurn = b.turn === myId && isFighting;
        document.getElementById('btn-attack').disabled = !myTurn;
        document.getElementById('btn-defend').disabled = !myTurn;
        document.getElementById('turn-display').innerText = myTurn ? "TE KÖVETKEZEL!" : (isFighting ? "ELLENFÉL JÖN..." : "KERESÉS...");
        
        myClassData.skills.forEach((s, i) => {
            const btn = document.getElementById(`sk-${i}`);
            btn.style.backgroundImage = `url('${s.img}')`;
            btn.disabled = !myTurn || me.mp < s.cost || myCooldowns[i] > 0;
            btn.innerHTML = myCooldowns[i] > 0 ? `<div style="background:rgba(0,0,0,0.6);color:red;height:100%;display:flex;align-items:center;justify-content:center;">${myCooldowns[i]}</div>` : "";
        });

        document.getElementById('dice').innerText = b.lastRoll || "?";
        document.getElementById('log').innerHTML = b.log ? b.log.map(l => `<div>${l}</div>`).reverse().join('') : "";

        if (myTurn && lastTurnOwner !== myId) {
            myCooldowns = myCooldowns.map(c => c > 0 ? c - 1 : 0);
            startTimer();
        } else if (!myTurn) { clearInterval(turnTimer); document.getElementById('timer-box').style.display = 'none'; }
        lastTurnOwner = b.turn;
        if(isFighting && me.hp <= 0 && b.winner === "none") bRef.update({ winner: opp.id });
    }

    function startTimer() {
        clearInterval(turnTimer); timeLeft = 15;
        const tb = document.getElementById('timer-box'); tb.style.display = 'block'; tb.innerText = timeLeft;
        turnTimer = setInterval(() => { timeLeft--; tb.innerText = timeLeft; if (timeLeft <= 0) skipTurn(); }, 1000);
    }

    function skipTurn() {
        bRef.once('value', snap => {
            const b = snap.val(); if (!b || b.turn !== myId) return;
            const isP1 = b.p1.id === myId;
            bRef.update({ turn: isP1 ? b.p2.id : b.p1.id, log: [...(b.log||[]).slice(-4), `${myHero.name} kifutott az időből!`], lastRoll: "⏳" });
        });
    }

    function useSkill(idx) {
        bRef.once('value', snap => {
            const b = snap.val(); const isP1 = b.p1.id === myId;
            const me = isP1 ? b.p1 : b.p2; const opp = isP1 ? b.p2 : b.p1;
            const s = myClassData.skills[idx];
            myCooldowns[idx] = s.cd;
            const res = CombatEngine.calculateSkillEffect(me, opp, s);
            const up = {};
            up[isP1 ? 'p2/hp' : 'p1/hp'] = Math.max(0, opp.hp - res.damage);
            up[isP1 ? 'p1/mp' : 'p2/mp'] = me.mp - s.cost;
            up[isP1 ? 'p1/isDefending' : 'p2/isDefending'] = false;
            up['turn'] = isP1 ? b.p2.id : b.p1.id;
            up['lastRoll'] = "✨";
            up['log'] = [...(b.log||[]).slice(-4), `${me.name}: ${s.name} (${res.damage})` ];
            bRef.update(up);
        });
    }

    function performAction(type) {
        bRef.once('value', snap => {
            const b = snap.val(); const isP1 = b.p1.id === myId;
            const me = isP1 ? b.p1 : b.p2; const opp = isP1 ? b.p2 : b.p1;
            const up = {};
            if (type === 'attack') {
                const res = CombatEngine.calculatePhysicalDamage(me, opp);
                up[isP1 ? 'p2/hp' : 'p1/hp'] = Math.max(0, opp.hp - res.damage);
                up['lastRoll'] = res.roll;
                up['log'] = [...(b.log||[]).slice(-4), `${me.name}: Ütés (${res.damage})` ];
                up[isP1 ? 'p1/isDefending' : 'p2/isDefending'] = false;
            } else {
                up[isP1 ? 'p1/isDefending' : 'p2/isDefending'] = true;
                up['lastRoll'] = "🛡️";
                up['log'] = [...(b.log||[]).slice(-4), `${me.name} védekezik!` ];
            }
            up['turn'] = isP1 ? b.p2.id : b.p1.id;
            bRef.update(up);
        });
    }

    function showEndScreen(win, finalHp) {
        document.getElementById('win-screen').style.display = 'flex';
        document.getElementById('win-title').innerText = win ? "GYŐZELEM!" : "VERESÉG!";
        document.getElementById('win-title').style.color = win ? "#c5a059" : "#ff4444";
        document.getElementById('reward-xp').innerText = win ? "+15 XP" : "+3 XP";
        document.getElementById('reward-gold').innerText = win ? "+10 Arany" : "-2 Arany";
        let savedHp = Math.max(1, Math.ceil(finalHp));
        document.getElementById('reward-hp').innerText = `Maradék életerő: ${savedHp} HP`;

        db.ref(`characters/${myId}`).update({
            hp: savedHp,
            xp: (myHero.xp || 0) + (win ? 15 : 3),
            gold: Math.max(0, (myHero.gold || 0) + (win ? 10 : -2))
        });
    }

    function handleExit() { 
        if(isFighting) {
            hasFled = true; document.getElementById('flee-screen').style.display = 'flex';
            clearInterval(turnTimer);
            db.ref(`characters/${myId}`).update({ gold: Math.max(0, (myHero.gold || 0) - 5) });
            if(bRef) bRef.update({ winner: "fled" }); 
        } else { safeExit(); }
    }

    function safeExit() { window.location.replace('index.html'); }
    initArena();
</script>

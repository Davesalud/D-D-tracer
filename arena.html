<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Death's Armada - ARENA v4.9 ⚔️</title>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --accent: #8b0000; --bg: #050507; --glass: rgba(15, 15, 20, 0.95); }
        body { 
            background: var(--bg); color: white; font-family: 'MedievalSharp', cursive; margin: 0;
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.9)), url('https://i.ibb.co/JjJy8Qry/Copilot-20260407-160524.png');
            background-size: cover; background-position: center; height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }
        .arena-header { padding: 10px; border-bottom: 2px solid var(--gold); text-align: center; background: rgba(0,0,0,0.8); display: flex; justify-content: space-between; align-items: center; }
        #timer-box { position: absolute; left: 50%; transform: translateX(-50%); top: 65px; font-size: 1.8em; color: #ff4444; border: 2px solid var(--gold); padding: 2px 15px; background: rgba(0,0,0,0.9); border-radius: 8px; z-index: 100; box-shadow: 0 0 10px rgba(255,0,0,0.3); }
        
        .battlefield { display: flex; flex: 1; justify-content: space-around; align-items: center; padding: 10px; gap: 15px; }
        .fighter-card { flex: 1; max-width: 320px; padding: 12px; border: 2px solid #333; background: var(--glass); border-radius: 12px; text-align: center; transition: 0.3s; position: relative; }
        .hero-portrait { width: 100%; height: 360px; border: 1px solid var(--gold); margin: 8px 0; background-size: cover; background-position: center top; border-radius: 6px; box-shadow: inset 0 0 15px black; background-color: #111; }
        
        .bar-container { width: 100%; height: 18px; background: #000; border: 1px solid #444; margin: 4px 0; overflow: hidden; position: relative; border-radius: 3px; }
        .hp-fill { height: 100%; background: linear-gradient(90deg, #600, #f00); width: 100%; transition: 0.6s; }
        .mp-fill { height: 100%; background: linear-gradient(90deg, #003366, #0088ff); width: 0%; transition: 0.6s; }
        .bar-text { position: absolute; width: 100%; text-align: center; font-size: 10px; top: 1px; font-weight: bold; text-shadow: 1px 1px 2px black; z-index: 5; }
        
        .skill-slot { width: 55px; height: 55px; background: #111; border: 2px solid var(--gold); border-radius: 6px; cursor: pointer; background-size: cover; margin: 0 4px; position: relative; }
        .skill-info-box { height: 50px; margin-top: 10px; border: 1px solid #444; background: rgba(0,0,0,0.5); border-radius: 5px; font-size: 0.85em; padding: 5px; color: #ccc; }

        .dice-box { width: 70px; height: 70px; border: 2px solid var(--gold); font-size: 1.5em; background: #000; color: var(--gold); border-radius: 10px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 10px rgba(197, 160, 89, 0.2); }
        .battle-log { width: 100%; max-width: 250px; height: 120px; background: rgba(0,0,0,0.85); border: 1px solid #444; padding: 8px; font-size: 0.8em; overflow-y: auto; color: #ddd; border-radius: 6px; }
        
        .btn { background: var(--accent); color: white; border: 1px solid var(--gold); padding: 10px; font-family: 'MedievalSharp'; cursor: pointer; width: 100%; border-radius: 4px; font-weight: bold; margin-bottom: 5px; position: relative; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none !important; }

        .glow-attack:not(:disabled) { box-shadow: 0 0 15px #ffcc00, inset 0 0 10px #ffcc00; border-color: #ffcc00; }
        .glow-defend:not(:disabled) { box-shadow: 0 0 15px #00e5ff, inset 0 0 10px #00e5ff; border-color: #00e5ff; }

        #ready-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 1500; display:none; flex-direction:column; align-items:center; justify-content:center; }
        #win-screen, #flee-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; text-align: center; }
    </style>
</head>
<body>

<div id="ready-overlay">
    <h2 id="ready-text" style="color:var(--gold);">Ellenfelet keresünk...</h2>
    <button id="btn-ready" class="btn" style="width:200px; font-size:1.5em;" onclick="markReady()" disabled>KÉSZ</button>
    <button id="btn-roll-start" class="btn" style="width:200px; font-size:1.5em; display:none; background: #2980b9;" onclick="rollForInitiative()">🎲 KEZDŐ DOBÁS</button>
    <button id="btn-cancel-search" class="btn" style="width:200px; background:#444; margin-top:10px;" onclick="safeExit()">MÉGSEM</button>
</div>

<div id="flee-screen">
    <img src="https://i.ibb.co/JFW7RN1F/Copilot-20260408-151920.png" alt="Nyuszika" style="max-width:80%; border-radius:15px; border:3px solid var(--gold);">
    <h2 style="color: var(--gold); margin-top: 15px;">Hová mész te kis nyuszika</h2>
    <p id="flee-msg" style="color: #ccc;">Büntetés: -5 Arany</p>
    <button class="btn" style="width:250px" onclick="safeExit()">🏰 SZÉGYENSZEMRE TÁVOZOM</button>
</div>

<div id="win-screen">
    <h1 id="win-title" style="color: var(--gold); font-size: 3em;">GYŐZELEM!</h1>
    <div id="rewards" style="padding: 20px; border: 1px solid var(--gold); width: 250px; margin: 20px 0; background: rgba(255,255,255,0.05); text-align: center;">
        <p id="reward-status" style="color: #aaa; margin-bottom: 10px;"></p>
        <p id="reward-xp" style="font-size: 1.4em;"></p>
        <p id="reward-gold" style="font-size: 1.4em; color: gold;"></p>
        <p id="reward-hp" style="color: #ff4444; margin-top: 10px;"></p>
    </div>
    <button class="btn" style="width:250px" onclick="safeExit()">🏰 VISSZATÉRÉS</button>
</div>

<div class="arena-header">
    <button id="header-exit-btn" class="btn" style="width:auto; padding: 5px 15px; background: #444;" onclick="handleExit()">🏰 KILÉPÉS</button>
    <h2 id="turn-display">KERESÉS...</h2>
    <div style="width:100px;"></div>
</div>

<div id="timer-box" style="display:none;">15</div>

<div class="battlefield">
    <div id="p-card" class="fighter-card">
        <h3 id="p-name" style="color: var(--gold); margin: 0;">Hősöd</h3>
        <div id="p-img" class="hero-portrait"></div>
        <div class="bar-container"><div id="p-hp-fill" class="hp-fill"></div><div class="bar-text" id="p-hp-val">0/0 HP</div></div>
        <div class="bar-container" style="height:12px;"><div id="p-mp-fill" class="mp-fill"></div><div class="bar-text" id="p-mp-val">0/0 MP</div></div>
        
        <div style="display: flex; justify-content: center; margin: 10px 0;">
            <button class="skill-slot" id="sk-0" onclick="useSkill(0)" onmouseover="showSkillInfo(0)" onmouseout="clearSkillInfo()" disabled></button>
            <button class="skill-slot" id="sk-1" onclick="useSkill(1)" onmouseover="showSkillInfo(1)" onmouseout="clearSkillInfo()" disabled></button>
            <button class="skill-slot" id="sk-2" onclick="useSkill(2)" onmouseover="showSkillInfo(2)" onmouseout="clearSkillInfo()" disabled></button>
        </div>

        <div id="skill-desc" class="skill-info-box">Hop-up: Vigye fölé az egeret!</div>

        <button id="btn-attack" class="btn glow-attack" onclick="performAction('attack')" disabled>⚔️ TÁMADÁS</button>
        <button id="btn-defend" class="btn glow-defend" style="background:#2c3e50" onclick="performAction('defend')" disabled>🛡️ VÉDEKEZÉS</button>
    </div>

    <div style="display:flex; flex-direction:column; align-items:center; gap:15px;">
        <div id="dice" class="dice-box">?</div>
        <div id="log" class="battle-log"></div>
    </div>

    <div id="e-card" class="fighter-card">
        <h3 id="e-name" style="color: #ff4444; margin: 0;">Ellenfél</h3>
        <div id="e-img" class="hero-portrait"></div>
        <div class="bar-container"><div id="e-hp-fill" class="hp-fill"></div><div class="bar-text" id="e-hp-val">HP: ---</div></div>
        <div id="e-skills-info" style="font-size: 0.8em; color: #aaa; text-align: left; padding: 8px; background: rgba(0,0,0,0.5); border-radius: 4px; min-height: 80px; margin-top: 10px;">Várakozás...</div>
    </div>
</div>

<script src="skills.js"></script>
<script src="combat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBg2WzLqxt0QRDkDiUKYrGRCw0Kg-gr1OU", authDomain: "dnd-tracker-4fe05.firebaseapp.com", projectId: "dnd-tracker-4fe05", databaseURL: "https://dnd-tracker-4fe05-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const myId = localStorage.getItem('selectedCharId');
    
    let currentRoom = null, bRef = null, isFighting = false, rewarded = false, hasFled = false;
    let myCooldowns = [0, 0, 0], lastTurnOwner = "";
    let turnTimer = null, timeLeft = 15;
    let myClassData = null;

    const HERO_IMGS = { 
        "Harcos":"https://i.ibb.co/20BXyqpy/Copilot-20260403-032810.png", 
        "Mágus":"https://i.ibb.co/yFz5bcXv/Copilot-20260403-033651.png", 
        "Lovag":"https://i.ibb.co/Fk3n339M/Copilot-20260403-034043.png", 
        "Bérgyilkos":"https://i.ibb.co/b525CsLg/Copilot-20260403-032807.png", 
        "Nekromanta":"https://i.ibb.co/NnCwwCbR/Copilot-20260403-033301.png",
        "Íjász":"https://i.ibb.co/whd2jNpB/Copilot-20260403-034402.png"
    };

    function showSkillInfo(idx) {
        if(!myClassData) return;
        const s = myClassData.skills[idx];
        document.getElementById('skill-desc').innerHTML = `<strong>${s.name}</strong>: ${s.desc} <br><span style="color:#ff4444">Sebzés: ~${s.power}</span> | <span style="color:#0088ff">MP: ${s.cost}</span>`;
    }

    function clearSkillInfo() {
        document.getElementById('skill-desc').innerText = "Hop-up: Vigye fölé az egeret!";
    }

    // --- KERESÉS ÉS HP ELLENŐRZÉS ---
    function findMatch() {
        document.getElementById('ready-overlay').style.display = 'flex';
        document.getElementById('ready-text').innerText = "Hősöd állapotának ellenőrzése...";

        db.ref(`characters/${myId}`).once('value', s => {
            const c = s.val();
            if(!c) return safeExit();
            
            myClassData = SKILLS_DATA[c.charClass];
            const minHp = c.maxHp * 0.2;

            // HP LIMIT: 20% alatt nincs harc
            if (c.hp < minHp) {
                document.getElementById('ready-text').innerHTML = `
                    <span style="color:#ff4444; font-size:1.2em;">NINCS ELÉG HP A HARCRA!</span><br>
                    <small style="color:#aaa;">Legalább ${Math.ceil(minHp)} HP szükséges. (Jelenleg: ${Math.ceil(c.hp)})</small>
                `;
                document.getElementById('btn-ready').style.display = 'none';
                return;
            }

            // Ha van elég HP, keresünk szobát
            document.getElementById('ready-text').innerText = "Ellenfelet keresünk...";
            db.ref('battles').once('value', snap => {
                const rooms = snap.val(); let found = null;
                if (rooms) {
                    for (let id in rooms) {
                        if (rooms[id].p2 && rooms[id].p2.id === "waiting") { found = id; break; }
                    }
                }
                found ? joinBattle(found, c) : createNewBattle(c);
            });
        });
    }

    function createNewBattle(c) {
        currentRoom = "room_" + Math.random().toString(36).substr(2, 6);
        bRef = db.ref('battles/' + currentRoom);
        bRef.set({
            p1: { id: myId, name: c.name, hp: Number(c.hp), maxHp: Number(c.maxHp || 100), mp: Number(c.mp || 0), maxMp: Number(c.maxMp || 100), class: c.charClass, atk: Number(c.atk || 10), def: Number(c.def || 5), ready: false, roll: 0 },
            p2: { id: "waiting", ready: false },
            status: "waiting", turn: "none", log: ["Várakozás ellenfélre..."], winner: "none", lastRoll: "?"
        });
        bRef.onDisconnect().remove(); listen();
    }

    function joinBattle(id, c) {
        currentRoom = id; bRef = db.ref('battles/' + currentRoom);
        bRef.update({ 
            "p2": { id: myId, name: c.name, hp: Number(c.hp), maxHp: Number(c.maxHp || 100), mp: Number(c.mp || 0), maxMp: Number(c.maxMp || 100), class: c.charClass, atk: Number(c.atk || 10), def: Number(c.def || 5), ready: false, roll: 0 },
            "status": "setup"
        }).then(() => {
            document.getElementById('btn-ready').disabled = false;
        });
        bRef.child('p2').onDisconnect().set({ id: "waiting", ready: false });
        listen();
    }

    function markReady() {
        const btn = document.getElementById('btn-ready');
        btn.disabled = true; 
        bRef.once('value', snap => {
            const b = snap.val();
            const isP1 = b.p1.id === myId;
            bRef.update({ [isP1 ? 'p1/ready' : 'p2/ready']: true });
            btn.style.display = 'none';
            document.getElementById('ready-text').innerText = "Várakozás a másik félre...";
        });
    }

    function rollForInitiative() {
        const roll = Math.floor(Math.random() * 20) + 1;
        bRef.once('value', snap => {
            const b = snap.val();
            const isP1 = b.p1.id === myId;
            bRef.update({ [isP1 ? 'p1/roll' : 'p2/roll']: roll });
            document.getElementById('btn-roll-start').disabled = true;
            document.getElementById('ready-text').innerText = "Dobásod: " + roll + ". Várakozás...";
        });
    }

    function listen() {
        bRef.on('value', snap => {
            const b = snap.val(); if(!b) return;
            
            const isP1 = b.p1.id === myId;
            const me = isP1 ? b.p1 : b.p2;
            const opp = isP1 ? b.p2 : b.p1;

            if(b.p1 && b.p2 && b.p2.id !== "waiting") {
                if(!me.ready) {
                    const rBtn = document.getElementById('btn-ready');
                    rBtn.disabled = false;
                    rBtn.style.opacity = "1";
                    rBtn.style.display = "block";
                    document.getElementById('ready-text').innerText = "Ellenfél megtalálva! Kész vagy?";
                }
                
                if(b.p1.ready && b.p2.ready && me.roll === 0) {
                    document.getElementById('btn-ready').style.display = 'none';
                    document.getElementById('btn-roll-start').style.display = 'block';
                    document.getElementById('btn-roll-start').disabled = false;
                    document.getElementById('ready-text').innerText = "Dobjátok ki a kezdést!";
                }
            }

            if(b.p1.roll > 0 && b.p2.roll > 0 && b.status !== "fighting") {
                const firstId = b.p1.roll >= b.p2.roll ? b.p1.id : b.p2.id;
                const msg = firstId === myId ? "TE KEZDESZ!" : "ELLENSÉG KEZD!";
                bRef.update({ 
                    status: "fighting", 
                    turn: firstId, 
                    log: [`Dobások: ${b.p1.name}(${b.p1.roll}) vs ${b.p2.name}(${b.p2.roll})`, msg] 
                });
            }

            if(b.status === "fighting") {
                document.getElementById('ready-overlay').style.display = 'none';
                const exitBtn = document.getElementById('header-exit-btn');
                exitBtn.innerText = "🏃 MEGFUTAMODÁS";
                exitBtn.style.background = "var(--accent)";
                isFighting = true;
            }

            if (b.winner !== "none" && !rewarded) { 
                clearInterval(turnTimer); rewarded = true; 
                if(b.winner === "fled") {
                    if(!hasFled) safeExit(); 
                } else {
                    showEndScreen(b.winner === myId, me.hp); 
                }
                return; 
            }
            updateUI(b);
        });
    }

    function updateUI(b) {
        const isP1 = b.p1.id === myId;
        const me = isP1 ? b.p1 : b.p2;
        const opp = isP1 ? b.p2 : b.p1;

        if (b.turn === myId && lastTurnOwner !== myId && isFighting) {
            myCooldowns = myCooldowns.map(c => c > 0 ? c - 1 : 0);
            startTimer();
        } else if (b.turn !== myId) {
            clearInterval(turnTimer); document.getElementById('timer-box').style.display = 'none';
        }
        lastTurnOwner = b.turn;

        document.getElementById('p-hp-fill').style.width = (me.hp/me.maxHp*100) + "%";
        document.getElementById('p-hp-val').innerText = `${Math.ceil(me.hp)} / ${me.maxHp} HP`;
        document.getElementById('p-mp-fill').style.width = (me.mp/me.maxMp*100) + "%";
        document.getElementById('p-mp-val').innerText = `${Math.ceil(me.mp)} / ${me.maxMp} MP`;
        document.getElementById('p-name').innerText = me.name + (me.isDefending ? " 🛡️" : "");
        document.getElementById('p-img').style.backgroundImage = `url('${HERO_IMGS[me.class] || ''}')`;

        if(opp && opp.id !== "waiting") {
            document.getElementById('e-name').innerText = opp.name + (opp.isDefending ? " 🛡️" : "");
            document.getElementById('e-hp-fill').style.width = (opp.hp/opp.maxHp*100) + "%";
            document.getElementById('e-hp-val').innerText = `${Math.ceil(opp.hp)} / ${opp.maxHp} HP`;
            document.getElementById('e-img').style.backgroundImage = `url('${HERO_IMGS[opp.class] || ''}')`;
        }

        const isTurn = (b.turn === myId && isFighting);
        document.getElementById('btn-attack').disabled = !isTurn;
        document.getElementById('btn-defend').disabled = !isTurn;
        document.getElementById('turn-display').innerText = isTurn ? "TE KÖVETKEZEL!" : (isFighting ? "ELLENFÉL JÖN..." : "KERESÉS...");
        
        if(me.class) {
            SKILLS_DATA[me.class].skills.forEach((s, i) => {
                const btn = document.getElementById(`sk-${i}`);
                if(btn) {
                    btn.style.backgroundImage = `url('${s.img}')`;
                    btn.disabled = !isTurn || me.mp < s.cost || myCooldowns[i] > 0;
                    btn.innerHTML = myCooldowns[i] > 0 ? `<div style="background:rgba(0,0,0,0.7);color:red;height:100%;display:flex;align-items:center;justify-content:center;">${myCooldowns[i]}</div>` : "";
                }
            });
        }

        document.getElementById('dice').innerText = b.lastRoll || "?";
        document.getElementById('log').innerHTML = b.log ? b.log.map(l => `<div>${l}</div>`).reverse().join('') : "";
        if(isFighting && me.hp <= 0 && b.winner === "none") bRef.update({ winner: opp.id });
    }

    function startTimer() {
        clearInterval(turnTimer); timeLeft = 15;
        const tb = document.getElementById('timer-box'); tb.style.display = 'block'; tb.innerText = timeLeft;
        turnTimer = setInterval(() => { timeLeft--; tb.innerText = timeLeft; if (timeLeft <= 0) skipTurn(); }, 1000);
    }

    function skipTurn() {
        bRef.once('value', snap => {
            const b = snap.val(); if (!b || b.turn !== myId) return;
            const isP1 = b.p1.id === myId;
            bRef.update({ turn: isP1 ? b.p2.id : b.p1.id, log: [...(b.log||[]).slice(-4), `${b[isP1?'p1':'p2'].name} kifutott az időből!`], lastRoll: "⏳" });
        });
    }

    function useSkill(idx) {
        bRef.once('value', snap => {
            const b = snap.val(); const isP1 = b.p1.id === myId;
            const me = isP1 ? b.p1 : b.p2; const opp = isP1 ? b.p2 : b.p1;
            const s = SKILLS_DATA[me.class].skills[idx];
            myCooldowns[idx] = s.cd;
            const res = CombatEngine.calculateSkillEffect(me, opp, s);
            const up = {};
            up[isP1 ? 'p2/hp' : 'p1/hp'] = Math.max(0, opp.hp - res.damage);
            up[isP1 ? 'p1/mp' : 'p2/mp'] = me.mp - s.cost;
            up['turn'] = isP1 ? b.p2.id : b.p1.id;
            up['lastRoll'] = "✨";
            up['log'] = [...(b.log||[]).slice(-4), `${me.name}: ${s.name} (${res.damage})` ];
            bRef.update(up);
        });
    }

    function performAction(type) {
        bRef.once('value', snap => {
            const b = snap.val(); const isP1 = b.p1.id === myId;
            const me = isP1 ? b.p1 : b.p2; const opp = isP1 ? b.p2 : b.p1;
            const up = {};
            if (type === 'attack') {
                const res = CombatEngine.calculatePhysicalDamage(me, opp);
                up[isP1 ? 'p2/hp' : 'p1/hp'] = Math.max(0, opp.hp - res.damage);
                up['lastRoll'] = res.roll;
                up['log'] = [...(b.log||[]).slice(-4), `${me.name}: Ütés (${res.damage})` ];
                up[isP1 ? 'p1/isDefending' : 'p2/isDefending'] = false;
            } else {
                up[isP1 ? 'p1/isDefending' : 'p2/isDefending'] = true;
                up['lastRoll'] = "🛡️";
                up['log'] = [...(b.log||[]).slice(-4), `${me.name} védekezik!` ];
            }
            up['turn'] = isP1 ? b.p2.id : b.p1.id;
            bRef.update(up);
        });
    }

    function showEndScreen(win, finalHp) {
        document.getElementById('win-screen').style.display = 'flex';
        const title = document.getElementById('win-title');
        title.innerText = win ? "GYŐZELEM!" : "VERESÉG!";
        title.style.color = win ? "#c5a059" : "#ff4444";
        
        document.getElementById('reward-status').innerText = win ? "Dicsőséges csata volt!" : "A sötétség elnyelt...";
        document.getElementById('reward-xp').innerText = win ? "+15 XP" : "+3 XP";
        document.getElementById('reward-gold').innerText = win ? "+10 Arany" : "-2 Arany";
        
        let savedHp = Math.ceil(finalHp);
        if(savedHp <= 0) savedHp = 1; 

        document.getElementById('reward-hp').innerText = `Maradék életerő: ${savedHp} HP`;

        db.ref(`characters/${myId}`).once('value', s => {
            const c = s.val();
            db.ref(`characters/${myId}`).update({ 
                xp: (c.xp || 0) + (win ? 15 : 3), 
                gold: Math.max(0, (c.gold || 0) + (win ? 10 : -2)),
                hp: savedHp
            });
        });
    }

    function handleExit() { 
        if(isFighting) {
            hasFled = true;
            document.getElementById('flee-screen').style.display = 'flex';
            clearInterval(turnTimer);
            db.ref(`characters/${myId}`).once('value', s => {
                const currentGold = s.val().gold || 0;
                db.ref(`characters/${myId}`).update({ gold: Math.max(0, currentGold - 5) });
                if(bRef) bRef.update({ winner: "fled" }); 
            });
        } else { safeExit(); }
    }

    function safeExit() { window.location.replace('index.html'); }
    
    // Elindítjuk a folyamatot
    findMatch();
</script>

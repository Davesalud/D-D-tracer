<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Death's Armada - ARENA ⚔️</title>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --accent: #8b0000; --bg: #050507; }
        body { 
            background: var(--bg); color: white; font-family: 'MedievalSharp', cursive; margin: 0;
            background-image: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.95)), url('https://wallpaperaccess.com/full/1155861.jpg');
            background-size: cover; height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }
        .arena-header { padding: 10px; border-bottom: 2px solid var(--gold); text-align: center; background: rgba(0,0,0,0.8); display: flex; justify-content: space-between; align-items: center; }
        .battlefield { display: flex; flex: 1; justify-content: space-around; align-items: center; padding: 10px; gap: 10px; }
        .fighter-card { flex: 1; max-width: 320px; padding: 15px; border: 2px solid #333; background: rgba(15, 15, 20, 0.95); border-radius: 12px; text-align: center; position: relative; }
        .fighter-card.active { border-color: var(--gold); box-shadow: 0 0 15px var(--gold); }
        .hero-portrait { width: 100%; height: 200px; border: 1px solid var(--gold); margin: 10px 0; background-size: cover; background-position: center 20%; border-radius: 4px; background-color: #000; }
        .hp-bar { width: 100%; height: 22px; background: #000; border: 1px solid #444; margin: 10px 0; overflow: hidden; position: relative; }
        .hp-fill { height: 100%; background: linear-gradient(90deg, #8b0000, #ff0000); width: 100%; transition: 0.6s; }
        .hp-text { position: absolute; width: 100%; text-align: center; font-size: 12px; top: 2px; font-weight: bold; text-shadow: 1px 1px 2px black; }
        .dice-box { width: 60px; height: 60px; border: 2px solid var(--gold); display: flex; align-items: center; justify-content: center; font-size: 2em; background: rgba(139, 0, 0, 0.3); color: var(--gold); border-radius: 10px; }
        .dice-rolling { animation: rotate 0.2s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .battle-log { width: 100%; max-width: 280px; height: 120px; background: rgba(0,0,0,0.8); border: 1px solid #444; padding: 8px; font-size: 0.85em; overflow-y: auto; color: #ccc; border-radius: 5px; }
        .btn { background: var(--accent); color: white; border: 1px solid var(--gold); padding: 12px; font-family: 'MedievalSharp'; cursor: pointer; width: 100%; margin-top: 5px; text-transform: uppercase; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .btn-exit { background: #222; width: auto; padding: 8px 20px; font-size: 0.9em; border: 1px solid var(--gold); }
        
        #win-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; text-align: center; padding: 20px; }
        .win-active { display: flex !important; }
        .futo-kep { width: 220px; height: 220px; border: 2px solid var(--gold); border-radius: 50%; margin: 20px 0; background-size: cover; background-position: center; }
    </style>
</head>
<body>

<div id="win-screen">
    <h1 id="win-title" style="color: var(--gold); font-size: 2.5em; margin: 0;">GYŐZELEM!</h1>
    <div id="win-subtitle" style="font-size: 1.2em; color: #ccc; margin: 10px 0;">-</div>
    
    <div id="futo-ui" style="display:none; flex-direction:column; align-items:center;">
        <div class="futo-kep" style="background-image: url('https://i.ibb.co/R4N45SWs/Copilot-20260405-020111.png');"></div>
        <h2 style="color: #ff4444;">Hová menekülsz te kisnyuszimuszi?</h2>
    </div>

    <div id="rewards" style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px; border: 1px solid rgba(197,160,89,0.3); width: 240px; margin: 10px auto;">
        <p id="reward-xp" style="margin: 5px 0; font-weight: bold;"></p>
        <p id="reward-gold" style="margin: 5px 0; font-weight: bold;"></p>
    </div>

    <div style="width: 280px; margin-top: 20px;">
        <button class="btn" onclick="safeExit()">🏰 VISSZATÉRÉS A VÁRBA</button>
    </div>
</div>

<div class="arena-header">
    <button id="main-exit-btn" class="btn btn-exit" onclick="handleExit()">🏰 KILÉPÉS</button>
    <h2 id="turn-display" style="margin:0; flex:1;">KERESÉS...</h2>
    <div style="width:100px;"></div>
</div>

<div class="battlefield">
    <div id="p-card" class="fighter-card">
        <h3 id="p-name">Te</h3>
        <div class="hp-bar"><div id="p-hp-fill" class="hp-fill"></div><div class="hp-text" id="p-hp-val">0/0</div></div>
        <div id="p-img" class="hero-portrait"></div>
        <button id="btn-attack" class="btn" onclick="performAction('attack')" disabled>⚔️ Támadás</button>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:10px;">
        <div id="dice" class="dice-box">?</div>
        <div id="log" class="battle-log"></div>
    </div>
    <div id="e-card" class="fighter-card">
        <h3 id="e-name">Ellenfél</h3>
        <div class="hp-bar"><div id="e-hp-fill" class="hp-fill"></div><div class="hp-text" id="e-hp-val">---</div></div>
        <div id="e-img" class="hero-portrait"></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBg2WzLqxt0QRDkDiUKYrGRCw0Kg-gr1OU", authDomain: "dnd-tracker-4fe05.firebaseapp.com", projectId: "dnd-tracker-4fe05", databaseURL: "https://dnd-tracker-4fe05-default-rtdb.europe-west1.firebasedatabase.app", storageBucket: "dnd-tracker-4fe05.firebasestorage.app", messagingSenderId: "886037504950", appId: "1:886037504950:web:46e80b46f0e26e24429717" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const myId = localStorage.getItem('selectedCharId');
    let currentRoom = null, bRef = null, rewarded = false, myHpAtEnd = 0, isFighting = false;

    const HERO_IMGS = { "Harcos":"https://i.ibb.co/20BXyqpy/Copilot-20260403-032810.png", "Mágus":"https://i.ibb.co/yFz5bcXv/Copilot-20260403-033651.png", "Lovag":"https://i.ibb.co/Fk3n339M/Copilot-20260403-034043.png", "Íjász":"https://i.ibb.co/whd2jNpB/Copilot-20260403-034402.png", "Bérgyilkos":"https://i.ibb.co/b525CsLg/Copilot-20260403-032807.png", "Nekromanta":"https://i.ibb.co/NnCwwCbR/Copilot-20260403-033301.png" };

    // 10 másodperces életjel
    setInterval(() => { 
        if(myId) db.ref(`characters/${myId}`).update({ lastUpdate: Date.now(), status: isFighting ? "online" : "searching" }); 
    }, 10000);

    function handleExit() {
        if (!isFighting) {
            safeExit(); // Sima kilépés ha nincs harc
        } else {
            if(confirm("Ha most elmenekülsz, büntetést kapsz! Biztos?")) {
                processEndGame(false, true); // Megfutamodás
            }
        }
    }

    function findMatch() {
        db.ref('battles').once('value', snap => {
            const rooms = snap.val();
            let found = null;
            if (rooms) { 
                for (let id in rooms) { 
                    if (rooms[id].p2 && rooms[id].p2.id === "waiting" && rooms[id].p1.id !== myId) { found = id; break; } 
                } 
            }
            found ? joinBattle(found) : createNewBattle();
        });
    }

    function createNewBattle() {
        currentRoom = "room_" + Math.random().toString(36).substr(2, 6);
        bRef = db.ref('battles/' + currentRoom);
        db.ref(`characters/${myId}`).update({ status: "searching", lastUpdate: Date.now() });
        db.ref(`characters/${myId}`).once('value', s => {
            const c = s.val();
            bRef.set({
                p1: { id: myId, name: c.name, hp: c.hp, maxHp: c.maxHp, class: c.charClass },
                p2: { id: "waiting", name: "Várakozás...", hp: 0, maxHp: 100 },
                turn: myId, lastRoll: "?", log: ["Ellenfelet keresünk..."]
            });
            bRef.onDisconnect().remove();
            listen();
        });
    }

    function joinBattle(id) {
        currentRoom = id; bRef = db.ref('battles/' + currentRoom);
        db.ref(`characters/${myId}`).once('value', s => {
            const c = s.val();
            bRef.update({ "p2": { id: myId, name: c.name, hp: c.hp, maxHp: c.maxHp, class: c.charClass }, "log": ["Harc indul!"] });
            listen();
        });
    }

    function listen() { bRef.on('value', snap => { if(snap.val()) updateArena(snap.val()); }); }

    function updateArena(b) {
        const isP1 = b.p1.id === myId;
        const me = isP1 ? b.p1 : b.p2;
        const opp = isP1 ? b.p2 : b.p1;
        myHpAtEnd = me.hp;

        // Ha van ellenfél, átváltunk harci módra
        if (opp.id !== "waiting") {
            isFighting = true;
            document.getElementById('main-exit-btn').innerText = "🏃 MEGFUTAMODÁS";
            document.getElementById('main-exit-btn').style.background = "#4a1a1a";
            
            document.getElementById('e-name').innerText = opp.name;
            document.getElementById('e-img').style.backgroundImage = `url('${HERO_IMGS[opp.class]}')`;
            document.getElementById('e-hp-fill').style.width = (opp.hp/opp.maxHp*100)+"%";
            document.getElementById('e-hp-val').innerText = Math.ceil(opp.hp) + " / " + opp.maxHp + " HP";
        }

        document.getElementById('p-name').innerText = me.name;
        document.getElementById('p-img').style.backgroundImage = `url('${HERO_IMGS[me.class]}')`;
        document.getElementById('p-hp-fill').style.width = (me.hp/me.maxHp*100)+"%";
        document.getElementById('p-hp-val').innerText = Math.ceil(me.hp) + " / " + me.maxHp + " HP";

        const myTurn = (b.turn === myId && isFighting && me.hp > 0 && opp.hp > 0);
        document.getElementById('turn-display').innerText = myTurn ? "TE KÖVETKEZEL!" : (opp.id === "waiting" ? "KERESÉS..." : "ELLENFÉL...");
        document.getElementById('p-card').classList.toggle('active', myTurn);
        document.getElementById('btn-attack').disabled = !myTurn;

        document.getElementById('dice').innerText = b.lastRoll;
        document.getElementById('log').innerHTML = b.log ? b.log.map(l => `<div>${l}</div>`).reverse().join('') : "";

        if (isFighting && (me.hp <= 0 || opp.hp <= 0) && !rewarded) {
            rewarded = true;
            processEndGame(me.hp > 0, false);
        }
    }

    function performAction(type) {
        const dice = document.getElementById('dice');
        dice.classList.add('dice-rolling');
        setTimeout(() => {
            dice.classList.remove('dice-rolling');
            bRef.once('value', snap => {
                const b = snap.val();
                const roll = Math.floor(Math.random() * 20) + 1;
                const isP1 = b.p1.id === myId;
                const me = isP1 ? b.p1 : b.p2;
                let dmg = (roll === 1) ? 0 : (roll === 20 ? 25 : Math.floor(Math.random() * 8) + 10);
                
                const updates = {};
                updates[isP1 ? 'p2/hp' : 'p1/hp'] = Math.max(0, (isP1 ? b.p2.hp : b.p1.hp) - dmg);
                updates['turn'] = isP1 ? b.p2.id : b.p1.id;
                updates['lastRoll'] = roll;
                let nLog = b.log || []; nLog.push(`${me.name}: ${roll === 20 ? 'KRITIKUS!' : 'Támadás'} (${dmg})`);
                updates['log'] = nLog.slice(-5);
                bRef.update(updates);
            });
        }, 600);
    }

    function processEndGame(isWin, isFuto) {
        let xpGain = isWin ? 15 : (isFuto ? -5 : 3);
        let goldGain = isWin ? 10 : (isFuto ? -5 : -2);
        
        db.ref(`characters/${myId}`).once('value', s => {
            const c = s.val();
            let newXp = Math.max(0, (c.xp || 0) + xpGain);
            let newGold = Math.max(0, (c.gold || 0) + goldGain);
            
            db.ref(`characters/${myId}`).update({ xp: newXp, gold: newGold, status: "online", hp: Math.max(0, myHpAtEnd) });
            
            document.getElementById('win-screen').classList.add('win-active');
            
            if (isFuto) {
                document.getElementById('win-title').innerText = "MEGFUTAMODTÁL!";
                document.getElementById('win-subtitle').innerText = "Szégyen a futás, de büntetés jár érte!";
                document.getElementById('futo-ui').style.display = 'flex';
                document.getElementById('reward-xp').style.color = "#ff4444";
                document.getElementById('reward-gold').style.color = "#ff4444";
            } else {
                document.getElementById('win-title').innerText = isWin ? "GYŐZELEM!" : "VERESÉG!";
                document.getElementById('reward-xp').style.color = isWin ? "#4facfe" : "#ff4444";
                document.getElementById('reward-gold').style.color = isWin ? "#c5a059" : "#ff4444";
            }
            
            document.getElementById('reward-xp').innerText = `XP: ${xpGain > 0 ? '+' : ''}${xpGain}`;
            document.getElementById('reward-gold').innerText = `ARANY: ${goldGain > 0 ? '+' : ''}${goldGain}`;
        });
    }

    function safeExit() { 
        if(bRef) bRef.off(); 
        db.ref(`characters/${myId}`).update({ status: "online" }).then(() => {
            if(currentRoom) db.ref('battles/'+currentRoom).remove(); 
            window.location.replace('index.html'); 
        });
    }
    findMatch();
</script>
</body>
</html>

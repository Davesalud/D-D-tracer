<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Death's Armada - ARENA</title>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #050507; 
            color: white; 
            font-family: 'MedievalSharp', cursive; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh;
            background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)), url('https://wallpaperaccess.com/full/1155861.jpg');
            background-size: cover;
        }
        .arena-card {
            border: 2px solid #c5a059;
            background: rgba(20, 20, 25, 0.9);
            padding: 30px;
            text-align: center;
            border-radius: 8px;
            width: 90%;
            max-width: 500px;
        }
        .hp-bar {
            width: 100%;
            height: 30px;
            background: #000;
            border: 1px solid #c5a059;
            margin: 20px 0;
            position: relative;
        }
        #hp-fill {
            height: 100%;
            background: linear-gradient(90deg, #8b0000, #ff0000);
            width: 100%;
            transition: width 0.3s;
        }
        .btn-action {
            background: #8b0000;
            color: white;
            border: 1px solid #c5a059;
            padding: 15px;
            width: 100%;
            font-family: 'MedievalSharp';
            cursor: pointer;
            font-size: 1.2em;
        }
        .btn-action:hover { background: #600; }
        .back-link { color: #c5a059; text-decoration: none; margin-top: 20px; display: block; font-size: 0.8em; }
    </style>
</head>
<body>

<div class="arena-card">
    <h1 id="char-name">Betöltés...</h1>
    <div class="hp-bar">
        <div id="hp-fill"></div>
        <div style="position:absolute; width:100%; top:5px;" id="hp-text">0 / 0 HP</div>
    </div>
    
    <button class="btn-action" onclick="attack()">⚔️ TÁMADÁS (TESZT)</button>
    
    <a href="index.html" class="back-link">⬅ Vissza a Lobby-ba</a>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBg2WzLqxt0QRDkDiUKYrGRCw0Kg-gr1OU",
        authDomain: "dnd-tracker-4fe05.firebaseapp.com",
        projectId: "dnd-tracker-4fe05",
        databaseURL: "https://dnd-tracker-4fe05-default-rtdb.europe-west1.firebasedatabase.app",
        storageBucket: "dnd-tracker-4fe05.firebasestorage.app",
        messagingSenderId: "886037504950",
        appId: "1:886037504950:web:46e80b46f0e26e24429717"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Itt egyelőre manuálisan kellene tudni, ki vagy, 
    // de tesztnek az első karaktert töltjük be, amit találunk
    db.ref('characters').on('value', snap => {
        const chars = snap.val();
        const firstId = Object.keys(chars)[0]; // Csak teszteléshez
        const c = chars[firstId];

        document.getElementById('char-name').innerText = c.name;
        document.getElementById('hp-fill').style.width = (c.hp / c.maxHp * 100) + "%";
        document.getElementById('hp-text').innerText = `${c.hp} / ${c.maxHp} HP`;
    });

    function attack() {
        alert("BUMM! A harcrendszer fejlesztés alatt...");
    }
</script>
</body>
</html>

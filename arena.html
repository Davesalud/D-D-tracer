<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Death's Armada - Arena</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,600;1,700&family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --bg: #050507; --card: rgba(15, 15, 18, 0.95); --accent: #8b0000; --text: #e0e0e0; --hp-green: #4CAF50; --hp-red: #f44336; }
        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; }
        body { font-family: 'Crimson Text', serif; background-color: var(--bg); color: var(--text); margin: 0; height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        
        .master-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)), url('https://i.pinimg.com/originals/26/2b/dd/262bdd02564bf6dabbe89df4f93e8e26.jpg'); background-size: cover; background-position: center; z-index: -1; filter: blur(3px); }
        
        .arena-container { display: flex; gap: 30px; max-width: 1100px; width: 95%; height: 90vh; align-items: stretch; }
        
        .combatant-card { flex: 1; background: var(--card); border: 2px solid var(--gold); border-radius: 5px; padding: 20px; text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: flex; flex-direction: column; justify-content: space-between; }
        
        /* PORTRÉK - PROFIL STÍLUSBAN */
        .combatant-portrait {
            width: 100%;
            height: 320px;
            border: 2px solid var(--gold);
            margin: 15px 0;
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center 20%;
            box-shadow: 0 0 25px rgba(0,0,0,0.8), inset 0 0 40px rgba(0,0,0,0.6);
            border-radius: 4px;
        }

        .hp-container { height: 30px; background: #000; border: 1px solid #333; position: relative; margin: 15px 0; border-radius: 3px; overflow: hidden; }
        .hp-fill { height: 100%; transition: width 0.4s ease; width: 100%; }
        .hp-text { position: absolute; width: 100%; text-align: center; line-height: 28px; font-size: 16px; color: white; font-weight: bold; z-index: 2; text-shadow: 1px 1px 2px black; }

        .battle-log { flex: 0.8; background: rgba(0,0,0,0.7); border: 1px solid #444; border-radius: 4px; padding: 15px; overflow-y: auto; display: flex; flex-direction: column-reverse; font-size: 0.9em; }
        .log-entry { margin-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 5px; }
        .log-entry.player-action { color: #a5d6a7; }
        .log-entry.enemy-action { color: #ef9a9a; }

        .btn-action { font-family: 'MedievalSharp'; padding: 15px; cursor: pointer; border: 1px solid var(--gold); transition: 0.3s; text-transform: uppercase; width: 100%; margin-bottom: 5px; color: var(--gold); background: none; }
        .btn-action:hover:not(:disabled) { background: rgba(197, 160, 89, 0.1); color: white; box-shadow: 0 0 15px rgba(197, 160, 89, 0.3); }
        .btn-attack { background: rgba(139, 0, 0, 0.3); color: white; border-color: var(--accent); }
        
        .btn-escape { position: fixed; top: 20px; left: 20px; background: rgba(0,0,0,0.6); color: #aaa; border: 1px solid #444; padding: 10px 20px; font-family: 'MedievalSharp'; cursor: pointer; }
        .btn-escape:hover { background: var(--accent); color: white; }
    </style>
</head>
<body>

<div class="master-bg"></div>
<button class="btn-escape" onclick="window.location.href='./index.html'">🏳️ MENEKÜLÉS</button>

<div class="arena-container">
    <div class="combatant-card">
        <h1 id="p-name" style="font-family:'MedievalSharp'; color:var(--gold); margin:0;">-</h1>
        <div id="p-img" class="combatant-portrait"></div>
        <div class="hp-container">
            <div id="p-hp-fill" class="hp-fill" style="background: var(--hp-green);"></div>
            <div id="p-hp-text" class="hp-text">0/0 HP</div>
        </div>
        <div id="actions">
            <button class="btn-action btn-attack" onclick="attack()">⚔️ TÁMADÁS</button>
            <button id="skill-btn" class="btn-action" onclick="useSkill()">✨ KÉPESSÉG</button>
        </div>
    </div>

    <div id="battle-log" class="battle-log">
        <div class="log-entry" style="color:var(--gold); font-style:italic;">A harc megkezdődött...</div>
    </div>

    <div class="combatant-card">
        <h1 style="font-family:'MedievalSharp'; color:var(--hp-red); margin:0;">Sötét Lovag</h1>
        <div class="combatant-portrait" style="background-image: url('https://i.ibb.co/Fk3n339M/Copilot-20260403-034043.png');"></div>
        <div class="hp-container">
            <div id="e-hp-fill" class="hp-fill" style="background: var(--hp-red);"></div>
            <div id="e-hp-text" class="hp-text">200/200 HP</div>
        </div>
        <div style="height: 100px; display: flex; align-items: center; justify-content: center; color: #555;">
            <i>Ellenfél várakozik...</i>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBg2WzLqxt0QRDkDiUKYrGRCw0Kg-gr1OU",
        authDomain: "dnd-tracker-4fe05.firebaseapp.com",
        projectId: "dnd-tracker-4fe05",
        databaseURL: "https://dnd-tracker-4fe05-default-rtdb.europe-west1.firebasedatabase.app",
        storageBucket: "dnd-tracker-4fe05.firebasestorage.app",
        messagingSenderId: "886037504950",
        appId: "1:886037504950:web:46e80b46f0e26e24429717"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const IMGS = { 
        "Harcos":"https://i.ibb.co/20BXyqpy/Copilot-20260403-032810.png", 
        "Mágus":"https://i.ibb.co/yFz5bcXv/Copilot-20260403-033651.png", 
        "Lovag":"https://i.ibb.co/Fk3n339M/Copilot-20260403-034043.png", 
        "Íjász":"https://i.ibb.co/whd2jNpB/Copilot-20260403-034402.png", 
        "Bérgyilkos":"https://i.ibb.co/b525CsLg/Copilot-20260403-032807.png", 
        "Nekromanta":"https://i.ibb.co/NnCwwCbR/Copilot-20260403-033301.png" 
    };
    
    let pData, eHP = 200, myId = localStorage.getItem('selectedCharId');

    // Adatok betöltése
    db.ref(`characters/${myId}`).once('value', s => {
        pData = s.val();
        if(!pData) window.location.href='./index.html';
        document.getElementById('p-name').innerText = pData.name;
        document.getElementById('p-img').style.backgroundImage = `url('${IMGS[pData.charClass]}')`;
        updateUI();
    });

    function updateUI() {
        document.getElementById('p-hp-fill').style.width = (pData.hp/pData.maxHp*100) + "%";
        document.getElementById('p-hp-text').innerText = `${pData.hp}/${pData.maxHp} HP`;
        document.getElementById('e-hp-fill').style.width = (eHP/200*100) + "%";
        document.getElementById('e-hp-text').innerText = `${eHP}/200 HP`;
    }

    function log(m, c) {
        const l = document.getElementById('battle-log');
        l.innerHTML += `<div class="log-entry ${c}">${m}</div>`;
    }

    function attack() {
        let d = Math.floor(Math.random() * 10) + 15; 
        eHP = Math.max(0, eHP - d);
        log(`${pData.name} lesújtott: <b>${d} sebzés</b>!`, 'player-action');
        updateUI();
        if(eHP <= 0) { 
            log("GYŐZELEM!", 'player-action');
            setTimeout(() => { alert("Leküzdötted az ellenséget!"); window.location.href='./index.html'; }, 1000);
        } else {
            enemyTurn();
        }
    }

    function enemyTurn() {
        document.querySelectorAll('.btn-action').forEach(b => b.disabled = true);
        setTimeout(() => {
            let d = Math.floor(Math.random() * 10) + 10;
            pData.hp = Math.max(0, pData.hp - d);
            log(`A Sötét Lovag visszatámad: <b>${d} sebzés</b>!`, 'enemy-action');
            db.ref(`characters/${myId}/hp`).set(pData.hp);
            updateUI();
            if(pData.hp <= 0) { 
                alert("Elestél a harcban..."); 
                window.location.href='./index.html'; 
            } else {
                document.querySelectorAll('.btn-action').forEach(b => b.disabled = false);
            }
        }, 1000);
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Death's Armada - Arena</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,600;1,700&family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --bg: #050507; --card: rgba(15, 15, 18, 0.95); --accent: #8b0000; --text: #e0e0e0; --hp-green: #4CAF50; --hp-red: #f44336; }
        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; outline: none; }
        body { font-family: 'Crimson Text', serif; background-color: var(--bg); color: var(--text); margin: 0; height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        
        .master-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)), url('https://i.pinimg.com/originals/26/2b/dd/262bdd02564bf6dabbe89df4f93e8e26.jpg'); background-size: cover; background-position: center; z-index: -1; filter: blur(3px); }
        
        .arena-container { display: flex; gap: 30px; max-width: 1100px; width: 95%; height: 90vh; align-items: stretch; }
        
        .combatant-card { flex: 1; background: var(--card); border: 2px solid var(--gold); border-radius: 5px; padding: 20px; text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: flex; flex-direction: column; justify-content: space-between; position: relative; }
        .combatant-card.player { border-color: #4CAF50; }
        .combatant-card.enemy { border-color: #f44336; }
        
        .combatant-name { font-family: 'MedievalSharp'; font-size: 2.2em; color: var(--gold); margin: 0; text-shadow: 0 0 10px rgba(197, 160, 89, 0.5); }
        .combatant-class { margin: 5px 0; font-style: italic; color: #aaa; text-transform: uppercase; letter-spacing: 1.5px; font-size: 0.9em; }

        /* NAGY PORTRÉ - PONT MINT A PROFILNÁL */
        .combatant-portrait {
            width: 100%;
            height: 320px;
            border: 2px solid var(--gold);
            margin: 15px 0;
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center 20%;
            box-shadow: 0 0 25px rgba(0,0,0,0.8), inset 0 0 40px rgba(0,0,0,0.6);
            border-radius: 4px;
        }

        .hp-container { height: 30px; background: #000; border: 1px solid #333; position: relative; margin: 15px 0; border-radius: 3px; overflow: hidden; box-shadow: inset 0 0 10px rgba(0,0,0,0.7); }
        .hp-fill { height: 100%; transition: width 0.4s ease, background-color 0.4s ease; width: 100%; }
        .hp-text { position: absolute; width: 100%; text-align: center; line-height: 28px; font-size: 16px; color: white; font-weight: bold; z-index: 2; text-shadow: 1px 1px 2px black, 0 0 5px rgba(0,0,0,1); }

        .battle-log { flex: 0.8; background: rgba(0,0,0,0.7); border: 1px solid #444; border-radius: 4px; padding: 15px; overflow-y: auto; display: flex; flex-direction: column-reverse; font-size: 0.9em; max-height: 100%; }
        .log-entry { margin-bottom: 8px; line-height: 1.4; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 5px; }
        .log-entry.player-action { color: #a5d6a7; }
        .log-entry.enemy-action { color: #ef9a9a; }
        .log-entry.system { color: var(--gold); font-style: italic; font-weight: bold; }
        .log-entry.damage { color: #f44336; font-weight: bold; }
        .log-entry.heal { color: #4CAF50; font-weight: bold; }

        .action-bars { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .btn-action { font-family: 'MedievalSharp'; padding: 15px; cursor: pointer; border: 1px solid var(--gold); transition: 0.3s; text-transform: uppercase; display: block; width: 100%; font-size: 1.1em; color: var(--gold); background: none; backdrop-filter: blur(5px); }
        .btn-action:hover:not(:disabled) { background: rgba(197, 160, 89, 0.1); border-color: white; color: white; box-shadow: 0 0 15px rgba(197, 160, 89, 0.3); }
        .btn-action:disabled { opacity: 0.5; cursor: not-allowed; border-color: #444; color: #888; }
        .btn-attack { background: rgba(139, 0, 0, 0.3); border-color: var(--accent); color: white; }
        .btn-attack:hover:not(:disabled) { background: var(--accent); }

        .btn-escape { position: fixed; top: 20px; left: 20px; background: rgba(0,0,0,0.6); color: #aaa; border: 1px solid #444; padding: 10px 20px; font-family: 'MedievalSharp'; cursor: pointer; backdrop-filter: blur(5px); transition: 0.3s; z-index: 100; }
        .btn-escape:hover { background: var(--accent); color: white; border-color: var(--gold); }
    </style>
</head>
<body>

<div class="master-bg"></div>

<button class="btn-escape" onclick="escapeArena()">🏳️ MENEKÜLÉS</button>

<div class="arena-container">
    
    <div id="player-card" class="combatant-card player">
        <div>
            <h1 id="player-name" class="combatant-name">-</h1>
            <p id="player-class" class="combatant-class">-</p>
            
            <div id="player-portrait" class="combatant-portrait"></div>
            
            <div class="hp-container">
                <div id="player-hp-fill" class="hp-fill" style="background-color: var(--hp-green);"></div>
                <div id="player-hp-text" class="hp-text">0/0 HP</div>
            </div>
        </div>

        <div id="player-actions" class="action-bars">
            <button class="btn-action btn-attack" onclick="playerAttack()">⚔️ ALAPTÁMADÁS</button>
            <button id="btn-skill" class="btn-action" onclick="playerSkill()">✨ KÉPESSÉG</button>
            <button class="btn-action" onclick="playerHeal()">❤️ GYÓGYÍTÁS (1x)</button>
        </div>
    </div>

    <div id="battle-log" class="battle-log">
        <div class="log-entry system">Az Aréna kapui kitárulnak... A harc megkezdődik!</div>
    </div>

    <div id="enemy-card" class="combatant-card enemy">
        <div>
            <h1 class="combatant-name">Sötét Lovag</h1>
            <p class="combatant-class">BOSS</p>
            
            <div class="combatant-portrait" style="background-image: url('https://i.ibb.co/Fk3n339M/Copilot-20260403-034043.png'); background-position: center center;"></div>
            
            <div class="hp-container">
                <div id="enemy-hp-fill" class="hp-fill" style="background-color: var(--hp-red);"></div>
                <div id="enemy-hp-text" class="hp-text">200/200 HP</div>
            </div>
        </div>

        <div class="action-bars" style="visibility: hidden;">
            <button class="btn-action disabled">ELLENFÉL KÖRE...</button>
        </div>
    </div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
    // Ugyanaz a Firebase config, mint az index.html-ben
    const firebaseConfig = {
        apiKey: "AIzaSyBg2WzLqxt0QRDkDiUKYrGRCw0Kg-gr1OU",
        authDomain: "dnd-tracker-4fe05.firebaseapp.com",
        projectId: "dnd-tracker-4fe05",
        databaseURL: "https://dnd-tracker-4fe05-default-rtdb.europe-west1.firebasedatabase.app",
        storageBucket: "dnd-tracker-4fe05.firebasestorage.app",
        messagingSenderId: "886037504950",
        appId: "1:886037504950:web:46e80b46f0e26e24429717"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Ugyanazok a képek
    const HERO_IMAGES = {
        "Harcos": "https://i.ibb.co/20BXyqpy/Copilot-20260403-032810.png",
        "Mágus": "https://i.ibb.co/yFz5bcXv/Copilot-20260403-033651.png",
        "Lovag": "https://i.ibb.co/Fk3n339M/Copilot-20260403-034043.png",
        "Íjász": "https://i.ibb.co/whd2jNpB/Copilot-20260403-034402.png",
        "Bérgyilkos": "https://i.ibb.co/b525CsLg/Copilot-20260403-032807.png",
        "Nekromanta": "https://i.ibb.co/NnCwwCbR/Copilot-20260403-033301.png"
    };

    const SKILLS = {
        "Harcos": { name: "Vérszomj", dmg: 25, type: "attack" },
        "Mágus": { name: "Tűzgolyó", dmg: 35, type: "attack" },
        "Lovag": { name: "Szent Pajzs", dmg: 10, type: "defend" }, // Most egyszerűsítve
        "Íjász": { name: "Dupla Lövés", dmg: 24, type: "attack" },
        "Bérgyilkos": { name: "Mérgezett Tőr", dmg: 30, type: "attack" },
        "Nekromanta": { name: "Életelszívás", dmg: 20, heal: 15, type: "special" }
    };

    let player = null;
    let enemy = { hp: 200, maxHp: 200, dmg: 18 };
    const myId = localStorage.getItem('selectedCharId');
    let canAct = true;
    let healUsed = false;

    if (!myId) { escapeArena(); }

    db.ref(`characters/${myId}`).once('value', snap => {
        player = snap.val();
        if (!player) { escapeArena(); }
        setupArenaUI();
    });

    function setupArenaUI() {
        document.getElementById('player-name').innerText = player.name;
        document.getElementById('player-class').innerText = player.charClass;
        
        const portrait = document.getElementById('player-portrait');
        portrait.style.backgroundImage = `url('${HERO_IMAGES[player.charClass]}')`;

        const skillBtn = document.getElementById('btn-skill');
        const skill = SKILLS[player.charClass];
        skillBtn.innerText = `✨ ${skill.name}`;

        updateHpUI();
    }

    function updateHpUI() {
        // Player HP
        const pRef = document.getElementById('player-hp-fill');
        const pPerc = (player.hp / player.maxHp * 100);
        pRef.style.width = pPerc + "%";
        document.getElementById('player-hp-text').innerText = `${player.hp}/${player.maxHp} HP`;
        pRef.style.backgroundColor = pPerc < 30 ? var(--hp-red) : var(--hp-green);

        // Enemy HP
        const eRef = document.getElementById('enemy-hp-fill');
        const ePerc = (enemy.hp / enemy.maxHp * 100);
        eRef.style.width = ePerc + "%";
        document.getElementById('enemy-hp-text').innerText = `${enemy.hp}/${enemy.maxHp} HP`;
    }

    function log(msg, type = 'system') {
        const logBox = document.getElementById('battle-log');
        const entry = document.createElement('div');
        entry.classList.add('log-entry', type);
        entry.innerHTML = msg;
        logBox.appendChild(entry);
    }

    function setActions(enabled) {
        canAct = enabled;
        document.querySelectorAll('#player-actions .btn-action').forEach(b => {
            if (b.innerText.includes("GYÓGYÍTÁS") && healUsed) return;
            b.disabled = !enabled;
        });
    }

    // --- HARCI MECHANIKA ---

    function playerAttack() {
        if (!canAct) return;
        setActions(false);
        const dmg = Math.floor(Math.random() * 10) + 10; // 10-20 sebzés
        enemy.hp = Math.max(0, enemy.hp - dmg);
        updateHpUI();
        log(`${player.name} támad: <span class="damage">${dmg} sebzés</span> a Sötét Lovagnak!`, 'player-action');
        checkBattleState();
    }

    function playerSkill() {
        if (!canAct) return;
        setActions(false);
        const skill = SKILLS[player.charClass];
        const dmg = skill.dmg;
        enemy.hp = Math.max(0, enemy.hp - dmg);
        
        if (skill.heal) {
            player.hp = Math.min(player.maxHp, player.hp + skill.heal);
        }

        updateHpUI();
        log(`${player.name} használja a ${skill.name} képességet: <span class="damage">${dmg} sebzés</span>!`, 'player-action');
        if (skill.heal) { log(`...és <span class="heal">${skill.heal} HP-t</span> visszatöltött magának!`, 'player-action'); }
        checkBattleState();
    }

    function playerHeal() {
        if (!canAct || healUsed) return;
        setActions(false);
        const heal = Math.floor(player.maxHp * 0.4); // 40% gyógyítás
        player.hp = Math.min(player.maxHp, player.hp + heal);
        updateHpUI();
        log(`${player.name} megitta a Gyógyitalt: <span class="heal">${heal} HP</span> visszatöltve!`, 'player-action');
        healUsed = true;
        document.querySelector('.btn-action:nth-child(3)').innerText = "❤️ GYÓGYÍTÁS (0x)";
        checkBattleState();
    }

    function enemyTurn() {
        log("Sötét Lovag készülődik...", 'enemy-action');
        setTimeout(() => {
            const dmg = Math.floor(Math.random() * 10) + enemy.dmg; // 18-28 sebzés
            player.hp = Math.max(0, player.hp - dmg);
            updateHpUI();
            log(`Sötét Lovag lesújt: <span class="damage">${dmg} sebzés</span>!`, 'enemy-action');
            db.ref(`characters/${myId}/hp`).set(player.hp); // HP frissítése a Firebase-ben
            checkBattleState('player');
        }, 1500);
    }

    function checkBattleState(lastAttacker = 'enemy') {
        if (enemy.hp <= 0) {
            updateHpUI();
            log("GYŐZELEM! A Sötét Lovag elesett!", 'system');
            setTimeout(() => { alert("Győztél! Visszatérés a bázisra..."); escapeArena(); }, 2000);
        } else if (player.hp <= 0) {
            updateHpUI();
            log("VERESÉG... A sötétség elnyelt.", 'damage');
            setTimeout(() => { alert("Meghaltál... A Hősöd elesett az Arénában."); db.ref(`characters/${myId}/hp`).set(player.maxHp); escapeArena(); }, 2000);
        } else if (lastAttacker === 'enemy') {
            setActions(true); // Játékos köre
        } else {
            enemyTurn(); // Ellenfél köre
        }
    }

    function escapeArena() {
        window.location.href = './index.html';
    }
</script>
</body>
</html>

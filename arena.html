<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Death's Armada - ARENA v4.2 ⚔️</title>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --accent: #8b0000; --bg: #050507; --glass: rgba(15, 15, 20, 0.95); }
        body { 
            background: var(--bg); color: white; font-family: 'MedievalSharp', cursive; margin: 0;
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.9)), url('https://i.ibb.co/JjJy8Qry/Copilot-20260407-160524.png');
            background-size: cover; background-position: center; height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }
        .arena-header { padding: 10px; border-bottom: 2px solid var(--gold); text-align: center; background: rgba(0,0,0,0.8); display: flex; justify-content: space-between; align-items: center; }
        #timer-box { position: absolute; left: 50%; transform: translateX(-50%); top: 65px; font-size: 1.8em; color: #ff4444; border: 2px solid var(--gold); padding: 2px 15px; background: rgba(0,0,0,0.9); border-radius: 8px; z-index: 100; box-shadow: 0 0 10px rgba(255,0,0,0.3); }
        .battlefield { display: flex; flex: 1; justify-content: space-around; align-items: center; padding: 10px; gap: 15px; }
        .fighter-card { flex: 1; max-width: 320px; padding: 12px; border: 2px solid #333; background: var(--glass); border-radius: 12px; text-align: center; transition: 0.3s; }
        .fighter-card.active { border-color: var(--gold); box-shadow: 0 0 20px var(--gold); }
        .hero-portrait { width: 100%; height: 180px; border: 1px solid var(--gold); margin: 8px 0; background-size: cover; background-position: center top; border-radius: 6px; box-shadow: inset 0 0 15px black; }
        .stat-row { display: flex; justify-content: center; gap: 10px; margin: 5px 0 10px 0; }
        .stat-box { border: 2px solid var(--gold); background: rgba(0,0,0,0.8); padding: 4px 8px; border-radius: 4px; min-width: 70px; }
        .stat-label { font-size: 0.65em; display: block; color: var(--gold); text-transform: uppercase; }
        .stat-val { font-size: 1.1em; font-weight: bold; }
        .bar-container { width: 100%; height: 18px; background: #000; border: 1px solid #444; margin: 4px 0; overflow: hidden; position: relative; border-radius: 3px; }
        .hp-fill { height: 100%; background: linear-gradient(90deg, #600, #f00); width: 100%; transition: 0.6s; }
        .mp-fill { height: 100%; background: linear-gradient(90deg, #003366, #0088ff); width: 0%; transition: 0.6s; }
        .bar-text { position: absolute; width: 100%; text-align: center; font-size: 10px; top: 1px; font-weight: bold; text-shadow: 1px 1px 2px black; z-index: 5; }
        .skill-slot { width: 55px; height: 55px; background: #111; border: 2px solid var(--gold); border-radius: 6px; cursor: pointer; background-size: cover; background-position: center; margin: 0 4px; position: relative; }
        .cd-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); display:flex; align-items:center; justify-content:center; color:#ff4444; font-size: 1.5em; font-weight: bold; border-radius: 4px; }
        .dice-box { width: 70px; height: 70px; border: 2px solid var(--gold); font-size: 1.5em; background: #000; color: var(--gold); border-radius: 10px; display: flex; align-items: center; justify-content: center; text-align: center; }
        .battle-log { width: 100%; max-width: 250px; height: 120px; background: rgba(0,0,0,0.85); border: 1px solid #444; padding: 8px; font-size: 0.8em; overflow-y: auto; color: #ddd; border-radius: 6px; }
        .btn { background: var(--accent); color: white; border: 1px solid var(--gold); padding: 10px; font-family: 'MedievalSharp'; cursor: pointer; width: 100%; border-radius: 4px; font-weight: bold; margin-bottom: 5px; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        #win-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
    </style>
</head>
<body>

<div id="win-screen">
    <h1 id="win-title" style="color: var(--gold); font-size: 3em;">GYŐZELEM!</h1>
    <div id="rewards" style="padding: 20px; border: 1px solid var(--gold); width: 250px; margin: 20px 0; background: rgba(255,255,255,0.05); text-align: center;">
        <p id="reward-xp" style="font-size: 1.4em;"></p>
        <p id="reward-gold" style="font-size: 1.4em; color: gold;"></p>
    </div>
    <button class="btn" style="width:250px" onclick="safeExit()">🏰 VISSZATÉRÉS</button>
</div>

<div class="arena-header">
    <button class="btn" style="width:auto; padding: 5px 15px;" onclick="handleExit()">🏰 KILÉPÉS</button>
    <h2 id="turn-display">KERESÉS...</h2>
    <div style="width:100px;"></div>
</div>

<div id="timer-box" style="display:none;">15</div>

<div class="battlefield">
    <div id="p-card" class="fighter-card">
        <h3 id="p-name" style="color: var(--gold); margin: 0;">Hősöd</h3>
        <div id="p-img" class="hero-portrait"></div>
        <div class="stat-row">
            <div class="stat-box"><span class="stat-label">Támadás</span><span class="stat-val" id="p-atk-val">0</span></div>
            <div class="stat-box"><span class="stat-label">Védelem</span><span class="stat-val" id="p-def-val">0</span></div>
        </div>
        <div class="bar-container"><div id="p-hp-fill" class="hp-fill"></div><div class="bar-text" id="p-hp-val">0/0 HP</div></div>
        <div class="bar-container" style="height:12px;"><div id="p-mp-fill" class="mp-fill"></div><div class="bar-text" id="p-mp-val">0/0 MP</div></div>
        
        <div style="color: var(--gold); font-size: 0.8em; margin: 10px 0 5px 0; border-bottom: 1px solid #333;">KÉPESSÉGEK</div>
        <div style="display: flex; justify-content: center; margin-bottom: 10px;">
            <button class="skill-slot" id="sk-0" onclick="useSkill(0)" disabled></button>
            <button class="skill-slot" id="sk-1" onclick="useSkill(1)" disabled></button>
            <button class="skill-slot" id="sk-2" onclick="useSkill(2)" disabled></button>
        </div>
        
        <button id="btn-attack" class="btn" onclick="performAction('attack')" disabled>⚔️ TÁMADÁS</button>
        <button id="btn-defend" class="btn" style="background:#2c3e50" onclick="performAction('defend')" disabled>🛡️ VÉDEKEZÉS</button>
    </div>

    <div style="display:flex; flex-direction:column; align-items:center; gap:15px;">
        <div id="dice" class="dice-box">?</div>
        <div id="log" class="battle-log"></div>
    </div>

    <div id="e-card" class="fighter-card">
        <h3 id="e-name" style="color: #ff4444; margin: 0;">Ellenfél</h3>
        <div id="e-img" class="hero-portrait"></div>
        <div class="stat-row">
            <div class="stat-box"><span class="stat-label">Támadás</span><span class="stat-val" id="e-atk-val">0</span></div>
            <div class="stat-box"><span class="stat-label">Védelem</span><span class="stat-val" id="e-def-val">0</span></div>
        </div>
        <div class="bar-container"><div id="e-hp-fill" class="hp-fill"></div><div class="bar-text" id="e-hp-val">HP: ---</div></div>
        <div id="e-skills-info" style="font-size: 0.8em; color: #aaa; text-align: left; padding: 8px; background: rgba(0,0,0,0.5); border-radius: 4px; min-height: 80px; margin-top: 10px;">Várakozás...</div>
    </div>
</div>

<script src="skills.js"></script>
<script src="combat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBg2WzLqxt0QRDkDiUKYrGRCw0Kg-gr1OU", authDomain: "dnd-tracker-4fe05.firebaseapp.com", projectId: "dnd-tracker-4fe05", databaseURL: "https://dnd-tracker-4fe05-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const myId = localStorage.getItem('selectedCharId');
    
    let currentRoom = null, bRef = null, isFighting = false, rewarded = false;
    let myCooldowns = [0, 0, 0], lastTurnOwner = "";
    let turnTimer = null, timeLeft = 15;

    const HERO_IMGS = { "Harcos":"https://i.ibb.co/20BXyqpy/Copilot-20260403-032810.png", "Mágus":"https://i.ibb.co/yFz5bcXv/Copilot-20260403-033651.png", "Lovag":"https://i.ibb.co/Fk3n339M/Copilot-20260403-034043.png", "Bérgyilkos":"https://i.ibb.co/b525CsLg/Copilot-20260403-032807.png", "Nekromanta":"https://i.ibb.co/CKhc0K9m/ulti.jpg" };

    function startTimer() {
        clearInterval(turnTimer); timeLeft = 15;
        const tb = document.getElementById('timer-box'); tb.style.display = 'block'; tb.innerText = timeLeft;
        turnTimer = setInterval(() => { timeLeft--; tb.innerText = timeLeft; if (timeLeft <= 0) skipTurn(); }, 1000);
    }

    function skipTurn() {
        bRef.once('value', snap => {
            const b = snap.val();
            if (b.turn === myId) {
                const isP1 = b.p1.id === myId;
                let nLog = b.log || []; nLog.push(`${b[isP1?'p1':'p2'].name} kifutott az időből!`);
                bRef.update({ turn: isP1 ? b.p2.id : b.p1.id, log: nLog.slice(-5) });
            }
        });
    }

    function findMatch() {
        db.ref('battles').once('value', snap => {
            const rooms = snap.val(); let found = null;
            if (rooms) for (let id in rooms) if (rooms[id].p2 && rooms[id].p2.id === "waiting" && rooms[id].p1.id !== myId) { found = id; break; }
            found ? joinBattle(found) : createNewBattle();
        });
    }

    function createNewBattle() {
        currentRoom = "room_" + Math.random().toString(36).substr(2, 6);
        bRef = db.ref('battles/' + currentRoom);
        db.ref(`characters/${myId}`).once('value', s => {
            const c = s.val();
            bRef.set({
                p1: { id: myId, name: c.name, hp: Number(c.hp), maxHp: Number(c.maxHp), mp: Number(c.mp || 0), maxMp: Number(c.maxMp || 100), class: c.charClass, atk: (Number(c.atk) || 10), def: (Number(c.def) || 5), isDefending: false },
                p2: { id: "waiting", name: "Várakozás...", hp: 0, maxHp: 100 },
                turn: myId, lastRoll: "?", log: ["Keresés..."], winner: "none"
            });
            bRef.onDisconnect().remove(); listen();
        });
    }

    function joinBattle(id) {
        currentRoom = id; bRef = db.ref('battles/' + currentRoom);
        db.ref(`characters/${myId}`).once('value', s => {
            const c = s.val();
            bRef.update({ 
                "p2": { id: myId, name: c.name, hp: Number(c.hp), maxHp: Number(c.maxHp), mp: Number(c.mp || 0), maxMp: Number(c.maxMp || 100), class: c.charClass, atk: (Number(c.atk) || 10), def: (Number(c.def) || 5), isDefending: false }, 
                "log": ["A párbaj megkezdődött!"], "winner": "none" 
            });
            listen();
        });
    }

    function listen() {
        bRef.on('value', snap => {
            const b = snap.val(); if(!b) return;
            if (b.winner !== "none" && !rewarded) { clearInterval(turnTimer); rewarded = true; showEndScreen(b.winner === myId); return; }
            updateUI(b);
        });
    }

    function updateUI(b) {
        const isP1 = b.p1.id === myId;
        const me = isP1 ? b.p1 : b.p2;
        const opp = isP1 ? b.p2 : b.p1;

        if (b.turn === myId && lastTurnOwner !== myId && isFighting) {
            myCooldowns = myCooldowns.map(c => c > 0 ? c - 1 : 0);
            startTimer();
        } else if (b.turn !== myId) {
            clearInterval(turnTimer);
            document.getElementById('timer-box').style.display = 'none';
        }
        lastTurnOwner = b.turn;

        if (opp.id !== "waiting") {
            isFighting = true;
            document.getElementById('e-name').innerText = opp.name + (opp.isDefending ? " 🛡️" : "");
            document.getElementById('e-atk-val').innerText = opp.atk;
            document.getElementById('e-def-val').innerText = opp.isDefending ? opp.def * 2 : opp.def;
            document.getElementById('e-img').style.backgroundImage = `url('${HERO_IMGS[opp.class]}')`;
            document.getElementById('e-hp-fill').style.width = (opp.hp/opp.maxHp*100) + "%";
            document.getElementById('e-hp-val').innerText = `${Math.ceil(opp.hp)} / ${opp.maxHp} HP`;
        }

        document.getElementById('p-name').innerText = me.name + (me.isDefending ? " 🛡️" : "");
        document.getElementById('p-atk-val').innerText = me.atk;
        document.getElementById('p-def-val').innerText = me.isDefending ? me.def * 2 : me.def;
        document.getElementById('p-img').style.backgroundImage = `url('${HERO_IMGS[me.class]}')`;
        document.getElementById('p-hp-fill').style.width = (me.hp/me.maxHp*100) + "%";
        document.getElementById('p-hp-val').innerText = `${Math.ceil(me.hp)} / ${me.maxHp} HP`;
        document.getElementById('p-mp-fill').style.width = (me.mp/me.maxMp*100) + "%";
        document.getElementById('p-mp-val').innerText = `${Math.ceil(me.mp)} MP`;

        const isTurn = (b.turn === myId && isFighting);
        document.getElementById('turn-display').innerText = isTurn ? "TE KÖVETKEZEL!" : "ELLENFÉLRE VÁRVA...";
        document.getElementById('p-card').classList.toggle('active', isTurn);
        document.getElementById('btn-attack').disabled = !isTurn;
        document.getElementById('btn-defend').disabled = !isTurn;

        const skills = SKILLS_DATA[me.class].skills;
        skills.forEach((s, i) => {
            const btn = document.getElementById(`sk-${i}`);
            btn.style.backgroundImage = `url('${s.img}')`;
            let cdOverlay = btn.querySelector('.cd-overlay');
            if (myCooldowns[i] > 0) {
                if(!cdOverlay) { cdOverlay = document.createElement('div'); cdOverlay.className='cd-overlay'; btn.appendChild(cdOverlay); }
                cdOverlay.innerText = myCooldowns[i]; btn.disabled = true;
            } else {
                if(cdOverlay) cdOverlay.remove(); btn.disabled = !isTurn || me.mp < s.cost;
            }
        });

        document.getElementById('dice').innerText = b.lastRoll;
        document.getElementById('log').innerHTML = b.log ? b.log.map(l => `<div>${l}</div>`).reverse().join('') : "";
        if(isFighting && me.hp <= 0 && b.winner === "none") bRef.update({ winner: opp.id });
    }

    function useSkill(idx) {
        clearInterval(turnTimer);
        bRef.once('value', snap => {
            const b = snap.val();
            const isP1 = b.p1.id === myId;
            const me = isP1 ? b.p1 : b.p2;
            const opp = isP1 ? b.p2 : b.p1;
            const s = SKILLS_DATA[me.class].skills[idx];
            
            myCooldowns[idx] = s.cd;
            const res = CombatEngine.calculateSkillEffect(me, opp, s);
            const updates = {};
            
            updates[isP1 ? 'p2/hp' : 'p1/hp'] = Math.max(0, opp.hp - res.damage);
            updates[isP1 ? 'p1/mp' : 'p2/mp'] = me.mp - s.cost;
            if(res.healing) updates[isP1 ? 'p1/hp' : 'p2/hp'] = Math.min(me.maxHp, me.hp + res.healing);
            if(res.buff) updates[isP1 ? 'p1/'+res.buff.stat : 'p2/'+res.buff.stat] = (me[res.buff.stat]||0) + res.buff.value;

            updates[isP1 ? 'p1/isDefending' : 'p2/isDefending'] = false;
            updates['turn'] = isP1 ? b.p2.id : b.p1.id;
            updates['lastRoll'] = "✨";
            let nLog = b.log || []; nLog.push(`${me.name}: ${s.name} (${res.damage})`);
            updates['log'] = nLog.slice(-5);
            bRef.update(updates);
        });
    }

    function performAction(type) {
        clearInterval(turnTimer);
        bRef.once('value', snap => {
            const b = snap.val();
            const isP1 = b.p1.id === myId;
            const me = isP1 ? b.p1 : b.p2;
            const opp = isP1 ? b.p2 : b.p1;
            const updates = {};
            let nLog = b.log || [];

            if (type === 'attack') {
                const res = CombatEngine.calculatePhysicalDamage(me, opp);
                updates[isP1 ? 'p2/hp' : 'p1/hp'] = Math.max(0, opp.hp - res.damage);
                updates['lastRoll'] = res.roll;
                nLog.push(`${me.name}: ${res.isCrit?'KRITIKUS!':'Ütés'} (${res.damage})`);
                updates[isP1 ? 'p1/isDefending' : 'p2/isDefending'] = false;
            } else if (type === 'defend') {
                updates[isP1 ? 'p1/isDefending' : 'p2/isDefending'] = true;
                updates['lastRoll'] = "🛡️";
                nLog.push(`${me.name} védekező állást vett fel!`);
            }

            updates['turn'] = isP1 ? b.p2.id : b.p1.id;
            updates['log'] = nLog.slice(-5);
            bRef.update(updates);
        });
    }

    function showEndScreen(win) {
        document.getElementById('win-screen').style.display = 'flex';
        document.getElementById('win-title').innerText = win ? "GYŐZELEM!" : "VERESÉG!";
        document.getElementById('reward-xp').innerText = win ? "+15 XP" : "+3 XP";
        document.getElementById('reward-gold').innerText = win ? "+10 Arany" : "-2 Arany";
        db.ref(`characters/${myId}`).once('value', s => {
            const c = s.val();
            db.ref(`characters/${myId}`).update({ 
                xp: (c.xp || 0) + (win ? 15 : 3), 
                gold: Math.max(0, (c.gold || 0) + (win ? 10 : -2))
            });
        });
    }

    function handleExit() { if(!isFighting || confirm("Kilépsz?")) safeExit(); }
    function safeExit() { window.location.replace('index.html'); }
    findMatch();
</script>
</body>
</html>

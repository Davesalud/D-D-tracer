<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Death's Armada - ARENA v1.9 ⚔️</title>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --accent: #8b0000; --bg: #050507; }
        body { 
            background: var(--bg); color: white; font-family: 'MedievalSharp', cursive; margin: 0;
            background-image: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.95)), url('https://wallpaperaccess.com/full/1155861.jpg');
            background-size: cover; height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }

        /* Effektusok */
        @keyframes shake { 0%, 100% { transform: translate(0, 0); } 20%, 60% { transform: translate(-8px, 0); } 40%, 80% { transform: translate(8px, 0); } }
        .shake { animation: shake 0.4s ease-in-out; border-color: red !important; }
        #flash-effect { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 0, 0, 0.4); opacity: 0; pointer-events: none; z-index: 999; transition: opacity 0.2s; }
        .flash-active { opacity: 1 !important; }

        .hero-portrait { width: 100%; height: 320px; border: 2px solid var(--gold); margin: 15px 0; background-size: cover; background-repeat: no-repeat; background-position: center 20%; border-radius: 4px; background-color: #000; }
        .dice-box { width: 100px; height: 100px; border: 3px solid var(--gold); display: flex; align-items: center; justify-content: center; font-size: 3.5em; background: rgba(139, 0, 0, 0.3); color: var(--gold); border-radius: 15px; }
        .dice-rolling { animation: dice-spin 0.2s linear infinite; }
        @keyframes dice-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .arena-header { padding: 10px; border-bottom: 2px solid var(--gold); text-align: center; background: rgba(0,0,0,0.7); }
        .battlefield { display: flex; flex: 1; justify-content: space-around; align-items: center; padding: 20px; gap: 20px; }
        
        .fighter-card { flex: 1; max-width: 340px; padding: 20px; border: 2px solid #333; background: rgba(15, 15, 20, 0.95); border-radius: 12px; text-align: center; transition: 0.4s ease; position: relative; }
        .turn-indicator { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); background: var(--gold); color: black; padding: 4px 20px; font-size: 0.9em; border-radius: 20px; display: none; font-weight: bold; }
        .fighter-card.active { border-color: var(--gold); transform: translateY(-10px); }
        .fighter-card.active .turn-indicator { display: block; }

        .hp-bar { width: 100%; height: 26px; background: #000; border: 1px solid #444; margin: 15px 0; overflow: hidden; position: relative; }
        .hp-fill { height: 100%; background: linear-gradient(90deg, #8b0000, #ff0000); width: 100%; transition: 0.6s; }
        .hp-text { position: absolute; width: 100%; text-align: center; font-size: 14px; top: 3px; text-shadow: 1px 1px 3px black; font-weight: bold; z-index: 5; }
        
        .battle-log { width: 100%; max-width: 380px; height: 180px; background: rgba(0,0,0,0.9); border: 1px solid #444; padding: 12px; font-size: 0.85em; overflow-y: auto; color: #ccc; border-radius: 8px; }
        .log-entry { border-bottom: 1px solid #222; padding: 3px; }

        .btn { background: var(--accent); color: white; border: 1px solid var(--gold); padding: 14px; font-family: 'MedievalSharp'; cursor: pointer; text-transform: uppercase; width: 100%; margin-top: 10px; }
        .btn:disabled { background: #1a1a1a; color: #444; border-color: #222; }
        
        /* ÚJ GYŐZELMI KÉPERNYŐ STÍLUS */
        #win-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; text-align: center; }
        .win-active { display: flex !important; }
        .win-btn-group { display: flex; flex-direction: column; gap: 10px; width: 300px; margin-top: 20px; }

        .back-btn-container { position: fixed; bottom: 20px; left: 20px; z-index: 100; }
        .back-link { color: var(--gold); background: rgba(0,0,0,0.6); border: 1px solid var(--gold); padding: 12px 20px; cursor: pointer; font-family: 'MedievalSharp'; text-transform: uppercase; border-radius: 4px; }
    </style>
</head>
<body>

<div id="flash-effect"></div>

<div id="win-screen">
    <h1 id="win-title" style="font-size: 4em; color: var(--gold); margin: 0;">GYŐZELEM!</h1>
    <div id="winner-name" style="font-size: 2em; margin-bottom: 10px;">-</div>
    <div id="win-msg" style="color: #aaa; font-style: italic; margin-bottom: 20px;"></div>
    
    <div class="win-btn-group">
        <button class="btn" onclick="rematch()">⚔️ Újra megküzdés</button>
        <button class="btn" style="background:#444;" onclick="findNewMatch()">🔍 Új ellenfél keresése</button>
        <button class="btn" style="background:#222;" onclick="safeExit()">⬅ Vissza a főmenübe</button>
    </div>
</div>

<div class="arena-header"><h2 id="turn-display">Keresés...</h2></div>

<div class="battlefield">
    <div id="p-card" class="fighter-card">
        <div class="turn-indicator">TE JÖSSZ!</div>
        <h3 id="p-name">Te</h3>
        <div id="p-img" class="hero-portrait"></div>
        <div class="hp-bar">
            <div id="p-hp-fill" class="hp-fill"></div>
            <div class="hp-text" id="p-hp-val">0/0 HP</div>
        </div>
        <button id="btn-attack" class="btn" onclick="performAction('attack')" disabled>⚔️ Támadás</button>
        <button id="btn-skill" class="btn" style="background:#4a1a1a;" onclick="performAction('skill')" disabled>✨ Képesség</button>
    </div>

    <div class="center-ui" style="display:flex; flex-direction:column; align-items:center; gap:15px;">
        <div id="dice" class="dice-box">?</div>
        <div id="log" class="battle-log"></div>
    </div>

    <div id="e-card" class="fighter-card">
        <div class="turn-indicator">ELLENFÉL TÁMAD!</div>
        <h3 id="e-name">Ellenfél</h3>
        <div id="e-img" class="hero-portrait"></div>
        <div class="hp-bar">
            <div id="e-hp-fill" class="hp-fill"></div>
            <div class="hp-text" id="e-hp-val">0/0 HP</div>
        </div>
        <div id="e-status" style="margin-top:10px; color:var(--gold); font-style: italic;">Keresés...</div>
    </div>
</div>

<div class="back-btn-container">
    <button id="exit-btn" class="back-link" onclick="safeExit()">⬅ Vissza a főmenübe</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBg2WzLqxt0QRDkDiUKYrGRCw0Kg-gr1OU",
        authDomain: "dnd-tracker-4fe05.firebaseapp.com",
        projectId: "dnd-tracker-4fe05",
        databaseURL: "https://dnd-tracker-4fe05-default-rtdb.europe-west1.firebasedatabase.app",
        storageBucket: "dnd-tracker-4fe05.firebasestorage.app",
        messagingSenderId: "886037504950",
        appId: "1:886037504950:web:46e80b46f0e26e24429717"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const myId = localStorage.getItem('selectedCharId');
    let currentRoom = null;
    let bRef = null;

    const HERO_IMGS = { "Harcos":"https://i.ibb.co/20BXyqpy/Copilot-20260403-032810.png", "Mágus":"https://i.ibb.co/yFz5bcXv/Copilot-20260403-033651.png", "Lovag":"https://i.ibb.co/Fk3n339M/Copilot-20260403-034043.png", "Íjász":"https://i.ibb.co/whd2jNpB/Copilot-20260403-034402.png", "Bérgyilkos":"https://i.ibb.co/b525CsLg/Copilot-20260403-032807.png", "Nekromanta":"https://i.ibb.co/NnCwwCbR/Copilot-20260403-033301.png" };
    const SKILLS = { "Harcos": 25, "Mágus": 35, "Lovag": 15, "Íjász": 24, "Bérgyilkos": 22, "Nekromanta": 15 };

    if (!myId) window.location.replace('index.html');

    // --- MECCSKERESÉS LOGIKA ---
    function findMatch() {
        db.ref('battles').once('value', snap => {
            const rooms = snap.val();
            let foundRoom = null;

            if (rooms) {
                for (let id in rooms) {
                    if (rooms[id].p2.id === "waiting" && rooms[id].p1.id !== myId) {
                        foundRoom = id;
                        break;
                    }
                }
            }

            if (foundRoom) {
                joinBattle(foundRoom);
            } else {
                createNewBattle();
            }
        });
    }

    function createNewBattle() {
        currentRoom = "room_" + Math.random().toString(36).substr(2, 9);
        bRef = db.ref('battles/' + currentRoom);
        db.ref(`characters/${myId}`).once('value', s => {
            const c = s.val();
            bRef.set({
                p1: { id: myId, name: c.name, hp: c.maxHp, maxHp: c.maxHp, class: c.charClass, status: "active" },
                p2: { id: "waiting", name: "Ellenfél", hp: 0, maxHp: 100, class: "" },
                turn: myId, lastRoll: "?", log: ["Várakozás ellenfélre..."]
            });
            listenToBattle();
        });
    }

    function joinBattle(roomId) {
        currentRoom = roomId;
        bRef = db.ref('battles/' + currentRoom);
        db.ref(`characters/${myId}`).once('value', s => {
            const c = s.val();
            bRef.update({
                "p2": { id: myId, name: c.name, hp: c.maxHp, maxHp: c.maxHp, class: c.charClass, status: "active" },
                "log": ["Egy új kihívó lépett az Arénába!"]
            });
            listenToBattle();
        });
    }

    function listenToBattle() {
        bRef.on('value', snap => {
            const b = snap.val();
            if (!b) return;
            updateArena(b);
        });
    }

    function updateArena(b) {
        const isP1 = b.p1.id === myId;
        const me = isP1 ? b.p1 : b.p2;
        const opp = isP1 ? b.p2 : b.p1;
        const hasOpponent = (opp && opp.id !== "waiting");

        // Ha nincs senki, látszik a főmenü gomb
        document.getElementById('exit-btn').style.display = hasOpponent ? 'none' : 'block';

        document.getElementById('p-img').style.backgroundImage = `url('${HERO_IMGS[me.class]}')`;
        if(hasOpponent) {
            document.getElementById('e-img').style.backgroundImage = `url('${HERO_IMGS[opp.class]}')`;
            document.getElementById('e-status').style.display = 'none';
        }

        document.getElementById('p-hp-fill').style.width = (me.hp/me.maxHp*100)+"%";
        document.getElementById('p-hp-val').innerText = Math.ceil(me.hp)+"/"+me.maxHp+" HP";
        document.getElementById('e-hp-fill').style.width = (opp.hp/opp.maxHp*100)+"%";
        document.getElementById('e-hp-val').innerText = Math.ceil(opp.hp)+"/"+opp.maxHp+" HP";
        
        document.getElementById('p-name').innerText = me.name;
        document.getElementById('e-name').innerText = opp.name;

        const myTurn = (b.turn === myId && hasOpponent && me.hp > 0 && opp.hp > 0);
        document.getElementById('turn-display').innerText = myTurn ? "TE KÖVETKEZEL!" : (hasOpponent ? "ELLENFÉL KÖRE..." : "Várakozás...");
        
        document.getElementById('p-card').classList.toggle('active', b.turn === me.id && hasOpponent);
        document.getElementById('e-card').classList.toggle('active', b.turn === opp.id && hasOpponent);

        document.getElementById('btn-attack').disabled = !myTurn;
        document.getElementById('btn-skill').disabled = !myTurn;
        document.getElementById('dice').innerText = b.lastRoll;
        document.getElementById('log').innerHTML = b.log ? b.log.map(l => `<div class="log-entry">${l}</div>`).reverse().join('') : "";

        if (hasOpponent && (me.hp <= 0 || opp.hp <= 0)) {
            showWinScreen(me, opp);
        }
    }

    function showWinScreen(me, opp) {
        const winScreen = document.getElementById('win-screen');
        document.getElementById('winner-name').innerText = me.hp > 0 ? me.name : opp.name;
        document.getElementById('win-title').innerText = me.hp > 0 ? "GYŐZELEM!" : "VERESÉG!";
        document.getElementById('win-msg').innerText = me.hp > 0 ? "Tiéd a dicsőség!" : "A porba hulltál...";
        winScreen.classList.add('win-active');
    }

    // --- 3 OPCIÓ FUNKCIÓI ---
    function rematch() {
        bRef.once('value', snap => {
            const b = snap.val();
            bRef.update({
                "p1/hp": b.p1.maxHp,
                "p2/hp": b.p2.maxHp,
                "turn": b.p1.id,
                "log": ["A visszavágó elkezdődött! Teljes életerő visszaállítva!"],
                "lastRoll": "?"
            });
            document.getElementById('win-screen').classList.remove('win-active');
        });
    }

    function findNewMatch() {
        if (bRef) bRef.off();
        if (currentRoom) db.ref('battles/' + currentRoom).remove();
        location.reload(); 
    }

    function safeExit() {
        if (bRef) bRef.off();
        // Ha egyedül vagyunk, töröljük a szobát kilépéskor
        bRef.once('value', snap => {
            const b = snap.val();
            if (!b || b.p2.id === "waiting") {
                db.ref('battles/' + currentRoom).remove().then(() => window.location.replace('index.html'));
            } else {
                window.location.replace('index.html');
            }
        });
    }

    function performAction(type) {
        const dice = document.getElementById('dice');
        dice.classList.add('dice-rolling');
        setTimeout(() => {
            dice.classList.remove('dice-rolling');
            bRef.once('value', snap => {
                const b = snap.val();
                const roll = Math.floor(Math.random() * 20) + 1;
                const isP1 = b.p1.id === myId;
                const me = isP1 ? b.p1 : b.p2;
                const opp = isP1 ? b.p2 : b.p1;
                let dmg = (type === 'attack') ? (roll >= 8 ? 15 : 0) : SKILLS[me.class];
                if (roll === 20 && type === 'attack') dmg *= 2;

                const updates = {};
                updates[isP1 ? 'p2/hp' : 'p1/hp'] = Math.max(0, (isP1 ? b.p2.hp : b.p1.hp) - dmg);
                updates['turn'] = opp.id;
                updates['lastRoll'] = roll;
                let nLog = b.log || [];
                nLog.push(`${me.name} ${type === 'attack' ? 'támadott' : 'képességet használt'}: ${dmg} sebzés!`);
                if (nLog.length > 5) nLog.shift();
                updates['log'] = nLog;
                bRef.update(updates);
            });
        }, 800);
    }

    // Indítás
    findMatch();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Death's Armada - ARENA v4.0 ⚔️</title>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --accent: #8b0000; --bg: #050507; --glass: rgba(15, 15, 20, 0.95); --magic: #0088ff; }
        body { 
            background: var(--bg); color: white; font-family: 'MedievalSharp', cursive; margin: 0;
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.9)), url('https://i.ibb.co/JjJy8Qry/Copilot-20260407-160524.png');
            background-size: cover; background-position: center; height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }
        .arena-header { padding: 10px; border-bottom: 2px solid var(--gold); text-align: center; background: rgba(0,0,0,0.8); display: flex; justify-content: space-between; align-items: center; position: relative; }
        
        /* TIMER STYLING */
        #timer-box { position: absolute; left: 50%; transform: translateX(-50%); top: 60px; font-size: 2em; color: #ff4444; text-shadow: 0 0 10px black; z-index: 100; border: 2px solid var(--gold); padding: 5px 20px; background: rgba(0,0,0,0.8); border-radius: 10px; }

        .battlefield { display: flex; flex: 1; justify-content: space-around; align-items: center; padding: 10px; gap: 10px; margin-top: 20px; }
        
        .fighter-card { flex: 1; max-width: 320px; padding: 15px; border: 2px solid #333; background: var(--glass); border-radius: 12px; text-align: center; position: relative; transition: 0.3s; }
        .fighter-card.active { border-color: var(--gold); box-shadow: 0 0 20px var(--gold); transform: scale(1.02); }
        .hero-portrait { width: 100%; height: 160px; border: 1px solid var(--gold); margin: 10px 0; background-size: cover; background-position: center 20%; border-radius: 6px; box-shadow: inset 0 0 15px black; }
        
        /* STAT BOXES */
        .stat-row { display: flex; justify-content: center; gap: 10px; margin-bottom: 10px; }
        .stat-box { border: 2px solid var(--gold); background: rgba(0,0,0,0.7); padding: 5px 10px; border-radius: 5px; min-width: 60px; box-shadow: 0 0 5px var(--gold); }
        .stat-label { font-size: 0.7em; display: block; color: var(--gold); }

        .bar-container { width: 100%; height: 20px; background: #000; border: 1px solid #444; margin: 5px 0; overflow: hidden; position: relative; border-radius: 4px; }
        .hp-fill { height: 100%; background: linear-gradient(90deg, #600, #f00); width: 100%; transition: 0.6s; }
        .mp-fill { height: 100%; background: linear-gradient(90deg, #003366, #0088ff); width: 0%; transition: 0.6s; }
        .bar-text { position: absolute; width: 100%; text-align: center; font-size: 11px; top: 2px; font-weight: bold; text-shadow: 1px 1px 2px black; z-index: 5; }

        .skills-wrapper { display: flex; gap: 8px; justify-content: center; margin: 10px 0; }
        .skill-slot { 
            width: 60px; height: 60px; background: #111; border: 2px solid var(--gold); border-radius: 8px;
            cursor: pointer; position: relative; display: flex; align-items: center; justify-content: center;
            transition: 0.2s; overflow: hidden; font-size: 0.75em; padding: 4px; color: #fff; text-align: center;
            background-size: cover; background-position: center;
        }
        .skill-slot:hover:not(:disabled) { border-color: white; transform: translateY(-3px); }
        .skill-slot:disabled { opacity: 0.3; filter: grayscale(1); }

        #p-spell-info {
            background: rgba(0,0,0,0.95); border: 1px solid var(--gold); border-left: 4px solid var(--gold);
            padding: 10px; margin-top: 10px; min-height: 80px; text-align: left;
            font-size: 0.85em; line-height: 1.4; border-radius: 4px; visibility: hidden; opacity: 0; transition: 0.3s;
        }
        #p-spell-info.active { visibility: visible; opacity: 1; }

        .cd-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); display:flex; align-items:center; justify-content:center; color:#ff4444; font-size: 1.6em; z-index: 10; }
        .dice-box { width: 60px; height: 60px; border: 2px solid var(--gold); font-size: 2em; background: #000; color: var(--gold); border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        .battle-log { width: 100%; max-width: 280px; height: 130px; background: rgba(0,0,0,0.85); border: 1px solid #444; padding: 10px; font-size: 0.85em; overflow-y: auto; color: #bbb; border-radius: 8px; }

        .btn { background: var(--accent); color: white; border: 1px solid var(--gold); padding: 12px; font-family: 'MedievalSharp'; cursor: pointer; width: 100%; border-radius: 4px; font-weight: bold; }
        .btn:disabled { opacity: 0.3; }

        #win-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; text-align: center; }
        .win-active { display: flex !important; }
    </style>
</head>
<body>

<div id="win-screen">
    <h1 id="win-title" style="color: var(--gold); font-size: 3em;">GYŐZELEM!</h1>
    <div id="rewards" style="padding: 20px; border: 1px solid var(--gold); width: 250px; margin: 20px 0; background: rgba(255,255,255,0.05);">
        <p id="reward-xp" style="font-size: 1.4em;"></p>
        <p id="reward-gold" style="font-size: 1.4em; color: gold;"></p>
    </div>
    <button class="btn" style="width:250px" onclick="safeExit()">🏰 VISSZATÉRÉS</button>
</div>

<div class="arena-header">
    <button class="btn" style="width:auto; padding: 5px 15px;" onclick="handleExit()">🏰 KILÉPÉS</button>
    <h2 id="turn-display">KERESÉS...</h2>
    <div style="width:100px;"></div>
</div>

<div id="timer-box" style="display:none;">15</div>

<div class="battlefield">
    <div id="p-card" class="fighter-card">
        <h3 id="p-name" style="color: var(--gold); margin: 5px 0;">Hősöd</h3>
        <div class="stat-row">
            <div class="stat-box"><span class="stat-label">Támadás</span><b id="p-atk-val">0</b></div>
            <div class="stat-box"><span class="stat-label">Védelem</span><b id="p-def-val">0</b></div>
        </div>
        <div class="bar-container"><div id="p-hp-fill" class="hp-fill"></div><div class="bar-text" id="p-hp-val">0/0 HP</div></div>
        <div class="bar-container" style="height:12px;"><div id="p-mp-fill" class="mp-fill"></div><div class="bar-text" id="p-mp-val" style="font-size:9px; top:0;">0/0 MP</div></div>
        <div id="p-img" class="hero-portrait"></div>
        
        <div class="skills-wrapper" id="p-skills">
            <button class="skill-slot" id="sk-0" onclick="useSkill(0)" disabled></button>
            <button class="skill-slot" id="sk-1" onclick="useSkill(1)" disabled></button>
            <button class="skill-slot" id="sk-2" onclick="useSkill(2)" disabled></button>
        </div>

        <div id="p-spell-info"><i>Érintsd meg a képességet!</i></div>
        <button id="btn-attack" class="btn" onclick="performAction('attack')" disabled>⚔️ ALAP TÁMADÁS</button>
    </div>

    <div style="display:flex; flex-direction:column; align-items:center; gap:10px;">
        <div id="dice" class="dice-box">?</div>
        <div id="log" class="battle-log"></div>
    </div>

    <div id="e-card" class="fighter-card">
        <h3 id="e-name" style="color: #ff4444; margin: 5px 0;">Ellenfél</h3>
        <div class="stat-row">
            <div class="stat-box"><span class="stat-label">Támadás</span><b id="e-atk-val">0</b></div>
            <div class="stat-box"><span class="stat-label">Védelem</span><b id="e-def-val">0</b></div>
        </div>
        <div class="bar-container"><div id="e-hp-fill" class="hp-fill"></div><div class="bar-text" id="e-hp-val">HP: ---</div></div>
        <div id="e-img" class="hero-portrait"></div>
        <div id="e-skills-info" style="font-size: 0.8em; color: #aaa; text-align: left; padding: 10px; background: rgba(0,0,0,0.5); border-radius: 5px; min-height: 80px;">
            Várakozás...
        </div>
    </div>
</div>

<script src="skills.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBg2WzLqxt0QRDkDiUKYrGRCw0Kg-gr1OU", authDomain: "dnd-tracker-4fe05.firebaseapp.com", projectId: "dnd-tracker-4fe05", databaseURL: "https://dnd-tracker-4fe05-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const myId = localStorage.getItem('selectedCharId');
    
    let currentRoom = null, bRef = null, isFighting = false, rewarded = false;
    let myCooldowns = [0, 0, 0], lastTurnOwner = "";
    let turnTimer = null, timeLeft = 15;

    const HERO_IMGS = { 
        "Harcos":"https://i.ibb.co/20BXyqpy/Copilot-20260403-032810.png", 
        "Mágus":"https://i.ibb.co/yFz5bcXv/Copilot-20260403-033651.png", 
        "Lovag":"https://i.ibb.co/cKWxyMbJ/1.jpg", 
        "Bérgyilkos":"https://i.ibb.co/b525CsLg/Copilot-20260403-032807.png",
        "Íjász":"https://i.ibb.co/Lhkdcqmb/1.jpg",
        "Nekromanta":"https://i.ibb.co/CKhc0K9m/ulti.jpg"
    };

    function startTimer() {
        clearInterval(turnTimer);
        timeLeft = 15;
        const timerBox = document.getElementById('timer-box');
        timerBox.style.display = 'block';
        timerBox.innerText = timeLeft;

        turnTimer = setInterval(() => {
            timeLeft--;
            timerBox.innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(turnTimer);
                skipTurn();
            }
        }, 1000);
    }

    function skipTurn() {
        bRef.once('value', snap => {
            const b = snap.val();
            if (b.turn === myId) {
                const updates = {};
                updates['turn'] = (b.p1.id === myId) ? b.p2.id : b.p1.id;
                let nLog = b.log || []; nLog.push(`${localStorage.getItem('charName') || 'Hős'} kihagyta a kört!`);
                updates['log'] = nLog.slice(-5);
                bRef.update(updates);
            }
        });
    }

    function findMatch() {
        db.ref('battles').once('value', snap => {
            const rooms = snap.val(); let found = null;
            if (rooms) { for (let id in rooms) { if (rooms[id].p2 && rooms[id].p2.id === "waiting" && rooms[id].p1.id !== myId) { found = id; break; } } }
            found ? joinBattle(found) : createNewBattle();
        });
    }

    function createNewBattle() {
        currentRoom = "room_" + Math.random().toString(36).substr(2, 6);
        bRef = db.ref('battles/' + currentRoom);
        db.ref(`characters/${myId}`).once('value', s => {
            const c = s.val();
            const classData = SKILLS_DATA[c.charClass] || SKILLS_DATA["Harcos"];
            bRef.set({
                p1: { id: myId, name: c.name, hp: Number(c.hp), maxHp: Number(c.maxHp), mp: Number(c.mp || 0), maxMp: classData.manaPool, class: c.charClass, atk: (c.atk || 10) + (c.bonusAtk || 0), def: (c.def || 5) },
                p2: { id: "waiting", name: "Várakozás...", hp: 0, maxHp: 100 },
                turn: myId, lastRoll: "?", log: ["Keresés..."], winner: "none"
            });
            bRef.onDisconnect().remove(); listen();
        });
    }

    function joinBattle(id) {
        currentRoom = id; bRef = db.ref('battles/' + currentRoom);
        db.ref(`characters/${myId}`).once('value', s => {
            const c = s.val();
            const classData = SKILLS_DATA[c.charClass] || SKILLS_DATA["Harcos"];
            bRef.update({ 
                "p2": { id: myId, name: c.name, hp: Number(c.hp), maxHp: Number(c.maxHp), mp: Number(c.mp || 0), maxMp: classData.manaPool, class: c.charClass, atk: (c.atk || 10) + (c.bonusAtk || 0), def: (c.def || 5) }, 
                "log": ["A párbaj megkezdődött!"], "winner": "none" 
            });
            listen();
        });
    }

    function listen() {
        bRef.on('value', snap => {
            const b = snap.val(); if(!b) return;
            if (b.winner !== "none" && !rewarded) { 
                clearInterval(turnTimer);
                rewarded = true; 
                showEndScreen(b.winner === myId); 
                return; 
            }
            updateUI(b);
        });
    }

    function updateUI(b) {
        const isP1 = b.p1.id === myId;
        const me = isP1 ? b.p1 : b.p2;
        const opp = isP1 ? b.p2 : b.p1;

        if (b.turn === myId && lastTurnOwner !== myId && isFighting) {
            myCooldowns = myCooldowns.map(c => c > 0 ? c - 1 : 0);
            startTimer();
        } else if (b.turn !== myId) {
            clearInterval(turnTimer);
            document.getElementById('timer-box').style.display = 'none';
        }
        lastTurnOwner = b.turn;

        if (opp.id !== "waiting") {
            isFighting = true;
            document.getElementById('e-name').innerText = opp.name;
            document.getElementById('e-atk-val').innerText = opp.atk;
            document.getElementById('e-def-val').innerText = opp.def;
            document.getElementById('e-img').style.backgroundImage = `url('${HERO_IMGS[opp.class]}')`;
            document.getElementById('e-hp-fill').style.width = (opp.hp/opp.maxHp*100) + "%";
            document.getElementById('e-hp-val').innerText = `${Math.ceil(opp.hp)} / ${opp.maxHp} HP`;
            document.getElementById('e-skills-info').innerHTML = `<b>${opp.class} ellen:</b><br>` + SKILLS_DATA[opp.class].skills.map(s => `• ${s.name}`).join("<br>");
        }

        document.getElementById('p-name').innerText = me.name;
        document.getElementById('p-atk-val').innerText = me.atk;
        document.getElementById('p-def-val').innerText = me.def;
        document.getElementById('p-img').style.backgroundImage = `url('${HERO_IMGS[me.class]}')`;
        document.getElementById('p-hp-fill').style.width = (me.hp/me.maxHp*100) + "%";
        document.getElementById('p-hp-val').innerText = `${Math.ceil(me.hp)} / ${me.maxHp} HP`;
        document.getElementById('p-mp-fill').style.width = (me.mp/me.maxMp*100) + "%";
        document.getElementById('p-mp-val').innerText = `${Math.ceil(me.mp)} / ${me.maxMp} MP`;

        const isMyTurn = (b.turn === myId && isFighting);
        document.getElementById('turn-display').innerText = isMyTurn ? "TE KÖVETKEZEL!" : "ELLENFÉLRE VÁRVA...";
        document.getElementById('p-card').classList.toggle('active', isMyTurn);

        const mySkills = SKILLS_DATA[me.class].skills;
        mySkills.forEach((s, i) => {
            const btn = document.getElementById(`sk-${i}`);
            btn.style.backgroundImage = `url('${s.img}')`;
            
            btn.onmouseover = () => {
                const info = document.getElementById('p-spell-info');
                info.innerHTML = `<b style="color:var(--gold)">${s.name}</b> (💧${s.cost} MP)<br>⏳ CD: ${s.cd} kör | <i>"${s.txt}"</i>`;
                info.classList.add('active');
            };
            btn.onmouseout = () => document.getElementById('p-spell-info').classList.remove('active');

            let cdOverlay = btn.querySelector('.cd-overlay');
            if (myCooldowns[i] > 0) {
                if(!cdOverlay) { cdOverlay = document.createElement('div'); cdOverlay.className='cd-overlay'; btn.appendChild(cdOverlay); }
                cdOverlay.innerText = myCooldowns[i]; btn.disabled = true;
            } else {
                if(cdOverlay) cdOverlay.remove(); btn.disabled = !isMyTurn || me.mp < s.cost;
            }
        });

        document.getElementById('btn-attack').disabled = !isMyTurn;
        document.getElementById('dice').innerText = b.lastRoll;
        document.getElementById('log').innerHTML = b.log ? b.log.map(l => `<div>${l}</div>`).reverse().join('') : "";
        if(isFighting && me.hp <= 0 && b.winner === "none") { bRef.update({ winner: opp.id }); }
    }

    function useSkill(idx) {
        clearInterval(turnTimer);
        bRef.once('value', snap => {
            const b = snap.val();
            const isP1 = b.p1.id === myId;
            const me = isP1 ? b.p1 : b.p2;
            const opp = isP1 ? b.p2 : b.p1;
            const s = SKILLS_DATA[me.class].skills[idx];
            
            myCooldowns[idx] = s.cd;
            let rawDmg = Math.floor((me.atk || 10) * s.power * (0.9 + Math.random() * 0.2));
            let reduction = Math.min(0.8, (opp.def || 0) / 100);
            let finalDmg = Math.max(1, Math.floor(rawDmg * (1 - reduction)));

            const updates = {};
            if (me.class === "Nekromanta" && s.name === "Életelszívás") {
                updates[isP1 ? 'p1/hp' : 'p2/hp'] = Math.min(me.maxHp, me.hp + Math.floor(finalDmg * 0.8));
            }
            if (me.class === "Lovag" && s.name === "Védelmező Aura") {
                updates[isP1 ? 'p1/def' : 'p2/def'] = (me.def || 0) + 20;
            }

            updates[isP1 ? 'p2/hp' : 'p1/hp'] = Math.max(0, opp.hp - finalDmg);
            updates[isP1 ? 'p1/mp' : 'p2/mp'] = me.mp - s.cost;
            updates['turn'] = isP1 ? b.p2.id : b.p1.id;
            updates['lastRoll'] = "✨";
            let nLog = b.log || []; nLog.push(`${me.name} -> ${s.name} (${finalDmg})`);
            updates['log'] = nLog.slice(-5);
            bRef.update(updates);
        });
    }

    function performAction(type) {
        clearInterval(turnTimer);
        bRef.once('value', snap => {
            const b = snap.val();
            const isP1 = b.p1.id === myId;
            const me = isP1 ? b.p1 : b.p2;
            const opp = isP1 ? b.p2 : b.p1;
            
            const roll = Math.floor(Math.random() * 20) + 1;
            let rawDmg = Math.floor((me.atk || 10) * (0.8 + Math.random() * 0.4));
            if (roll === 20) rawDmg = Math.floor(rawDmg * 2.5);

            let reduction = Math.min(0.8, (opp.def || 0) / 100);
            let finalDmg = Math.max(1, Math.floor(rawDmg * (1 - reduction)));
            
            const updates = {};
            updates[isP1 ? 'p2/hp' : 'p1/hp'] = Math.max(0, opp.hp - finalDmg);
            updates['turn'] = isP1 ? b.p2.id : b.p1.id;
            updates['lastRoll'] = roll;
            let nLog = b.log || []; nLog.push(`${me.name}: ${roll===20?'KRITIKUS!':'Ütés'} (${finalDmg})`);
            updates['log'] = nLog.slice(-5);
            bRef.update(updates);
        });
    }

    function showEndScreen(win) {
        document.getElementById('win-screen').classList.add('win-active');
        document.getElementById('win-title').innerText = win ? "GYŐZELEM!" : "VERESÉG!";
        document.getElementById('reward-xp').innerText = win ? "+15 XP" : "+3 XP";
        document.getElementById('reward-gold').innerText = win ? "+10 Arany" : "-2 Arany";
        
        bRef.once('value', snap => {
            const b = snap.val();
            const me = (b.p1.id === myId) ? b.p1 : b.p2;
            db.ref(`characters/${myId}`).once('value', s => {
                const c = s.val();
                db.ref(`characters/${myId}`).update({ 
                    xp: (c.xp || 0) + (win ? 15 : 3), 
                    gold: Math.max(0, (c.gold || 0) + (win ? 10 : -2)),
                    hp: Math.max(0, me.hp),
                    mp: Math.max(0, me.mp),
                    lastUpdate: Date.now(),
                    status: "online" 
                });
            });
        });
    }

    function handleExit() { if(!isFighting || confirm("Kilépsz? A jelenlegi HP-d megmarad!")) safeExit(); }

    function safeExit() { 
        if(bRef) {
            bRef.once('value', snap => {
                const b = snap.val();
                if(b) {
                    const me = (b.p1.id === myId) ? b.p1 : b.p2;
                    db.ref(`characters/${myId}`).update({
                        hp: Math.max(0, me.hp),
                        mp: Math.max(0, me.mp),
                        lastUpdate: Date.now(),
                        status: "online"
                    }).then(() => {
                        bRef.off();
                        window.location.replace('index.html');
                    });
                } else { window.location.replace('index.html'); }
            });
        } else { window.location.replace('index.html'); }
    }

    findMatch();
</script>
</body>
</html>
